<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تأكيد الاستلام — مدرسة الجود</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #1A2A4A 0%, #2d6a9f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 25px 70px rgba(0,0,0,0.35);
    }
    .logo {
      width: 75px;
      margin-bottom: 15px;
    }
    .school-name {
      font-size: 15px;
      color: #C9A84C;
      font-weight: bold;
      margin-bottom: 25px;
      letter-spacing: 0.5px;
    }
    .icon-wrap {
      margin: 10px 0 20px;
    }
    .check-icon {
      font-size: 72px;
      display: block;
      animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes pop {
      0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
      70%  { transform: scale(1.15) rotate(3deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    h1 {
      color: #1A2A4A;
      font-size: 20px;
      margin-bottom: 8px;
    }
    .teacher-name {
      color: #2d6a9f;
      font-size: 22px;
      font-weight: bold;
      margin: 12px 0 6px;
    }
    .date-lbl {
      color: #888;
      font-size: 14px;
      margin-bottom: 22px;
    }
    .info-box {
      background: #f0f8ff;
      border-right: 4px solid #2d6a9f;
      border-radius: 10px;
      padding: 14px 16px;
      margin: 16px 0;
      font-size: 14px;
      color: #333;
      text-align: right;
      line-height: 1.7;
    }
    .status-bar {
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }
    .meta {
      margin-top: 20px;
      font-size: 11px;
      color: #aaa;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e0e0e0;
      border-top-color: #2d6a9f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 10px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo"
      src="https://raw.githubusercontent.com/AlJood-School/grade-dashboard/main/assets/logo_aljood_school.png"
      alt="مدرسة الجود"
      onerror="this.style.display='none'">
    <div class="school-name">مدرسة الجود</div>

    <div class="icon-wrap">
      <span class="check-icon" id="icon">⏳</span>
    </div>

    <h1>تأكيد استلام جدول الاحتياط</h1>
    <div class="teacher-name" id="teacher-name">...</div>
    <div class="date-lbl" id="date-lbl"></div>

    <div class="info-box" id="info-box">
      <div class="spinner"></div>
      جاري تسجيل تأكيدك...
    </div>

    <div class="status-bar" id="status-bar"></div>

    <div class="meta" id="meta"></div>
  </div>

  <script>
    (function () {
      var params  = new URLSearchParams(window.location.search);
      var name    = decodeURIComponent(params.get('n') || 'المعلمة');
      var date    = decodeURIComponent(params.get('d') || '');
      var token   = params.get('t') || (name + '_' + Date.now());

      document.getElementById('teacher-name').textContent = name;
      document.getElementById('date-lbl').textContent     = date;

      var now     = new Date();
      var timeStr = now.toLocaleString('ar-AE', { timeZone: 'Asia/Dubai',
                      hour: '2-digit', minute: '2-digit' });
      var device  = /Mobi|Android/i.test(navigator.userAgent) ? 'موبايل' : 'كمبيوتر';

      var webhook = 'https://webhooks.tasklet.ai/v1/public/webhook?token=1f75fe6c88269f5e877ee2633934e304';

      fetch(webhook, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          event:       'teacher_ack',
          token:       token,
          teacherName: name,
          date:        date,
          time:        timeStr,
          device:      device,
          userAgent:   navigator.userAgent
        })
      })
      .then(function () { showSuccess(timeStr, device); })
      .catch(function () { showSuccess(timeStr, device); }); /* show success anyway */

      function showSuccess(t, d) {
        document.getElementById('icon').textContent = '✅';
        document.getElementById('info-box').innerHTML =
          '<strong>تم التسجيل بنجاح ✅</strong><br>' +
          'استلمتِ جدول الاحتياط وتم إخطار الإدارة.';
        var sb = document.getElementById('status-bar');
        sb.textContent = '📋 وقت التأكيد: ' + t + ' — الجهاز: ' + d;
        sb.style.display = 'block';
        document.getElementById('meta').textContent =
          'رمز التحقق: ' + token.substring(0, 12);
      }
    })();
  </script>
</body>
</html>
