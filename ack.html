<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تأكيد الاستلام — مدرسة الجود</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #1A2A4A 0%, #2d6a9f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 25px 70px rgba(0,0,0,0.35);
    }
    .logo { width: 75px; margin-bottom: 15px; }
    .school-name {
      font-size: 15px; color: #C9A84C; font-weight: bold;
      margin-bottom: 25px; letter-spacing: 0.5px;
    }
    .icon-wrap { margin: 10px 0 20px; }
    .check-icon {
      font-size: 72px; display: block;
      animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes pop {
      0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
      70%  { transform: scale(1.15) rotate(3deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    h1 { color: #1A2A4A; font-size: 20px; margin-bottom: 8px; }
    .teacher-name {
      color: #2d6a9f; font-size: 22px; font-weight: bold;
      margin: 12px 0 6px;
    }
    .date-lbl { color: #888; font-size: 14px; margin-bottom: 22px; }
    .info-box {
      background: #f0f8ff;
      border-right: 4px solid #2d6a9f;
      border-radius: 10px;
      padding: 14px 16px;
      margin: 16px 0;
      font-size: 14px;
      color: #333;
      line-height: 1.7;
    }
    .confirm-btn {
      display: none;
      width: 100%;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
      font-family: inherit;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .confirm-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(34,197,94,0.35); }
    .confirm-btn:active { transform: translateY(0); }
    .status-bar {
      background: #e8f5e9; color: #2e7d32;
      border-radius: 10px; padding: 12px 20px;
      font-size: 13px; margin-top: 16px; display: none;
    }
    .meta { margin-top: 20px; font-size: 11px; color: #aaa; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e0e0e0;
      border-top-color: #2d6a9f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 8px auto;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .opened-notice {
      background: #fff8e1; border-right: 4px solid #f59e0b;
      border-radius: 10px; padding: 12px 14px;
      font-size: 13px; color: #92400e; margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo"
      src="https://raw.githubusercontent.com/AlJood-School/grade-dashboard/main/assets/logo_aljood_school.png"
      alt="مدرسة الجود"
      onerror="this.style.display='none'">
    <div class="school-name">مدرسة الجود</div>

    <div class="icon-wrap">
      <span class="check-icon" id="icon">📋</span>
    </div>

    <h1>إشعار احتياط</h1>
    <div class="teacher-name" id="teacher-name">...</div>
    <div class="date-lbl" id="date-lbl"></div>

    <div class="opened-notice" id="opened-notice">
      ✅ تم تسجيل استلامكِ للإشعار — يرجى الضغط على زر التأكيد أدناه
    </div>

    <div class="info-box" id="info-box">
      <div class="spinner"></div>
      جاري التحقق...
    </div>

    <button class="confirm-btn" id="confirm-btn" onclick="doConfirm()">
      ✅ أؤكد استلام جدول الاحتياط
    </button>

    <div class="status-bar" id="status-bar"></div>
    <div class="meta" id="meta"></div>
  </div>

  <script>
    (function () {
      var params      = new URLSearchParams(window.location.search);
      var name        = decodeURIComponent(params.get('n') || 'المعلمة');
      var dateKey     = decodeURIComponent(params.get('d') || '');
      var dateDisplay = decodeURIComponent(params.get('ds') || dateKey);
      var token       = params.get('t') || (name.replace(/\s/g,'_') + '_' + Date.now());

      document.getElementById('teacher-name').textContent = name;
      document.getElementById('date-lbl').textContent     = dateDisplay || dateKey;

      var webhook = 'https://webhooks.tasklet.ai/v1/public/webhook?token=1f75fe6c88269f5e877ee2633934e304';

      var now     = new Date();
      var timeStr = now.toLocaleTimeString('ar-AE', { timeZone:'Asia/Dubai', hour:'2-digit', minute:'2-digit' });
      var device  = /Mobi|Android/i.test(navigator.userAgent) ? 'موبايل' : 'كمبيوتر';

      /* ── المرحلة 1: page_opened — عند مجرد فتح الرابط ── */
      fetch(webhook, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          event:       'page_opened',
          token:       token,
          teacherName: name,
          dateKey:     dateKey,
          dateDisplay: dateDisplay,
          time:        timeStr,
          device:      device,
          userAgent:   navigator.userAgent
        })
      })
      .then(function() { showConfirmStep(); })
      .catch(function() { showConfirmStep(); });

      function showConfirmStep() {
        document.getElementById('icon').textContent = '📋';
        document.getElementById('info-box').innerHTML =
          '<strong>مرحباً ' + name + '</strong><br>' +
          'يرجى تأكيد استلامكِ لجدول الاحتياط بالضغط على الزر أدناه.';
        document.getElementById('opened-notice').style.display = 'block';
        document.getElementById('confirm-btn').style.display   = 'block';
      }

      /* ── المرحلة 2: teacher_ack — عند الضغط على زر التأكيد ── */
      window.doConfirm = function() {
        var btn = document.getElementById('confirm-btn');
        btn.disabled = true;
        btn.textContent = '⏳ جاري التأكيد...';

        var now2     = new Date();
        var timeStr2 = now2.toLocaleTimeString('ar-AE', { timeZone:'Asia/Dubai', hour:'2-digit', minute:'2-digit' });

        fetch(webhook, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            event:       'teacher_ack',
            token:       token,
            teacherName: name,
            dateKey:     dateKey,
            dateDisplay: dateDisplay,
            time:        timeStr2,
            device:      device,
            userAgent:   navigator.userAgent
          })
        })
        .then(function()  { showSuccess(timeStr2, device); })
        .catch(function() { showSuccess(timeStr2, device); });
      };

      function showSuccess(t, d) {
        document.getElementById('icon').textContent = '✅';
        document.getElementById('info-box').innerHTML =
          '<strong>تم التأكيد بنجاح ✅</strong><br>' +
          'استلمتِ جدول الاحتياط وتم إخطار الإدارة.';
        document.getElementById('opened-notice').style.display = 'none';
        document.getElementById('confirm-btn').style.display   = 'none';
        var sb = document.getElementById('status-bar');
        sb.textContent = '📋 وقت التأكيد: ' + t + ' — الجهاز: ' + d;
        sb.style.display = 'block';
        document.getElementById('meta').textContent = 'رمز التحقق: ' + token.substring(0,12);
      }
    })();
  </script>
</body>
</html>
