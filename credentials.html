<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بطاقات بيانات دخول الطلاب — مدرسة الجود</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #e8c96a;
    --navy: #1A2A4A;
    --navy-light: #243558;
    --bg: #f0f4f8;
    --card-w: 280px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--navy);
    min-height: 100vh;
  }

  /* ───── HEADER ───── */
  .top-bar {
    background: var(--navy);
    color: white;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    justify-content: space-between;
    flex-wrap: wrap;
  }
  .top-bar .logos { display: flex; align-items: center; gap: 12px; }
  .top-bar img { height: 46px; }
  .top-bar h1 { font-size: 1.15rem; font-weight: 700; color: var(--gold); line-height: 1.3; }
  .top-bar h1 small { display: block; font-size: 0.72rem; color: #ccc; font-weight: 400; }

  /* ───── CONTROLS ───── */
  .controls {
    background: white;
    border-bottom: 3px solid var(--gold);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .controls label { font-weight: 600; font-size: 0.9rem; color: var(--navy); }
  .controls select, .controls input {
    font-family: 'Cairo', sans-serif;
    border: 2px solid #ddd;
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 0.88rem;
    color: var(--navy);
    background: white;
    cursor: pointer;
    transition: border-color .2s;
    outline: none;
  }
  .controls select:focus, .controls input:focus { border-color: var(--gold); }
  .btn {
    font-family: 'Cairo', sans-serif;
    padding: 8px 20px;
    border-radius: 8px;
    border: none;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-gold { background: var(--gold); color: white; }
  .btn-gold:hover { background: var(--gold-light); color: var(--navy); }
  .btn-navy { background: var(--navy); color: white; }
  .btn-navy:hover { background: var(--navy-light); }
  .btn-green { background: #22c55e; color: white; }
  .btn-green:hover { background: #16a34a; }

  .stat-badge {
    background: var(--navy);
    color: var(--gold);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.82rem;
    font-weight: 700;
    margin-right: auto;
  }

  /* ───── GRID ───── */
  .grid-wrap { padding: 20px 24px; }
  .class-section { margin-bottom: 32px; }
  .class-title {
    font-size: 1.05rem;
    font-weight: 900;
    color: white;
    background: var(--navy);
    padding: 8px 18px;
    border-radius: 8px 8px 0 0;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border-right: 5px solid var(--gold);
  }
  .class-title span { background: var(--gold); color: var(--navy); border-radius: 12px; padding: 2px 10px; font-size: 0.8rem; }
  .cards-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    padding: 14px;
    background: white;
    border-radius: 0 8px 8px 8px;
    border: 1px solid #e2e8f0;
  }

  /* ───── CREDENTIAL CARD ───── */
  .cred-card {
    width: var(--card-w);
    border: 2px solid var(--navy);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    background: white;
    position: relative;
    page-break-inside: avoid;
    break-inside: avoid;
  }
  .cred-card .card-header {
    background: var(--navy);
    padding: 10px 12px 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cred-card .card-header img { height: 32px; }
  .cred-card .card-header .school-name {
    color: var(--gold);
    font-size: 0.8rem;
    font-weight: 700;
    line-height: 1.3;
  }
  .cred-card .card-header .school-name small { display: block; color: #aaa; font-size: 0.65rem; font-weight: 400; }
  .cred-card .card-body { padding: 10px 14px 12px; }
  .cred-card .student-name {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 2px;
    line-height: 1.4;
    border-bottom: 1px dashed var(--gold);
    padding-bottom: 6px;
    margin-bottom: 8px;
  }
  .cred-card .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
    font-size: 0.8rem;
  }
  .cred-card .info-label { color: #666; }
  .cred-card .info-value {
    font-weight: 700;
    color: var(--navy);
    font-family: monospace;
    font-size: 0.82rem;
    background: #f5f7fa;
    padding: 2px 8px;
    border-radius: 4px;
    direction: ltr;
    text-align: left;
  }
  .cred-card .info-value.password {
    background: #fef9ec;
    color: #b45309;
    border: 1px dashed var(--gold);
    letter-spacing: 1px;
  }
  .cred-card .portal-url {
    margin-top: 8px;
    text-align: center;
    font-size: 0.65rem;
    color: #888;
    border-top: 1px solid #eee;
    padding-top: 6px;
    direction: ltr;
  }
  .cred-card .class-badge {
    position: absolute;
    top: 8px;
    left: 10px;
    background: var(--gold);
    color: var(--navy);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 0.7rem;
    font-weight: 900;
  }

  /* ───── EMPTY STATE ───── */
  .empty { text-align: center; padding: 60px 20px; color: #94a3b8; font-size: 1.1rem; }

  /* ───── LOADING ───── */
  .loader {
    text-align: center;
    padding: 60px;
    font-size: 1.1rem;
    color: var(--navy);
  }
  .loader .spin {
    display: inline-block;
    width: 40px; height: 40px;
    border: 4px solid #ddd;
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ───── PRINT ───── */
  @media print {
    .top-bar, .controls { display: none !important; }
    body { background: white; }
    .grid-wrap { padding: 0; }
    .class-section { page-break-after: always; margin-bottom: 0; }
    .class-title { border-radius: 8px 8px 0 0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .cards-grid { border: none; padding: 8px; }
    .cred-card { box-shadow: none; border: 1.5px solid var(--navy); }
    .cred-card .card-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .cred-card .info-value.password { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .class-badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="top-bar">
  <div class="logos">
    <img src="assets/logo_ministry_uae.png" alt="وزارة التربية" onerror="this.style.display='none'">
    <img src="assets/logo_aljood_school.png" alt="مدرسة الجود" onerror="this.style.display='none'">
  </div>
  <div>
    <h1>بطاقات بيانات دخول الطلاب
      <small>Al Jood School — Student Credential Cards</small>
    </h1>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <label for="classFilter">🎓 الفصل:</label>
  <select id="classFilter" onchange="renderCards()">
    <option value="all">جميع الفصول</option>
  </select>

  <label for="stageFilter">📚 المرحلة:</label>
  <select id="stageFilter" onchange="applyStageFilter()">
    <option value="all">جميع المراحل</option>
    <option value="kg">الروضة (KG)</option>
    <option value="prim_low">الابتدائية الدنيا (1-3)</option>
    <option value="prim_high">الابتدائية العليا (4-6)</option>
    <option value="middle">الإعدادية (7-8)</option>
  </select>

  <label for="searchInput">🔍</label>
  <input type="text" id="searchInput" placeholder="ابحث بالاسم أو رقم الهوية..." style="width:200px" oninput="renderCards()">

  <span class="stat-badge" id="statBadge">0 طالب</span>

  <button class="btn btn-navy" onclick="window.print()">🖨️ طباعة</button>
  <button class="btn btn-gold" onclick="exportCSV()">📥 تصدير CSV</button>
</div>

<!-- CONTENT -->
<div class="grid-wrap" id="gridWrap">
  <div class="loader">
    <div class="spin"></div><br>
    جاري تحميل بيانات الطلاب...
  </div>
</div>

<script>
let ALL_STUDENTS = {}; // {className: [students]}
const PORTAL_URL = 'https://aljood-school.github.io/grade-dashboard/';

// Build password from student ID: "Jood" + last 4 digits
function buildPassword(id) {
  const str = String(id);
  return 'Jood@' + str.slice(-4);
}

// Stage for a class name
function getStage(cls) {
  if (/^KG/i.test(cls)) return 'kg';
  const n = parseInt(cls.replace(/[^\d]/g,''));
  if (n <= 3) return 'prim_low';
  if (n <= 6) return 'prim_high';
  return 'middle';
}

function getStageLabel(cls) {
  const s = getStage(cls);
  return { kg:'الروضة', prim_low:'ابتدائي دنيا', prim_high:'ابتدائي عليا', middle:'إعدادي' }[s];
}

// Arabic class name
function arabicClass(cls) {
  const map = {
    'KG1':'روضة أولى','KG2':'روضة ثانية',
    '1':'الصف الأول','2':'الصف الثاني','3':'الصف الثالث',
    '4':'الصف الرابع','5':'الصف الخامس','6':'الصف السادس',
    '7':'الصف السابع','8':'الصف الثامن'
  };
  const grade = cls.replace(/[A-Z]$/,'');
  const sec = cls.slice(-1);
  const secAr = {A:'أ',B:'ب',C:'ج',D:'د',E:'هـ',F:'و'}[sec] || sec;
  return (map[grade] || cls) + ' — ' + secAr;
}

async function loadData() {
  try {
    const resp = await fetch('data/students.json');
    ALL_STUDENTS = await resp.json();

    // Populate class dropdown
    const sel = document.getElementById('classFilter');
    Object.keys(ALL_STUDENTS).forEach(cls => {
      const opt = document.createElement('option');
      opt.value = cls;
      opt.textContent = `${cls} — ${arabicClass(cls)} (${ALL_STUDENTS[cls].length})`;
      sel.appendChild(opt);
    });

    renderCards();
  } catch(e) {
    document.getElementById('gridWrap').innerHTML = `<div class="empty">⚠️ تعذّر تحميل بيانات الطلاب<br><small>${e.message}</small></div>`;
  }
}

function applyStageFilter() {
  const stage = document.getElementById('stageFilter').value;
  const sel = document.getElementById('classFilter');
  sel.value = 'all'; // reset class filter
  // We'll filter in renderCards
  renderCards(stage);
}

function renderCards(stageOverride) {
  const classFilter = document.getElementById('classFilter').value;
  const stageFilter = stageOverride || document.getElementById('stageFilter').value;
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const wrap = document.getElementById('gridWrap');

  let classesToShow = Object.keys(ALL_STUDENTS);

  // Apply class filter
  if (classFilter !== 'all') {
    classesToShow = classesToShow.filter(c => c === classFilter);
  }

  // Apply stage filter
  if (stageFilter !== 'all') {
    classesToShow = classesToShow.filter(c => getStage(c) === stageFilter);
  }

  let totalCount = 0;
  let html = '';

  classesToShow.forEach(cls => {
    let students = ALL_STUDENTS[cls];

    // Apply search
    if (search) {
      students = students.filter(s =>
        s.nameAr.toLowerCase().includes(search) ||
        s.nameEn.toLowerCase().includes(search) ||
        String(s.id).includes(search)
      );
    }

    if (!students.length) return;
    totalCount += students.length;

    html += `
    <div class="class-section" data-class="${cls}" data-stage="${getStage(cls)}">
      <div class="class-title">
        🎓 ${arabicClass(cls)}
        <span>${cls}</span>
        <span style="background:#e2e8f0;color:var(--navy)">${getStageLabel(cls)}</span>
        <span style="background:#22c55e">${students.length} طالب</span>
      </div>
      <div class="cards-grid">
        ${students.map(s => buildCard(s, cls)).join('')}
      </div>
    </div>`;
  });

  if (!html) {
    wrap.innerHTML = `<div class="empty">🔍 لا توجد نتائج مطابقة</div>`;
    document.getElementById('statBadge').textContent = '0 طالب';
    return;
  }

  wrap.innerHTML = html;
  document.getElementById('statBadge').textContent = `${totalCount.toLocaleString('ar-EG')} طالب`;
}

function buildCard(s, cls) {
  const pw = buildPassword(s.id);
  return `
  <div class="cred-card">
    <div class="card-header">
      <img src="assets/logo_aljood_school.png" alt="الجود" onerror="this.style.display='none'">
      <div class="school-name">مدرسة الجود<small>Al Jood School</small></div>
    </div>
    <span class="class-badge">${cls}</span>
    <div class="card-body">
      <div class="student-name">${s.nameAr}</div>
      <div style="font-size:0.68rem;color:#888;margin-bottom:8px;direction:ltr">${s.nameEn}</div>
      <div class="info-row">
        <span class="info-label">🪪 رقم الطالب</span>
        <span class="info-value">${s.id}</span>
      </div>
      <div class="info-row">
        <span class="info-label">👤 اسم المستخدم</span>
        <span class="info-value">${s.id}</span>
      </div>
      <div class="info-row">
        <span class="info-label">🔐 كلمة المرور</span>
        <span class="info-value password">${pw}</span>
      </div>
      <div class="portal-url">${PORTAL_URL}</div>
    </div>
  </div>`;
}

function exportCSV() {
  const classFilter = document.getElementById('classFilter').value;
  const stageFilter = document.getElementById('stageFilter').value;
  const search = document.getElementById('searchInput').value.trim().toLowerCase();

  let rows = [['الاسم بالعربي','الاسم بالإنجليزي','رقم الطالب','الفصل','المرحلة','اسم المستخدم','كلمة المرور','رابط البوابة']];

  Object.entries(ALL_STUDENTS).forEach(([cls, students]) => {
    if (classFilter !== 'all' && cls !== classFilter) return;
    if (stageFilter !== 'all' && getStage(cls) !== stageFilter) return;

    students.forEach(s => {
      if (search && !s.nameAr.toLowerCase().includes(search) && !s.nameEn.toLowerCase().includes(search) && !String(s.id).includes(search)) return;
      rows.push([s.nameAr, s.nameEn, s.id, cls, getStageLabel(cls), s.id, buildPassword(s.id), PORTAL_URL]);
    });
  });

  const csv = '\uFEFF' + rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `student_credentials_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// Init
loadData();
</script>
</body>
</html>
