<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Planning Boards — Class 3A</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: #f0f0f0;
    padding: 10px;
  }

  @media print {
    body { background: white; padding: 0; }
    .page-break { page-break-after: always; }
    .no-print { display: none; }
    @page { size: A3 landscape; margin: 8mm; }
    .board { box-shadow: none; border: 1px solid #ddd; }
    .write-line, .write-line-lg { border-bottom-color: #999 !important; }
  }

  /* ===== PRINT BUTTON ===== */
  .print-btn {
    display: block;
    margin: 15px auto;
    padding: 14px 40px;
    background: #1a237e;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    font-weight: 700;
    transition: background 0.2s;
  }
  .print-btn:hover { background: #283593; }

  /* ===== BOARD WRAPPER ===== */
  .board {
    width: 420mm;
    min-height: 288mm;
    max-width: 100%;
    background: white;
    margin: 0 auto 24px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
  }

  /* ===== HEADER ===== */
  .board-header {
    padding: 12px 24px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: white;
  }
  .team-info { display: flex; align-items: center; gap: 12px; }
  .team-emoji { font-size: 44px; line-height: 1; }
  .team-name { font-size: 28px; font-weight: 900; letter-spacing: 0.5px; }
  .team-name-ar { font-size: 15px; font-weight: 600; opacity: 0.85; margin-top: 2px; font-family: 'Tajawal', sans-serif; }
  .school-badge { text-align: right; font-size: 12px; opacity: 0.9; line-height: 1.7; }

  /* ===== MEMBERS ROW ===== */
  .members-row {
    display: flex;
    padding: 8px 16px 8px;
    background: white;
    border-bottom: 2.5px solid #e8ecf0;
    gap: 8px;
    justify-content: center;
    flex-wrap: nowrap;
  }
  /* Fixed width — same regardless of 5 or 6 members */
  .member-card {
    width: 116px;
    flex-shrink: 0;
    border-radius: 10px;
    padding: 7px 6px 6px;
    text-align: center;
    border: 2px solid #e0e0e0;
    background: #fafafa;
  }
  .member-card.special {
    border-color: #42a5f5;
    background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
  }
  .member-pc { font-size: 10px; color: #9e9e9e; font-weight: 700; margin-bottom: 2px; }
  .member-name { font-size: 12px; font-weight: 800; color: #1a237e; line-height: 1.3; font-family: 'Tajawal', sans-serif; }
  .special-badge { font-size: 9px; color: #1565c0; font-weight: 700; margin-top: 1px; }
  .member-role-badge {
    font-size: 9px;
    font-weight: 700;
    margin-top: 4px;
    padding: 2px 5px;
    border-radius: 20px;
    color: white;
    display: inline-block;
    line-height: 1.3;
  }
  .member-role-ar { font-size: 8px; color: #777; margin-top: 2px; font-family: 'Tajawal', sans-serif; direction: rtl; }

  /* ===== MAIN BODY — 3 EQUAL COLUMNS ===== */
  .board-body {
    display: grid;
    grid-template-columns: 1.05fr 0.95fr 1fr;
    gap: 10px;
    flex: 1;
    padding: 10px 14px 12px;
  }

  /* ===== SECTION BOX ===== */
  .section {
    border-radius: 12px;
    padding: 10px 12px 10px;
    border: 2px solid #e0e0e0;
    background: #fafafa;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 2px solid #eeeeee;
  }
  .section-title-en { font-size: 13px; font-weight: 900; color: #1a237e; }
  .section-title-ar { font-size: 10px; font-weight: 700; color: #9e9e9e; font-family: 'Tajawal', sans-serif; direction: rtl; }

  /* ===== QUESTION BLOCKS ===== */
  .q-block { margin-bottom: 8px; }
  .q-label-en { font-size: 12px; font-weight: 900; color: #263238; }
  .q-label-ar {
    font-size: 9px; color: #bdbdbd;
    font-family: 'Tajawal', sans-serif;
    direction: rtl;
    margin-bottom: 3px;
    line-height: 1.2;
  }

  /* ─── THE KEY CHANGE: Wide, solid, Grade-3-friendly writing lines ─── */
  .write-line {
    display: block;
    width: 100%;
    height: 38px;
    border: none;
    border-bottom: 2.5px solid #90a4ae;
    background: transparent;
    margin-top: 2px;
  }
  .write-line-lg {
    display: block;
    width: 100%;
    height: 44px;
    border: none;
    border-bottom: 2.5px solid #90a4ae;
    background: transparent;
    margin-top: 2px;
  }
  /* Double-line for 2-line answers */
  .write-line + .write-line,
  .write-line-lg + .write-line-lg {
    margin-top: 6px;
  }

  /* ===== ROBOT NAME BOX ===== */
  .robot-name-block {
    margin-top: 6px;
    padding: 7px 12px;
    background: white;
    border: 2px dashed #90a4ae;
    border-radius: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .robot-label-en { font-size: 11px; font-weight: 800; color: #546e7a; white-space: nowrap; }
  .robot-label-ar { font-size: 8px; color: #b0bec5; font-family: 'Tajawal', sans-serif; direction: rtl; white-space: nowrap; }
  .robot-input-line { flex: 1; border-bottom: 2px solid #90a4ae; height: 22px; }

  /* ===== DRAW BOX ===== */
  .draw-outer {
    flex: 1;
    border: 2.5px dashed #90a4ae;
    border-radius: 12px;
    background: white;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 150px;
  }
  .draw-hint {
    background: #f5f5f5;
    border-bottom: 1.5px dashed #e0e0e0;
    padding: 4px 8px;
    text-align: center;
    font-size: 9px;
    color: #aaa;
    font-weight: 700;
    line-height: 1.4;
  }
  .draw-hint span { font-family: 'Tajawal', sans-serif; direction: rtl; display: block; font-size: 8px; }
  .draw-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    flex: 1;
  }
  .draw-cell {
    border: 1px dashed #e8e8e8;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    padding: 4px 6px;
  }
  .draw-cell-label {
    font-size: 8px;
    color: #d0d0d0;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* ===== UAE FACT BOX ===== */
  .uae-box {
    border-radius: 10px;
    padding: 8px 10px;
    margin-bottom: 8px;
    border: 2px solid transparent;
  }
  .uae-flag-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .uae-flag-label { font-size: 11px; font-weight: 900; color: inherit; }
  .uae-fact-en { font-size: 10.5px; font-weight: 700; line-height: 1.45; color: #263238; }
  .uae-fact-ar { font-size: 9px; font-family: 'Tajawal', sans-serif; direction: rtl; color: #607d8b; margin-top: 2px; }

  /* ===== STAR RATING ===== */
  .rating-section { margin-top: 6px; }
  .rating-head { margin-bottom: 5px; }
  .rating-title-en { font-size: 12px; font-weight: 900; color: #1a237e; }
  .rating-title-ar { font-size: 9px; color: #9e9e9e; font-family: 'Tajawal', sans-serif; direction: rtl; }
  .stars-row { display: flex; gap: 6px; }
  .star-box {
    flex: 1;
    border: 2px solid #e8e8e8;
    border-radius: 10px;
    padding: 6px 4px 5px;
    text-align: center;
    background: white;
  }
  .star-emoji { font-size: 18px; display: block; }
  .star-label-en { font-size: 9px; font-weight: 800; color: #333; display: block; margin-top: 2px; }
  .star-label-ar { font-size: 8px; color: #aaa; direction: rtl; display: block; font-family: 'Tajawal', sans-serif; }
  .star-circles { display: flex; justify-content: center; gap: 4px; margin-top: 5px; }
  .star-circle {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid #cfd8dc;
    background: white;
  }
</style>
</head>
<body>

<button class="print-btn no-print" onclick="window.print()">🖨️ Print All 5 Boards — اطبع جميع اللوحات</button>

  'Designer 🎨': '#8e24aa',
  'Programmer 💻': '#1565c0',
  'Researcher 🔍': '#2e7d32',
  'Presenter 📢': '#ef6c00',
  'Time Keeper ⏱️': '#00838f',
  'Materials Manager 📋': '#558b2f',
};

function buildBoard(g) {
  const membersHTML = g.members.map(m => `
    <div class="member-card ${m.special ? 'special' : ''}">
      <div class="member-pc">PC ${m.pc}</div>
      <div class="member-name">${m.name}</div>
      ${m.special ? '<div class="special-badge">💙 Support</div>' : ''}
      <div class="member-role-badge" style="background:${roleColors[m.role_en] || '#607d8b'}">${m.role_en}</div>
      <div class="member-role-ar">${m.role_ar}</div>
    </div>
  `).join('');

  return `
  <div class="board">

    <!-- ── HEADER ── -->
    <div class="board-header" style="background: linear-gradient(135deg, ${g.color} 0%, ${g.color}cc 100%);">
      <div class="team-info">
        <div class="team-emoji">${g.emoji}</div>
        <div>
          <div class="team-name">${g.name_en}</div>
          <div class="team-name-ar">${g.name_ar}</div>
        </div>
      </div>
      <div class="school-badge">

      </div>
    </div>

    <!-- ── MEMBERS ── -->
    <div class="members-row">${membersHTML}</div>

    <!-- ── BODY: 3 COLUMNS ── -->

        <div class="section-head">
          <div class="section-title-en">🤖 Our Robot's Mission</div>
          <div class="section-title-ar">مهمة روبوتنا</div>
        </div>

        <div class="q-block">
          <div class="q-label-en">1 · Who does it help?</div>
          <div class="q-label-ar">من يساعد الروبوت؟</div>
          <div class="write-line-lg"></div>
        </div>

        <div class="q-block">
          <div class="q-label-en">2 · How does it help?</div>
          <div class="q-label-ar">كيف يساعد؟</div>
          <div class="write-line-lg"></div>
          <div class="write-line-lg" style="margin-top:5px;"></div>
        </div>

        <div class="q-block">
          <div class="q-label-en">3 · Where does it work?</div>
          <div class="q-label-ar">أين يعمل الروبوت؟</div>
          <div class="write-line-lg"></div>
        </div>

        <div class="robot-name-block">
          <div>
            <div class="robot-label-en">🤖 Robot Name:</div>
            <div class="robot-label-ar">اسم الروبوت</div>
          </div>
          <div class="robot-input-line"></div>
        </div>
      </div>

      <!-- ══ COLUMN 2: DRAW THE ROBOT ══ -->
      <div class="section" style="border-color:${g.color}35">
        <div class="section-head">
          <div class="section-title-en">✏️ Design Your Robot!</div>
          <div class="section-title-ar">صمّم روبوتك — كل عضو يرسم جزءاً</div>
        </div>
        <div class="draw-outer">
          <div class="draw-hint">
            Each member adds one part to the robot!
            <span>كل عضو يرسم جزءاً واحداً من الروبوت</span>
          </div>
          <div class="draw-grid">
            <div class="draw-cell"><span class="draw-cell-label">HEAD 🦾</span></div>
            <div class="draw-cell"><span class="draw-cell-label">HEAD 🦾</span></div>
            <div class="draw-cell"><span class="draw-cell-label">BODY ⚙️</span></div>
            <div class="draw-cell"><span class="draw-cell-label">ARMS 💪</span></div>
          </div>
        </div>
      </div>

      <!-- ══ COLUMN 3: UAE + RATING ══ -->
      <div class="section" style="border-color:${g.color}35">
        <div class="section-head">
          <div class="section-title-en">🇦🇪 UAE Connection</div>
          <div class="section-title-ar">ربطنا بالإمارات</div>
        </div>

        <div class="uae-box" style="background:${g.color}12; border-color:${g.color}30">
          <div class="uae-flag-row">

          <div class="write-line-lg"></div>

        <div class="rating-section">

              <span class="star-label-en">Teamwork</span>

              <div class="star-circles">
                <div class="star-circle"></div>
                <div class="star-circle"></div>
                <div class="star-circle"></div>
              </div>
            </div>
            <div class="star-box">
              <span class="star-emoji">💡</span>
              <span class="star-label-en">Ideas</span>
              <span class="star-label-ar">الأفكار</span>
              <div class="star-circles">
                <div class="star-circle"></div>
                <div class="star-circle"></div>
                <div class="star-circle"></div>
              </div>
            </div>
            <div class="star-box">
              <span class="star-emoji">⏱️</span>

              <div class="star-circles">

              </div>
            </div>
          </div>
        </div>

      </div><!-- /col3 -->

    </div><!-- /board-body -->
  </div><!-- /board -->
  `;
}

document.addEventListener('DOMContentLoaded', () => {
  const container = document.getElementById('boards-container');
  groups.forEach((g, i) => {
    container.innerHTML += buildBoard(g);
    if (i < groups.length - 1) {
      container.innerHTML += '<div class="page-break"></div>';
    }
  });
});
</script>

<div id="boards-container"></div>

</body>
</html>
