<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Planning Boards — Class 3A</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: #e8eaf0;
    padding: 16px;
  }

  @page { size: A3 landscape; margin: 8mm; }

  @media print {
    body { background: white !important; padding: 0; }
    .page-break { page-break-after: always; }
    .no-print { display: none !important; }

    .board { box-shadow: none !important; border: 1.5px solid #bbb !important; }

    .board-header {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .member-card { background: white !important; border: 1.5px solid #aaa !important; }
    .member-card.special { background: #e3f2fd !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .member-role-badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    .section-top-bar { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .uae-box { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    .write-line, .write-line-lg { border-bottom: 2px solid #555 !important; }
    .draw-outer { border: 2px dashed #888 !important; }
    .rating-circle { border: 2px solid #555 !important; }
  }

  /* ══════════════════════════════════════
     PRINT BUTTON
  ══════════════════════════════════════ */
  .print-btn {
    display: block;
    margin: 0 auto 20px;
    padding: 14px 44px;
    background: #1a237e;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    font-weight: 700;
  }
  .print-btn:hover { background: #283593; }

  /* ══════════════════════════════════════
     BOARD WRAPPER — no forced min-height
  ══════════════════════════════════════ */
  .board {
    width: 410mm;
    max-width: 100%;
    background: white;
    margin: 0 auto 28px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 6px 28px rgba(0,0,0,0.18);
  }

  /* ══════════════════════════════════════
     HEADER — dark team-color background (original)
  ══════════════════════════════════════ */
  .board-header {
    padding: 14px 22px 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    color: white;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .team-emoji { font-size: 48px; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
  .team-name   { font-size: 28px; font-weight: 900; color: white; letter-spacing: 0.5px; line-height: 1.1; }
  .team-name-ar { font-size: 15px; font-weight: 700; opacity: 0.85; font-family: 'Tajawal', sans-serif; margin-top: 2px; }
  .header-deco  { font-size: 42px; opacity: 0.2; letter-spacing: -4px; }
  .school-badge {
    text-align: right;
    font-size: 11px;
    line-height: 1.8;
    color: rgba(255,255,255,0.85);
    background: rgba(0,0,0,0.18);
    border-radius: 10px;
    padding: 6px 12px;
  }

  /* ══════════════════════════════════════
     MEMBERS ROW
  ══════════════════════════════════════ */
  .members-row {
    display: flex;
    padding: 10px 18px 10px;
    background: white;
    border-bottom: 2.5px solid #e8ecf0;
    gap: 8px;
    justify-content: center;
    flex-wrap: nowrap;
  }
  .member-card {
    width: 116px;
    flex-shrink: 0;
    border-radius: 10px;
    padding: 7px 6px 7px;
    text-align: center;
    border: 2px solid #e0e0e0;
    background: #fafafa;
  }
  .member-card.special {
    border-color: #42a5f5;
    background: linear-gradient(135deg, #e3f2fd, #bbdefb);
  }
  .member-pc   { font-size: 10px; color: #9e9e9e; font-weight: 700; margin-bottom: 2px; }
  .member-name { font-size: 11.5px; font-weight: 800; color: #1a237e; line-height: 1.3; font-family: 'Tajawal', sans-serif; }
  .special-badge { font-size: 9px; color: #1565c0; font-weight: 700; margin-top: 2px; }
  .member-role-badge {
    font-size: 9px; font-weight: 700; margin-top: 5px;
    padding: 2px 5px; border-radius: 20px;
    color: white; display: inline-block; line-height: 1.3;
  }
  .member-role-ar { font-size: 8px; color: #777; margin-top: 2px; font-family: 'Tajawal', sans-serif; direction: rtl; }

  /* ══════════════════════════════════════
     BOARD BODY — 3 columns, content height
  ══════════════════════════════════════ */
  .board-body {
    display: grid;
    grid-template-columns: 1.05fr 0.9fr 1.05fr;
    gap: 12px;
    padding: 12px 16px 16px;
    align-items: start;   /* ← KEY: no stretching */
  }

  /* ══════════════════════════════════════
     SECTION BOX
  ══════════════════════════════════════ */
  .section {
    border-radius: 12px;
    border: 2px solid #e0e0e0;
    background: #fafafa;
    overflow: hidden;
  }
  .section-top-bar {
    padding: 7px 12px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid rgba(0,0,0,0.08);
  }
  .section-title-en { font-size: 13px; font-weight: 900; color: white; }
  .section-title-ar { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.8); font-family: 'Tajawal', sans-serif; direction: rtl; }
  .section-body { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 10px; }

  /* ══════════════════════════════════════
     QUESTION BLOCKS
  ══════════════════════════════════════ */
  .q-block { display: flex; flex-direction: column; gap: 2px; }
  .q-num   { font-size: 11px; font-weight: 900; color: #263238; }
  .q-ar    { font-size: 9px; color: #b0bec5; font-family: 'Tajawal', sans-serif; direction: rtl; line-height: 1.2; margin-bottom: 2px; }

  /* Writing lines */
  .write-line {
    display: block; width: 100%;
    height: 40px;
    border: none;
    border-bottom: 2.5px solid #90a4ae;
    background: transparent;
  }
  .write-line + .write-line { margin-top: 8px; }

  /* Robot name pill */
  .robot-name-block {
    padding: 8px 12px;
    background: white;
    border: 2px dashed #90a4ae;
    border-radius: 30px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .robot-label-en { font-size: 11px; font-weight: 800; color: #546e7a; white-space: nowrap; }
  .robot-label-ar { font-size: 8px; color: #b0bec5; font-family: 'Tajawal', sans-serif; direction: rtl; }
  .robot-input-line { flex: 1; border-bottom: 2px solid #90a4ae; height: 24px; }

  /* ══════════════════════════════════════
     DRAW BOX — empty, fixed height
  ══════════════════════════════════════ */
  .draw-outer {
    border: 2.5px dashed #90a4ae;
    border-radius: 10px;
    background: white;
    height: 195px;
    position: relative;
    margin-top: 4px;
  }
  .draw-outer::after {
    content: '🤖';
    position: absolute;
    bottom: 8px;
    right: 10px;
    font-size: 38px;
    opacity: 0.06;
    pointer-events: none;
  }
  .draw-hint {
    border-bottom: 1.5px dashed #e8e8e8;
    padding: 4px 8px;
    text-align: center;
    font-size: 9px;
    color: #bdbdbd;
    font-weight: 700;
    line-height: 1.4;
  }
  .draw-hint span { font-family: 'Tajawal', sans-serif; direction: rtl; display: block; font-size: 8px; }

  /* ══════════════════════════════════════
     UAE FACT BOX
  ══════════════════════════════════════ */
  .uae-box {
    border-radius: 10px;
    padding: 9px 11px;
    border: 2px solid transparent;
  }
  .uae-flag-row { display: flex; align-items: flex-start; gap: 7px; margin-bottom: 4px; }
  .uae-fact-en  { font-size: 10.5px; font-weight: 700; line-height: 1.45; color: #263238; }
  .uae-fact-ar  { font-size: 9px; font-family: 'Tajawal', sans-serif; direction: rtl; color: #607d8b; margin-top: 2px; }

  /* ══════════════════════════════════════
     STAR RATING
  ══════════════════════════════════════ */
  .rating-head { margin-bottom: 6px; }
  .rating-title-en { font-size: 12px; font-weight: 900; color: #1a237e; }
  .rating-title-ar { font-size: 9px; color: #9e9e9e; font-family: 'Tajawal', sans-serif; direction: rtl; }
  .stars-row { display: flex; gap: 7px; }
  .star-box {
    flex: 1;
    border: 2px solid #e8e8e8;
    border-radius: 10px;
    padding: 7px 4px 6px;
    text-align: center;
    background: white;
  }
  .star-emoji  { font-size: 20px; display: block; }
  .star-lbl-en { font-size: 9px; font-weight: 800; color: #333; display: block; margin-top: 2px; }
  .star-lbl-ar { font-size: 8px; color: #aaa; direction: rtl; display: block; font-family: 'Tajawal', sans-serif; }
  .star-circles { display: flex; justify-content: center; gap: 4px; margin-top: 6px; }
  .rating-circle {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid #cfd8dc;
    background: white;
  }
</style>
</head>

}

document.addEventListener('DOMContentLoaded', () => {
  const container = document.getElementById('boards-container');
  groups.forEach((g, i) => {
    container.innerHTML += buildBoard(g);
    if (i < groups.length - 1) {
      container.innerHTML += '<div class="page-break"></div>';
    }
  });
});
</script>

<div id="boards-container"></div>

</body>
</html>
