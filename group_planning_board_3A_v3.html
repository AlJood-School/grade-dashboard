<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Planning Boards — Class 3A</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: #f0f0f0;
    padding: 10px;
  }

  @media print {
    body { background: white; padding: 0; }
    .page-break { page-break-after: always; }
    .no-print { display: none; }
    @page { size: A3 landscape; margin: 8mm; }
  }

  /* ===== PRINT BUTTON ===== */
  .print-btn {
    display: block;
    margin: 15px auto;
    padding: 14px 40px;
    background: #1a237e;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    font-weight: 700;
  }
  .print-btn:hover { background: #283593; }

  /* ===== BOARD WRAPPER ===== */
  .board {
    width: 420mm;
    min-height: 290mm;
    max-width: 100%;
    background: white;
    margin: 0 auto 20px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
  }

  /* ===== HEADER ===== */
  .board-header {
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: white;
  }
  .team-name {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 1px;
  }
  .team-name-ar {
    font-size: 18px;
    font-weight: 600;
    opacity: 0.85;
    margin-top: 2px;
  }
  .school-badge {
    text-align: right;
    font-size: 13px;
    opacity: 0.9;
    line-height: 1.5;
  }

  /* ===== MEMBERS ROW ===== */
  .members-row {
    display: flex;
    gap: 0;
    padding: 10px 16px 8px;
    background: white;
    border-bottom: 2px solid #eee;
    flex-wrap: wrap;
    gap: 8px;
  }
  .member-card {
    flex: 1;
    min-width: 90px;
    border-radius: 10px;
    padding: 8px 6px;
    text-align: center;
    border: 2px solid #e0e0e0;
    background: #fafafa;
  }
  .member-card.special {
    border-color: #42a5f5;
    background: #e3f2fd;
  }
  .member-pc {
    font-size: 11px;
    color: #888;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .member-name {
    font-size: 13px;
    font-weight: 700;
    color: #1a237e;
    line-height: 1.3;
  }
  .special-badge {
    font-size: 10px;
    color: #1565c0;
    font-weight: 600;
  }
  .member-role-en {
    font-size: 11px;
    font-weight: 700;
    margin-top: 3px;
    padding: 2px 6px;
    border-radius: 20px;
    color: white;
    display: inline-block;
  }
  .member-role-ar {
    font-size: 10px;
    color: #666;
    margin-top: 2px;
    direction: rtl;
  }

  /* ===== MAIN CONTENT ===== */
  .board-body {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    flex: 1;
    padding: 12px 16px;
    gap: 12px;
  }

  /* ===== SECTION BOXES ===== */
  .section {
    border-radius: 12px;
    padding: 12px 14px;
    border: 2px solid #e8e8e8;
    background: #fafafa;
    display: flex;
    flex-direction: column;
  }
  .section-title-en {
    font-size: 14px;
    font-weight: 900;
    color: #1a237e;
    margin-bottom: 2px;
  }
  .section-title-ar {
    font-size: 11px;
    color: #888;
    direction: rtl;
    margin-bottom: 8px;
  }
  .write-line {
    border: none;
    border-bottom: 2px dashed #ccc;
    background: transparent;
    width: 100%;
    margin-bottom: 10px;
    height: 30px;
    font-size: 14px;
    font-family: 'Cairo', sans-serif;
  }
  .write-box {
    border: 2px dashed #ccc;
    border-radius: 8px;
    width: 100%;
    flex: 1;
    min-height: 80px;
    background: white;
    padding: 6px;
    font-size: 12px;
    color: #999;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
  }

  /* Draw box */
  .draw-box {
    border: 2px dashed #ccc;
    border-radius: 10px;
    flex: 1;
    min-height: 100px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    color: #bbb;
    font-size: 13px;
  }
  .draw-icon {
    font-size: 36px;
    opacity: 0.4;
  }

  /* Robot name */
  .robot-name-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: white;
    border: 2px dashed #ccc;
    border-radius: 30px;
    padding: 8px 16px;
    margin-top: 8px;
  }
  .robot-label-en { font-size: 13px; font-weight: 700; color: #555; white-space: nowrap; }
  .robot-label-ar { font-size: 10px; color: #aaa; direction: rtl; white-space: nowrap; }
  .robot-line { flex: 1; border-bottom: 2px dashed #ccc; height: 1px; }

  /* Quick answers */
  .q-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 8px;
  }
  .q-label-en { font-size: 12px; font-weight: 700; color: #333; white-space: nowrap; }
  .q-label-ar { font-size: 10px; color: #aaa; direction: rtl; white-space: nowrap; }
  .q-line { flex: 1; border-bottom: 2px dashed #ccc; height: 1px; }

  /* Star row */
  .stars-row {
    display: flex;
    gap: 6px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .star-item {
    flex: 1;
    min-width: 60px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    padding: 6px 4px;
    text-align: center;
    background: white;
  }
  .star-emoji { font-size: 20px; }
  .star-label-en { font-size: 10px; font-weight: 700; color: #333; display: block; margin-top: 2px; }
  .star-label-ar { font-size: 9px; color: #888; direction: rtl; display: block; }

  /* UAE fact */
  .uae-box {
    background: linear-gradient(135deg, #006400 0%, #006400 33%, white 33%, white 66%, #ff0000 66%);
    border-radius: 10px;
    padding: 10px 14px;
    color: white;
    margin-top: 6px;
    position: relative;
    overflow: hidden;
  }
  .uae-box::before {
    content: '🇦🇪';
    position: absolute;
    font-size: 50px;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.3;
  }
  .uae-fact-en { font-size: 12px; font-weight: 700; color: #1a237e; background: rgba(255,255,255,0.9); padding: 4px 8px; border-radius: 6px; }
  .uae-fact-ar { font-size: 10px; color: #333; direction: rtl; background: rgba(255,255,255,0.9); padding: 2px 8px; border-radius: 6px; margin-top: 3px; display: inline-block; }
  .uae-complete-en { font-size: 11px; font-weight: 700; margin-top: 6px; color: #1a237e; background: rgba(255,255,255,0.9); padding: 3px 8px; border-radius: 6px; display: inline-block; }
  .uae-complete-ar { font-size: 10px; color: #555; direction: rtl; display: block; background: rgba(255,255,255,0.9); padding: 2px 8px; border-radius: 6px; margin-top: 3px; display: inline-block; }

</style>
</head>
<body>

<button class="print-btn no-print" onclick="window.print()">🖨️ Print All 5 Boards — اطبع جميع اللوحات</button>

<script>
const groups = [

      {name:'حامد بن', role_en:'Team Leader 🎯', role_ar:'قائد الفريق', pc:2, special:false},
      {name:'روضه سالم', role_en:'Designer 🎨', role_ar:'المصمم', pc:7, special:false},
      {name:'سلطان ناصر', role_en:'Programmer 💻', role_ar:'المبرمج', pc:12, special:false},
      {name:'عبدالعزيز حمد', role_en:'Researcher 🔍', role_ar:'الباحث', pc:17, special:false},
      {name:'مهره سالم', role_en:'Presenter 📢', role_ar:'المقدِّم', pc:22, special:false},
      {name:'ميره راشد', role_en:'Materials Manager 📋', role_ar:'مسؤول المواد', pc:26, special:false},
    ]
  },
  {
    name_en: '🧠 Neuron', name_ar: 'نيورون',
    color: '#4a148c', accent: '#e040fb',
    uae_fact_en: 'The UAE has a Ministry of AI — the first in the world! 🤖',
    uae_fact_ar: 'الإمارات لديها أول وزارة للذكاء الاصطناعي في العالم!',
    uae_complete_en: 'Our AI robot can think and...',
    uae_complete_ar: 'روبوتنا الذكي يستطيع التفكير و...',
    members: [
      {name:'حمود ناصر', role_en:'Team Leader 🎯', role_ar:'قائد الفريق', pc:3, special:false},
      {name:'ساره بنت', role_en:'Designer 🎨', role_ar:'المصمم', pc:8, special:false},
      {name:'سهيل عمر', role_en:'Programmer 💻', role_ar:'المبرمج', pc:13, special:false},
      {name:'مترف فيصل', role_en:'Researcher 🔍', role_ar:'الباحث', pc:18, special:false},

    ]

  {

    uae_fact_ar: 'قال الشيخ زايد: أعظم الثروات هي العقل.',
    uae_complete_en: 'Our robot will make UAE proud by...',
    uae_complete_ar: 'روبوتنا سيجعل الإمارات فخورة بـ...',
    members: [
      {name:'خالد الوليد', role_en:'Team Leader 🎯', role_ar:'قائد الفريق', pc:4, special:false},
      {name:'ساره سامي', role_en:'Designer 🎨', role_ar:'المصمم', pc:9, special:false},
      {name:'سيف ابراهيم', role_en:'Programmer 💻', role_ar:'المبرمج', pc:14, special:false},
      {name:'محمد سالم', role_en:'Researcher 🔍', role_ar:'الباحث', pc:19, special:false},

    ]
  },
  {
    name_en: '⚡ Masdar', name_ar: 'مصدر',
    color: '#004d40', accent: '#00e5ff',
    uae_fact_en: 'Masdar City in Abu Dhabi runs 100% on clean energy! ⚡',
    uae_fact_ar: 'مدينة مصدر في أبوظبي تعمل بالطاقة النظيفة 100%!',
    uae_complete_en: 'Our robot saves energy by...',
    uae_complete_ar: 'روبوتنا يوفر الطاقة عن طريق...',
    members: [
      {name:'خالد ناصر', role_en:'Team Leader 🎯', role_ar:'قائد الفريق', pc:5, special:false},
      {name:'سعيد محمد 💙', role_en:'Designer 🎨', role_ar:'المصمم', pc:10, special:true},
      {name:'شماء بنت', role_en:'Programmer 💻', role_ar:'المبرمج', pc:15, special:false},
      {name:'محمد سعيد', role_en:'Researcher 🔍', role_ar:'الباحث', pc:20, special:false},
      {name:'هند عبدالعزيز', role_en:'Presenter 📢', role_ar:'المقدِّم', pc:27, special:false},
    ]
  }
];

const roleColors = {
  'Team Leader 🎯': '#e53935',
  'Designer 🎨': '#8e24aa',
  'Programmer 💻': '#1565c0',
  'Researcher 🔍': '#2e7d32',
  'Presenter 📢': '#ef6c00'
};

function buildBoard(g) {
  const membersHTML = g.members.map(m => `
    <div class="member-card ${m.special ? 'special' : ''}">
      <div class="member-pc">PC ${m.pc}</div>
      <div class="member-name">${m.name}</div>
      ${m.special ? '<div class="special-badge">💙 Support</div>' : ''}
      <div class="member-role-en" style="background:${roleColors[m.role_en] || '#555'}">${m.role_en}</div>
      <div class="member-role-ar">${m.role_ar}</div>
    </div>
  `).join('');

  return `
  <div class="board">
    <!-- HEADER -->
    <div class="board-header" style="background: linear-gradient(135deg, ${g.color} 0%, ${g.color}dd 100%);">
      <div>
        <div class="team-name">${g.name_en}</div>
        <div class="team-name-ar">${g.name_ar}</div>
      </div>
      <div class="school-badge">
        ⭐ Al Jood School<br>
        <span style="font-size:11px;opacity:0.8;">روضة ومدرسة الجود</span><br>
        <span style="font-size:11px;opacity:0.7;">CCDI & AI — Grade 3A</span>
      </div>
    </div>

    <!-- MEMBERS -->
    <div class="members-row">
      ${membersHTML}
    </div>

    <!-- BODY -->
    <div class="board-body">

      <!-- BOX 1: ROBOT MISSION -->
      <div class="section" style="border-color:${g.accent}30">
        <div class="section-title-en">🤖 Our Robot's Mission</div>
        <div class="section-title-ar">مهمة روبوتنا</div>

        <div class="q-row">
          <div>
            <div class="q-label-en">Who does it help?</div>
            <div class="q-label-ar">من يساعد؟</div>
          </div>
          <div class="q-line"></div>
        </div>

        <div class="q-row">
          <div>
            <div class="q-label-en">How does it help?</div>
            <div class="q-label-ar">كيف يساعد؟</div>
          </div>
          <div class="q-line"></div>
        </div>

        <div class="q-row">
          <div>
            <div class="q-label-en">Where does it work?</div>
            <div class="q-label-ar">أين يعمل؟</div>
          </div>
          <div class="q-line"></div>
        </div>

        <div class="robot-name-box">
          <div>
            <div class="robot-label-en">🤖 Robot Name:</div>
            <div class="robot-label-ar">اسم الروبوت:</div>
          </div>
          <div class="robot-line"></div>
        </div>
      </div>

      <!-- BOX 2: DRAW THE ROBOT -->
      <div class="section" style="border-color:${g.accent}30">
        <div class="section-title-en">✏️ Draw Your Robot!</div>
        <div class="section-title-ar">ارسم روبوتك!</div>
        <div class="draw-box">
          <div class="draw-icon">🤖</div>
          <div>Each member adds one part!<br><span style="font-size:11px;color:#aaa">كل عضو يرسم جزءاً واحداً</span></div>
        </div>
      </div>

      <!-- BOX 3: UAE + STARS -->
      <div class="section" style="border-color:${g.accent}30">
        <div class="section-title-en">🇦🇪 UAE Connection</div>
        <div class="section-title-ar">ربط بالإمارات</div>

        <div class="uae-box">
          <div class="uae-fact-en">💡 ${g.uae_fact_en}</div>
          <div class="uae-fact-ar">${g.uae_fact_ar}</div>
          <br>
          <span class="uae-complete-en">✍️ Complete: ${g.uae_complete_en}</span>
          <br>
          <span class="uae-complete-ar">أكمل: ${g.uae_complete_ar}</span>
          <div class="q-line" style="margin-top:8px; border-color: rgba(255,255,255,0.5)"></div>
        </div>

        <div style="margin-top:10px">
          <div class="section-title-en">⭐ Rate Your Team!</div>
          <div class="section-title-ar">قيّم فريقك!</div>
          <div class="stars-row">
            <div class="star-item">
              <div class="star-emoji">🤝</div>
              <span class="star-label-en">Teamwork</span>
              <span class="star-label-ar">التعاون</span>
              <div style="font-size:16px;margin-top:2px">⭐⭐⭐</div>
            </div>
            <div class="star-item">
              <div class="star-emoji">💡</div>
              <span class="star-label-en">Ideas</span>
              <span class="star-label-ar">الأفكار</span>
              <div style="font-size:16px;margin-top:2px">⭐⭐⭐</div>
            </div>
            <div class="star-item">
              <div class="star-emoji">⏱️</div>
              <span class="star-label-en">Speed</span>
              <span class="star-label-ar">السرعة</span>
              <div style="font-size:16px;margin-top:2px">⭐⭐⭐</div>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /board-body -->
  </div><!-- /board -->
  `;
}

document.addEventListener('DOMContentLoaded', () => {
  const container = document.getElementById('boards-container');
  groups.forEach((g, i) => {
    container.innerHTML += buildBoard(g);
    if (i < groups.length - 1) {
      container.innerHTML += '<div class="page-break"></div>';
    }
  });
});
</script>

<div id="boards-container"></div>

</body>
</html>
