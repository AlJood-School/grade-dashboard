<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>سجل الطلاب — EduOS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
<script src="../platform-config.js"></script>
<script src="../platform-auth-guard.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D1B2A;
  --surface:#111827;
  --surface2:#1a2235;
  --surface3:#1f2d44;
  --indigo:#6366f1;
  --indigo2:#818cf8;
  --emerald:#10b981;
  --emerald2:#34d399;
  --gold:#f6c90e;
  --rose:#f43f5e;
  --sky:#0ea5e9;
  --violet:#8b5cf6;
  --text:#f1f5f9;
  --text2:rgba(241,245,249,0.65);
  --text3:rgba(241,245,249,0.35);
  --border:rgba(255,255,255,0.07);
}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}
.header-brand{display:flex;align-items:center;gap:12px}
.brand-logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#6C3DD6,#22D3EE);display:flex;align-items:center;justify-content:center;font-size:20px}
.brand-title{font-size:15px;font-weight:800;background:linear-gradient(90deg,#818cf8,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand-sub{font-size:11px;color:var(--text2)}
.header-meta{display:flex;align-items:center;gap:10px}
.meta-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--text2)}
.header-user{display:flex;align-items:center;gap:10px}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--emerald),var(--indigo));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;border:2px solid var(--emerald)}
.user-name{font-size:13px;font-weight:700}
.user-role{font-size:11px;color:var(--emerald2)}
.logout-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2);transition:all .2s}
.logout-btn:hover{background:#f43f5e22;border-color:var(--rose);color:var(--rose)}

/* ── MAIN ── */
.main{padding:28px 32px;max-width:1400px;margin:0 auto}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden;transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-card::before{content:'';position:absolute;inset:0;background:var(--card-glow,transparent);border-radius:16px}
.stat-value{font-size:32px;font-weight:900;line-height:1}
.stat-label{font-size:12px;color:var(--text2);margin-top:6px}
.stat-icon{position:absolute;top:16px;left:16px;font-size:28px;opacity:.4}

/* ── TOOLBAR ── */
.toolbar{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.search-box{flex:1;min-width:220px;display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:0 16px;height:42px;transition:border-color .2s}
.search-box:focus-within{border-color:var(--indigo)}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;width:100%;direction:rtl}
.search-box input::placeholder{color:var(--text3)}
.filter-group{display:flex;gap:8px;flex-wrap:wrap}
.grade-btn{padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;font-weight:600}
.grade-btn:hover{border-color:var(--indigo);color:var(--indigo2)}
.grade-btn.active{background:linear-gradient(135deg,#6C3DD6,#22D3EE);border-color:transparent;color:#fff}
.class-btn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface3);color:var(--text2);font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;transition:all .2s}
.class-btn:hover{border-color:var(--sky);color:var(--sky)}
.class-btn.active{background:var(--sky);border-color:transparent;color:#fff}
.class-filter-row{width:100%;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.class-filter-label{font-size:12px;color:var(--text3);margin-left:4px}

/* ── TABLE ── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.table-header-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.table-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.count-badge{background:var(--indigo);color:#fff;border-radius:20px;padding:2px 10px;font-size:12px}
.export-btn{padding:8px 16px;border-radius:10px;background:linear-gradient(135deg,#6C3DD6,#22D3EE);border:none;color:#fff;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.export-btn:hover{opacity:.85}
table{width:100%;border-collapse:collapse}
thead th{padding:12px 16px;text-align:right;font-size:12px;color:var(--text3);font-weight:600;background:var(--surface2);border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child{border-bottom:none}
td{padding:12px 16px;font-size:14px;vertical-align:middle}
.td-num{color:var(--text3);font-size:12px}
.td-name{font-weight:600}
.td-esis{font-size:12px;color:var(--text2);font-family:monospace;direction:ltr}
.class-badge{display:inline-flex;align-items:center;justify-content:center;width:38px;height:24px;border-radius:6px;font-size:12px;font-weight:700;background:var(--surface3);color:var(--indigo2)}
.grade-badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:6px;font-size:12px;font-weight:700}
.phone-link{font-size:12px;color:var(--sky);direction:ltr;text-decoration:none}
.phone-link:hover{text-decoration:underline}
.vark-badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:700}
.vark-V{background:#6366f122;color:#818cf8}
.vark-A{background:#f6c90e22;color:#f6c90e}
.vark-R{background:#10b98122;color:#34d399}
.vark-K{background:#f43f5e22;color:#f87171}

/* ── PAGINATION ── */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:20px}
.page-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.page-btn:hover:not(:disabled){border-color:var(--indigo);color:var(--indigo2)}
.page-btn.active{background:linear-gradient(135deg,#6C3DD6,#22D3EE);border-color:transparent;color:#fff;font-weight:700}
.page-btn:disabled{opacity:.3;cursor:default}
.page-info{font-size:13px;color:var(--text2);padding:0 8px}

/* ── LOADING ── */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:16px;color:var(--text2)}
.spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--indigo);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:16px}

/* ── GRADE COLORS ── */
.grade-KG1{background:#8b5cf622;color:#a78bfa}
.grade-KG2{background:#6366f122;color:#818cf8}
.grade-1{background:#0ea5e922;color:#38bdf8}
.grade-2{background:#06b6d422;color:#22d3ee}
.grade-3{background:#10b98122;color:#34d399}
.grade-4{background:#84cc1622;color:#a3e635}
.grade-5{background:#eab30822;color:#fcd34d}
.grade-6{background:#f9731622;color:#fb923c}
.grade-7{background:#ef444422;color:#f87171}
.grade-8{background:#ec489922;color:#f472b6}

@media(max-width:768px){
  .main{padding:16px}
  .toolbar{gap:10px}
  table{display:block;overflow-x:auto}
  .stats-row{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="header">
  <div class="header-brand">
    <div class="brand-logo">🎓</div>
    <div>
      <div class="brand-title">سجل الطلاب</div>
      <div class="brand-sub">Powered by EduOS</div>
    </div>
  </div>
  <div class="header-meta">
    <div class="meta-chip" id="weekChip">—</div>
    <div class="meta-chip" id="termChip">—</div>
  </div>
  <div class="header-user">
    <div class="user-avatar" id="userAvatar">—</div>
    <div>
      <div class="user-name" id="userName">—</div>
      <div class="user-role" id="userRole">—</div>
    </div>
    <button class="logout-btn" title="خروج" onclick="handleLogout()">🚪</button>
  </div>
</header>

<div class="main">

  <!-- ── STATS ── -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card" style="--card-glow:linear-gradient(135deg,#6C3DD622,transparent)">
      <div class="stat-icon">👨‍🎓</div>
      <div class="stat-value" style="color:#818cf8" id="statTotal">—</div>
      <div class="stat-label">إجمالي الطلاب</div>
    </div>
    <div class="stat-card" style="--card-glow:linear-gradient(135deg,#10b98122,transparent)">
      <div class="stat-icon">🏫</div>
      <div class="stat-value" style="color:#34d399" id="statClasses">—</div>
      <div class="stat-label">عدد الفصول</div>
    </div>
    <div class="stat-card" style="--card-glow:linear-gradient(135deg,#f6c90e22,transparent)">
      <div class="stat-icon">📚</div>
      <div class="stat-value" style="color:#fcd34d" id="statGrades">—</div>
      <div class="stat-label">المراحل الدراسية</div>
    </div>
    <div class="stat-card" style="--card-glow:linear-gradient(135deg,#22D3EE22,transparent)">
      <div class="stat-icon">🧠</div>
      <div class="stat-value" style="color:#22d3ee" id="statVark">—</div>
      <div class="stat-label">لديهم نمط VARK</div>
    </div>
  </div>

  <!-- ── TOOLBAR ── -->
  <div class="toolbar">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="ابحث بالاسم أو رقم الطالب..." oninput="onSearch()"/>
    </div>
    <div class="filter-group" id="gradeFilters">
      <button class="grade-btn active" data-grade="all" onclick="selectGrade('all',this)">الكل</button>
    </div>
    <div class="class-filter-row" id="classFilterRow" style="display:none">
      <span class="class-filter-label">الفصل:</span>
      <div id="classFilters" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    </div>
  </div>

  <!-- ── TABLE ── -->
  <div class="table-wrap">
    <div class="table-header-bar">
      <div class="table-title">
        <span>📋 قائمة الطلاب</span>
        <span class="count-badge" id="countBadge">0</span>
      </div>
      <button class="export-btn" onclick="exportCSV()">⬇️ تصدير CSV</button>
    </div>

    <div id="tableBody">
      <div class="loading-state">
        <div class="spinner"></div>
        <div>جاري تحميل بيانات الطلاب...</div>
      </div>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>

</div>

<script>
// ══════════════════════════════════════
// Config
// ══════════════════════════════════════
const SB_URL = 'https://zuyizaiugpmhmeycqton.supabase.co';
const ANON_KEY = ['eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9',
  'eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1eWl6YWl1Z3BtaG1leWNxdG9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwODgyNDAsImV4cCI6MjA5NDY2NDI0MH0',
  'FqOUqiR7GfttAEI8NY3bbOwFPnupxBsHMgYJCNT68PI'].join('.');

const sb = supabase.createClient(SB_URL, ANON_KEY);

const PAGE_SIZE = 50;
let allStudents = [];
let filtered = [];
let currentPage = 1;
let currentGrade = 'all';
let currentClass = 'all';
let searchTerm = '';

// ── Grade order/labels ──
const GRADE_ORDER = ['KG1','KG2','1','2','3','4','5','6','7','8'];
const GRADE_LABELS = {KG1:'رياض 1',KG2:'رياض 2','1':'ص1','2':'ص2','3':'ص3','4':'ص4','5':'ص5','6':'ص6','7':'ص7','8':'ص8'};
const ROLE_LABELS = {principal:'مدير/مديرة',vice_principal:'وكيل/ة',teacher:'معلم/ة',social_worker:'أخصائي/ة',nurse:'ممرض/ة',registrar:'تسجيل',admin:'إداري/ة',security:'أمن',noor:'نور'};

// ── Normalize grade from class_name ──
function gradeFromClass(cls){
  if(!cls) return '?';
  if(cls.startsWith('KG1')) return 'KG1';
  if(cls.startsWith('KG2')) return 'KG2';
  const m = cls.match(/^(\d+)/);
  return m ? m[1] : cls;
}

// ── Grade display ──
function gradeLabel(g){
  return GRADE_LABELS[g] || g;
}

// ── User info ──
function loadUser(){
  try{
    const u = JSON.parse(sessionStorage.getItem('edoos_user')||'{}');
    const name = u.full_name || u.name || '—';
    const role = u.role || '—';
    document.getElementById('userName').textContent = name;
    document.getElementById('userRole').textContent = ROLE_LABELS[role]||role;
    document.getElementById('userAvatar').textContent = (name[0]||'؟');
  }catch(e){}
}

// ── Week/Term chips ──
function loadWeek(){
  if(window.EDUOS_PLATFORM && window.EDUOS_PLATFORM.week){
    const w = window.EDUOS_PLATFORM.week;
    document.getElementById('weekChip').textContent = `الأسبوع ${w.number||''}`;
    document.getElementById('termChip').textContent = w.term ? `الفصل ${w.term}` : '—';
  }
}

// ══════════════════════════════════════
// Fetch all students
// ══════════════════════════════════════
async function fetchStudents(){
  let all = [];
  let from = 0;
  const batch = 1000;

  while(true){
    const {data, error} = await sb.from('students')
      .select('id,name,grade,class_name,student_number,parent_phone,vark_style')
      .range(from, from+batch-1)
      .order('class_name', {ascending:true})
      .order('name', {ascending:true});

    if(error || !data || data.length===0) break;
    all = all.concat(data);
    if(data.length < batch) break;
    from += batch;
  }

  // Normalize: remove duplicates (prefer records where grade matches normalized class grade)
  // Keep unique by student_number, prefer the cleaner record
  const seen = new Map();
  for(const s of all){
    const key = s.student_number || s.id;
    const normalized = gradeFromClass(s.class_name);
    if(!seen.has(key)){
      seen.set(key, {...s, _grade: normalized});
    } else {
      // prefer record where grade === normalized
      const existing = seen.get(key);
      if(s.grade === normalized && existing._grade !== normalized){
        seen.set(key, {...s, _grade: normalized});
      }
    }
  }

  allStudents = Array.from(seen.values());

  // Sort by grade order then class then name
  allStudents.sort((a,b)=>{
    const gi = GRADE_ORDER.indexOf(a._grade);
    const gj = GRADE_ORDER.indexOf(b._grade);
    if(gi !== gj) return gi - gj;
    if(a.class_name < b.class_name) return -1;
    if(a.class_name > b.class_name) return 1;
    return (a.name||'').localeCompare(b.name||'', 'ar');
  });

  buildStats();
  buildGradeFilters();
  applyFilters();
}

// ══════════════════════════════════════
// Build Stats
// ══════════════════════════════════════
function buildStats(){
  const total = allStudents.length;
  const classes = new Set(allStudents.map(s=>s.class_name)).size;
  const grades = new Set(allStudents.map(s=>s._grade)).size;
  const withVark = allStudents.filter(s=>s.vark_style).length;

  document.getElementById('statTotal').textContent = total.toLocaleString('ar');
  document.getElementById('statClasses').textContent = classes;
  document.getElementById('statGrades').textContent = grades;
  document.getElementById('statVark').textContent = withVark.toLocaleString('ar');
}

// ══════════════════════════════════════
// Grade Filters
// ══════════════════════════════════════
function buildGradeFilters(){
  const grades = [...new Set(allStudents.map(s=>s._grade))];
  grades.sort((a,b)=>GRADE_ORDER.indexOf(a)-GRADE_ORDER.indexOf(b));

  const container = document.getElementById('gradeFilters');
  // Keep "الكل" button
  const allBtn = container.querySelector('[data-grade="all"]');
  container.innerHTML = '';
  container.appendChild(allBtn);

  for(const g of grades){
    const btn = document.createElement('button');
    btn.className = 'grade-btn';
    btn.dataset.grade = g;
    btn.textContent = gradeLabel(g);
    btn.onclick = ()=> selectGrade(g, btn);
    container.appendChild(btn);
  }
}

function selectGrade(grade, btn){
  currentGrade = grade;
  currentClass = 'all';
  currentPage = 1;

  document.querySelectorAll('.grade-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  // Build class sub-filter
  if(grade === 'all'){
    document.getElementById('classFilterRow').style.display = 'none';
  } else {
    const classes = [...new Set(
      allStudents.filter(s=>s._grade===grade).map(s=>s.class_name)
    )].sort();
    const cf = document.getElementById('classFilters');
    cf.innerHTML = '';
    // "الكل" button
    const allCls = document.createElement('button');
    allCls.className = 'class-btn active';
    allCls.dataset.cls = 'all';
    allCls.textContent = 'الكل';
    allCls.onclick = ()=> selectClass('all', allCls);
    cf.appendChild(allCls);

    for(const cls of classes){
      const b = document.createElement('button');
      b.className = 'class-btn';
      b.dataset.cls = cls;
      b.textContent = cls;
      b.onclick = ()=> selectClass(cls, b);
      cf.appendChild(b);
    }
    document.getElementById('classFilterRow').style.display = 'flex';
  }

  applyFilters();
}

function selectClass(cls, btn){
  currentClass = cls;
  currentPage = 1;
  document.querySelectorAll('.class-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

// ══════════════════════════════════════
// Search
// ══════════════════════════════════════
function onSearch(){
  searchTerm = document.getElementById('searchInput').value.trim();
  currentPage = 1;
  applyFilters();
}

// ══════════════════════════════════════
// Apply Filters
// ══════════════════════════════════════
function applyFilters(){
  filtered = allStudents.filter(s=>{
    if(currentGrade !== 'all' && s._grade !== currentGrade) return false;
    if(currentClass !== 'all' && s.class_name !== currentClass) return false;
    if(searchTerm){
      const q = searchTerm.toLowerCase();
      const name = (s.name||'').toLowerCase();
      const num = (s.student_number||'').toLowerCase();
      if(!name.includes(q) && !num.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('countBadge').textContent = filtered.length.toLocaleString('ar');
  renderPage(1);
}

// ══════════════════════════════════════
// Render Table
// ══════════════════════════════════════
function renderPage(page){
  currentPage = page;
  const start = (page-1)*PAGE_SIZE;
  const slice = filtered.slice(start, start+PAGE_SIZE);
  const totalPages = Math.ceil(filtered.length/PAGE_SIZE);

  if(filtered.length === 0){
    document.getElementById('tableBody').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div>لا توجد نتائج مطابقة</div>
      </div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  let html = `<table>
    <thead><tr>
      <th>#</th>
      <th>اسم الطالب/ة</th>
      <th>رقم eSIS</th>
      <th>الصف</th>
      <th>الفصل</th>
      <th>نمط VARK</th>
      <th>هاتف ولي الأمر</th>
    </tr></thead>
    <tbody>`;

  for(let i=0;i<slice.length;i++){
    const s = slice[i];
    const rowNum = start+i+1;
    const grade = s._grade;
    const vark = s.vark_style||'';
    const phone = s.parent_phone||'';

    html += `<tr>
      <td class="td-num">${rowNum.toLocaleString('ar')}</td>
      <td class="td-name">${esc(s.name||'—')}</td>
      <td class="td-esis">${esc(s.student_number||s.id||'—')}</td>
      <td><span class="grade-badge grade-${grade.replace(/\s/g,'')}">${gradeLabel(grade)}</span></td>
      <td><span class="class-badge">${esc(s.class_name||'—')}</span></td>
      <td>${vark ? `<span class="vark-badge vark-${vark[0]}">${vark}</span>` : '<span style="color:var(--text3)">—</span>'}</td>
      <td>${phone ? `<a class="phone-link" href="tel:${esc(phone)}">${esc(phone)}</a>` : '<span style="color:var(--text3)">—</span>'}</td>
    </tr>`;
  }
  html += '</tbody></table>';

  document.getElementById('tableBody').innerHTML = html;
  renderPagination(page, totalPages);
}

function renderPagination(page, total){
  if(total <= 1){ document.getElementById('pagination').innerHTML=''; return; }

  let html = '';
  html += `<button class="page-btn" onclick="renderPage(${page-1})" ${page<=1?'disabled':''}>›</button>`;

  // Show up to 7 page buttons
  let start = Math.max(1, page-3);
  let end = Math.min(total, start+6);
  if(end-start < 6) start = Math.max(1, end-6);

  if(start > 1) html += `<button class="page-btn" onclick="renderPage(1)">1</button><span class="page-info">...</span>`;
  for(let p=start;p<=end;p++){
    html += `<button class="page-btn ${p===page?'active':''}" onclick="renderPage(${p})">${p}</button>`;
  }
  if(end < total) html += `<span class="page-info">...</span><button class="page-btn" onclick="renderPage(${total})">${total}</button>`;

  html += `<button class="page-btn" onclick="renderPage(${page+1})" ${page>=total?'disabled':''}>‹</button>`;
  html += `<span class="page-info">${page} / ${total}</span>`;

  document.getElementById('pagination').innerHTML = html;
}

function exportCSV(){
  const headers = ['#','الاسم','رقم eSIS','الصف','الفصل','نمط VARK','هاتف ولي الأمر'];
  const rows = filtered.map((s,i)=>[
    i+1,
    s.name||'',
    s.student_number||s.id||'',
    gradeLabel(s._grade),
    s.class_name||'',
    s.vark_style||'',
    s.parent_phone||''
  ]);

  const csv = '\uFEFF' + [headers, ...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const label = currentGrade==='all'?'كل-الطلاب':(currentClass==='all'?gradeLabel(currentGrade):currentClass);
  a.download = `طلاب-${label}-${new Date().toLocaleDateString('ar')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
