<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجري ⭐ — EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../platform-config.js"></script>
<script src="../platform-auth-guard.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal',sans-serif; }
:root {
  --bg:#0D1B2A; --card:rgba(255,255,255,0.05); --border:rgba(255,255,255,0.1);
  --primary:#6C3DD6; --accent:#22D3EE; --gold:#F59E0B; --green:#10B981;
  --red:#EF4444; --text:#F1F5F9; --muted:#94A3B8;
}
body { background:var(--bg); color:var(--text); min-height:100vh; }

/* Header */
.header {
  background:linear-gradient(135deg,rgba(108,61,214,0.3),rgba(34,211,238,0.15));
  border-bottom:1px solid var(--border); padding:20px 24px;
  display:flex; align-items:center; justify-content:space-between;
}
.header-left { display:flex; align-items:center; gap:14px; }
.logo { font-size:36px; }
.title { font-size:22px; font-weight:900; }
.subtitle { font-size:13px; color:var(--muted); }

/* Stars Banner */
.stars-banner {
  background:linear-gradient(135deg,rgba(245,158,11,0.2),rgba(245,158,11,0.05));
  border:1px solid rgba(245,158,11,0.3); border-radius:20px;
  padding:20px 28px; margin:24px; display:flex; align-items:center; gap:24px;
}
.stars-main { display:flex; align-items:center; gap:10px; }
.stars-num { font-size:52px; font-weight:900; color:var(--gold); line-height:1; }
.stars-label { font-size:14px; color:var(--muted); }
.stars-divider { width:1px; height:50px; background:var(--border); }
.goal-section { flex:1; }
.goal-title { font-size:13px; color:var(--muted); margin-bottom:6px; }
.goal-item { font-size:16px; font-weight:700; margin-bottom:8px; }
.goal-bar-wrap { background:rgba(255,255,255,0.08); border-radius:99px; height:12px; overflow:hidden; }
.goal-bar { height:100%; border-radius:99px; transition:width .8s; background:linear-gradient(90deg,#6C3DD6,#22D3EE); }
.goal-meta { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-top:4px; }
.set-goal-btn {
  padding:8px 16px; border-radius:10px; border:1px solid rgba(34,211,238,0.4);
  background:rgba(34,211,238,0.1); color:var(--accent); cursor:pointer; font-family:Tajawal; font-size:13px;
  white-space:nowrap; transition:all .2s;
}
.set-goal-btn:hover { background:rgba(34,211,238,0.2); }

/* Parent Goal */
.parent-goal-banner {
  background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(16,185,129,0.05));
  border:1px solid rgba(16,185,129,0.3); border-radius:14px;
  padding:14px 20px; margin:0 24px 20px; display:flex; align-items:center; gap:12px;
}
.parent-goal-icon { font-size:24px; }
.parent-goal-text { font-size:14px; }
.parent-goal-name { font-weight:700; color:var(--green); }

/* Tabs */
.tabs {
  display:flex; gap:4px; padding:0 24px 0; border-bottom:1px solid var(--border);
}
.tab {
  padding:10px 18px; cursor:pointer; font-size:14px; color:var(--muted);
  border-bottom:2px solid transparent; transition:all .2s;
}
.tab:hover { color:var(--text); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:700; }

/* Main */
.main { padding:24px; }

/* Store Grid */
.store-section-title {
  font-size:13px; color:var(--muted); font-weight:700; letter-spacing:1px;
  margin:20px 0 12px; text-transform:uppercase;
}
.store-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; margin-bottom:32px; }
.store-item {
  background:var(--card); border:1px solid var(--border); border-radius:16px;
  padding:20px; text-align:center; transition:all .25s; position:relative;
}
.store-item:hover { border-color:var(--gold); transform:translateY(-3px); box-shadow:0 8px 24px rgba(245,158,11,0.15); }
.store-item.cant-afford { opacity:.55; }
.item-emoji { font-size:40px; margin-bottom:10px; }
.item-name { font-size:15px; font-weight:700; margin-bottom:4px; }
.item-desc { font-size:12px; color:var(--muted); margin-bottom:14px; line-height:1.5; }
.item-cost {
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 16px; border-radius:99px;
  background:rgba(245,158,11,0.15); border:1px solid rgba(245,158,11,0.3);
  color:var(--gold); font-weight:800; font-size:14px; margin-bottom:12px;
}
.buy-btn {
  width:100%; padding:10px; border-radius:10px; border:none; cursor:pointer;
  font-family:Tajawal; font-size:14px; font-weight:700; transition:all .2s;
}
.buy-btn.can { background:linear-gradient(135deg,#6C3DD6,#22D3EE); color:white; }
.buy-btn.can:hover { opacity:.9; }
.buy-btn.cant { background:rgba(255,255,255,0.06); color:var(--muted); cursor:not-allowed; }
.buy-btn.goal-set { background:rgba(34,211,238,0.1); color:var(--accent); border:1px solid rgba(34,211,238,0.3); }
.seasonal-badge {
  position:absolute; top:10px; left:10px; font-size:10px; padding:3px 8px; border-radius:8px;
  background:rgba(239,68,68,0.2); color:#F87171; border:1px solid rgba(239,68,68,0.3);
}
.surprise-badge {
  position:absolute; top:10px; left:10px; font-size:10px; padding:3px 8px; border-radius:8px;
  background:rgba(168,85,247,0.2); color:#C084FC; border:1px solid rgba(168,85,247,0.3);
}

/* Reinforcements Tab */
.reinf-list { display:flex; flex-direction:column; gap:12px; }
.reinf-item {
  background:var(--card); border:1px solid var(--border); border-radius:14px;
  padding:16px 20px; display:flex; align-items:center; gap:14px;
}
.reinf-emoji { font-size:36px; }
.reinf-info { flex:1; }
.reinf-card { font-size:16px; font-weight:700; margin-bottom:2px; }
.reinf-from { font-size:13px; color:var(--muted); }
.reinf-msg { font-size:13px; color:var(--text); margin-top:4px; font-style:italic; line-height:1.6; }
.reinf-photo { width:60px; height:60px; border-radius:10px; object-fit:cover; }
.reinf-meta { text-align:left; }
.reinf-stars { color:var(--gold); font-weight:800; font-size:16px; }
.reinf-date { font-size:11px; color:var(--muted); margin-top:2px; }
.public-badge { font-size:10px; padding:2px 8px; border-radius:8px; background:rgba(16,185,129,0.15); color:var(--green); }

/* Orders Tab */
.order-list { display:flex; flex-direction:column; gap:12px; }
.order-item {
  background:var(--card); border:1px solid var(--border); border-radius:14px;
  padding:16px 20px; display:flex; align-items:center; gap:14px;
}
.order-emoji { font-size:28px; }
.order-info { flex:1; }
.order-name { font-weight:700; font-size:15px; }
.order-stars { font-size:12px; color:var(--muted); }
.status-badge { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:700; }
.status-pending { background:rgba(245,158,11,0.15); color:var(--gold); border:1px solid rgba(245,158,11,0.3); }
.status-approved { background:rgba(16,185,129,0.15); color:var(--green); border:1px solid rgba(16,185,129,0.3); }
.status-delivered { background:rgba(34,211,238,0.15); color:var(--accent); border:1px solid rgba(34,211,238,0.3); }

/* Modals */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.75);
  display:flex; align-items:center; justify-content:center; z-index:999;
  opacity:0; pointer-events:none; transition:opacity .3s;
}
.modal-overlay.show { opacity:1; pointer-events:all; }
.modal {
  background:#0F2035; border:1px solid var(--border); border-radius:20px;
  padding:32px; max-width:480px; width:90%;
}
.modal-title { font-size:20px; font-weight:800; margin-bottom:20px; }
.modal-item-preview { text-align:center; margin-bottom:24px; }
.modal-item-preview .emoji { font-size:56px; margin-bottom:8px; }
.modal-item-preview .name { font-size:18px; font-weight:700; }
.modal-item-preview .cost { color:var(--gold); font-size:16px; margin-top:4px; }
.confirm-msg { color:var(--muted); font-size:14px; margin-bottom:20px; line-height:1.7; }
.modal-btns { display:flex; gap:12px; }
.modal-btn { flex:1; padding:12px; border-radius:12px; border:none; cursor:pointer; font-family:Tajawal; font-size:15px; font-weight:700; }
.modal-btn.confirm { background:linear-gradient(135deg,#6C3DD6,#22D3EE); color:white; }
.modal-btn.cancel { background:rgba(255,255,255,0.08); color:var(--muted); }

/* Goal Picker Modal */
.goal-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; max-height:350px; overflow-y:auto; margin-bottom:20px; }
.goal-option {
  background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:12px;
  padding:14px; text-align:center; cursor:pointer; transition:all .2s;
}
.goal-option:hover { border-color:var(--accent); }
.goal-option.selected { border-color:var(--gold); background:rgba(245,158,11,0.1); }
.goal-option .e { font-size:28px; margin-bottom:6px; }
.goal-option .n { font-size:13px; font-weight:700; }
.goal-option .c { font-size:12px; color:var(--gold); margin-top:2px; }

/* Confetti */
.confetti-overlay {
  position:fixed; inset:0; pointer-events:none; z-index:9999;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .3s;
}
.confetti-overlay.show { opacity:1; }
.confetti-box { background:rgba(10,20,35,0.92); border:1px solid var(--green); border-radius:24px; padding:40px 32px; text-align:center; }
.confetti-icon { font-size:72px; margin-bottom:16px; }
.confetti-title { font-size:26px; font-weight:900; color:var(--green); margin-bottom:8px; }
.confetti-msg { color:var(--muted); font-size:15px; }
.confetti-close { margin-top:20px; padding:10px 28px; border-radius:12px; border:none; cursor:pointer; background:rgba(255,255,255,0.1); color:var(--text); font-family:Tajawal; font-size:14px; }

/* Loader */
.loader { text-align:center; padding:40px; color:var(--muted); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="logo">🏪</div>
    <div>
      <div class="title">متجري ⭐</div>
      <div class="subtitle" id="studentNameHeader">جارٍ التحميل...</div>
    </div>
  </div>
  <button onclick="window.history.back()" style="background:rgba(255,255,255,0.08);border:none;color:var(--muted);padding:8px 16px;border-radius:10px;cursor:pointer;font-family:Tajawal;font-size:13px;">← رجوع</button>
</div>

<!-- Stars Banner -->
<div class="stars-banner">
  <div class="stars-main">
    <div class="stars-num" id="starsNum">0</div>
    <div>
      <div style="font-size:22px">⭐</div>
      <div class="stars-label">نجمة متاحة</div>
    </div>
  </div>
  <div class="stars-divider"></div>
  <div class="goal-section">
    <div class="goal-title">🎯 هدفي القادم</div>
    <div class="goal-item" id="goalName">اختر هدفاً من المتجر</div>
    <div class="goal-bar-wrap"><div class="goal-bar" id="goalBar" style="width:0%"></div></div>
    <div class="goal-meta">
      <span id="goalProgress">---</span>
      <span id="goalPct">---%</span>
    </div>
  </div>
  <button class="set-goal-btn" onclick="openGoalPicker()">🎯 غيّر هدفي</button>
</div>

<!-- Parent Goal -->
<div class="parent-goal-banner" id="parentGoalBanner" style="display:none">
  <div class="parent-goal-icon">👨‍👩‍👦</div>
  <div>
    <div class="parent-goal-text">هدف أهلك: <span class="parent-goal-name" id="parentGoalText">---</span></div>
    <div style="font-size:12px;color:var(--muted)" id="parentGoalProgress">---</div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('store')" id="tab-store">🏪 المتجر</div>
  <div class="tab" onclick="switchTab('reinforcements')" id="tab-reinforcements">⭐ تعزيزاتي</div>
  <div class="tab" onclick="switchTab('orders')" id="tab-orders">📦 طلباتي</div>
</div>

<div class="main">

  <!-- Store Tab -->
  <div id="pane-store">
    <div id="storeContent"><div class="loader">جارٍ تحميل المتجر...</div></div>
  </div>

  <!-- Reinforcements Tab -->
  <div id="pane-reinforcements" style="display:none">
    <div class="reinf-list" id="reinfList"><div class="loader">جارٍ التحميل...</div></div>
  </div>

  <!-- Orders Tab -->
  <div id="pane-orders" style="display:none">
    <div class="order-list" id="orderList"><div class="loader">جارٍ التحميل...</div></div>
  </div>

</div>

<!-- Confirm Buy Modal -->
<div class="modal-overlay" id="buyModal">
  <div class="modal">
    <div class="modal-title">تأكيد الاستبدال</div>
    <div class="modal-item-preview">
      <div class="emoji" id="modalEmoji">🎁</div>
      <div class="name" id="modalName">---</div>
      <div class="cost" id="modalCost">--- ⭐</div>
    </div>
    <div class="confirm-msg" id="modalMsg">---</div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeBuyModal()">إلغاء</button>
      <button class="modal-btn confirm" id="confirmBuyBtn" onclick="confirmBuy()">✓ استبدل الآن</button>
    </div>
  </div>
</div>

<!-- Goal Picker Modal -->
<div class="modal-overlay" id="goalModal">
  <div class="modal">
    <div class="modal-title">🎯 اختر هدفك القادم</div>
    <div class="goal-grid" id="goalGrid"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeGoalModal()">إغلاق</button>
    </div>
  </div>
</div>

<!-- Confetti / Success -->
<div class="confetti-overlay" id="confettiOverlay">
  <div class="confetti-box">
    <div class="confetti-icon" id="confettiIcon">🎉</div>
    <div class="confetti-title" id="confettiTitle">تم الاستبدال!</div>
    <div class="confetti-msg" id="confettiMsg">---</div>
    <button class="confetti-close" onclick="closeConfetti()">✓ رائع</button>
  </div>
</div>

<script>
const SUPABASE_URL = window.EDUOS_CONFIG?.supabaseUrl || 'https://zuyizaiugpmhmeycqton.supabase.co'
const ANON_KEY = window.EDUOS_CONFIG?.anonKey || ''
const FN_URL = SUPABASE_URL + '/functions/v1'
const sb = supabase.createClient(SUPABASE_URL, ANON_KEY)

let currentUser = null
let studentData = null
let storeItems = []
let selectedBuyItem = null
let selectedGoalItem = null

window.addEventListener('DOMContentLoaded', async () => {
  await new Promise(r => setTimeout(r, 800))
  currentUser = JSON.parse(sessionStorage.getItem('edoos_user') || 'null')
  if (!currentUser) return

  document.getElementById('studentNameHeader').textContent = currentUser.full_name || ''
  await loadAll()
})

async function loadAll() {
  try {
    const res = await fetch(`${FN_URL}/store-redeem`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': ANON_KEY },
      body: JSON.stringify({ action: 'get_student_data', student_id: currentUser.id })
    })
    const data = await res.json()
    studentData = data
    storeItems = data.store_items || []
    renderStarsBanner()
    renderStore()
    renderParentGoal()
  } catch (e) {
    document.getElementById('storeContent').innerHTML = '<div class="loader">خطأ في التحميل</div>'
  }
}

function renderStarsBanner() {
  const stars = studentData?.stars || { available_stars: 0, total_stars: 0 }
  document.getElementById('starsNum').textContent = stars.available_stars || 0

  const goal = studentData?.goal
  if (goal?.store_items) {
    const item = goal.store_items
    const available = stars.available_stars || 0
    const pct = Math.min(100, Math.round(available / item.stars_cost * 100))
    document.getElementById('goalName').textContent = `${item.emoji} ${item.name_ar}`
    document.getElementById('goalBar').style.width = pct + '%'
    document.getElementById('goalProgress').textContent = `${available} / ${item.stars_cost} ⭐`
    document.getElementById('goalPct').textContent = pct + '%'
  } else {
    document.getElementById('goalName').textContent = 'اختر هدفاً من المتجر'
    document.getElementById('goalProgress').textContent = '---'
    document.getElementById('goalPct').textContent = '---%'
  }
}

function renderParentGoal() {
  const pg = studentData?.parent_goal
  if (!pg) return
  const banner = document.getElementById('parentGoalBanner')
  banner.style.display = 'flex'
  document.getElementById('parentGoalText').textContent = pg.reward_description
  const available = studentData?.stars?.available_stars || 0
  const needed = pg.target_stars - available
  document.getElementById('parentGoalProgress').textContent =
    needed <= 0 ? '🎉 وصلت! تحدث مع أهلك' : `تحتاج ${needed} نجمة أخرى (هدف: ${pg.target_stars} ⭐)`
}

function renderStore() {
  const available = studentData?.stars?.available_stars || 0
  const categories = [
    { key: 'school', title: '🏫 مكافآت مدرسية', emoji: '🏫' },
    { key: 'digital', title: '✨ مكافآت رقمية — فورية', emoji: '✨' },
    { key: 'surprise', title: '🎁 صندوق المفاجآت', emoji: '🎁' },
    { key: 'seasonal', title: '🌟 مكافآت موسمية', emoji: '🌟' },
  ]

  let html = ''
  for (const cat of categories) {
    const items = storeItems.filter(i => i.category === cat.key)
    if (!items.length) continue
    html += `<div class="store-section-title">${cat.title}</div><div class="store-grid">`
    for (const item of items) {
      const canAfford = available >= item.stars_cost
      const isGoal = studentData?.goal?.goal_item_id === item.id
      html += `
      <div class="store-item ${!canAfford ? 'cant-afford' : ''}">
        ${item.is_seasonal ? '<div class="seasonal-badge">موسمي</div>' : ''}
        ${item.category === 'surprise' ? '<div class="surprise-badge">مفاجأة 🎲</div>' : ''}
        <div class="item-emoji">${item.emoji || '🎁'}</div>
        <div class="item-name">${item.name_ar}</div>
        <div class="item-desc">${item.description_ar || ''}</div>
        <div class="item-cost">⭐ ${item.stars_cost}</div><br>
        ${canAfford
          ? `<button class="buy-btn can" onclick="openBuyModal('${item.id}')">🛒 استبدل الآن</button>`
          : isGoal
            ? `<button class="buy-btn goal-set" onclick="openGoalPicker()">🎯 هدفي الحالي</button>`
            : `<button class="buy-btn cant" onclick="setGoalItem('${item.id}')">🎯 اجعله هدفي</button>`}
      </div>`
    }
    html += '</div>'
  }
  document.getElementById('storeContent').innerHTML = html || '<div class="loader">المتجر فارغ</div>'
}

function openBuyModal(itemId) {
  selectedBuyItem = storeItems.find(i => i.id === itemId)
  if (!selectedBuyItem) return
  const available = studentData?.stars?.available_stars || 0
  document.getElementById('modalEmoji').textContent = selectedBuyItem.emoji || '🎁'
  document.getElementById('modalName').textContent = selectedBuyItem.name_ar
  document.getElementById('modalCost').textContent = `${selectedBuyItem.stars_cost} ⭐`
  document.getElementById('modalMsg').textContent =
    `سيتم خصم ${selectedBuyItem.stars_cost} نجمة من رصيدك (${available} متاح). ${selectedBuyItem.category === 'digital' ? 'ستُفعَّل مكافأتك فوراً!' : 'سيصلك رد من الإدارة قريباً.'}`
  document.getElementById('buyModal').classList.add('show')
}

function closeBuyModal() { document.getElementById('buyModal').classList.remove('show') }

async function confirmBuy() {
  if (!selectedBuyItem) return
  const btn = document.getElementById('confirmBuyBtn')
  btn.disabled = true; btn.textContent = '⏳'

  try {
    const res = await fetch(`${FN_URL}/store-redeem`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': ANON_KEY },
      body: JSON.stringify({ action: 'redeem', student_id: currentUser.id, item_id: selectedBuyItem.id })
    })
    const data = await res.json()
    closeBuyModal()

    if (data.success) {
      document.getElementById('confettiIcon').textContent = selectedBuyItem.emoji || '🎉'
      document.getElementById('confettiTitle').textContent = 'تم الاستبدال!'
      document.getElementById('confettiMsg').textContent = data.message
      document.getElementById('confettiOverlay').classList.add('show')
      await loadAll()
    } else {
      alert(data.error || 'فشل الاستبدال')
    }
  } catch {
    alert('خطأ في الاتصال')
  } finally {
    btn.disabled = false; btn.textContent = '✓ استبدل الآن'
  }
}

function closeConfetti() { document.getElementById('confettiOverlay').classList.remove('show') }

// Goal Picker
function openGoalPicker() {
  const available = studentData?.stars?.available_stars || 0
  document.getElementById('goalGrid').innerHTML = storeItems.map(item => {
    const pct = Math.min(100, Math.round(available / item.stars_cost * 100))
    const isSelected = studentData?.goal?.goal_item_id === item.id
    return `
    <div class="goal-option ${isSelected ? 'selected' : ''}" onclick="setGoalItem('${item.id}')">
      <div class="e">${item.emoji || '🎁'}</div>
      <div class="n">${item.name_ar}</div>
      <div class="c">${item.stars_cost} ⭐ · ${pct}% مكتمل</div>
    </div>`
  }).join('')
  document.getElementById('goalModal').classList.add('show')
}

function closeGoalModal() { document.getElementById('goalModal').classList.remove('show') }

async function setGoalItem(itemId) {
  try {
    await fetch(`${FN_URL}/store-redeem`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': ANON_KEY },
      body: JSON.stringify({ action: 'set_goal', student_id: currentUser.id, goal_item_id: itemId })
    })
    closeGoalModal()
    await loadAll()
  } catch {}
}

// Tab switch
function switchTab(tab) {
  ['store','reinforcements','orders'].forEach(t => {
    document.getElementById('pane-'+t).style.display = t===tab?'block':'none'
    document.getElementById('tab-'+t).className = 'tab' + (t===tab?' active':'')
  })
  if (tab === 'reinforcements') renderReinforcements()
  if (tab === 'orders') renderOrders()
}

function renderReinforcements() {
  const list = studentData?.reinforcements || []
  const el = document.getElementById('reinfList')
  if (!list.length) { el.innerHTML = '<div class="loader">لم تحصل على تعزيزات بعد</div>'; return }
  el.innerHTML = list.map(r => {
    const d = new Date(r.created_at)
    const dateStr = d.toLocaleDateString('ar-AE', { day:'numeric', month:'short' })
    return `
    <div class="reinf-item">
      <div class="reinf-emoji">${r.card_emoji || '⭐'}</div>
      <div class="reinf-info">
        <div class="reinf-card">${r.card_label || '---'}</div>
        <div class="reinf-from">${r.subject ? 'في ' + r.subject + ' · ' : ''}${dateStr}</div>
        ${r.message ? `<div class="reinf-msg">"${r.message}"</div>` : ''}
      </div>
      ${r.photo_url ? `<img src="${r.photo_url}" class="reinf-photo">` : ''}
      <div class="reinf-meta">
        <div class="reinf-stars">+${r.stars_awarded} ⭐</div>
        ${r.is_public ? '<div class="public-badge">معلن</div>' : ''}
      </div>
    </div>`
  }).join('')
}

function renderOrders() {
  const list = studentData?.orders || []
  const el = document.getElementById('orderList')
  if (!list.length) { el.innerHTML = '<div class="loader">لا توجد طلبات بعد</div>'; return }
  const statusMap = { pending: ['status-pending','⏳ قيد المراجعة'], approved: ['status-approved','✓ موافق عليه'], delivered: ['status-delivered','✅ تم التسليم'], rejected: ['status-pending','❌ مرفوض'] }
  el.innerHTML = list.map(o => {
    const s = statusMap[o.status] || ['status-pending', o.status]
    return `
    <div class="order-item">
      <div class="order-emoji">${o.store_items?.emoji || '🎁'}</div>
      <div class="order-info">
        <div class="order-name">${o.store_items?.name_ar || '---'}</div>
        <div class="order-stars">${o.stars_spent} ⭐</div>
      </div>
      <div class="status-badge ${s[0]}">${s[1]}</div>
    </div>`
  }).join('')
}
</script>
</body>
