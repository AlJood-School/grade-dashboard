<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduOS — مدرسة الجود</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0D1B2A;--card:rgba(255,255,255,.05);--border:rgba(255,255,255,.1);
  --text:#E2E8F0;--sub:#94A3B8;--accent:#6C3DD6;--cyan:#06B6D4;
  --role-a:#6C3DD6;--role-b:#9333EA;
}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;}

/* Header */
.header{
  background:linear-gradient(135deg,var(--role-a),var(--role-b));
  padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.header-logo{display:flex;align-items:center;gap:10px;}
.header-logo .logo-sq{
  width:38px;height:38px;background:rgba(255,255,255,.2);
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;
}
.logo-text{font-size:1rem;font-weight:700;}
.logo-sub{font-size:.72rem;opacity:.8;}
.header-user{text-align:left;display:flex;flex-direction:column;align-items:flex-end;}
.user-name-hdr{font-size:.9rem;font-weight:700;}
.user-role-hdr{font-size:.72rem;background:rgba(255,255,255,.2);padding:2px 10px;border-radius:100px;margin-top:3px;}

/* Banner */
.welcome-banner{
  background:linear-gradient(135deg,rgba(108,61,214,.15),rgba(34,211,238,.1));
  border:1px solid rgba(108,61,214,.25);border-radius:16px;
  padding:18px;margin:16px;display:flex;align-items:center;gap:14px;
}
.wb-icon{font-size:2.2rem;}
.wb-title{font-size:1.05rem;font-weight:700;}
.wb-sub{font-size:.82rem;color:var(--sub);margin-top:3px;line-height:1.5;}

/* AI Card */
.ai-card{
  background:linear-gradient(135deg,rgba(108,61,214,.12),rgba(6,182,212,.08));
  border:1px solid rgba(108,61,214,.3);border-radius:16px;padding:18px;margin:0 16px 14px;
}
.ai-header{display:flex;align-items:center;gap:8px;font-size:.85rem;color:var(--cyan);margin-bottom:10px;font-weight:600;}
.ai-body{font-size:.9rem;color:var(--sub);line-height:1.7;}
.ai-list{list-style:none;margin-top:10px;}
.ai-list li{padding:7px 0;border-bottom:1px solid rgba(255,255,255,.06);display:flex;gap:8px;font-size:.88rem;line-height:1.5;}
.ai-list li:last-child{border-bottom:none;}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:0 16px 14px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center;}
.stat-num{font-size:1.5rem;font-weight:900;color:var(--cyan);}
.stat-label{font-size:.77rem;color:var(--sub);margin-top:3px;}
.stat-card.green .stat-num{color:#10B981;}
.stat-card.red .stat-num{color:#EF4444;}
.stat-card.yellow .stat-num{color:#F59E0B;}
.stat-card.purple .stat-num{color:#A78BFA;}

/* Section */
.section{margin:0 16px 14px;}
.section-title{font-size:.95rem;font-weight:700;padding:0 0 10px;border-bottom:1px solid var(--border);margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;}
.card-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.card-title{font-size:.9rem;font-weight:600;}
.card-sub{font-size:.8rem;color:var(--sub);margin-top:2px;}
.badge{padding:3px 10px;border-radius:100px;font-size:.77rem;font-weight:600;white-space:nowrap;}
.badge-green{background:rgba(16,185,129,.15);color:#10B981;border:1px solid rgba(16,185,129,.3);}
.badge-yellow{background:rgba(245,158,11,.15);color:#F59E0B;border:1px solid rgba(245,158,11,.3);}
.badge-red{background:rgba(239,68,68,.15);color:#EF4444;border:1px solid rgba(239,68,68,.3);}
.badge-blue{background:rgba(6,182,212,.15);color:#06B6D4;border:1px solid rgba(6,182,212,.3);}
.badge-purple{background:rgba(108,61,214,.15);color:#A78BFA;border:1px solid rgba(108,61,214,.3);}

/* Progress */
.prog-wrap{margin-bottom:8px;}
.prog-label{display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:4px;}
.prog-label span:last-child{color:var(--cyan);}
.prog-bar{height:7px;background:rgba(255,255,255,.08);border-radius:100px;overflow:hidden;}
.prog-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--accent),var(--cyan));}

/* Actions */
.actions-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 14px;}
.action-btn{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;cursor:pointer;transition:background .2s,border-color .2s;}
.action-btn:hover{background:rgba(108,61,214,.15);border-color:rgba(108,61,214,.4);}
.ab-icon{font-size:1.7rem;margin-bottom:6px;}
.ab-label{font-size:.82rem;font-weight:600;}

/* Visit items */
.visit-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.visit-item:last-child{border-bottom:none;}
.visit-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0;}
.visit-name{font-size:.9rem;font-weight:600;}
.visit-detail{font-size:.78rem;color:var(--sub);}

/* Schedule table */
.sched-table{width:100%;border-collapse:collapse;font-size:.85rem;}
.sched-table th{color:var(--sub);font-weight:500;padding:6px 8px;text-align:right;border-bottom:1px solid var(--border);}
.sched-table td{padding:8px;border-bottom:1px solid rgba(255,255,255,.04);}
.sched-table tr:last-child td{border-bottom:none;}
.sched-table td:last-child{text-align:left;}

/* Grade bars */
.grade-item{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.grade-subject{width:80px;font-size:.83rem;color:var(--sub);flex-shrink:0;}
.grade-bar-wrap{flex:1;height:22px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden;}
.grade-bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-right:8px;font-size:.78rem;font-weight:700;color:#fff;}
.grade-val{font-size:.85rem;font-weight:700;width:42px;text-align:left;}

/* FAB + Modal */
.fab{position:fixed;bottom:24px;left:24px;width:52px;height:52px;background:linear-gradient(135deg,var(--accent),var(--cyan));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;box-shadow:0 4px 20px rgba(108,61,214,.5);cursor:pointer;z-index:200;transition:transform .2s;}
.fab:hover{transform:scale(1.1);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:300;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal-sheet{background:#0F2132;border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:500px;padding:22px;max-height:70dvh;overflow-y:auto;}
.modal-title{font-size:1.05rem;font-weight:700;margin-bottom:14px;display:flex;gap:8px;align-items:center;}
.modal-close{margin-right:auto;background:none;border:none;color:var(--sub);font-size:1.2rem;cursor:pointer;font-family:'Tajawal',sans-serif;}
.ai-msg{background:rgba(108,61,214,.1);border:1px solid rgba(108,61,214,.2);border-radius:12px;padding:16px;font-size:.9rem;line-height:1.7;color:var(--text);}

/* Demo badge */
.demo-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;
  background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);
  border-radius:100px;font-size:.75rem;color:#F59E0B;
  margin:0 16px 14px;
}

.bottom-pad{height:80px;}

/* Role header themes */
body.principal{--role-a:#5B21B6;--role-b:#7C3AED;}
body.teacher{--role-a:#0E7490;--role-b:#0891B2;}
body.student{--role-a:#065F46;--role-b:#059669;}
body.parent{--role-a:#92400E;--role-b:#B45309;}
body.socialworker{--role-a:#831843;--role-b:#BE185D;}
body.nurse{--role-a:#B91C1C;--role-b:#DC2626;}
body.security{--role-a:#374151;--role-b:#4B5563;}
</style>
</head>
<body>
<div class="header">
  <div class="header-logo">
    <div class="logo-sq">🎓</div>
    <div>
      <div class="logo-text">مدرسة الجود</div>
      <div class="logo-sub">Powered by EduOS</div>
    </div>
  </div>
  <div class="header-user">
    <div class="user-name-hdr" id="hdr-name">—</div>
    <div class="user-role-hdr" id="hdr-role">—</div>
  </div>
</div>

<div class="demo-chip">🎪 وضع العرض التجريبي — معسكر خليفة</div>

<div id="portal-content"></div>
<div class="bottom-pad"></div>

<div class="fab" onclick="openAI()">🤲</div>

<div class="modal-overlay" id="ai-modal" onclick="closeAI(event)">
  <div class="modal-sheet">
    <div class="modal-title">🤲 المساعد الذكي <button class="modal-close" onclick="closeAI()">✕</button></div>
    <div class="ai-msg" id="ai-modal-msg">جاري تحميل التوصية...</div>
  </div>
</div>

<script>
const params   = new URLSearchParams(location.search);
const userName = decodeURIComponent(params.get('name') || 'الزائر');
const userRole = params.get('role') || 'teacher';
const today    = new Date().toLocaleDateString('ar-AE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
const week     = 'الأسبوع الثاني والعشرون';

const ROLES = {
  principal:    { label:'مدير/ة المدرسة',         icon:'🏫' },
  teacher:      { label:'معلم/ة الصف',             icon:'📚' },
  student:      { label:'طالب/ة',                  icon:'🎒' },
  parent:       { label:'ولي/ة أمر',               icon:'👨‍👩‍👧' },
  socialworker: { label:'الأخصائي/ة الاجتماعي/ة', icon:'💙' },
  nurse:        { label:'المشرف/ة الصحي/ة',        icon:'🏥' },
  security:     { label:'مسؤول/ة الأمن',           icon:'🔐' }
};
const role = ROLES[userRole] || ROLES.teacher;
document.body.classList.add(userRole);
document.getElementById('hdr-name').textContent = userName;
document.getElementById('hdr-role').textContent = role.icon + ' ' + role.label;
document.title = role.label + ' — مدرسة الجود';

const content = document.getElementById('portal-content');

/* helpers */
function card(h){ return `<div class="card">${h}</div>`; }
function cardRow(title,sub,badge){
  return card(`<div class="card-row"><div><div class="card-title">${title}</div><div class="card-sub">${sub}</div></div>${badge}</div>`);
}
function prog(label,val,pct,color=''){
  return `<div class="prog-wrap"><div class="prog-label"><span>${label}</span><span>${val}</span></div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;${color?'background:'+color:''}"></div></div></div>`;
}
function gradeBar(subject,score,color){
  return `<div class="grade-item"><div class="grade-subject">${subject}</div><div class="grade-bar-wrap"><div class="grade-bar-fill" style="width:${score}%;background:${color}">${score > 30 ? score+'%' : ''}</div></div><div class="grade-val" style="color:${color}">${score}%</div></div>`;
}

/* ──────────────────── PRINCIPAL ──────────────────── */
function renderPrincipal(){
  return `
  <div class="welcome-banner"><div class="wb-icon">🏫</div><div class="wb-text"><div class="wb-title">مرحباً، ${userName} — لوحة المدير</div><div class="wb-sub">${today} — ${week}</div></div></div>
  <div class="ai-card">
    <div class="ai-header">🤲 تقرير الذكاء الاصطناعي — اليوم</div>
    <div class="ai-body">بناءً على تحليل <strong>315 طالباً</strong> و<strong>84 موظفاً</strong>، رصدت 3 تنبيهات:</div>
    <ul class="ai-list">
      <li>📉 تراجع أداء 8 طلاب في الصف السادس هذا الأسبوع</li>
      <li>🏃 غياب متكرر: 3 طلاب غابوا أكثر من 5 أيام هذا الشهر</li>
      <li>📝 3 معلمين لم يُرسلوا exit ticket في آخر حصصهم</li>
    </ul>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num">315</div><div class="stat-label">طالب/ة</div></div>
    <div class="stat-card green"><div class="stat-num">96.2%</div><div class="stat-label">الحضور</div></div>
    <div class="stat-card yellow"><div class="stat-num">3</div><div class="stat-label">تنبيهات</div></div>
  </div>
  <div class="section"><div class="section-title">📊 أداء الكادر اليوم</div>
    ${prog('حضور الموظفين','21 / 23','91')}
    ${prog('تسليم الخطط اليومية','19 / 23','83')}
    ${prog('إرسال exit tickets','17 / 23','74')}
  </div>
  <div class="section"><div class="section-title">📋 آخر الأحداث</div>
    ${cardRow('اجتماع مجلس المعلمين','غداً الساعة 11:00 ص','<span class="badge badge-blue">قادم</span>')}
    ${cardRow('تقرير التوطين','موعد التسليم: الأحد','<span class="badge badge-yellow">معلّق</span>')}
    ${cardRow('زيارة إشرافية — الصف الخامس','أُنجزت اليوم','<span class="badge badge-green">مكتمل</span>')}
  </div>
  <div class="actions-row">
    <div class="action-btn"><div class="ab-icon">📊</div><div class="ab-label">تقرير يومي</div></div>
    <div class="action-btn"><div class="ab-icon">📢</div><div class="ab-label">إشعار الأولياء</div></div>
    <div class="action-btn"><div class="ab-icon">🗓️</div><div class="ab-label">جدول الحصص</div></div>
    <div class="action-btn"><div class="ab-icon">👥</div><div class="ab-label">الموظفون</div></div>
  </div>`;
}

/* ──────────────────── TEACHER ──────────────────── */
function renderTeacher(){
  return `
  <div class="welcome-banner"><div class="wb-icon">📚</div><div class="wb-text"><div class="wb-title">مرحباً، ${userName}</div><div class="wb-sub">الصف الخامس أ — 28 طالب/ة | ${week}</div></div></div>
  <div class="ai-card">
    <div class="ai-header">🤲 توصية المساعد الذكي</div>
    <div class="ai-body">لاحظ النظام أن <strong>طالبَين</strong> في صفك يحتاجان دعماً في الرياضيات. يُنصح بـ exit ticket تأملي في نهاية الحصة القادمة.</div>
  </div>
  <div class="stats-row">
    <div class="stat-card green"><div class="stat-num">26</div><div class="stat-label">حاضر اليوم</div></div>
    <div class="stat-card red"><div class="stat-num">2</div><div class="stat-label">غائب</div></div>
    <div class="stat-card"><div class="stat-num">4</div><div class="stat-label">حصص اليوم</div></div>
  </div>
  <div class="section"><div class="section-title">🗓️ جدول اليوم</div>
    ${cardRow('الحصة الأولى — الرياضيات','الكسور العشرية','<span class="badge badge-green">منتهية</span>')}
    ${cardRow('الحصة الثانية — العلوم','دورة الماء في الطبيعة','<span class="badge badge-blue">الآن</span>')}
    ${cardRow('الحصة الثالثة — العربية','مهارة الكتابة الإبداعية','<span class="badge badge-yellow">قادمة</span>')}
    ${cardRow('الحصة الرابعة — التربية الإسلامية','الصدق وأثره','<span class="badge badge-yellow">قادمة</span>')}
  </div>
  <div class="section"><div class="section-title">📊 أداء الطلاب</div>
    ${prog('متفوقون (80%+)','11 طالب','39')}
    ${prog('مستوى جيد (60%–79%)','12 طالب','43')}
    ${prog('يحتاجون دعماً (<60%)','5 طلاب','18','#EF4444')}
  </div>
  <div class="actions-row">
    <div class="action-btn"><div class="ab-icon">📤</div><div class="ab-label">Exit Ticket</div></div>
    <div class="action-btn"><div class="ab-icon">✅</div><div class="ab-label">تسجيل حضور</div></div>
    <div class="action-btn"><div class="ab-icon">📝</div><div class="ab-label">تسجيل درجات</div></div>
    <div class="action-btn"><div class="ab-icon">📁</div><div class="ab-label">ملفات الطلاب</div></div>
  </div>`;
}

/* ──────────────────── STUDENT ──────────────────── */
function renderStudent(){
  return `
  <div class="welcome-banner"><div class="wb-icon">🎒</div><div class="wb-text"><div class="wb-title">مرحباً، ${userName}!</div><div class="wb-sub">الصف الخامس أ — ${today}</div></div></div>
  <div class="ai-card">
    <div class="ai-header">🤲 رسالة المساعد الذكي</div>
    <div class="ai-body">أداؤك في الرياضيات <strong>تحسّن 8%</strong> هذا الأسبوع — أحسنت! 🌟 يُنصح بمراجعة باب الكسور قبل الاختبار القادم.</div>
  </div>
  <div class="stats-row">
    <div class="stat-card green"><div class="stat-num">92%</div><div class="stat-label">معدل الحضور</div></div>
    <div class="stat-card purple"><div class="stat-num">78%</div><div class="stat-label">المعدل العام</div></div>
    <div class="stat-card yellow"><div class="stat-num">2</div><div class="stat-label">مهام قادمة</div></div>
  </div>
  <div class="section"><div class="section-title">📚 درجاتي — الفصل الثالث</div>
    ${gradeBar('الرياضيات',82,'#6C3DD6')}
    ${gradeBar('العلوم',75,'#22D3EE')}
    ${gradeBar('العربية',88,'#10B981')}
    ${gradeBar('الإسلامية',91,'#F59E0B')}
    ${gradeBar('الإنجليزية',70,'#EC4899')}
  </div>
  <div class="section"><div class="section-title">🗓️ جدول اليوم</div>
    ${cardRow('الرياضيات — الكسور','الحصة الأولى 7:30–8:15','<span class="badge badge-green">انتهت</span>')}
    ${cardRow('العلوم — دورة الماء','الحصة الثانية 8:20–9:05','<span class="badge badge-blue">الآن</span>')}
    ${cardRow('اللغة العربية','الحصة الثالثة 9:10–9:55','<span class="badge badge-yellow">قادمة</span>')}
  </div>
  <div class="section"><div class="section-title">📋 المهام القادمة</div>
    ${cardRow('تقرير العلوم — دورة الماء','موعد التسليم: الأحد','<span class="badge badge-red">عاجل</span>')}
    ${cardRow('تدريبات الرياضيات — ص 47','موعد التسليم: الثلاثاء','<span class="badge badge-yellow">قادم</span>')}
  </div>
  <div class="actions-row">
    <div class="action-btn"><div class="ab-icon">📖</div><div class="ab-label">مهامي</div></div>
    <div class="action-btn"><div class="ab-icon">📊</div><div class="ab-label">درجاتي</div></div>
    <div class="action-btn"><div class="ab-icon">🗓️</div><div class="ab-label">جدولي</div></div>
    <div class="action-btn"><div class="ab-icon">🏆</div><div class="ab-label">إنجازاتي</div></div>
  </div>`;
}

/* ──────────────────── PARENT ──────────────────── */
function renderParent(){
  return `
  <div class="welcome-banner"><div class="wb-icon">👨‍👩‍👧</div><div class="wb-text"><div class="wb-title">مرحباً، ${userName}</div><div class="wb-sub">متابعة أداء ابنك/ابنتك — الصف الخامس أ</div></div></div>
  <div class="ai-card">
    <div class="ai-header">🤲 ملاحظة من المساعد الذكي</div>
    <div class="ai-body">أداء ابنك/ابنتك <strong>جيد عموماً</strong> 👍 مع تحسّن ملحوظ في الرياضيات هذا الشهر. يُنصح بمتابعة مهمة العلوم المستحقة هذا الأحد.</div>
  </div>
  <div class="stats-row">
    <div class="stat-card green"><div class="stat-num">92%</div><div class="stat-label">الحضور</div></div>
    <div class="stat-card purple"><div class="stat-num">78%</div><div class="stat-label">المعدل</div></div>
    <div class="stat-card yellow"><div class="stat-num">2</div><div class="stat-label">مهام</div></div>
  </div>
  <div class="section"><div class="section-title">📊 الأداء الأكاديمي</div>
    ${gradeBar('الرياضيات',82,'#6C3DD6')}
    ${gradeBar('العلوم',75,'#22D3EE')}
    ${gradeBar('العربية',88,'#10B981')}
