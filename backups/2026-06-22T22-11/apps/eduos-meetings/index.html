<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة الاجتماعات | EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0D1B2A;
  --surface: #112240;
  --card:    #1a2f4a;
  --border:  #1e3a5f;
  --primary: #6C3DD6;
  --pl:      #8B5CF6;
  --cyan:    #06B6D4;
  --green:   #10B981;
  --red:     #EF4444;
  --amber:   #F59E0B;
  --blue:    #3B82F6;
  --pink:    #EC4899;
  --orange:  #F97316;
  --text:    #E2E8F0;
  --muted:   #94A3B8;
  --radius:  14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,#0D1B2A,#112240);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:100;}
.header-inner{max-width:900px;margin:0 auto;height:60px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-logo{width:36px;height:36px;background:linear-gradient(135deg,#6C3DD6,#22D3EE);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.brand-title{font-size:1rem;font-weight:900;background:linear-gradient(135deg,var(--pl),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.brand-sub{font-size:.65rem;color:var(--muted);}
.header-right{display:flex;align-items:center;gap:10px;}
.user-badge{background:rgba(108,61,214,.15);border:1px solid rgba(108,61,214,.3);border-radius:20px;padding:4px 12px;font-size:.78rem;color:var(--pl);}
.btn-logout{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s;}
.btn-logout:hover{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.1);}

/* ── TABS ── */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;}
.tabs-inner{max-width:900px;margin:0 auto;display:flex;gap:4px;}
.tab-btn{padding:12px 18px;border:none;background:none;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.tab-btn.active{color:var(--text);border-bottom-color:var(--primary);}
.tab-btn:hover{color:var(--text);}
.badge-count{background:var(--red);color:white;border-radius:10px;padding:1px 7px;font-size:.7rem;font-weight:700;}

/* ── MAIN ── */
.main{max-width:900px;margin:0 auto;padding:20px;}
.view{display:none;}
.view.active{display:block;}

/* ── SECTION HEADER ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-size:1.1rem;font-weight:700;color:var(--text);}
.filter-row{display:flex;gap:8px;}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:.78rem;cursor:pointer;transition:all .2s;}
.filter-btn.active{background:rgba(108,61,214,.2);border-color:var(--primary);color:var(--pl);}

/* ── MEETING CARD ── */
.meeting-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;transition:border-color .2s;}
.meeting-card:hover{border-color:rgba(108,61,214,.4);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;}
.card-badges{display:flex;gap:6px;flex-wrap:wrap;}
.type-badge{padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;}
.status-badge{padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600;}
.card-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.4;}
.card-meta{display:flex;flex-wrap:wrap;gap:12px;color:var(--muted);font-size:.82rem;margin-bottom:12px;}
.card-meta span{display:flex;align-items:center;gap:4px;}
.card-creator{font-size:.8rem;color:var(--muted);}
.response-area{border-top:1px solid var(--border);padding-top:12px;margin-top:12px;}
.response-label{font-size:.78rem;color:var(--muted);margin-bottom:8px;}
.response-btns{display:flex;gap:8px;}
.btn-confirm{flex:1;padding:9px;border-radius:10px;border:none;background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3);font-family:'Tajawal',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-confirm:hover{background:rgba(16,185,129,.25);}
.btn-decline{flex:1;padding:9px;border-radius:10px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.1);color:var(--red);font-family:'Tajawal',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-decline:hover{background:rgba(239,68,68,.2);}
.btn-ignore{flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-ignore:hover{background:rgba(255,255,255,.05);color:var(--text);}
.responded-status{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;font-size:.85rem;font-weight:600;}
.responded-status.confirmed{background:rgba(16,185,129,.1);color:var(--green);}
.responded-status.declined{background:rgba(239,68,68,.1);color:var(--red);}
.responded-status.ignored{background:rgba(255,255,255,.05);color:var(--muted);}

/* ── STATS BAR (created meetings) ── */
.stats-bar{display:flex;gap:12px;font-size:.78rem;}
.stat-item{display:flex;align-items:center;gap:4px;}

/* ── NOTE INPUT (decline) ── */
.note-area{margin-top:8px;display:none;}
.note-area.visible{display:block;}
.note-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:.85rem;resize:none;outline:none;}
.note-input:focus{border-color:var(--primary);}
.btn-send-note{margin-top:6px;padding:7px 16px;border-radius:8px;border:none;background:var(--primary);color:white;font-family:'Tajawal',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;}

/* ── CREATE FORM ── */
.create-form{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;}
.form-section{margin-bottom:20px;}
.form-label{font-size:.85rem;font-weight:700;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.form-input,.form-select,.form-textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary);}
.form-textarea{min-height:80px;resize:vertical;}
.form-select option{background:#1a2f4a;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.type-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.type-opt{padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;}
.type-opt.selected{border-color:var(--primary);color:var(--pl);background:rgba(108,61,214,.15);}
.target-opts{display:flex;gap:8px;}
.target-opt{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:.83rem;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;}
.target-opt.selected{border-color:var(--cyan);color:var(--cyan);background:rgba(6,182,212,.1);}
.roles-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.role-opt{padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:.8rem;cursor:pointer;text-align:right;transition:all .2s;}
.role-opt.selected{border-color:var(--cyan);color:var(--cyan);background:rgba(6,182,212,.1);}
.btn-submit{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--primary),var(--pl));color:white;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px;}
.btn-submit:hover{opacity:.9;transform:translateY(-1px);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* ── CLOSE MEETING ── */
.btn-close-meeting{padding:6px 14px;border-radius:8px;border:1px solid rgba(239,68,68,.3);background:transparent;color:var(--red);font-family:'Tajawal',sans-serif;font-size:.78rem;cursor:pointer;transition:all .2s;}
.btn-close-meeting:hover{background:rgba(239,68,68,.1);}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:3rem;margin-bottom:12px;}
.empty-text{font-size:.95rem;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:.88rem;z-index:9999;transition:transform .3s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{border-color:var(--green);color:var(--green);}
.toast.error{border-color:var(--red);color:var(--red);}

/* ── LOADING ── */
.loading{text-align:center;padding:40px;color:var(--muted);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){
  .form-grid{grid-template-columns:1fr;}
  .type-btns{grid-template-columns:1fr 1fr;}
  .response-btns{flex-direction:column;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-logo">🎓</div>
      <div>
        <div class="brand-title">الجود</div>
        <div class="brand-sub">EduOS</div>
      </div>
    </div>
    <div style="font-size:.95rem;font-weight:700;color:var(--text);">إدارة الاجتماعات</div>
    <div class="header-right">
      <span class="user-badge" id="userBadge">...</span>
      <button class="btn-logout" onclick="logout()" title="خروج">⏏</button>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tabs-inner">
    <button class="tab-btn active" id="tab-my" onclick="switchTab('my')">
      📬 اجتماعاتي <span class="badge-count" id="pendingBadge" style="display:none">0</span>
    </button>
    <button class="tab-btn" id="tab-created" onclick="switchTab('created')">📋 أنشأتها</button>
    <button class="tab-btn" id="tab-create" onclick="switchTab('create')">➕ إنشاء اجتماع</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- VIEW: MY MEETINGS -->
  <div class="view active" id="view-my">
    <div class="section-header">
      <div class="section-title">الاجتماعات المرسلة إليك</div>
      <div class="filter-row">
        <button class="filter-btn active" onclick="filterMyMeetings('all',this)">الكل</button>
        <button class="filter-btn" onclick="filterMyMeetings('pending',this)">⏳ معلّقة</button>
        <button class="filter-btn" onclick="filterMyMeetings('upcoming',this)">📅 قادمة</button>
      </div>
    </div>
    <div id="my-meetings-list"><div class="loading"><div class="spinner"></div>جاري التحميل...</div></div>
  </div>

  <!-- VIEW: CREATED BY ME -->
  <div class="view" id="view-created">
    <div class="section-header">
      <div class="section-title">الاجتماعات التي أنشأتها</div>
    </div>
    <div id="created-meetings-list"><div class="loading"><div class="spinner"></div>جاري التحميل...</div></div>
  </div>

  <!-- VIEW: CREATE -->
  <div class="view" id="view-create">
    <div class="create-form">
      <div style="font-size:1.1rem;font-weight:700;margin-bottom:20px;">📝 إنشاء اجتماع جديد</div>

      <!-- العنوان -->
      <div class="form-section">
        <div class="form-label">📌 عنوان الاجتماع <span style="color:var(--red)">*</span></div>
        <input class="form-input" id="f-title" placeholder="مثال: مراجعة خطة الأسبوع الدراسي..." maxlength="100">
      </div>

      <!-- النوع -->
      <div class="form-section">
        <div class="form-label">🏷️ نوع الاجتماع <span style="color:var(--red)">*</span></div>
        <div class="type-btns">
          <button class="type-opt" data-type="emergency" onclick="selectType(this)">🚨 طارئ</button>
          <button class="type-opt" data-type="admin" onclick="selectType(this)">🏛️ إداري</button>
          <button class="type-opt" data-type="educational" onclick="selectType(this)">📚 تربوي</button>
          <button class="type-opt" data-type="student_support" onclick="selectType(this)">🎒 دعم طالب</button>
          <button class="type-opt" data-type="support_team" onclick="selectType(this)">🤝 فريق دعم</button>
          <button class="type-opt" data-type="professional_dev" onclick="selectType(this)">💡 تطوير مهني</button>
        </div>
      </div>

      <!-- التاريخ والوقت -->
      <div class="form-section">
        <div class="form-grid">
          <div>
            <div class="form-label">📅 التاريخ <span style="color:var(--red)">*</span></div>
            <input class="form-input" id="f-date" type="date">
          </div>
          <div>
            <div class="form-label">🕐 الوقت <span style="color:var(--red)">*</span></div>
            <input class="form-input" id="f-time" type="time">
          </div>
        </div>
      </div>

      <!-- الموقع -->
      <div class="form-section">
        <div class="form-label">📍 الموقع (اختياري)</div>
        <input class="form-input" id="f-location" placeholder="مثال: قاعة الاجتماعات، مكتب المديرة...">
      </div>

      <!-- الأجندة -->
      <div class="form-section">
        <div class="form-label">📋 أجندة الاجتماع (اختياري)</div>
        <textarea class="form-textarea" id="f-agenda" placeholder="نقاط الاجتماع وما سيُناقش..."></textarea>
      </div>

      <!-- المدعوون -->
      <div class="form-section">
        <div class="form-label">👥 المدعوون <span style="color:var(--red)">*</span></div>
        <div class="target-opts">
          <button class="target-opt selected" data-target="all_staff" onclick="selectTarget(this)">🏫 جميع الموظفين</button>
          <button class="target-opt" data-target="roles" onclick="selectTarget(this)">👤 أدوار محددة</button>
        </div>
        <!-- أدوار محددة -->
        <div id="roles-picker" style="display:none;">
          <div class="roles-grid" style="margin-top:10px;">
            <button class="role-opt" data-role="teacher" onclick="toggleRole(this)">👩‍🏫 معلمون</button>
            <button class="role-opt" data-role="admin" onclick="toggleRole(this)">🏛️ إداريون</button>
            <button class="role-opt" data-role="social_worker" onclick="toggleRole(this)">🧑‍💼 اختصاصيون اجتماعيون</button>
            <button class="role-opt" data-role="special_ed" onclick="toggleRole(this)">♿ تربية خاصة</button>
            <button class="role-opt" data-role="nurse" onclick="toggleRole(this)">👩‍⚕️ ممرضة / طاقم طبي</button>
            <button class="role-opt" data-role="principal" onclick="toggleRole(this)">🎓 مدير/نائب مدير</button>
            <button class="role-opt" data-role="counselor" onclick="toggleRole(this)">🧠 مرشد/توجيه</button>
            <button class="role-opt" data-role="security" onclick="toggleRole(this)">🔐 أمن</button>
          </div>
        </div>
      </div>

      <button class="btn-submit" id="btn-create" onclick="createMeeting()">📤 إنشاء الاجتماع وإرسال الدعوات</button>
    </div>
  </div>

</div><!-- /main -->

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const SB_URL  = 'https://zuyizaiugpmhmeycqton.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1eWl6YWl1Z3BtaG1leWNxdG9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwODgyNDAsImV4cCI6MjA5NDY2NDI0MH0.FqOUqiR7GfttAEI8NY3bbOwFPnupxBsHMgYJCNT68PI';

const MEETING_TYPES = {
  emergency:        { label:'🚨 طارئ',           color:'#EF4444', bg:'rgba(239,68,68,.15)' },
  admin:            { label:'🏛️ إداري',          color:'#6C3DD6', bg:'rgba(108,61,214,.15)' },
  educational:      { label:'📚 تربوي',           color:'#06B6D4', bg:'rgba(6,182,212,.15)' },
  student_support:  { label:'🎒 دعم طالب',        color:'#F59E0B', bg:'rgba(245,158,11,.15)' },
  support_team:     { label:'🤝 فريق دعم',        color:'#10B981', bg:'rgba(16,185,129,.15)' },
  professional_dev: { label:'💡 تطوير مهني',      color:'#EC4899', bg:'rgba(236,72,153,.15)' }
};

const RESPONSE_STATUS = {
  pending:   { label:'⏳ في الانتظار', color:'#F59E0B' },
  confirmed: { label:'✅ تم التأكيد',  color:'#10B981' },
  declined:  { label:'❌ اعتذار',      color:'#EF4444' },
  ignored:   { label:'🚫 تجاهل',       color:'#64748B' }
};

// ══════════════════════════════════════════════
// CURRENT USER
// ══════════════════════════════════════════════
let currentUser = null;

function loadUser() {
  try {
    const raw = sessionStorage.getItem('edoos_user');
    if (raw) { currentUser = JSON.parse(raw); return; }
    // fallback: محاولة قراءة بيانات الجلسة بأشكال مختلفة
    ['aljood_session_user','loggedInUser','aljood_username'].forEach(k => {
      const v = sessionStorage.getItem(k);
      if (v && !currentUser) {
        try { currentUser = JSON.parse(v); }
        catch { currentUser = { id: v, name: v, role: 'staff' }; }
      }
    });
  } catch(e) { console.warn('User load error:', e); }
  if (!currentUser) currentUser = { id: 'guest', name: 'زائر', role: 'guest' };
  document.getElementById('userBadge').textContent = currentUser.name || currentUser.username || 'موظف';
}

// ══════════════════════════════════════════════
// SUPABASE HELPERS
// ══════════════════════════════════════════════
const HEADERS = {
  'apikey': SB_ANON,
  'Authorization': `Bearer ${SB_ANON}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

async function sbGet(table, query='') {
  const res = await fetch(`${SB_URL}/rest/v1/${table}?${query}`, { headers: HEADERS });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function sbPost(table, body) {
  const res = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method:'POST', headers: HEADERS, body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(await res.text());
  const ct = res.headers.get('content-type') || '';
  return ct.includes('json') ? res.json() : [];
}

async function sbPatch(table, filter, body) {
  const res = await fetch(`${SB_URL}/rest/v1/${table}?${filter}`, {
    method:'PATCH', headers: HEADERS, body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(await res.text());
}

async function sbUpsert(table, body, onConflict='') {
  const url = `${SB_URL}/rest/v1/${table}` + (onConflict ? `?on_conflict=${onConflict}` : '');
  const h = {...HEADERS, 'Prefer': 'resolution=merge-duplicates,return=representation'};
  const res = await fetch(url, { method:'POST', headers:h, body:JSON.stringify(body) });
  if (!res.ok) throw new Error(await res.text());
  const ct = res.headers.get('content-type') || '';
  return ct.includes('json') ? res.json() : [];
}

// ══════════════════════════════════════════════
// TAB MANAGEMENT
// ══════════════════════════════════════════════
let activeTab = 'my';

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  if (tab === 'my') loadMyMeetings();
  if (tab === 'created') loadCreatedMeetings();
  if (tab === 'create') resetCreateForm();
}

// ══════════════════════════════════════════════
// MY MEETINGS
// ══════════════════════════════════════════════
let myMeetingsData = [];
let myFilter = 'all';

async function loadMyMeetings() {
  const list = document.getElementById('my-meetings-list');
  list.innerHTML = '<div class="loading"><div class="spinner"></div>جاري التحميل...</div>';
  try {
    // جلب كل الاجتماعات النشطة
    const meetings = await sbGet('meetings', `school_id=eq.aljood&status=neq.cancelled&order=meeting_date.asc,meeting_time.asc`);
    const userId = (currentUser.id || currentUser.username || currentUser.name || '').toString();
    const userRole = (currentUser.role || '').toString();

    // فلترة الاجتماعات التي يُدعى إليها المستخدم
    const myMeetings = meetings.filter(m => {
      if (m.target_type === 'all_staff') return true;
      if (m.target_type === 'roles') return (m.target_roles || []).includes(userRole);
      if (m.target_type === 'individuals') return (m.target_ids || []).includes(userId);
      return false;
    });

    // جلب ردود المستخدم
    const responses = await sbGet('meeting_responses', `staff_id=eq.${encodeURIComponent(userId)}`);
    const responseMap = {};
    responses.forEach(r => { responseMap[r.meeting_id] = r; });

    // إنشاء ردود pending للاجتماعات الجديدة
    for (const m of myMeetings) {
      if (!responseMap[m.id] && m.creator_id !== userId) {
        try {
          const newResp = await sbUpsert('meeting_responses', {
            meeting_id: m.id,
            staff_id: userId,
            staff_name: currentUser.name || userId,
            response: 'pending'
          }, 'meeting_id,staff_id');
          if (Array.isArray(newResp) && newResp[0]) responseMap[m.id] = newResp[0];
          else responseMap[m.id] = { response: 'pending' };
        } catch(e) {
          responseMap[m.id] = { response: 'pending' };
        }
      }
    }

    myMeetingsData = myMeetings.map(m => ({ ...m, myResponse: responseMap[m.id] }));

    // عداد الانتظار
    const pendingCount = myMeetingsData.filter(m => !m.myResponse || m.myResponse.response === 'pending').length;
    const badge = document.getElementById('pendingBadge');
    if (pendingCount > 0) { badge.style.display='inline'; badge.textContent = pendingCount; }
    else { badge.style.display='none'; }

    renderMyMeetings();
  } catch(e) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">خطأ في التحميل: ${e.message}</div></div>`;
  }
}

function filterMyMeetings(f, btn) {
  myFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMyMeetings();
}

function renderMyMeetings() {
  const list = document.getElementById('my-meetings-list');
  let data = [...myMeetingsData];
  const now = new Date();
  const today = now.toISOString().split('T')[0];
  const userId = (currentUser.id || currentUser.username || '').toString();

  if (myFilter === 'pending') data = data.filter(m => !m.myResponse || m.myResponse.response === 'pending');
  if (myFilter === 'upcoming') data = data.filter(m => m.meeting_date >= today);

  // اخفاء اجتماعاتي التي أنشأتها
  data = data.filter(m => m.creator_id !== userId);

  if (!data.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">لا توجد اجتماعات ' + (myFilter !== 'all' ? 'في هذه الفئة' : '') + '</div></div>';
    return;
  }

  list.innerHTML = data.map(m => renderMeetingCard(m, 'my')).join('');
}

// ══════════════════════════════════════════════
// CREATED MEETINGS
// ══════════════════════════════════════════════
async function loadCreatedMeetings() {
  const list = document.getElementById('created-meetings-list');
  list.innerHTML = '<div class="loading"><div class="spinner"></div>جاري التحميل...</div>';
  try {
    const userId = (currentUser.id || currentUser.username || '').toString();
    const meetings = await sbGet('meetings', `creator_id=eq.${encodeURIComponent(userId)}&order=meeting_date.desc`);

    if (!meetings.length) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">لم تُنشئ أي اجتماعات بعد</div></div>';
      return;
    }

    // جلب إحصاءات الردود
    const meetingIds = meetings.map(m => `"${m.id}"`).join(',');
    const responses = await sbGet('meeting_responses', `meeting_id=in.(${meetingIds})`);

    const statsMap = {};
    responses.forEach(r => {
      if (!statsMap[r.meeting_id]) statsMap[r.meeting_id] = { confirmed:0, declined:0, ignored:0, pending:0 };
      statsMap[r.meeting_id][r.response] = (statsMap[r.meeting_id][r.response] || 0) + 1;
    });

    list.innerHTML = meetings.map(m => renderMeetingCard({ ...m, stats: statsMap[m.id] || {} }, 'created')).join('');
  } catch(e) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">خطأ في التحميل</div></div>`;
  }
}

// ══════════════════════════════════════════════
// RENDER CARD
// ══════════════════════════════════════════════
function renderMeetingCard(m, mode) {
  const type = MEETING_TYPES[m.type] || { label: m.type, color: '#94A3B8', bg: 'transparent' };
  const dateStr = m.meeting_date ? new Date(m.meeting_date + 'T00:00').toLocaleDateString('ar-AE', { weekday:'short', year:'numeric', month:'short', day:'numeric' }) : '';
  const timeStr = m.meeting_time ? m.meeting_time.slice(0,5) : '';
  const isPast = m.meeting_date < new Date().toISOString().split('T')[0];
  const statusLabel = m.status === 'completed' ? '✅ مكتمل' : m.status === 'cancelled' ? '🚫 ملغى' : isPast ? '⏰ انتهى' : '🟢 نشط';
  const statusColor = m.status === 'completed' ? '#10B981' : m.status === 'cancelled' ? '#EF4444' : isPast ? '#64748B' : '#10B981';

  let responseHTML = '';
  if (mode === 'my') {
    const resp = m.myResponse;
    const response = resp ? resp.response : 'pending';
    if (response === 'pending' && !isPast && m.status === 'active') {
      responseHTML = `
        <div class="response-area">
          <div class="response-label">ردّك على هذا الاجتماع:</div>
          <div class="response-btns">
            <button class="btn-confirm" onclick="respond('${m.id}','confirmed',this)">✅ تأكيد الحضور</button>
            <button class="btn-decline" onclick="startDecline('${m.id}')">❌ اعتذار</button>
            <button class="btn-ignore" onclick="respond('${m.id}','ignored',this)">🚫 تجاهل</button>
          </div>
          <div class="note-area" id="note-${m.id}">
            <textarea class="note-input" id="note-text-${m.id}" rows="2" placeholder="سبب الاعتذار (اختياري)..."></textarea>
            <button class="btn-send-note" onclick="respond('${m.id}','declined',null,'${m.id}')">إرسال الاعتذار</button>
          </div>
        </div>`;
    } else {
      const s = RESPONSE_STATUS[response] || RESPONSE_STATUS.pending;
      responseHTML = `<div class="response-area"><div class="responded-status ${response}">${s.label}</div></div>`;
    }
  } else if (mode === 'created') {
    const s = m.stats || {};
    responseHTML = `
      <div class="response-area">
        <div class="stats-bar">
          <span class="stat-item" style="color:#10B981">✅ ${s.confirmed||0} تأكيد</span>
          <span class="stat-item" style="color:#EF4444">❌ ${s.declined||0} اعتذار</span>
          <span class="stat-item" style="color:#64748B">🚫 ${s.ignored||0} تجاهل</span>
          <span class="stat-item" style="color:#F59E0B">⏳ ${s.pending||0} انتظار</span>
        </div>
        ${m.status === 'active' ? `<button class="btn-close-meeting" onclick="closeMeeting('${m.id}')" style="margin-top:10px;">إغلاق الاجتماع</button>` : ''}
      </div>`;
  }

  return `
    <div class="meeting-card" id="card-${m.id}">
      <div class="card-top">
        <div class="card-badges">
          <span class="type-badge" style="background:${type.bg};color:${type.color};">${type.label}</span>
          <span class="status-badge" style="color:${statusColor};background:rgba(0,0,0,.2);">${statusLabel}</span>
        </div>
      </div>
      <div class="card-title">${m.title}</div>
      <div class="card-meta">
        <span>📅 ${dateStr}</span>
        <span>🕐 ${timeStr}</span>
        ${m.location ? `<span>📍 ${m.location}</span>` : ''}
      </div>
      <div class="card-creator">👤 المنشئ: ${m.creator_name}</div>
      ${m.agenda ? `<div style="margin-top:8px;font-size:.8rem;color:var(--muted);background:rgba(255,255,255,.03);border-radius:8px;padding:8px 10px;">${m.agenda}</div>` : ''}
      ${responseHTML}
    </div>`;
}

// ══════════════════════════════════════════════
// RESPOND
// ══════════════════════════════════════════════
async function respond(meetingId, response, btn, noteId) {
  const userId = (currentUser.id || currentUser.username || '').toString();
  const note = noteId ? (document.getElementById('note-text-' + noteId)||{}).value || '' : '';
  if (btn) btn.disabled = true;
  try {
    await sbUpsert('meeting_responses', {
      meeting_id: meetingId,
      staff_id: userId,
      staff_name: currentUser.name || userId,
      response: response,
      note: note,
      responded_at: new Date().toISOString()
    }, 'meeting_id,staff_id');
    toast('تم تسجيل ردك ✅', 'success');
    await loadMyMeetings();
  } catch(e) {
    toast('خطأ في الإرسال ⚠️', 'error');
    if (btn) btn.disabled = false;
  }
}

function startDecline(meetingId) {
  const noteArea = document.getElementById('note-' + meetingId);
  if (noteArea) noteArea.classList.toggle('visible');
}

// ══════════════════════════════════════════════
// CLOSE MEETING
// ══════════════════════════════════════════════
async function closeMeeting(meetingId) {
  if (!confirm('هل تريد إغلاق هذا الاجتماع؟ لن يتلقى المدعوون مزيداً من التذكيرات.')) return;
  try {
    await sbPatch('meetings', `id=eq.${meetingId}`, { status: 'completed', reminder_active: false, updated_at: new Date().toISOString() });
    toast('تم إغلاق الاجتماع ✅', 'success');
    loadCreatedMeetings();
  } catch(e) {
    toast('خطأ في الإغلاق ⚠️', 'error');
  }
}

// ══════════════════════════════════════════════
// CREATE FORM
// ══════════════════════════════════════════════
let selectedType = '';
let selectedTarget = 'all_staff';
let selectedRoles = [];

function selectType(btn) {
  document.querySelectorAll('.type-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedType = btn.dataset.type;
}

function selectTarget(btn) {
  document.querySelectorAll('.target-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedTarget = btn.dataset.target;
  document.getElementById('roles-picker').style.display = selectedTarget === 'roles' ? 'block' : 'none';
  selectedRoles = [];
  document.querySelectorAll('.role-opt').forEach(b => b.classList.remove('selected'));
}

function toggleRole(btn) {
  btn.classList.toggle('selected');
  const role = btn.dataset.role;
  if (btn.classList.contains('selected')) { if (!selectedRoles.includes(role)) selectedRoles.push(role); }
  else { selectedRoles = selectedRoles.filter(r => r !== role); }
}

function resetCreateForm() {
  document.getElementById('f-title').value = '';
  document.getElementById('f-date').value = '';
  document.getElementById('f-time').value = '';
  document.getElementById('f-location').value = '';
  document.getElementById('f-agenda').value = '';
  document.querySelectorAll('.type-opt').forEach(b => b.classList.remove('selected'));
  selectedType = '';
  selectedTarget = 'all_staff';
  selectedRoles = [];
  document.querySelectorAll('.target-opt').forEach(b => b.classList.remove('selected'));
  document.querySelector('.target-opt[data-target="all_staff"]').classList.add('selected');
  document.getElementById('roles-picker').style.display = 'none';
  document.querySelectorAll('.role-opt').forEach(b => b.classList.remove('selected'));
}

async function createMeeting() {
  const title = document.getElementById('f-title').value.trim();
  const date  = document.getElementById('f-date').value;
  const time  = document.getElementById('f-time').value;
  const location = document.getElementById('f-location').value.trim();
  const agenda   = document.getElementById('f-agenda').value.trim();

  if (!title) { toast('أدخل عنوان الاجتماع', 'error'); return; }
  if (!selectedType) { toast('اختر نوع الاجتماع', 'error'); return; }
  if (!date) { toast('اختر تاريخ الاجتماع', 'error'); return; }
  if (!time) { toast('اختر وقت الاجتماع', 'error'); return; }
  if (selectedTarget === 'roles' && !selectedRoles.length) { toast('اختر دوراً واحداً على الأقل', 'error'); return; }

  const userId = (currentUser.id || currentUser.username || '').toString();
  const btn = document.getElementById('btn-create');
  btn.disabled = true; btn.textContent = '⏳ جاري الإنشاء...';

  try {
    const payload = {
      title, type: selectedType,
      creator_id: userId,
      creator_name: currentUser.name || userId,
      target_type: selectedTarget,
      target_roles: selectedTarget === 'roles' ? selectedRoles : [],
      target_ids: [],
      meeting_date: date,
      meeting_time: time,
      location: location || null,
      agenda: agenda || null,
      school_id: 'aljood',
      status: 'active',
      reminder_active: true
    };

    await sbPost('meetings', payload);
    toast('✅ تم إنشاء الاجتماع وإرسال الدعوات!', 'success');
    resetCreateForm();
    switchTab('created');
  } catch(e) {
    toast('خطأ في الإنشاء: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '📤 إنشاء الاجتماع وإرسال الدعوات';
  }
}

// ══════════════════════════════════════════════
// TOAST + LOGOUT
// ══════════════════════════════════════════════
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function logout() {
  if (confirm('هل تريد تسجيل الخروج؟')) {
    sessionStorage.removeItem('edoos_user');
    window.location.href = '../../eduos-login/index.html';
  }
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
loadUser();
loadMyMeetings();
// تحديث كل 60 ثانية
setInterval(() => { if (activeTab === 'my') loadMyMeetings(); }, 60000);
</script>
