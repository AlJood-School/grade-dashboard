name: 🤖 AI News Monitor — Daily

on:
  schedule:
    # 6:00 AM Dubai time = 2:00 AM UTC (UTC+4)
    - cron: '0 2 * * *'
  workflow_dispatch:   # يمكن تشغيله يدوياً من GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run AI News Monitor
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 .github/scripts/ai_news_monitor.py

      - name: Summary
        if: always()
        run: echo "✅ News monitor completed at $(date -u '+%Y-%m-%d %H:%M UTC')"
