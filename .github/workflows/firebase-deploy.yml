name: Deploy to Firebase Hosting
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: npm install -g firebase-tools
      - run: |
          echo '{"hosting":{"public":".","ignore":["firebase.json","**/.*"]}}' > firebase.json
          echo '{"projects":{"default":"aljood-school"}}' > .firebaserc
      - env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo $GOOGLE_APPLICATION_CREDENTIALS_JSON > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          firebase deploy --only hosting --project aljood-school
