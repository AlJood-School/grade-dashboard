<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بطاقات الروابط — الصف الثالث أ</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: #f0f4f8;
    padding: 20px;
    direction: rtl;
  }

  .page-title {
    text-align: center;
    margin-bottom: 24px;
    color: #1a2540;
  }
  .page-title h1 { font-size: 26px; font-weight: 900; }
  .page-title p { font-size: 14px; color: #666; margin-top: 4px; }

  .print-btn {
    display: block;
    margin: 0 auto 24px;
    padding: 12px 36px;
    background: #1a2540;
    color: #f5c842;
    border: none;
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  .print-btn:hover { background: #253060; }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .card {
    background: #fff;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 3px 12px rgba(0,0,0,0.12);
    border: 2px solid #1a2540;
    position: relative;
    page-break-inside: avoid;
  }

  .card-header {
    background: linear-gradient(135deg, #1a2540 0%, #2a3a6a 100%);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-header .school {
    color: #f5c842;
    font-size: 11px;
    font-weight: 700;
    line-height: 1.4;
  }

  .card-header .section-badge {
    background: #f5c842;
    color: #1a2540;
    font-size: 13px;
    font-weight: 900;
    padding: 4px 10px;
    border-radius: 8px;
    flex-shrink: 0;
  }

  .card-body {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .student-info {
    flex: 1;
  }

  .student-num {
    font-size: 11px;
    color: #999;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .student-name {
    font-size: 14px;
    font-weight: 700;
    color: #1a2540;
    line-height: 1.4;
  }

  .card-footer {
    background: #f8f9ff;
    border-top: 1px dashed #dde;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .link-info {
    flex: 1;
  }

  .link-label {
    font-size: 10px;
    color: #888;
    margin-bottom: 2px;
  }

  .link-url {
    font-size: 13px;
    font-weight: 700;
    color: #2a3a9a;
    direction: ltr;
    text-align: left;
  }

  .qr-img {
    width: 60px;
    height: 60px;
    border-radius: 6px;
    border: 1.5px solid #dde;
  }

  .special-needs-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: #7b2fff;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 6px;
  }

  /* ===== PRINT ===== */
  @media print {
    body { background: #fff; padding: 0; }
    .page-title, .print-btn { display: none; }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 100%;
      padding: 8mm;
    }
    .card {
      border: 2px solid #1a2540;
      box-shadow: none;
      border-radius: 10px;
    }
    .card-header { background: #1a2540 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .card-header .school { color: #f5c842 !important; }
    .card-header .section-badge { background: #f5c842 !important; color: #1a2540 !important; }
    .card-footer { background: #f8f9ff !important; }
    .special-needs-badge { background: #7b2fff !important; }
  }
</style>
</head>
<body>

<div class="page-title">
  <h1>🔗 بطاقات الروابط — الصف الثالث أ</h1>
  <p>27 بطاقة • قصّها وضعها على الطاولة قبل الحصة • الرابط يفتح الحصة مباشرة</p>
</div>

<button class="print-btn" onclick="window.print()">🖨️ طباعة البطاقات</button>

<div class="cards-grid" id="cardsGrid"></div>

<script>
const SHORT_LINK = 'tinyurl.com/2bvkzldy';
const FULL_LINK  = 'https://tinyurl.com/2bvkzldy';
const QR_BASE    = 'https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=';

const students = [
  { num: 1,  name: 'الجود محمود محمد احمد الحوقانى',          special: false },
  { num: 2,  name: 'حامد بن محمد بن سيف بن محمد',             special: false },
  { num: 3,  name: 'حمود ناصر شايع حمود الهاجرى',             special: false },
  { num: 4,  name: 'خالد الوليد محمد صالح',                   special: false },
  { num: 5,  name: 'خالد ناصر حمد مبارك الكربى',              special: false },
  { num: 6,  name: 'خليفه عبدالله حمد المربوعى',              special: false },
  { num: 7,  name: 'روضه سالم سعيد خلفان البادي',             special: false },
  { num: 8,  name: 'ساره بنت مسفر بن على الحبابى',            special: false },
  { num: 9,  name: 'ساره سامي رمضان عاشور الراشدي',           special: false },
  { num: 10, name: 'سعيد محمد على الغرينيق',                  special: true  },
  { num: 11, name: 'سلامه سيف محمد ابراهيم الكعبي',           special: false },
  { num: 12, name: 'سلطان ناصر هداف رضوان المنهالى',          special: false },
  { num: 13, name: 'سهيل عمر صالح يسلم الكثيري',              special: false },
  { num: 14, name: 'سيف ابراهيم عوض محمد اكبر',               special: false },
  { num: 15, name: 'شماء بنت عامر بن مبخوت الكربي',           special: false },
  { num: 16, name: 'صالح مهدى عبدالله خميس',                  special: false },
  { num: 17, name: 'عبدالعزيز حمد جابر على الأحبابي',         special: false },
  { num: 18, name: 'مترف فيصل سيف علي الشامسي',               special: false },
  { num: 19, name: 'محمد سالم منصور سالم الصيعرى',            special: false },
  { num: 20, name: 'محمد سعيد البخيت على',                    special: false },
  { num: 21, name: 'مريم عيسى على سعيد المعمرى',              special: false },
  { num: 22, name: 'مهره سالم محمد كرامه العامري',             special: false },
  { num: 23, name: 'ميثاء محمد على داهم الأحبابي',            special: false },
  { num: 24, name: 'ميثه أحمد هلال حمدان الشامسي',            special: false },
  { num: 25, name: 'ميرة بنت سلطان بن ناصر بن محمد الفارسية', special: false },
  { num: 26, name: 'ميره راشد سالم راشد المقرشى',             special: false },
  { num: 27, name: 'هند عبدالعزيز داود محمد الفارسي',         special: false },
];

const grid = document.getElementById('cardsGrid');

students.forEach(s => {
  const qrUrl = QR_BASE + encodeURIComponent(FULL_LINK) + '&color=1a2540&bgcolor=ffffff';
  grid.innerHTML += `
    <div class="card">
      ${s.special ? '<span class="special-needs-badge">💙 دعم خاص</span>' : ''}
      <div class="card-header">
        <div class="school">⭐ روضة ومدرسة الجود<br>CCDI &amp; AI — الصف الثالث</div>
        <div class="section-badge">3A</div>
      </div>
      <div class="card-body">
        <div class="student-info">
          <div class="student-num">الطالب رقم ${s.num}</div>
          <div class="student-name">${s.name}</div>
        </div>
      </div>
      <div class="card-footer">
        <div class="link-info">
          <div class="link-label">🔗 رابط الحصة — افتح من المتصفح</div>
          <div class="link-url">${SHORT_LINK}</div>
        </div>
        <img class="qr-img" src="${qrUrl}" alt="QR" loading="lazy">
      </div>
    </div>
  `;
});
</script>
</body>
</html>
