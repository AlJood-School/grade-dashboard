<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقييم الموظفات — المديرة | EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary:#6c63ff; --primary-dark:#4a42cc; --gold:#c9a84c;
  --success:#00d4aa; --danger:#ff6b6b; --warning:#ffd93d; --orange:#ff9f43;
  --bg:#0d1117; --card:#161b22; --card2:#21262d; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.header{background:linear-gradient(135deg,#0d1117,#1a0d2e);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-brand{display:flex;align-items:center;gap:12px;}
.header-logo{width:42px;height:42px;background:linear-gradient(135deg,var(--gold),#f0c040);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.header-title{font-size:16px;font-weight:900;color:white;}
.header-sub{font-size:12px;color:var(--muted);}
.btn{border:none;border-radius:8px;padding:8px 18px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-primary{background:var(--primary);color:white;}
.btn-success{background:var(--success);color:#000;}
.btn-gold{background:var(--gold);color:#000;}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

.layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 64px);}
@media(max-width:768px){.layout{grid-template-columns:1fr;}}

/* SIDEBAR */
.sidebar{background:var(--card);border-left:1px solid var(--border);padding:16px;overflow-y:auto;max-height:calc(100vh - 64px);position:sticky;top:64px;}
.sidebar-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.staff-item{padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .2s;margin-bottom:4px;display:flex;align-items:center;gap:10px;border:1px solid transparent;}
.staff-item:hover{background:var(--card2);}
.staff-item.active{background:rgba(108,99,255,0.12);border-color:var(--primary);}
.staff-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.staff-name{font-size:13px;font-weight:700;color:var(--text);}
.staff-role{font-size:11px;color:var(--muted);}
.status-dot{width:8px;height:8px;border-radius:50%;margin-right:auto;flex-shrink:0;}
.dot-draft{background:#8b949e;}
.dot-submitted{background:var(--orange);}
.dot-approved{background:var(--success);}
.dot-revision{background:var(--danger);}
.dot-eval{background:var(--primary);}

/* FILTERS */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.filter-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .2s;}
.filter-btn.active{background:var(--primary);color:white;border-color:var(--primary);}

/* MAIN CONTENT */
.main{padding:24px;overflow-y:auto;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
.stat-num{font-size:26px;font-weight:900;}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;}

/* SECTION */
.section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;}
.section-title{font-size:16px;font-weight:900;color:white;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.section-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}

/* PDP REVIEW */
.goal-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.goal-type-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:700;margin-bottom:8px;}
.type-academic{background:rgba(108,99,255,.2);color:#a78bfa;}
.type-professional{background:rgba(0,212,170,.2);color:#00d4aa;}
.type-behavioral{background:rgba(255,107,107,.2);color:#ff6b6b;}
.type-community{background:rgba(255,159,67,.2);color:#ff9f43;}

/* EVAL MANAGER */
.criteria-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card2);border-radius:8px;margin-bottom:8px;flex-wrap:wrap;}
.criteria-name-m{font-size:13px;font-weight:700;color:white;flex:1;min-width:150px;}
.criteria-weight-m{font-size:11px;color:var(--muted);white-space:nowrap;}
.score-btns{display:flex;gap:4px;}
.sbtn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-weight:700;font-size:12px;cursor:pointer;transition:all .2s;font-family:'Tajawal',sans-serif;}
.sbtn:hover{border-color:var(--primary);color:var(--primary);}
.sbtn.sel{background:var(--primary);color:white;border-color:var(--primary);}
.sbtn.sel5{background:var(--success);color:#000;border-color:var(--success);}

/* SCORE SUMMARY */
.score-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:16px 0;}
.score-box{background:var(--card2);border-radius:10px;padding:14px;text-align:center;border:1px solid var(--border);}
.score-box .num{font-size:24px;font-weight:900;}
.score-box .lbl{font-size:11px;color:var(--muted);}

/* COMPARISON */
.compare-bar{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.bar-label{font-size:12px;color:var(--muted);width:80px;text-align:right;flex-shrink:0;}
.bar-track{flex:1;height:10px;background:var(--border);border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;transition:width .5s ease;}
.bar-val{font-size:13px;font-weight:700;width:40px;flex-shrink:0;}

/* ANNUAL FINAL */
.annual-row{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card2);border-radius:10px;margin-bottom:8px;flex-wrap:wrap;}
.annual-name{font-size:14px;font-weight:700;color:white;flex:1;}
.grade-chip{padding:4px 12px;border-radius:8px;font-size:13px;font-weight:900;}
.grade-A{background:rgba(0,212,170,.2);color:#00d4aa;}
.grade-B{background:rgba(108,99,255,.2);color:#a78bfa;}
.grade-C{background:rgba(255,211,61,.2);color:#ffd93d;}
.grade-D{background:rgba(255,159,67,.2);color:#ff9f43;}
.grade-F{background:rgba(255,107,107,.2);color:#ff6b6b;}

/* FORM */
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:700;color:var(--text);margin-bottom:5px;display:block;}
.form-input,.form-textarea,.form-select{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'Tajawal',sans-serif;font-size:13px;color:var(--text);}
.form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;border-color:var(--primary);}
.form-textarea{resize:vertical;min-height:70px;}

/* BADGE */
.badge{display:inline-block;padding:2px 9px;border-radius:8px;font-size:11px;font-weight:700;}
.badge-draft{background:rgba(139,148,158,.2);color:#8b949e;}
.badge-submitted{background:rgba(255,159,67,.2);color:#ff9f43;}
.badge-approved{background:rgba(0,212,170,.2);color:#00d4aa;}
.badge-revision{background:rgba(255,107,107,.2);color:#ff6b6b;}
.badge-eval{background:rgba(108,99,255,.2);color:#a78bfa;}

/* EMPTY */
.empty{text-align:center;padding:60px;color:var(--muted);}
.empty .icon{font-size:48px;margin-bottom:12px;}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 22px;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.4);display:none;}
.toast.show{display:block;animation:slideDown .3s ease;}
@keyframes slideDown{from{top:0;opacity:0}to{top:20px;opacity:1}}

.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* TABS */
.inner-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0;}
.itab{padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted);border-radius:6px 6px 0 0;transition:all .2s;}
.itab.active{color:var(--primary);background:var(--card2);border-bottom:2px solid var(--primary);}
.itab-content{display:none;}
.itab-content.active{display:block;}
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="header-logo">👩‍💼</div>
    <div>
      <div class="header-title">إدارة تقييم الموظفات</div>
      <div class="header-sub">المديرة — العام الدراسي 2025-2026</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="btn btn-outline btn-sm" onclick="loadAllStaff()">🔄 تحديث</button>
    <button class="btn btn-gold btn-sm" onclick="exportReport()">📊 تقرير شامل</button>
  </div>
</div>
<div id="toast" class="toast"></div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div style="margin-bottom:12px;">
      <input class="form-input" id="searchStaff" placeholder="🔍 بحث عن موظفة..." oninput="filterStaff()" style="font-size:13px;">
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">الكل</button>
      <button class="filter-btn" onclick="setFilter('submitted',this)">⏳ بانتظار المراجعة</button>
      <button class="filter-btn" onclick="setFilter('teacher',this)">👩‍🏫 معلمات</button>
      <button class="filter-btn" onclick="setFilter('specialist',this)">💚 أخصائيات</button>
    </div>
    <div class="sidebar-title">الموظفات (<span id="staffCount">0</span>)</div>
    <div id="staffList">
      <div class="empty"><div class="spinner"></div><div style="font-size:13px;">جاري التحميل...</div></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card" style="border-color:rgba(255,159,67,.4)">
        <div class="stat-num" style="color:var(--orange)" id="statPending">0</div>
        <div class="stat-label">خطط بانتظار المراجعة</div>
      </div>
      <div class="stat-card" style="border-color:rgba(0,212,170,.4)">
        <div class="stat-num" style="color:var(--success)" id="statApproved">0</div>
        <div class="stat-label">خطط معتمدة</div>
      </div>
      <div class="stat-card" style="border-color:rgba(108,99,255,.4)">
        <div class="stat-num" style="color:var(--primary)" id="statEval">0</div>
        <div class="stat-label">تقييمات مكتملة</div>
      </div>
      <div class="stat-card" style="border-color:rgba(201,168,76,.4)">
        <div class="stat-num" style="color:var(--gold)" id="statAvg">—</div>
        <div class="stat-label">متوسط التقييم</div>
      </div>
    </div>

    <!-- DETAIL PANEL -->
    <div id="detailPanel">
      <div class="empty">
        <div class="icon">👈</div>
        <div>اختاري موظفة من القائمة لعرض ملفها وتقييمها</div>
      </div>
    </div>

  </div>
</div>

<script>
const SUPA_URL = 'https://zuyizaiugpmhmeycqton.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1eWl6YWl1Z3BtaG1leWNxdG9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwODgyNDAsImV4cCI6MjA5NDY2NDI0MH0.FqOUqiR7GfttAEI8NY3bbOwFPnupxBsHMgYJCNT68PI';
const SCHOOL_YEAR = '2025-2026';

const ROLE_LABELS = { teacher:'👩‍🏫 معلمة', specialist_social:'💚 أخصائية اجتماعية', specialist_psych:'🧠 أخصائية نفسية', specialist_special:'♿ أخصائية تربية خاصة', librarian:'📚 أمينة مكتبة', admin:'📋 إدارية', coordinator:'🎯 منسقة', nurse:'🏥 ممرضة' };

const CRITERIA_MAP = {
  teacher:[{name:'التخطيط للتعلم',w:20},{name:'التدريس والتعلم',w:25},{name:'التقييم والتغذية الراجعة',w:20},{name:'البيئة الصفية',w:15},{name:'التطوير المهني',w:10},{name:'التواصل والشراكة',w:10}],
  specialist_social:[{name:'الدعم والإرشاد',w:25},{name:'إدارة الحالات',w:25},{name:'التنسيق مع الأسر',w:20},{name:'التعاون التربوي',w:15},{name:'التطوير المهني',w:10},{name:'التوثيق',w:5}],
  specialist_psych:[{name:'الدعم النفسي',w:25},{name:'التقييم النفسي',w:25},{name:'التنسيق',w:20},{name:'برامج الصحة',w:15},{name:'التطوير المهني',w:10},{name:'التوثيق',w:5}],
  specialist_special:[{name:'تنفيذ IEP',w:30},{name:'التدريس التكيّفي',w:25},{name:'التنسيق',w:20},{name:'التقييم',w:15},{name:'التطوير المهني',w:10}],
  librarian:[{name:'إدارة المصادر',w:25},{name:'تشجيع القراءة',w:25},{name:'دعم المنهج',w:20},{name:'خدمة المستفيدين',w:15},{name:'التطوير المهني',w:10},{name:'التوثيق',w:5}],
  admin:[{name:'الدقة والإتقان',w:25},{name:'الالتزام بالمواعيد',w:20},{name:'خدمة العملاء',w:20},{name:'التنظيم',w:15},{name:'المبادرة',w:10},{name:'العمل الجماعي',w:10}],
  coordinator:[{name:'التخطيط',w:25},{name:'قيادة الفريق',w:25},{name:'التواصل',w:20},{name:'التحليل',w:15},{name:'التطوير',w:10},{name:'التوثيق',w:5}],
  nurse:[{name:'الرعاية اليومية',w:30},{name:'التثقيف الصحي',w:20},{name:'التنسيق',w:20},{name:'إدارة الملفات',w:15},{name:'الطوارئ',w:10},{name:'التطوير',w:5}],
};

let allPDPs = [], allEvals = [], allAnnual = [];
let activeStaff = null;
let currentFilter = 'all';
let managerScores1 = {}, managerScores2 = {};

async function api(method, table, data, params) {
  let url = `${SUPA_URL}/rest/v1/${table}`;
  const opts = {
    method, headers: {
      'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation,resolution=merge-duplicates' : 'return=representation'
    }
  };
  if (params) url += '?' + params;
  if (data) opts.body = JSON.stringify(data);
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadAllStaff() {
  try {
    allPDPs = await api('GET', 'staff_pdp', null, `school_year=eq.${SCHOOL_YEAR}&order=created_at.desc`);
    allEvals = await api('GET', 'staff_evaluations', null, `school_year=eq.${SCHOOL_YEAR}`);
    allAnnual = await api('GET', 'staff_annual_grades', null, `school_year=eq.${SCHOOL_YEAR}`);
    updateStats();
    renderSidebar(allPDPs);
  } catch(e) { console.error(e); showToast('❗ خطأ في التحميل: ' + e.message, 'var(--danger)'); }
}

function updateStats() {
  const pending = allPDPs.filter(p => p.status === 'submitted').length;
  const approved = allPDPs.filter(p => p.status === 'approved').length;
  const evalsDone = allEvals.filter(e => e.status === 'manager_done' || e.status === 'finalized').length;
  const scores = allAnnual.map(a => a.annual_grade).filter(Boolean);
  const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : null;
  
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statApproved').textContent = approved;
  document.getElementById('statEval').textContent = evalsDone;
  document.getElementById('statAvg').textContent = avg ? avg + '%' : '—';
}

function renderSidebar(pdps) {
  document.getElementById('staffCount').textContent = pdps.length;
  if (!pdps.length) {
    document.getElementById('staffList').innerHTML = '<div class="empty"><div>لا توجد خطط مهنية بعد</div></div>';
    return;
  }
  const statusClass = { draft:'dot-draft', submitted:'dot-submitted', approved:'dot-approved', revision_requested:'dot-revision' };
  const roleColors = { teacher:'#6c63ff', specialist_social:'#00d4aa', specialist_psych:'#ff9f43', specialist_special:'#ffd93d', librarian:'#ff6b6b', admin:'#8b949e', coordinator:'#a78bfa', nurse:'#4ecdc4' };
  document.getElementById('staffList').innerHTML = pdps.map(p => `
    <div class="staff-item ${activeStaff?.id === p.id ? 'active' : ''}" onclick="selectStaff('${p.id}')">
      <div class="staff-avatar" style="background:${roleColors[p.staff_role] || '#666'}22;color:${roleColors[p.staff_role] || '#999'}">
        ${p.staff_name.charAt(0)}
      </div>
      <div style="flex:1;min-width:0;">
        <div class="staff-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.staff_name}</div>
        <div class="staff-role">${ROLE_LABELS[p.staff_role] || p.staff_role}</div>
      </div>
      <div class="status-dot ${statusClass[p.status] || 'dot-draft'}" title="${p.status}"></div>
    </div>
  `).join('');
}

function filterStaff() {
  const q = document.getElementById('searchStaff').value.toLowerCase();
  let filtered = allPDPs;
  if (currentFilter === 'submitted') filtered = filtered.filter(p => p.status === 'submitted');
  else if (currentFilter === 'teacher') filtered = filtered.filter(p => p.staff_role === 'teacher');
  else if (currentFilter === 'specialist') filtered = filtered.filter(p => p.staff_role.includes('specialist'));
  if (q) filtered = filtered.filter(p => p.staff_name.includes(q) || (ROLE_LABELS[p.staff_role] || '').includes(q));
  renderSidebar(filtered);
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  filterStaff();
}

function selectStaff(id) {
  activeStaff = allPDPs.find(p => p.id === id);
  if (!activeStaff) return;
  managerScores1 = {};
  managerScores2 = {};
  // Load existing manager scores
  const e1 = allEvals.find(e => e.staff_name === activeStaff.staff_name && e.term === 1);
  const e2 = allEvals.find(e => e.staff_name === activeStaff.staff_name && e.term === 2);
  if (e1?.manager_criteria) managerScores1 = e1.manager_criteria;
  if (e2?.manager_criteria) managerScores2 = e2.manager_criteria;
  
  renderDetail();
  filterStaff(); // refresh active state
}

function renderDetail() {
  if (!activeStaff) return;
  const e1 = allEvals.find(e => e.staff_name === activeStaff.staff_name && e.term === 1);
  const e2 = allEvals.find(e => e.staff_name === activeStaff.staff_name && e.term === 2);
  const annual = allAnnual.find(a => a.staff_name === activeStaff.staff_name);
  const statusLabel = { draft:'مسودة', submitted:'بانتظار المراجعة', approved:'معتمدة', revision_requested:'تحتاج تعديل' };
  const statusBadge = { draft:'badge-draft', submitted:'badge-submitted', approved:'badge-approved', revision_requested:'badge-revision' };

  document.getElementById('detailPanel').innerHTML = `
    <!-- STAFF HEADER -->
    <div class="section">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
        <div style="width:50px;height:50px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:white">
          ${activeStaff.staff_name.charAt(0)}
        </div>
        <div style="flex:1">
          <div style="font-size:18px;font-weight:900;color:white">${activeStaff.staff_name}</div>
          <div style="font-size:13px;color:var(--muted)">${ROLE_LABELS[activeStaff.staff_role] || activeStaff.staff_role}</div>
        </div>
        <span class="badge ${statusBadge[activeStaff.status]}">${statusLabel[activeStaff.status]}</span>
        ${annual ? `<span class="badge badge-eval">الدرجة: ${annual.annual_grade}%</span>` : ''}
      </div>
    </div>

    <!-- INNER TABS -->
    <div class="inner-tabs">
      <div class="itab active" onclick="switchInnerTab('pdp',this)">📋 الخطة المهنية</div>
      <div class="itab" onclick="switchInnerTab('eval1',this)">📊 تقييم الفصل الأول</div>
      <div class="itab" onclick="switchInnerTab('eval2',this)">📊 تقييم الفصل الثاني</div>
      <div class="itab" onclick="switchInnerTab('annual',this)">🏆 الدرجة السنوية</div>
    </div>

    <!-- PDP TAB -->
    <div class="itab-content active" id="itab-pdp">
      ${renderPDPReview()}
      ${activeStaff.status === 'submitted' ? `
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px;">
          <button class="btn btn-outline btn-sm" onclick="reviewPDP('revision_requested')">🔄 طلب تعديل</button>
          <button class="btn btn-success btn-sm" onclick="reviewPDP('approved')">✅ اعتماد الخطة</button>
        </div>
      ` : ''}
      ${activeStaff.status === 'draft' ? '<div style="color:var(--muted);font-size:13px;padding:8px;background:var(--card2);border-radius:8px;text-align:center;">⏳ الموظفة لم ترسل الخطة بعد</div>' : ''}
      ${activeStaff.status === 'revision_requested' ? `
        <div style="margin-top:12px">
          <div class="form-group">
            <label class="form-label">ملاحظات التعديل المطلوبة</label>
            <textarea class="form-textarea" id="revisionNotes" placeholder="اذكري التعديلات المطلوبة بوضوح...">${activeStaff.revision_notes || ''}</textarea>
          </div>
          <button class="btn btn-primary btn-sm" onclick="saveRevisionNotes()">💾 حفظ الملاحظات</button>
        </div>
      ` : ''}
    </div>

    <!-- EVAL1 TAB -->
    <div class="itab-content" id="itab-eval1">
      ${e1 ? renderEvalReview(e1, 1) : '<div style="color:var(--muted);font-size:13px;padding:16px;text-align:center">⏳ الموظفة لم تُكمل التقييم الذاتي للفصل الأول بعد</div>'}
      <div class="section">
        <div class="section-title">👩‍💼 تقييم المديرة — الفصل الأول</div>
        <div class="section-sub">قيّمي الموظفة بموضوعية بناءً على ملاحظاتك الميدانية</div>
        ${renderManagerEvalForm(1)}
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px">
          <button class="btn btn-success" onclick="saveManagerEval(1)">✅ حفظ تقييم الفصل الأول</button>
        </div>
      </div>
    </div>

    <!-- EVAL2 TAB -->
    <div class="itab-content" id="itab-eval2">
      ${e2 ? renderEvalReview(e2, 2) : '<div style="color:var(--muted);font-size:13px;padding:16px;text-align:center">⏳ الموظفة لم تُكمل التقييم الذاتي للفصل الثاني بعد</div>'}
      <div class="section">
        <div class="section-title">👩‍💼 تقييم المديرة — الفصل الثاني</div>
        <div class="section-sub">التقييم الختامي للعام الدراسي</div>
        ${renderManagerEvalForm(2)}
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px">
          <button class="btn btn-success" onclick="saveManagerEval(2)">✅ حفظ تقييم الفصل الثاني</button>
        </div>
      </div>
    </div>

    <!-- ANNUAL TAB -->
    <div class="itab-content" id="itab-annual">
      ${renderAnnualPanel(e1, e2, annual)}
    </div>
  `;
}

function renderPDPReview() {
  const goals = activeStaff.goals || [];
  if (!goals.length) return '<div style="color:var(--muted);font-size:13px;padding:12px;text-align:center">لا توجد أهداف في الخطة</div>';
  
  const typeLabel = { academic:'أكاديمي', professional:'مهني', behavioral:'سلوكي', community:'مجتمعي' };
  const typeClass = { academic:'type-academic', professional:'type-professional', behavioral:'type-behavioral', community:'type-community' };
  
  return `
    <div class="section">
      <div class="section-title">📋 الأهداف المهنية (${goals.length} أهداف)</div>
      ${goals.map((g, i) => `
        <div class="goal-item">
          <span class="goal-type-badge ${typeClass[g.type] || 'type-professional'}">${typeLabel[g.type] || 'مهني'}</span>
          <div style="font-size:14px;font-weight:700;color:white;margin-bottom:6px">${g.what || '—'}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;color:var(--muted)">
            ${g.measurable ? `<div>📏 <strong>المقياس:</strong> ${g.measurable}</div>` : ''}
            ${g.how ? `<div>🛠️ <strong>الطريقة:</strong> ${g.how}</div>` : ''}
            ${g.due ? `<div>📅 <strong>الموعد:</strong> ${g.due}</div>` : ''}
          </div>
        </div>
      `).join('')}
      ${activeStaff.school_goals_alignment ? `
        <div style="background:rgba(108,99,255,.08);border:1px solid rgba(108,99,255,.2);border-radius:8px;padding:12px;margin-top:8px">
          <div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:4px">🏫 ارتباط بأهداف المدرسة</div>
          <div style="font-size:13px;color:var(--muted)">${activeStaff.school_goals_alignment}</div>
        </div>
      ` : ''}
    </div>
  `;
}

function renderEvalReview(e, term) {
  if (!e) return '';
  return `
    <div class="section">
      <div class="section-title">👤 التقييم الذاتي — الفصل ${term===1?'الأول':'الثاني'}</div>
      <div class="compare-bar">
        <div class="bar-label">التقييم الذاتي</div>
        <div class="bar-track"><div class="bar-fill" style="width:${e.self_score||0}%;background:var(--primary)"></div></div>
        <div class="bar-val" style="color:var(--primary)">${e.self_score||0}٪</div>
      </div>
      ${e.self_strengths ? `<div style="font-size:13px;color:var(--muted);margin-top:8px"><strong style="color:var(--success)">✅ نقاط القوة:</strong> ${e.self_strengths}</div>` : ''}
      ${e.self_improvement ? `<div style="font-size:13px;color:var(--muted);margin-top:4px"><strong style="color:var(--orange)">📈 مجالات التطوير:</strong> ${e.self_improvement}</div>` : ''}
    </div>
  `;
}

function renderManagerEvalForm(term) {
  const role = activeStaff.staff_role;
  const criteria = CRITERIA_MAP[role] || CRITERIA_MAP.teacher;
  const scores = term === 1 ? managerScores1 : managerScores2;
  
  return criteria.map((c, i) => `
    <div class="criteria-row">
      <div class="criteria-name-m">${c.name}</div>
      <div class="criteria-weight-m">${c.w}٪</div>
      <div class="score-btns">
        ${[1,2,3,4,5].map(s => `
          <button class="sbtn ${scores[i]===s?(s===5?'sel5':'sel'):''}" 
            onclick="setManagerScore(${term},${i},${s})">${s}</button>
        `).join('')}
      </div>
    </div>
  `).join('') + `
    <div style="margin-top:12px">
      <div class="form-group">
        <label class="form-label">نقاط القوة الملاحظة</label>
        <textarea class="form-textarea" id="mStrengths${term}" placeholder="ما الذي لاحظتِه إيجابياً؟"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">مجالات التحسين الموصى بها</label>
        <textarea class="form-textarea" id="mImprove${term}" placeholder="اقتراحات تطوير محددة..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">الأهداف للفترة القادمة</label>
        <textarea class="form-textarea" id="mGoals${term}" placeholder="ما الذي تتوقعينه منها في الفترة القادمة؟"></textarea>
      </div>
    </div>
    <div style="background:var(--card2);border-radius:8px;padding:12px;display:flex;align-items:center;gap:12px;margin-top:8px">
      <div style="font-size:13px;font-weight:700">درجة المديرة للفصل ${term===1?'الأول':'الثاني'}:</div>
      <div style="font-size:22px;font-weight:900;color:var(--gold)" id="mScore${term}">${calcManagerScore(term)}٪</div>
    </div>
  `;
}

function setManagerScore(term, idx, score) {
  if (term === 1) managerScores1[idx] = score;
  else managerScores2[idx] = score;
  document.getElementById(`mScore${term}`).textContent = calcManagerScore(term) + '٪';
  // Re-render just the score buttons
  const role = activeStaff.staff_role;
  const criteria = CRITERIA_MAP[role] || CRITERIA_MAP.teacher;
  const scores = term === 1 ? managerScores1 : managerScores2;
  document.querySelectorAll(`#itab-eval${term} .criteria-row`).forEach((row, i) => {
    row.querySelectorAll('.sbtn').forEach((btn, si) => {
      const s = si + 1;
      btn.className = 'sbtn';
      if (scores[i] === s) btn.className = s === 5 ? 'sbtn sel5' : 'sbtn sel';
    });
  });
}

function calcManagerScore(term) {
  const role = activeStaff?.staff_role;
  if (!role) return 0;
  const criteria = CRITERIA_MAP[role] || CRITERIA_MAP.teacher;
  const scores = term === 1 ? managerScores1 : managerScores2;
  let total = 0;
  criteria.forEach((c, i) => { if (scores[i]) total += (scores[i]/5) * c.w; });
  return Math.round(total);
}

async function reviewPDP(newStatus) {
  if (!activeStaff) return;
  try {
    const data = { status: newStatus, updated_at: new Date().toISOString() };
    if (newStatus === 'approved') data.approved_by = 'المديرة';
    if (newStatus === 'approved') data.approved_at = new Date().toISOString();
    await api('PATCH', 'staff_pdp', data, `id=eq.${activeStaff.id}`);
    activeStaff.status = newStatus;
    await loadAllStaff();
    renderDetail();
    showToast(newStatus === 'approved' ? '✅ تم اعتماد الخطة' : '🔄 تم طلب التعديل');
  } catch(e) { showToast('❗ خطأ: ' + e.message, 'var(--danger)'); }
}

async function saveRevisionNotes() {
  const notes = document.getElementById('revisionNotes')?.value;
  if (!activeStaff) return;
  try {
    await api('PATCH', 'staff_pdp', { revision_notes: notes, updated_at: new Date().toISOString() }, `id=eq.${activeStaff.id}`);
    showToast('💾 تم حفظ الملاحظات');
  } catch(e) { showToast('❗ ' + e.message, 'var(--danger)'); }
}

async function saveManagerEval(term) {
  if (!activeStaff) return;
  const mScore = calcManagerScore(term);
  const mStrengths = document.getElementById(`mStrengths${term}`)?.value || '';
  const mImprove = document.getElementById(`mImprove${term}`)?.value || '';
  const mGoals = document.getElementById(`mGoals${term}`)?.value || '';
  const scores = term === 1 ? managerScores1 : managerScores2;
  
  try {
    await api('POST', 'staff_evaluations', {
      staff_name: activeStaff.staff_name,
      staff_role: activeStaff.staff_role,
      school_year: SCHOOL_YEAR,
      term,
      manager_criteria: scores,
      manager_score: mScore,
      manager_strengths: mStrengths,
      manager_improvement: mImprove,
      manager_goals: mGoals,
      evaluator_name: 'المديرة',
      manager_completed_at: new Date().toISOString(),
      status: 'manager_done',
      updated_at: new Date().toISOString()
    });
    await loadAllStaff();
    // Auto-calculate annual if both terms done
    await tryFinalizeAnnual();
    showToast(`✅ تم حفظ تقييم الفصل ${term===1?'الأول':'الثاني'} بنجاح`);
    renderDetail();
  } catch(e) { showToast('❗ ' + e.message, 'var(--danger)'); }
}

async function tryFinalizeAnnual() {
  const e1 = allEvals.find(e => e.staff_name === activeStaff.staff_name && e.term === 1);
  const e2 = allEvals.find(e => e.staff_name === activeStaff.staff_name && e.term === 2);
  if (!e1?.manager_score || !e2?.manager_score) return;
  
  const pdpGoals = activeStaff.goals || [];
  const pdpScore = pdpGoals.length ? Math.min(100, pdpGoals.filter(g=>g.what).length / pdpGoals.length * 100) : 0;
  const annual = Math.round((e1.manager_score * 0.35) + (e2.manager_score * 0.45) + (pdpScore * 0.2));
  let label = '';
  if (annual >= 90) label = 'ممتاز';
  else if (annual >= 80) label = 'جيد جداً';
  else if (annual >= 70) label = 'جيد';
  else if (annual >= 60) label = 'مقبول';
  else label = 'يحتاج تحسيناً';
  
  await api('POST', 'staff_annual_grades', {
    staff_name: activeStaff.staff_name,
    staff_role: activeStaff.staff_role,
    school_year: SCHOOL_YEAR,
    term1_score: e1.manager_score,
    term2_score: e2.manager_score,
    pdp_completion_score: pdpScore,
    annual_grade: annual,
    grade_label: label,
    finalized_at: new Date().toISOString()
  });
}

function renderAnnualPanel(e1, e2, annual) {
  const s1 = e1?.manager_score || 0;
  const s2 = e2?.manager_score || 0;
  const pdpGoals = activeStaff.goals || [];
  const pdpScore = pdpGoals.length ? Math.round(pdpGoals.filter(g=>g.what).length/pdpGoals.length*100) : 0;
  const finalGrade = annual?.annual_grade || Math.round((s1*.35)+(s2*.45)+(pdpScore*.2));
  const gradeLabel = annual?.grade_label || (finalGrade>=90?'ممتاز':finalGrade>=80?'جيد جداً':finalGrade>=70?'جيد':finalGrade>=60?'مقبول':'يحتاج تحسيناً');
  const gradeClass = finalGrade>=90?'grade-A':finalGrade>=80?'grade-B':finalGrade>=70?'grade-C':finalGrade>=60?'grade-D':'grade-F';

  return `
    <div class="section" style="background:linear-gradient(135deg,var(--card),#1a1a2e)">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:40px;font-weight:900" class="${gradeClass}">${finalGrade}٪</div>
        <span class="grade-chip ${gradeClass}" style="font-size:15px">${gradeLabel}</span>
      </div>
      <div class="score-summary">
        <div class="score-box">
          <div class="num" style="color:var(--primary)">${s1}٪</div>
          <div class="lbl">الفصل الأول (35٪)</div>
        </div>
        <div class="score-box">
          <div class="num" style="color:var(--success)">${s2}٪</div>
          <div class="lbl">الفصل الثاني (45٪)</div>
        </div>
        <div class="score-box">
          <div class="num" style="color:var(--gold)">${pdpScore}٪</div>
          <div class="lbl">تنفيذ الخطة (20٪)</div>
        </div>
      </div>
      <div class="form-group" style="margin-top:12px">
        <label class="form-label">ملاحظات المديرة النهائية</label>
        <textarea class="form-textarea" id="annualNotes" placeholder="ملاحظات ختامية...">${annual?.principal_notes||''}</textarea>
      </div>
      <div style="text-align:left">
        <button class="btn btn-gold" onclick="finalizeAnnual(${finalGrade},'${gradeLabel}')">🏆 اعتماد الدرجة السنوية النهائية</button>
      </div>
    </div>
  `;
}

async function finalizeAnnual(grade, label) {
  if (!activeStaff) return;
  const notes = document.getElementById('annualNotes')?.value || '';
  const e1 = allEvals.find(e => e.staff_name === activeStaff.staff_name && e.term === 1);
  const e2 = allEvals.find(e => e.staff_name === activeStaff.staff_name && e.term === 2);
  const pdpGoals = activeStaff.goals || [];
  const pdpScore = pdpGoals.length ? Math.round(pdpGoals.filter(g=>g.what).length/pdpGoals.length*100) : 0;
  
  try {
    await api('POST', 'staff_annual_grades', {
      staff_name: activeStaff.staff_name,
      staff_role: activeStaff.staff_role,
      school_year: SCHOOL_YEAR,
      term1_score: e1?.manager_score || 0,
      term2_score: e2?.manager_score || 0,
      pdp_completion_score: pdpScore,
      annual_grade: grade,
      grade_label: label,
      principal_notes: notes,
      finalized_at: new Date().toISOString()
    });
    await loadAllStaff();
    showToast('🏆 تم اعتماد الدرجة السنوية النهائية');
    renderDetail();
  } catch(e) { showToast('❗ ' + e.message, 'var(--danger)'); }
}

function switchInnerTab(tab, el) {
  document.querySelectorAll('.itab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.itab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('itab-' + tab).classList.add('active');
}

function exportReport() {
  if (!allPDPs.length) { showToast('لا توجد بيانات بعد', 'var(--danger)'); return; }
  let csv = 'الاسم,الدور,حالة الخطة,الفصل الأول,الفصل الثاني,الدرجة السنوية,التقدير\n';
  allPDPs.forEach(p => {
    const e1 = allEvals.find(e=>e.staff_name===p.staff_name&&e.term===1);
    const e2 = allEvals.find(e=>e.staff_name===p.staff_name&&e.term===2);
    const a = allAnnual.find(x=>x.staff_name===p.staff_name);
    csv += `"${p.staff_name}","${ROLE_LABELS[p.staff_role]||p.staff_role}","${p.status}","${e1?.manager_score||'—'}","${e2?.manager_score||'—'}","${a?.annual_grade||'—'}","${a?.grade_label||'—'}"\n`;
  });
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `تقرير_التقييم_${SCHOOL_YEAR}.csv`; a.click();
  showToast('📊 تم تصدير التقرير');
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.color = color || 'var(--success)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

// INIT
loadAllStaff();
</script>
</body>
</html>
