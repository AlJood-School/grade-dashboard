<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>دخول الطلاب/ات — EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',Arial,sans-serif;background:linear-gradient(135deg,#0ea5e9 0%,#6C3DD6 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;direction:rtl;padding:20px}
.login-box{background:#fff;border-radius:24px;padding:40px 36px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.logo-area{text-align:center;margin-bottom:28px}
.logo-badge{background:linear-gradient(135deg,#0ea5e9,#6C3DD6);color:#fff;border-radius:16px;padding:12px 24px;font-size:1.6rem;font-weight:900;display:inline-block;margin-bottom:8px}
.title{font-size:1.2rem;font-weight:900;color:#1e293b;margin-bottom:4px}
.sub{font-size:.82rem;color:#64748b;margin-bottom:28px;text-align:center}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:.82rem;font-weight:700;color:#1e293b;margin-bottom:6px}
input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-family:inherit;font-size:.9rem;background:#F8FAFF;color:#1e293b;transition:.2s}
input:focus{outline:none;border-color:#6C3DD6;background:#fff}
.btn{width:100%;padding:12px;border-radius:12px;border:none;cursor:pointer;font-family:inherit;font-size:.95rem;font-weight:700;transition:.2s;margin-top:6px}
.btn-primary{background:linear-gradient(135deg,#0ea5e9,#6C3DD6);color:#fff}.btn-primary:hover{opacity:.9}
.btn-outline{background:#fff;border:1.5px solid #e2e8f0;color:#64748b;margin-top:8px;font-size:.85rem}.btn-outline:hover{border-color:#6C3DD6}
.mascot{font-size:3rem;text-align:center;margin-bottom:8px}
.toast{position:fixed;top:30px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:10px;padding:12px 24px;font-size:.88rem;font-weight:600;z-index:999;display:none}
.toast.show{display:block}
.spinner{display:none;width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.quick-links{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;justify-content:center}
.quick-link{padding:6px 12px;border-radius:8px;border:1px solid #e2e8f0;font-size:.78rem;font-weight:600;color:#64748b;cursor:pointer;text-decoration:none;transition:.2s}
.quick-link:hover{border-color:#6C3DD6;color:#6C3DD6}
</style>
<script src="../platform-config.js"></script>
</head>
<body>
<div class="login-box">
  <div class="logo-area">
    <div class="mascot">🎓</div>
    <div class="logo-badge">👨‍🎓 EduOS</div>
    <div class="title">دخول الطلاب/ات</div>
    <div class="sub">Student Login · أدخل/ي بياناتك/ِ للوصول</div>
  </div>

  <div class="form-group">
    <label class="form-label">رقم الطالب/ة | Student ID</label>
    <input type="text" id="studentId" placeholder="مثال: STU-2024-001" autocomplete="username"/>
  </div>
  <div class="form-group">
    <label class="form-label">كلمة المرور | Password</label>
    <input type="password" id="password" placeholder="كلمة المرور..." autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/>
  </div>

  <button class="btn btn-primary" id="loginBtn" onclick="login()">
    <span id="btnText">🚀 دخول — Login</span>
    <div class="spinner" id="spinner"></div>
  </button>
  <button class="btn btn-outline" onclick="location.href='/apps/eduos-welcome/'">← العودة للرئيسية</button>

  <div class="quick-links">
    <a class="quick-link" href="/apps/eduos-student-portal/">بوابة الطالب/ة</a>
    <a class="quick-link" href="/apps/eduos-space/">فضاء التعلم</a>
    <a class="quick-link" href="/apps/eduos-atheer/">أثير 🌟</a>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SB='https://zuyizaiugpmhmeycqton.supabase.co';
const KEY=window.EduOS?.SB_KEY;
async function login(){
  const id=document.getElementById('studentId').value.trim();
  const pw=document.getElementById('password').value;
  if(!id||!pw){ showToast('⚠️ أدخل/ي رقم الطالب/ة وكلمة المرور'); return; }
  document.getElementById('btnText').style.display='none';
  document.getElementById('spinner').style.display='block';
  document.getElementById('loginBtn').disabled=true;
  try{
    const r=await fetch(`${SB}/auth/v1/token?grant_type=password`,{method:'POST',headers:{'apikey':KEY,'Content-Type':'application/json'},body:JSON.stringify({email:`${id}@aljood.eduos.ae`,password:pw})});
    const d=await r.json();
    if(d?.access_token){
      sessionStorage.setItem('edoos_user',JSON.stringify(d));
      location.href='/apps/eduos-student-portal/';
    } else {
      showToast('❌ خطأ في رقم الطالب/ة أو كلمة المرور');
    }
  }catch(e){ showToast('❌ خطأ في الاتصال — حاول/ي مرة أخرى'); }
  document.getElementById('btnText').style.display='block';
  document.getElementById('spinner').style.display='none';
  document.getElementById('loginBtn').disabled=false;
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
// Check if already logged in
const s=sessionStorage.getItem('edoos_user');
if(s){ try{ const u=JSON.parse(s); if(u?.access_token) location.href='/apps/eduos-student-portal/'; }catch(e){} }
</script>
</body>
</html>
