<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduOS Calendar — التقويم المدرسي الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root {
  --bg: #0D1B2A;
  --surface: rgba(255,255,255,0.05);
  --surface2: rgba(255,255,255,0.09);
  --border: rgba(255,255,255,0.1);
  --primary: #6366F1;
  --primary-dark: #4F46E5;
  --primary-light: #A5B4FC;
  --green: #10B981;
  --red: #EF4444;
  --orange: #F59E0B;
  --blue: #0EA5E9;
  --pink: #EC4899;
  --purple: #8B5CF6;
  --teal: #14B8A6;
  --text: #F1F5F9;
  --text-muted: #94A3B8;
  --radius: 14px;
  --transition: 0.25s ease;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;}

/* HEADER */
.header{background:linear-gradient(135deg,#312E81,#6366F1,#4F46E5);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(99,102,241,0.4);}
.header-right{display:flex;align-items:center;gap:14px;}
.logo{width:40px;height:40px;border-radius:10px;object-fit:contain;}
.header-title{font-size:1.1rem;font-weight:700;}
.header-title span{color:#C7D2FE;font-size:0.8rem;display:block;font-weight:400;}
.header-center{display:flex;align-items:center;gap:10px;}
.hdr-badge{background:rgba(255,255,255,0.12);padding:4px 12px;border-radius:20px;font-size:0.75rem;color:#E0E7FF;}
.header-left{display:flex;align-items:center;gap:10px;}
.btn-exit{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;cursor:pointer;color:#94A3B8;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:var(--transition);}
.btn-exit:hover{background:#EF4444;color:white;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:300px 1fr;gap:0;height:calc(100vh - 64px - 44px);overflow:hidden;}

/* SIDEBAR */
.sidebar{background:rgba(255,255,255,0.03);border-left:1px solid var(--border);overflow-y:auto;padding:16px;}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* MINI CALENDAR */
.mini-cal{margin-bottom:20px;}
.mini-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.mini-cal-title{font-weight:700;font-size:0.95rem;}
.mini-cal-nav{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:none;cursor:pointer;color:var(--text);font-size:0.8rem;display:flex;align-items:center;justify-content:center;transition:var(--transition);}
.mini-cal-nav:hover{background:var(--primary);}
.mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;}
.mini-day-label{font-size:0.65rem;color:var(--text-muted);padding:4px 0;font-weight:600;}
.mini-day{padding:5px;font-size:0.78rem;border-radius:50%;cursor:pointer;transition:var(--transition);line-height:1;aspect-ratio:1;display:flex;align-items:center;justify-content:center;}
.mini-day:hover{background:var(--surface2);}
.mini-day.today{background:var(--primary);color:white;font-weight:700;}
.mini-day.has-event{position:relative;}
.mini-day.has-event::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--orange);}
.mini-day.selected{background:var(--primary-dark);}
.mini-day.other-month{color:var(--text-muted);opacity:0.4;}

/* EVENT TYPES */
.event-types{margin-bottom:20px;}
.event-types-title{font-size:0.82rem;color:var(--text-muted);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;}
.event-type-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:var(--transition);font-size:0.85rem;}
.event-type-item:hover{background:var(--surface2);}
.event-type-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.event-type-item input{accent-color:var(--primary);}

/* UPCOMING */
.upcoming-title{font-size:0.82rem;color:var(--text-muted);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;}
.upcoming-item{padding:10px;background:var(--surface2);border-radius:10px;margin-bottom:8px;border-right:3px solid;cursor:pointer;transition:var(--transition);}
.upcoming-item:hover{background:rgba(255,255,255,0.1);}
.upcoming-date{font-size:0.72rem;color:var(--text-muted);margin-bottom:3px;}
.upcoming-name{font-size:0.88rem;font-weight:600;}
.upcoming-meta{font-size:0.75rem;color:var(--text-muted);margin-top:3px;}

/* MAIN */
.main-area{display:flex;flex-direction:column;overflow:hidden;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
.toolbar-left{display:flex;align-items:center;gap:10px;}
.toolbar-title{font-size:1.2rem;font-weight:700;}
.toolbar-nav{display:flex;gap:6px;}
.btn-nav{padding:6px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:0.9rem;transition:var(--transition);}
.btn-nav:hover{background:var(--primary);border-color:var(--primary);}
.btn-today{background:var(--primary);border-color:var(--primary);color:white;}
.toolbar-right{display:flex;align-items:center;gap:8px;}
.view-btns{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.view-btn{padding:6px 12px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:0.85rem;transition:var(--transition);}
.view-btn.active{background:var(--primary);color:white;}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:0.88rem;font-weight:600;transition:var(--transition);display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--primary);color:white;}
.btn-primary:hover{background:var(--primary-dark);}

/* CALENDAR GRID */
.cal-wrap{flex:1;overflow:auto;padding:0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:auto;min-height:100%;}
.day-label{padding:10px;text-align:center;font-size:0.8rem;font-weight:700;color:var(--text-muted);border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02);position:sticky;top:0;z-index:10;}
.cal-day{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:110px;padding:6px;cursor:pointer;transition:var(--transition);position:relative;}
.cal-day:hover{background:rgba(255,255,255,0.03);}
.cal-day.today .day-num{background:var(--primary);color:white;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;}
.cal-day.other-month{opacity:0.4;}
.cal-day.weekend{background:rgba(255,255,255,0.02);}
.cal-day.selected{background:rgba(99,102,241,0.1);}
.day-num{font-size:0.85rem;font-weight:600;margin-bottom:4px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;}
.cal-event{padding:3px 6px;border-radius:4px;font-size:0.72rem;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:var(--transition);}
.cal-event:hover{opacity:0.8;transform:translateX(-2px);}
.more-events{font-size:0.7rem;color:var(--text-muted);margin-top:2px;}

/* WEEK VIEW */
.week-view{display:grid;grid-template-columns:60px repeat(7,1fr);overflow:auto;height:100%;}
.week-time-col{position:sticky;right:0;background:var(--bg);z-index:5;}
.week-time{height:60px;padding:4px 8px;font-size:0.7rem;color:var(--text-muted);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:flex-start;}
.week-day-col{border-right:1px solid var(--border);position:relative;}
.week-day-header{padding:8px;text-align:center;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:4;}
.week-hour{height:60px;border-bottom:1px solid rgba(255,255,255,0.05);}
.week-event{position:absolute;border-radius:4px;padding:3px 6px;font-size:0.72rem;font-weight:600;overflow:hidden;cursor:pointer;right:4px;left:4px;}

/* LIST VIEW */
.list-view{padding:16px 20px;overflow-y:auto;height:100%;}
.list-date-group{margin-bottom:20px;}
.list-date-header{font-size:0.85rem;font-weight:700;color:var(--text-muted);padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.list-event-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:var(--transition);border-right:4px solid;}
.list-event-card:hover{background:var(--surface2);}
.list-event-time{font-size:0.78rem;color:var(--text-muted);width:70px;flex-shrink:0;padding-top:2px;}
.list-event-body{flex:1;}
.list-event-title{font-weight:700;font-size:0.95rem;margin-bottom:4px;}
.list-event-meta{font-size:0.8rem;color:var(--text-muted);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:#1E2D40;border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:1.1rem;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.form-group{margin-bottom:14px;}
.form-group label{font-size:0.82rem;color:var(--text-muted);display:block;margin-bottom:6px;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:0.9rem;transition:var(--transition);}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);}
.form-group textarea{resize:vertical;min-height:70px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--surface);}
.btn-danger{background:#EF4444;color:white;}
.color-picker{display:flex;gap:8px;flex-wrap:wrap;}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:var(--transition);}
.color-opt.selected{border-color:white;transform:scale(1.2);}

/* TICKER */
.motd-ticker{position:fixed;bottom:0;left:0;right:0;background:rgba(13,27,42,0.95);border-top:1px solid var(--border);padding:8px 20px;font-size:0.8rem;color:var(--primary-light);z-index:99;display:flex;align-items:center;gap:10px;overflow:hidden;height:44px;}
.ticker-text{display:inline-block;animation:ticker 40s linear infinite;white-space:nowrap;}
@keyframes ticker{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* NOTIF */
.notif{position:fixed;top:80px;left:20px;background:var(--green);color:white;padding:12px 20px;border-radius:10px;font-size:0.9rem;font-weight:600;z-index:999;transform:translateX(-120%);transition:transform 0.3s ease;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.notif.show{transform:translateX(0);}
.notif.error{background:var(--red);}

/* HOLIDAY BANNER */
.holiday-banner{background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(239,68,68,0.1));border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:12px 16px;margin:10px 20px;display:flex;align-items:center;gap:10px;font-size:0.88rem;}

@media(max-width:900px){.layout{grid-template-columns:1fr;}.sidebar{display:none;}.toolbar{flex-wrap:wrap;gap:8px;}}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-right">
    <img src="../edoos-landing/edoos-logo.png" class="logo" alt="EduOS">
    <div class="header-title">
      EduOS Calendar
      <span>التقويم المدرسي الذكي</span>
    </div>
  </div>
  <div class="header-center">
    <span class="hdr-badge" id="hdr-week">الأسبوع —</span>
    <span class="hdr-badge" id="hdr-term">الفصل الثاني</span>
    <span class="hdr-badge">2024-2025</span>
  </div>
  <div class="header-left">
    <span id="clock" style="font-size:0.85rem;color:#C7D2FE;"></span>
    <button class="btn-exit" onclick="exitApp()" title="خروج"><i class="fas fa-sign-out-alt"></i></button>
  </div>
</header>

<!-- HOLIDAY BANNER (conditional) -->
<div id="holiday-banner" class="holiday-banner" style="display:none;">
  <span style="font-size:1.2rem;">🏖️</span>
  <span id="holiday-msg">إجازة</span>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- Mini Calendar -->
    <div class="mini-cal">
      <div class="mini-cal-header">
        <button class="mini-cal-nav" onclick="miniCalPrev()">‹</button>
        <div class="mini-cal-title" id="mini-cal-title">يناير 2025</div>
        <button class="mini-cal-nav" onclick="miniCalNext()">›</button>
      </div>
      <div class="mini-cal-grid" id="mini-cal-grid"></div>
    </div>

    <!-- Event Types Filter -->
    <div class="event-types">
      <div class="event-types-title">أنواع الأحداث</div>
      <div id="event-filters"></div>
    </div>

    <!-- Upcoming Events -->
    <div>
      <div class="upcoming-title">الأحداث القادمة</div>
      <div id="upcoming-events"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-area">
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="toolbar-nav">
          <button class="btn btn-nav" onclick="navigate(-1)">‹ السابق</button>
          <button class="btn btn-nav btn-today" onclick="goToday()">اليوم</button>
          <button class="btn btn-nav" onclick="navigate(1)">التالي ›</button>
        </div>
        <div class="toolbar-title" id="view-title">يناير 2025</div>
      </div>
      <div class="toolbar-right">
        <div class="view-btns">
          <button class="view-btn active" onclick="setView('month',this)">شهر</button>
          <button class="view-btn" onclick="setView('week',this)">أسبوع</button>
          <button class="view-btn" onclick="setView('list',this)">قائمة</button>
        </div>
        <button class="btn btn-primary" onclick="openNewEvent()">
          <i class="fas fa-plus"></i> حدث جديد
        </button>
      </div>
    </div>

    <div class="cal-wrap" id="cal-wrap">
      <!-- Dynamic content -->
    </div>
  </div>

</div>

<!-- TICKER -->
<div class="motd-ticker">
  <span style="font-size:1rem;flex-shrink:0;">📅</span>
  <div style="overflow:hidden;flex:1;"><span class="ticker-text" id="motd-text">
    "وَلَا تَنسَ نَصِيبَكَ مِنَ الدُّنْيَا" — نظّمي وقتك واستثمريه في خدمة طلابك
  </span></div>
</div>

<!-- NOTIFICATION -->
<div id="notif" class="notif"><i class="fas fa-check-circle"></i> <span id="notif-text"></span></div>

<!-- MODAL: New / Edit Event -->
<div id="modal-event" class="modal-overlay">
  <div class="modal">
    <div class="modal-title"><i class="fas fa-calendar-plus"></i> <span id="modal-event-title">حدث جديد</span></div>
    <div class="form-group">
      <label>عنوان الحدث *</label>
      <input type="text" id="ev-title" placeholder="اسم الحدث أو النشاط">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>تاريخ البدء</label>
        <input type="date" id="ev-start">
      </div>
      <div class="form-group">
        <label>تاريخ الانتهاء</label>
        <input type="date" id="ev-end">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>وقت البدء</label>
        <input type="time" id="ev-time-start" value="08:00">
      </div>
      <div class="form-group">
        <label>وقت الانتهاء</label>
        <input type="time" id="ev-time-end" value="10:00">
      </div>
    </div>
    <div class="form-group">
      <label>نوع الحدث</label>
      <select id="ev-type">
        <option value="academic">أكاديمي</option>
        <option value="holiday">إجازة</option>
        <option value="exam">اختبار</option>
        <option value="meeting">اجتماع</option>
        <option value="trip">رحلة</option>
        <option value="sport">رياضي</option>
        <option value="cultural">ثقافي</option>
        <option value="parent">ولي أمر</option>
        <option value="national">وطني</option>
        <option value="other">أخرى</option>
      </select>
    </div>
    <div class="form-group">
      <label>المكان</label>
      <input type="text" id="ev-location" placeholder="قاعة الاجتماعات، الصف، الملعب...">
    </div>
    <div class="form-group">
      <label>الفئة المستهدفة</label>
      <input type="text" id="ev-audience" placeholder="الكل، الصف الثالث، المعلمين...">
    </div>
    <div class="form-group">
      <label>ملاحظات</label>
      <textarea id="ev-notes" placeholder="تفاصيل إضافية..."></textarea>
    </div>
    <div class="form-group">
      <label>اللون</label>
      <div class="color-picker" id="color-picker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btn-delete-event" onclick="deleteEvent()" style="margin-left:auto;display:none;"><i class="fas fa-trash"></i> حذف</button>
      <button class="btn btn-secondary" onclick="closeModal('modal-event')">إلغاء</button>
      <button class="btn btn-primary" onclick="saveEvent()"><i class="fas fa-save"></i> حفظ</button>
    </div>
  </div>
</div>

<!-- MODAL: Event Detail -->
<div id="modal-detail" class="modal-overlay">
  <div class="modal" id="modal-detail-content">
    <div id="event-detail-body"></div>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="deleteCurrentEvent()"><i class="fas fa-trash"></i> حذف</button>
      <button class="btn btn-secondary" onclick="closeModal('modal-detail')">إغلاق</button>
      <button class="btn btn-primary" onclick="editCurrentEvent()"><i class="fas fa-edit"></i> تعديل</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════
// CONFIG & TYPES
// ═══════════════════════════════════
const EVENT_TYPES = {
  academic:  { label:'أكاديمي',    color:'#6366F1', icon:'📚' },
  holiday:   { label:'إجازة',      color:'#10B981', icon:'🏖️' },
  exam:      { label:'اختبار',     color:'#EF4444', icon:'📝' },
  meeting:   { label:'اجتماع',     color:'#0EA5E9', icon:'👥' },
  trip:      { label:'رحلة',       color:'#F59E0B', icon:'🚌' },
  sport:     { label:'رياضي',      color:'#EC4899', icon:'⚽' },
  cultural:  { label:'ثقافي',      color:'#8B5CF6', icon:'🎨' },
  parent:    { label:'ولي أمر',    color:'#14B8A6', icon:'👨‍👩‍👧' },
  national:  { label:'وطني',       color:'#22C55E', icon:'🇦🇪' },
  other:     { label:'أخرى',       color:'#94A3B8', icon:'📌' },
};

const COLORS = ['#6366F1','#EF4444','#10B981','#F59E0B','#0EA5E9','#EC4899','#8B5CF6','#14B8A6','#22C55E','#F97316'];

// ═══════════════════════════════════
// AUTH
// ═══════════════════════════════════
(function() {
  const s = sessionStorage.getItem('edoos-session');
  if (!s) window.location.href = '../edoos-login/';
})();

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let today = new Date();
let viewDate = new Date();
let miniDate = new Date();
let currentView = 'month';
let selectedColor = COLORS[0];
let editingEventId = null;
let currentDetailId = null;
let activeFilters = new Set(Object.keys(EVENT_TYPES));

// ═══════════════════════════════════
// ARAB MONTH NAMES
// ═══════════════════════════════════
const AR_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const AR_DAYS_SHORT = ['أح','إث','ثل','أر','خم','جم','سب'];
const AR_DAYS_FULL = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

// ═══════════════════════════════════
// FILTERS
// ═══════════════════════════════════
function renderFilters() {
  const container = document.getElementById('event-filters');
  container.innerHTML = Object.entries(EVENT_TYPES).map(([key,t]) => `
    <div class="event-type-item" onclick="toggleFilter('${key}')">
      <input type="checkbox" checked id="filter-${key}">
      <div class="event-type-dot" style="background:${t.color}"></div>
      <span style="font-size:0.88rem;">${t.icon} ${t.label}</span>
    </div>
  `).join('');
}
function toggleFilter(key) {
  const cb = document.getElementById('filter-'+key);
  if (activeFilters.has(key)) { activeFilters.delete(key); cb.checked=false; }
  else { activeFilters.add(key); cb.checked=true; }
  renderCalendar();
}

// ═══════════════════════════════════
// MINI CALENDAR
// ═══════════════════════════════════
function renderMiniCal() {
  const yr = miniDate.getFullYear(), mo = miniDate.getMonth();
  document.getElementById('mini-cal-title').textContent = AR_MONTHS[mo] + ' ' + yr;
  const first = new Date(yr,mo,1).getDay();
  const days = new Date(yr,mo+1,0).getDate();
  let html = AR_DAYS_SHORT.map(d=>`<div class="mini-day-label">${d}</div>`).join('');
  for (let i=0;i<first;i++) { const pd = new Date(yr,mo,1-first+i); html+=`<div class="mini-day other-month">${pd.getDate()}</div>`; }
  for (let d=1;d<=days;d++) {
    const isToday = yr===today.getFullYear()&&mo===today.getMonth()&&d===today.getDate();
    const hasEv = EVENTS.some(e=>e.date===`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
    html+=`<div class="mini-day${isToday?' today':''}${hasEv?' has-event':''}" onclick="jumpToDate(${yr},${mo},${d})">${d}</div>`;
  }
  document.getElementById('mini-cal-grid').innerHTML = html;
}
function miniCalPrev() { miniDate=new Date(miniDate.getFullYear(),miniDate.getMonth()-1,1); renderMiniCal(); }
function miniCalNext() { miniDate=new Date(miniDate.getFullYear(),miniDate.getMonth()+1,1); renderMiniCal(); }
function jumpToDate(yr,mo,d) { viewDate=new Date(yr,mo,d); renderCalendar(); }

// ═══════════════════════════════════
// UPCOMING EVENTS
// ═══════════════════════════════════
function renderUpcoming() {
  const now = new Date();
  const upcoming = EVENTS.filter(e=>new Date(e.date)>=now).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,5);
  const container = document.getElementById('upcoming-events');
  if (!upcoming.length) { container.innerHTML='<p style="font-size:0.8rem;color:var(--text-muted);">لا أحداث قادمة</p>'; return; }
  container.innerHTML = upcoming.map(e => {
    const t = EVENT_TYPES[e.type] || EVENT_TYPES.other;
    return `<div class="upcoming-item" style="border-color:${e.color}" onclick="showDetail('${e.id}')">
      <div class="upcoming-date">${t.icon} ${e.date}</div>
      <div class="upcoming-name">${e.title}</div>
      ${e.location?`<div class="upcoming-meta"><i class="fas fa-map-marker-alt"></i> ${e.location}</div>`:''}
    </div>`;
  }).join('');
}

// ═══════════════════════════════════
// VIEW: MONTH
// ═══════════════════════════════════
function renderMonthView() {
  const yr = viewDate.getFullYear(), mo = viewDate.getMonth();
  document.getElementById('view-title').textContent = AR_MONTHS[mo] + ' ' + yr;
  const first = new Date(yr,mo,1).getDay();
  const days = new Date(yr,mo+1,0).getDate();
  let html = AR_DAYS_FULL.map(d=>`<div class="day-label">${d}</div>`).join('');
  
  const filteredEvents = EVENTS.filter(e=>activeFilters.has(e.type));
  
  // Prev month days
  for (let i=0;i<first;i++) {
    const d = new Date(yr,mo,1-first+i);
    html += `<div class="cal-day other-month weekend"><div class="day-num">${d.getDate()}</div></div>`;
  }
  
  for (let d=1;d<=days;d++) {
    const dateStr = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = yr===today.getFullYear()&&mo===today.getMonth()&&d===today.getDate();
    const dow = new Date(yr,mo,d).getDay();
    const weekend = dow===5||dow===6;
    const dayEvs = filteredEvents.filter(e => {
      const s = new Date(e.date), en = new Date(e.endDate||e.date);
      const cur = new Date(dateStr);
      return cur>=s&&cur<=en;
    });
    html += `<div class="cal-day${isToday?' today':''}${weekend?' weekend':''}" onclick="clickDay('${dateStr}')">
      <div class="day-num">${d}</div>
      ${dayEvs.slice(0,3).map(e=>`<div class="cal-event" style="background:${e.color}20;color:${e.color};border-right:2px solid ${e.color};" onclick="event.stopPropagation();showDetail('${e.id}')">${(EVENT_TYPES[e.type]||EVENT_TYPES.other).icon} ${e.title}</div>`).join('')}
      ${dayEvs.length>3?`<div class="more-events">+${dayEvs.length-3} أكثر</div>`:''}
    </div>`;
  }
  document.getElementById('cal-wrap').innerHTML = `<div class="cal-grid" style="grid-template-rows:44px repeat(6,1fr);">${html}</div>`;
}

// ═══════════════════════════════════
// VIEW: WEEK
// ═══════════════════════════════════
function renderWeekView() {
  const dow = viewDate.getDay();
  const weekStart = new Date(viewDate); weekStart.setDate(viewDate.getDate()-dow);
  const days = Array.from({length:7},(_,i)=>{const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);return d;});
  const startStr = `${AR_DAYS_FULL[days[0].getDay()]} ${days[0].getDate()}`;
  const endStr = `${AR_DAYS_FULL[days[6].getDay()]} ${days[6].getDate()} ${AR_MONTHS[days[6].getMonth()]}`;
  document.getElementById('view-title').textContent = `${startStr} — ${endStr} ${days[0].getFullYear()}`;
  
  const hours = Array.from({length:14},(_,i)=>i+7);
  let html = `<div class="week-time-col">
    <div style="height:52px;border-bottom:1px solid var(--border);"></div>
    ${hours.map(h=>`<div class="week-time">${String(h).padStart(2,'0')}:00</div>`).join('')}
  </div>`;
  
  days.forEach(d => {
    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const isToday = d.toDateString()===today.toDateString();
    const dayEvs = EVENTS.filter(e=>e.date===dateStr&&activeFilters.has(e.type)&&e.timeStart);
    html += `<div class="week-day-col">
      <div class="week-day-header${isToday?' today':''}">
        <div style="font-size:0.8rem;color:var(--text-muted);">${AR_DAYS_SHORT[d.getDay()]}</div>
        <div style="font-weight:700;${isToday?'color:var(--primary)':''}">${d.getDate()}</div>
      </div>
      ${hours.map(h=>`<div class="week-hour" onclick="clickWeekSlot('${dateStr}','${String(h).padStart(2,'0')}:00')"></div>`).join('')}
      ${dayEvs.map(e=>{
        const sh = parseInt(e.timeStart),sm = parseInt(e.timeStart.split(':')[1]||0);
        const eh = parseInt(e.timeEnd),em = parseInt(e.timeEnd.split(':')[1]||0);
        const top = ((sh-7)*60+sm);
        const height = ((eh-sh)*60+(em-sm));
        return `<div class="week-event" style="top:${52+top}px;height:${height}px;background:${e.color}30;color:${e.color};border-right:3px solid ${e.color};" onclick="showDetail('${e.id}')">${e.title}</div>`;
      }).join('')}
    </div>`;
  });
  document.getElementById('cal-wrap').innerHTML = `<div class="week-view" style="display:grid;grid-template-columns:60px repeat(7,1fr);height:100%;overflow-y:auto;">${html}</div>`;
}

// ═══════════════════════════════════
// VIEW: LIST
// ═══════════════════════════════════
function renderListView() {
  document.getElementById('view-title').textContent = 'قائمة الأحداث — ' + AR_MONTHS[viewDate.getMonth()] + ' ' + viewDate.getFullYear();
  const yr = viewDate.getFullYear(), mo = viewDate.getMonth();
  const evs = EVENTS.filter(e => {
    const d = new Date(e.date);
    return d.getFullYear()===yr && d.getMonth()===mo && activeFilters.has(e.type);
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));
  
  if (!evs.length) {
    document.getElementById('cal-wrap').innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-muted);">لا أحداث هذا الشهر</div>';
    return;
  }
  
  // Group by date
  const groups = {};
  evs.forEach(e => { if (!groups[e.date]) groups[e.date]=[];  groups[e.date].push(e); });
  
  let html = '<div class="list-view">';
  Object.entries(groups).forEach(([date,gevs]) => {
    const d = new Date(date);
    html += `<div class="list-date-group">
      <div class="list-date-header">
        <span style="font-size:1.2rem;background:var(--primary);padding:4px 10px;border-radius:6px;">${d.getDate()}</span>
        ${AR_DAYS_FULL[d.getDay()]} ${AR_MONTHS[d.getMonth()]} ${d.getFullYear()}
      </div>
      ${gevs.map(e=>{const t=EVENT_TYPES[e.type]||EVENT_TYPES.other;return `
        <div class="list-event-card" style="border-color:${e.color}" onclick="showDetail('${e.id}')">
          <div class="list-event-time">${e.timeStart||'طوال اليوم'}</div>
          <div class="list-event-body">
            <div class="list-event-title">${t.icon} ${e.title}</div>
            <div class="list-event-meta">
              ${e.location?`<i class="fas fa-map-marker-alt"></i> ${e.location} &nbsp;`:''}
              ${e.audience?`<i class="fas fa-users"></i> ${e.audience}`:''}
            </div>
          </div>
          <span style="font-size:0.72rem;padding:3px 8px;border-radius:12px;background:${e.color}20;color:${e.color};">${t.label}</span>
        </div>
      `;}).join('')}
    </div>`;
  });
  html += '</div>';
  document.getElementById('cal-wrap').innerHTML = html;
}

// ═══════════════════════════════════
// RENDER CALENDAR
// ═══════════════════════════════════
function renderCalendar() {
  if (currentView==='month') renderMonthView();
  else if (currentView==='week') renderWeekView();
  else renderListView();
  renderMiniCal();
  renderUpcoming();
  checkHoliday();
}

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCalendar();
}

function navigate(dir) {
  if (currentView==='month') viewDate=new Date(viewDate.getFullYear(),viewDate.getMonth()+dir,1);
  else if (currentView==='week') { viewDate=new Date(viewDate); viewDate.setDate(viewDate.getDate()+(dir*7)); }
  else viewDate=new Date(viewDate.getFullYear(),viewDate.getMonth()+dir,1);
  renderCalendar();
}

function goToday() { viewDate=new Date(); renderCalendar(); }

function showDetail(id) {
  const e = EVENTS.find(x=>x.id===id);
  if (!e) return;
  currentDetailId = id;
  const t = EVENT_TYPES[e.type]||EVENT_TYPES.other;
  document.getElementById('event-detail-body').innerHTML = `
    <div style="border-right:4px solid ${e.color};padding-right:16px;margin-bottom:16px;">
      <div style="font-size:1.5rem;font-weight:900;">${t.icon} ${e.title}</div>
      <div style="font-size:0.85rem;color:var(--text-muted);margin-top:4px;">${t.label}</div>
    </div>
    <div style="display:grid;gap:10px;">
      <div style="display:flex;align-items:center;gap:10px;"><i class="fas fa-calendar" style="color:var(--primary-light);width:18px;"></i> <span>${e.date}${e.endDate&&e.endDate!==e.date?' → '+e.endDate:''}</span></div>
      ${e.timeStart?`<div style="display:flex;align-items:center;gap:10px;"><i class="fas fa-clock" style="color:var(--primary-light);width:18px;"></i> <span>${e.timeStart}${e.timeEnd?' — '+e.timeEnd:''}</span></div>`:''}
      ${e.location?`<div style="display:flex;align-items:center;gap:10px;"><i class="fas fa-map-marker-alt" style="color:var(--primary-light);width:18px;"></i> <span>${e.location}</span></div>`:''}
      ${e.audience?`<div style="display:flex;align-items:center;gap:10px;"><i class="fas fa-users" style="color:var(--primary-light);width:18px;"></i> <span>${e.audience}</span></div>`:''}
      ${e.notes?`<div style="display:flex;align-items:flex-start;gap:10px;"><i class="fas fa-sticky-note" style="color:var(--primary-light);width:18px;margin-top:3px;"></i> <span>${e.notes}</span></div>`:''}
    </div>
  `;
  openModal('modal-detail');
}

function editCurrentEvent() {
  closeModal('modal-detail');
  const e = EVENTS.find(x=>x.id===currentDetailId);
  if (!e) return;
  editingEventId = e.id;
  document.getElementById('modal-event-title').textContent = 'تعديل الحدث';
  document.getElementById('ev-title').value = e.title;
  document.getElementById('ev-start').value = e.date;
  document.getElementById('ev-end').value = e.endDate||e.date;
  document.getElementById('ev-time-start').value = e.timeStart||'08:00';
  document.getElementById('ev-time-end').value = e.timeEnd||'10:00';
  document.getElementById('ev-type').value = e.type;
  document.getElementById('ev-location').value = e.location||'';
  document.getElementById('ev-audience').value = e.audience||'';
  document.getElementById('ev-notes').value = e.notes||'';
  selectedColor = e.color;
  renderColorPicker();
  document.getElementById('btn-delete-event').style.display='flex';
  openModal('modal-event');
}

function deleteCurrentEvent() {
  if (!confirm('حذف هذا الحدث؟')) return;
  EVENTS = EVENTS.filter(e=>e.id!==currentDetailId);
  closeModal('modal-detail');
  renderCalendar();
  showNotif('تم حذف الحدث ✓');
}

// ═══════════════════════════════════
// NEW / EDIT EVENT
// ═══════════════════════════════════
function openNewEvent() {
  editingEventId = null;
  document.getElementById('modal-event-title').textContent = 'حدث جديد';
  document.getElementById('btn-delete-event').style.display='none';
  if (!document.getElementById('ev-start').value) {
    const now = new Date().toISOString().split('T')[0];
    document.getElementById('ev-start').value = now;
    document.getElementById('ev-end').value = now;
  }
  selectedColor = COLORS[0];
  renderColorPicker();
  openModal('modal-event');
}

function renderColorPicker() {
  document.getElementById('color-picker').innerHTML = COLORS.map(c=>
    `<div class="color-opt${c===selectedColor?' selected':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}

function pickColor(c) { selectedColor=c; renderColorPicker(); }

function saveEvent() {
  const title = document.getElementById('ev-title').value.trim();
  if (!title) { showNotif('يرجى إدخال عنوان الحدث','error'); return; }
  const ev = {
    id: editingEventId || ('e'+Date.now()),
    title, type: document.getElementById('ev-type').value,
    date: document.getElementById('ev-start').value,
    endDate: document.getElementById('ev-end').value,
    timeStart: document.getElementById('ev-time-start').value,
    timeEnd: document.getElementById('ev-time-end').value,
    color: selectedColor,
    location: document.getElementById('ev-location').value,
    audience: document.getElementById('ev-audience').value,
    notes: document.getElementById('ev-notes').value,
  };
  if (editingEventId) EVENTS = EVENTS.map(e=>e.id===editingEventId?ev:e);
  else EVENTS.unshift(ev);
  closeModal('modal-event');
  clearEventForm();
  renderCalendar();
  showNotif((editingEventId?'تم تحديث':'تم إضافة') + ' الحدث ✓');
}

function deleteEvent() {
  if (!editingEventId || !confirm('حذف؟')) return;
  EVENTS = EVENTS.filter(e=>e.id!==editingEventId);
  closeModal('modal-event');
  clearEventForm();
  renderCalendar();
  showNotif('تم الحذف ✓');
}

function clearEventForm() {
  ['ev-title','ev-location','ev-audience','ev-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  editingEventId = null;
}

// HOLIDAY CHECK
// ═══════════════════════════════════
function checkHoliday() {
  const todayStr = today.toISOString().split('T')[0];
  const holiday = EVENTS.find(e=>e.type==='holiday'&&e.date<=todayStr&&(e.endDate||e.date)>=todayStr);
  const banner = document.getElementById('holiday-banner');
  if (holiday) { banner.style.display='flex'; document.getElementById('holiday-msg').textContent='إجازة حالياً: '+holiday.title; }
  else banner.style.display='none';
}
