<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الرسائل الداخلية — مدرسة الجود</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../platform-week.js"></script>
<script src="../platform-motd.js"></script>
<script src="../platform-autologout.js"></script>
<script src="../platform-auth-guard.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #0D1B2A;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --accent: #6C63FF;
    --accent2: #00D4AA;
    --gold: #FFD700;
    --text: #E8EDF2;
    --muted: #8899AA;
    --card-bg: rgba(255,255,255,0.06);
    --radius: 16px;
    --sidebar-w: 300px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a0533 0%, #0D1B2A 60%, #0a2440 100%);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 100;
  }
  .header-logo { display: flex; align-items: center; gap: 12px; }
  .header-logo img { width: 42px; height: 42px; object-fit: contain; }
  .header-title { font-size: 1.1rem; font-weight: 700; }
  .header-sub { font-size: 0.75rem; color: var(--muted); }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .btn-exit {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-size: 0.9rem;
    text-decoration: none;
  }
  .btn-exit:hover { background: rgba(220,53,69,0.3); border-color: #dc3545; color: #ff6b6b; }

  /* LAYOUT */
  .app-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: var(--sidebar-w);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: rgba(255,255,255,0.02);
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sidebar-title { font-size: 0.95rem; font-weight: 700; }
  .btn-new-msg {
    background: linear-gradient(135deg, var(--accent), #8B5CF6);
    border: none;
    border-radius: 8px;
    padding: 6px 14px;
    color: white;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .btn-new-msg:hover { opacity: 0.85; }

  .sidebar-search {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-search input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 0.85rem;
    outline: none;
  }

  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 0.8rem;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .sidebar-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: rgba(108,99,255,0.05);
  }

  .conversations-list {
    flex: 1;
    overflow-y: auto;
  }
  .conversations-list::-webkit-scrollbar { width: 4px; }
  .conversations-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .conv-item {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .conv-item:hover, .conv-item.active {
    background: rgba(108,99,255,0.08);
  }
  .conv-item.active { border-right: 3px solid var(--accent); }
  .conv-item.unread .conv-name { font-weight: 800; }

  .conv-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; font-weight: 700;
    flex-shrink: 0;
    color: white;
  }
  .conv-body { flex: 1; min-width: 0; }
  .conv-top { display: flex; justify-content: space-between; align-items: center; }
  .conv-name { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-time { font-size: 0.7rem; color: var(--muted); flex-shrink: 0; }
  .conv-preview { font-size: 0.77rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-badge {
    background: var(--accent);
    color: white;
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 0.68rem;
    font-weight: 700;
    margin-top: 2px;
    display: inline-block;
  }

  /* CHAT AREA */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.02);
    flex-shrink: 0;
  }
  .chat-header-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; font-weight: 700;
    color: white;
  }
  .chat-header-name { font-size: 0.95rem; font-weight: 700; }
  .chat-header-role { font-size: 0.75rem; color: var(--muted); }
  .chat-header-actions { margin-right: auto; display: flex; gap: 8px; }
  .chat-action-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-size: 0.8rem;
  }
  .chat-action-btn:hover { color: var(--text); background: rgba(255,255,255,0.1); }

  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-bubble {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 0.88rem;
    line-height: 1.5;
    position: relative;
    word-wrap: break-word;
  }
  .msg-bubble.sent {
    align-self: flex-start;
    background: linear-gradient(135deg, rgba(108,99,255,0.25), rgba(108,99,255,0.15));
    border: 1px solid rgba(108,99,255,0.3);
    border-top-right-radius: 2px;
  }
  .msg-bubble.received {
    align-self: flex-end;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    border-top-left-radius: 2px;
  }
  .msg-time {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 4px;
    display: block;
    text-align: left;
  }
  .msg-bubble.sent .msg-time { text-align: right; }
  .msg-bubble.received .msg-time { text-align: left; }

  .msg-date-divider {
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    padding: 8px;
    position: relative;
  }
  .msg-date-divider::before, .msg-date-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 35%;
    height: 1px;
    background: var(--border);
  }
  .msg-date-divider::before { right: 0; }
  .msg-date-divider::after { left: 0; }

  /* PRIORITY BADGE */
  .msg-priority {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 6px;
  }
  .priority-high { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
  .priority-medium { background: rgba(245,158,11,0.2); border: 1px solid rgba(245,158,11,0.3); color: #fbbf24; }
  .priority-low { background: rgba(0,212,170,0.2); border: 1px solid rgba(0,212,170,0.3); color: #00D4AA; }

  /* ATTACHMENT */
  .msg-attachment {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.78rem;
    cursor: pointer;
  }
  .msg-attachment:hover { background: rgba(255,255,255,0.1); }
  .msg-attachment i { color: var(--accent); }

  /* INPUT */
  .chat-input-area {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    flex-shrink: 0;
  }
  .input-toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .toolbar-btn {
    width: 30px; height: 30px;
    border-radius: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    transition: all 0.2s;
  }
  .toolbar-btn:hover { color: var(--text); background: rgba(255,255,255,0.1); }
  .priority-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 0.78rem;
    outline: none;
    margin-right: auto;
  }
  .priority-select option { background: #1a2a3a; }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .msg-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 0.9rem;
    outline: none;
    resize: none;
    max-height: 120px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  .msg-input:focus { border-color: var(--accent); }
  .btn-send {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #8B5CF6);
    border: none;
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .btn-send:hover { opacity: 0.85; }
  .btn-send:active { transform: scale(0.95); }

  /* EMPTY CHAT */
  .empty-chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 16px;
  }
  .empty-chat i { font-size: 4rem; opacity: 0.3; }
  .empty-chat h3 { font-size: 1.1rem; opacity: 0.7; }
  .empty-chat p { font-size: 0.85rem; opacity: 0.5; text-align: center; max-width: 280px; }

  /* NEW MSG MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: #1a2535;
    border: 1px solid rgba(108,99,255,0.3);
    border-radius: 20px;
    padding: 28px;
    max-width: 500px;
    width: 90%;
  }
  .modal-box h3 { font-size: 1.1rem; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; display: block; }
  .form-control {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-control:focus { border-color: var(--accent); }
  .form-control option { background: #1a2a3a; }
  textarea.form-control { resize: vertical; min-height: 100px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #8B5CF6);
    border: none; border-radius: 10px; padding: 10px 24px;
    color: white; font-family: 'Tajawal', sans-serif; font-weight: 700;
    cursor: pointer; font-size: 0.9rem;
  }
  .btn-secondary {
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px;
    color: var(--text); font-family: 'Tajawal', sans-serif;
    cursor: pointer; font-size: 0.9rem;
  }

  /* TYPING INDICATOR */
  .typing-indicator {
    display: flex; align-items: center; gap: 4px;
    padding: 6px 14px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    align-self: flex-end;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: typing 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%,60%,100%{opacity:0.3; transform:scale(1)} 30%{opacity:1; transform:scale(1.3)} }

  /* BROADCAST PANEL */
  .broadcast-banner {
    background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,107,53,0.05));
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    margin: 12px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.82rem;
    color: #FFD700;
    cursor: pointer;
  }
  .broadcast-banner:hover { background: rgba(255,215,0,0.15); }

  /* AI ASSIST BTN */
  .btn-ai {
    background: linear-gradient(135deg, rgba(0,212,170,0.15), rgba(0,212,170,0.05));
    border: 1px solid rgba(0,212,170,0.3);
    border-radius: 6px;
    padding: 4px 10px;
    color: var(--accent2);
    font-family: 'Tajawal', sans-serif;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-ai:hover { background: rgba(0,212,170,0.2); }

  @media (max-width: 700px) {
    .sidebar { width: 0; display: none; }
    .sidebar.mobile-open { display: flex; width: 280px; position: absolute; height: 100%; z-index: 50; }
  }
</style>
</head>
<body>
<!-- HEADER -->
<header class="header">
  <div class="header-logo">
    <div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#6C3DD6,#22D3EE);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;box-shadow:0 0 20px rgba(108,61,214,0.35);">🎓</div>
    <div>
      <div class="header-title">الرسائل الداخلية</div>
      <div class="header-sub" id="headerSub">مدرسة الجود — 2025–2026</div>
    </div>
  </div>
  <div class="header-actions">
    <span id="headerWeek" style="font-size:0.8rem;color:var(--muted);background:var(--surface);padding:4px 12px;border-radius:20px;border:1px solid var(--border)"></span>
    <a href="../eduos-hub/" class="btn-exit" title="خروج"><i class="fas fa-times"></i></a>
  </div>
</header>

<!-- BROADCAST BANNER -->
<div class="broadcast-banner" onclick="showNewMsg('all')">
  <i class="fas fa-bullhorn"></i>
  <span>بثّ رسالة للجميع — إشعار عام لكل المنظومات</span>
  <span style="margin-right:auto; font-size:0.72rem; opacity:0.7">اضغطي للإرسال →</span>
</div>

<!-- APP LAYOUT -->
<div class="app-layout">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title"><i class="fas fa-comments" style="color:var(--accent)"></i> المحادثات</span>
      <button class="btn-new-msg" onclick="showNewMsg()">
        <i class="fas fa-pen"></i> جديدة
      </button>
    </div>

    <div class="sidebar-search">
      <input type="text" placeholder="بحث..." id="convSearch" oninput="filterConvs()">
    </div>

    <div class="sidebar-tabs">
      <div class="sidebar-tab active" onclick="switchTab('inbox', this)">📥 الوارد</div>
      <div class="sidebar-tab" onclick="switchTab('sent', this)">📤 المُرسَل</div>
      <div class="sidebar-tab" onclick="switchTab('starred', this)">⭐ المهمة</div>
    </div>

    <div class="conversations-list" id="convList">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chatArea">
    <div class="empty-chat" id="emptyChat">
      <i class="fas fa-envelope-open-text"></i>
      <h3>اختاري محادثة للبدء</h3>
      <p>يمكنك إرسال رسائل للمعلمات والإدارة والمختصين وأولياء الأمور</p>
      <button class="btn-new-msg" style="margin-top:8px" onclick="showNewMsg()">
        <i class="fas fa-pen"></i> رسالة جديدة
      </button>
    </div>

    <!-- ACTIVE CHAT (hidden initially) -->
    <div id="activeChatView" style="display:none; flex-direction:column; height:100%; overflow:hidden; display:none">
      <div class="chat-header" id="chatHeader">
        <div class="chat-header-avatar" id="chatAvatar"></div>
        <div>
          <div class="chat-header-name" id="chatName"></div>
          <div class="chat-header-role" id="chatRole"></div>
        </div>
        <div class="chat-header-actions">
          <button class="chat-action-btn" title="بحث في المحادثة"><i class="fas fa-search"></i></button>
          <button class="chat-action-btn" title="تنبيه" onclick="toggleStar()"><i class="fas fa-star" id="starBtn"></i></button>
          <button class="chat-action-btn" title="أرشفة"><i class="fas fa-archive"></i></button>
          <button class="chat-action-btn" title="حذف" style="color:#f87171"><i class="fas fa-trash"></i></button>
        </div>
      </div>

      <div class="messages-area" id="messagesArea"></div>

      <div class="chat-input-area">
        <div class="input-toolbar">
          <button class="toolbar-btn" title="إرفاق ملف"><i class="fas fa-paperclip"></i></button>
          <button class="toolbar-btn" title="صورة"><i class="fas fa-image"></i></button>
          <button class="toolbar-btn" title="إيموجي"><i class="fas fa-smile"></i></button>
          <button class="btn-ai" onclick="aiSuggest()">🤲 اقتراح AI</button>
          <select class="priority-select" id="msgPriority">
            <option value="normal">عادي</option>
            <option value="medium">مهم</option>
            <option value="high">عاجل</option>
          </select>
        </div>
        <div class="input-row">
          <textarea class="msg-input" id="msgInput" rows="1"
            placeholder="اكتبي رسالتك..."
            oninput="autoResize(this)"
            onkeydown="handleEnter(event)"></textarea>
          <button class="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- NEW MESSAGE MODAL -->
<div class="modal-overlay" id="newMsgModal">
  <div class="modal-box">
    <h3><i class="fas fa-pen" style="color:var(--accent)"></i> رسالة جديدة</h3>
    <div class="form-group">
      <label class="form-label">المستقبل</label>
      <select class="form-control" id="msgTo">
        <option value="">اختاري المستقبل...</option>
        <optgroup label="الإدارة">
          <option value="principal">المديرة — نور يام</option>
          <option value="vp">الوكيلة</option>
        </optgroup>
        <optgroup label="المعلمات">
          <option value="t_munira">منيرة المري</option>
          <option value="t_all">جميع المعلمات</option>
        </optgroup>
        <optgroup label="المختصون">
          <option value="social_worker">الأخصائية الاجتماعية</option>

// ============================================================
// RENDER CONVS
// ============================================================
function renderConvList(tab) {
  const list = document.getElementById('convList');
  const q = document.getElementById('convSearch').value.toLowerCase();
  let convs = DEMO_CONVS.filter(c => {
    const matchTab = tab === 'starred' ? c.starred : c.type === tab;
    const matchQ = !q || c.name.includes(q) || c.preview.includes(q);
    return matchTab && matchQ;
  });

  if (convs.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:0.85rem">لا توجد رسائل</div>`;
    return;
  }

  list.innerHTML = convs.map(c => `
    <div class="conv-item ${c.unread > 0 ? 'unread' : ''} ${currentConv?.id === c.id ? 'active' : ''}"
         onclick="openConv(${c.id})">
      <div class="conv-avatar" style="background:${c.avatarColor}20;border:1px solid ${c.avatarColor}40;color:${c.avatarColor}">${c.avatar}</div>
      <div class="conv-body">
        <div class="conv-top">
          <span class="conv-name">${c.name} ${c.starred ? '⭐' : ''}</span>
          <span class="conv-time">${c.time}</span>
        </div>
        <div class="conv-preview">${c.priority === 'high' ? '🔴 ' : c.priority === 'medium' ? '🟡 ' : ''}${c.preview}</div>
        ${c.unread > 0 ? `<span class="conv-badge">${c.unread}</span>` : ''}
      </div>
    </div>
  `).join('');
}

// ============================================================
// OPEN CONV
// ============================================================
function openConv(id) {
  currentConv = DEMO_CONVS.find(c => c.id === id);
  if (!currentConv) return;
  currentConv.unread = 0;

  // Update sidebar
  renderConvList(currentTab);

  // Show chat view
  document.getElementById('emptyChat').style.display = 'none';
  const chatView = document.getElementById('activeChatView');
  chatView.style.display = 'flex';
  chatView.style.flexDirection = 'column';

  // Header
  document.getElementById('chatAvatar').textContent = currentConv.avatar;
  document.getElementById('chatAvatar').style.background = currentConv.avatarColor + '20';
  document.getElementById('chatAvatar').style.color = currentConv.avatarColor;
  document.getElementById('chatAvatar').style.border = `1px solid ${currentConv.avatarColor}40`;
  document.getElementById('chatName').textContent = currentConv.name;
  document.getElementById('chatRole').textContent = currentConv.role;
  document.getElementById('starBtn').style.color = currentConv.starred ? '#FFD700' : '';

  renderMessages();
}

// ============================================================
// RENDER MESSAGES
// ============================================================
function renderMessages() {
  const area = document.getElementById('messagesArea');
  area.innerHTML = '';

  let lastDate = '';

  (currentConv.messages || []).forEach(msg => {
    // Date divider (demo: today)
    const dateStr = 'اليوم';
    if (dateStr !== lastDate) {
      const div = document.createElement('div');
      div.className = 'msg-date-divider';
      div.textContent = dateStr;
      area.appendChild(div);
      lastDate = dateStr;
    }

    const bubble = document.createElement('div');
    bubble.className = `msg-bubble ${msg.sent ? 'sent' : 'received'}`;

    let inner = '';
    if (msg.priority) {
      const cls = msg.priority === 'high' ? 'priority-high' : 'priority-medium';
      const label = msg.priority === 'high' ? '🔴 عاجل' : '🟡 مهم';
      inner += `<div><span class="msg-priority ${cls}">${label}</span></div>`;
    }
    inner += `<div>${msg.text}</div>`;
    if (msg.hasAttachment) {
      inner += `<div class="msg-attachment">
        <i class="fas fa-file-pdf"></i>
        <span>${msg.attachmentName || 'مرفق'}</span>
        <i class="fas fa-download" style="margin-right:auto;color:var(--muted)"></i>
      </div>`;
    }
    inner += `<span class="msg-time">${msg.time}${msg.sent ? ' ✓✓' : ''}</span>`;

    bubble.innerHTML = inner;
    area.appendChild(bubble);
  });

  area.scrollTop = area.scrollHeight;
}

// ============================================================
// SEND MESSAGE
// ============================================================
function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !currentConv) return;

  const priority = document.getElementById('msgPriority').value;
  const now = new Date();
  const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  currentConv.messages.push({ id: Date.now(), sent: true, text, time, priority: priority === 'normal' ? null : priority });
  input.value = '';
  input.style.height = 'auto';

  renderMessages();

  // Simulate reply after 2s
  if (Math.random() > 0.4) {
    setTimeout(() => {
      const replies = [
        'شكراً على رسالتك، سأتابع الأمر 🤲',
        'حسناً، جزاكِ الله خيراً',
        'تم الإشعار، شكراً',
        'سأرد عليكِ بأقرب وقت بإذن الله'
      ];
      currentConv.messages.push({
        id: Date.now() + 1,
        sent: false,
        text: replies[Math.floor(Math.random() * replies.length)],
        time: `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes() + 1).padStart(2,'0')}`
      });
      renderMessages();
    }, 2000);
  }
}

function sendNewMsg() {
  const to = document.getElementById('msgTo').value;
  const subject = document.getElementById('msgSubject').value.trim();
  const body = document.getElementById('newMsgBody').value.trim();
  const priority = document.getElementById('newMsgPriority').value;

  if (!to || !body) {
    alert('الرجاء تحديد المستقبل وكتابة الرسالة');
    return;
  }

  // Add to sent convs
  const names = { principal:'المديرة — نور يام', vp:'الوكيلة', t_munira:'منيرة المري',
    t_all:'جميع المعلمات', social_worker:'الأخصائية الاجتماعية',
    nurse:'المرشدة الصحية', inclusion:'مختصة الدمج', all:'بث لكل الكادر' };

  DEMO_CONVS.unshift({
    id: Date.now(), type: 'sent', unread: 0, starred: false,
    avatar: names[to]?.[0] || '?', avatarColor: '#6C63FF',
    name: names[to] || to, role: subject || 'رسالة جديدة',
    preview: body.slice(0, 60),
    time: 'الآن',
    priority,
    messages: [{ id: 1, sent: true, text: body, time: new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'}), priority: priority === 'normal' ? null : priority }]
  });

  // حفظ في Supabase
  fetch(`${SB_URL}/rest/v1/messages`, {
    method: 'POST',
    headers: {'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal'},
    body: JSON.stringify({
      sender_name: 'المستخدم الحالي', sender_role: 'teacher',
      recipient_name: names[to] || to, recipient_role: to,
      subject: subject || 'رسالة جديدة', body: body,
      message_type: priority === 'high' ? 'urgent' : 'internal'
    })
  }).catch(e => console.error('save msg:', e));

  closeModal();
  switchTab('sent', document.querySelectorAll('.sidebar-tab')[1]);
  renderConvList('sent');
  openConv(DEMO_CONVS[0].id);
  document.getElementById('msgTo').value = '';
  document.getElementById('msgSubject').value = '';
  document.getElementById('newMsgBody').value = '';
}

// ============================================================
// AI SUGGEST
// ============================================================
async function aiSuggest() {
  if (!currentConv) return;
  const btn = document.querySelector('.btn-ai');
  btn.textContent = '⏳ جاري التفكير...';
  btn.disabled = true;

  const lastMsg = currentConv.messages.slice(-1)[0];
  const context = lastMsg ? lastMsg.text : 'رسالة عامة';

  try {
    const res = await fetch(`${SB_URL}/functions/v1/ai-assistant`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` },
      body: JSON.stringify({
        messages: [{ role: 'user', content: `اقترحي رداً مهنياً ومختصراً بالعربية على هذه الرسالة: "${context}"` }]
      })
    });
    const data = await res.json();
    if (data.reply) {
      document.getElementById('msgInput').value = data.reply;
      autoResize(document.getElementById('msgInput'));
    }
  } catch(e) {
    document.getElementById('msgInput').value = 'جزاكِ الله خيراً على التواصل، سأتابع الأمر بإذن الله.';
  }

  btn.textContent = '🤲 اقتراح AI';
  btn.disabled = false;
}

// ============================================================
// HELPERS
// ============================================================
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderConvList(tab);
}

function filterConvs() {
  renderConvList(currentTab);
}

function toggleStar() {
  if (!currentConv) return;
  currentConv.starred = !currentConv.starred;
  document.getElementById('starBtn').style.color = currentConv.starred ? '#FFD700' : '';
  renderConvList(currentTab);
}

function handleEnter(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
