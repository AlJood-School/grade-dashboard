<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>شاشة الفصل — رياض الأطفال | EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Tajawal',sans-serif;background:#050d1a;color:#f1f5f9;overflow:hidden;direction:rtl;}

body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 80% 10%, rgba(108,61,214,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 20% 90%, rgba(34,211,238,0.15) 0%, transparent 60%),
    #050d1a;
  z-index:-1;
}

/* ════ LAYOUT ════ */
.screen{display:grid;grid-template-rows:76px 1fr 64px;height:100vh;padding:10px;gap:10px;}
.content{display:grid;grid-template-columns:270px 1fr 270px;gap:10px;}

/* ════ GLASS CARD ════ */
.glass{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:20px;
  backdrop-filter:blur(20px);
}

/* ════ HEADER ════ */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;
}
.hdr-logo{display:flex;align-items:center;gap:12px;}
.logo-sq{
  width:48px;height:48px;
  background:linear-gradient(135deg,#6C3DD6,#22D3EE);
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;
}
.school-name{font-size:20px;font-weight:900;line-height:1.2;}
.school-sub{font-size:12px;color:rgba(255,255,255,0.4);}
.hdr-center{text-align:center;}
.hdr-date{font-size:17px;font-weight:700;color:rgba(255,255,255,0.85);}
.hdr-week{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px;}
.hdr-clock{text-align:left;display:flex;flex-direction:column;align-items:flex-end;}
.clock-time{font-size:30px;font-weight:900;color:#22D3EE;letter-spacing:3px;direction:ltr;line-height:1;}
.clock-label{font-size:11px;color:rgba(255,255,255,0.35);margin-top:3px;}
.refresh-dot{
  width:8px;height:8px;border-radius:50%;background:#22D3EE;
  display:inline-block;margin-right:6px;
  animation:blink 2s ease infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

/* ════ LEFT PANEL ════ */
.left-panel{display:flex;flex-direction:column;gap:10px;}

.att-box{
  background:rgba(255,255,255,0.05);
  border-radius:16px;padding:16px;
  display:flex;align-items:center;gap:12px;
}
.att-icon{font-size:32px;flex-shrink:0;}
.att-num{font-size:38px;font-weight:900;line-height:1;}
.att-lbl{font-size:13px;color:rgba(255,255,255,0.45);margin-top:2px;}

.mood-box{
  flex:1;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:16px;padding:16px;
}
.sec-title{
  font-size:12px;font-weight:800;letter-spacing:1px;
  color:rgba(255,255,255,0.4);text-transform:uppercase;
  margin-bottom:14px;
}
.mood-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.mood-emoji{font-size:26px;width:36px;text-align:center;}
.mood-track{flex:1;background:rgba(255,255,255,0.07);border-radius:6px;height:10px;overflow:hidden;}
.mood-fill{height:100%;border-radius:6px;transition:width 1.2s ease;}
.mood-n{font-size:18px;font-weight:800;width:28px;text-align:left;}

/* ════ CENTER PANEL ════ */
.center-panel{display:flex;flex-direction:column;gap:10px;}

/* Hero */
.hero-card{
  background:linear-gradient(135deg,rgba(108,61,214,0.25),rgba(34,211,238,0.15));
  border:1.5px solid rgba(108,61,214,0.5);
  border-radius:20px;
  padding:20px;text-align:center;
  position:relative;overflow:hidden;
}
.hero-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(108,61,214,0.1),transparent);
  pointer-events:none;
}
.hero-crown{font-size:44px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.hero-label{font-size:13px;color:rgba(255,255,255,0.5);margin:6px 0 4px;}
.hero-name{
  font-size:30px;font-weight:900;
  background:linear-gradient(135deg,#f472b6,#a78bfa,#22D3EE);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  min-height:40px;
}
.hero-stars-row{font-size:22px;margin-top:6px;letter-spacing:3px;}

/* Stars total */
.stars-total{
  background:linear-gradient(135deg,rgba(251,191,36,0.12),rgba(251,146,60,0.08));
  border:1px solid rgba(251,191,36,0.25);
  border-radius:16px;padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.stars-total-label{font-size:15px;font-weight:700;color:rgba(255,255,255,0.65);}
.stars-total-num{font-size:40px;font-weight:900;color:#fbbf24;line-height:1;}
.stars-total-icon{font-size:36px;}

/* Leaderboard */
.leaderboard{flex:1;display:flex;flex-direction:column;gap:8px;overflow:hidden;}
.lb-row{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:14px;padding:10px 16px;
  transition:all 0.3s;
}
.lb-row:hover{background:rgba(255,255,255,0.08);}
.lb-rank{font-size:22px;width:32px;text-align:center;flex-shrink:0;}
.lb-emo{font-size:26px;}
.lb-info{flex:1;min-width:0;}
.lb-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-cls{font-size:11px;color:rgba(255,255,255,0.35);margin-top:1px;}
.lb-stars{font-size:16px;letter-spacing:2px;}

/* ════ RIGHT PANEL ════ */
.right-panel{display:flex;flex-direction:column;gap:8px;overflow:hidden;}
.sched-list{flex:1;display:flex;flex-direction:column;gap:7px;overflow:hidden;}

.sched-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;
  border-radius:13px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  transition:all 0.4s;
  flex-shrink:0;
}
.sched-item.current{
  background:rgba(52,211,153,0.1);
  border-color:rgba(52,211,153,0.4);
  box-shadow:0 0 20px rgba(52,211,153,0.08);
}
.sched-item.done{opacity:0.3;}
.sched-time{font-size:12px;color:rgba(255,255,255,0.4);min-width:48px;direction:ltr;flex-shrink:0;}
.sched-icon{font-size:22px;flex-shrink:0;}
.sched-name{font-size:14px;font-weight:700;flex:1;}
.sched-live{width:8px;height:8px;border-radius:50%;background:#34d399;flex-shrink:0;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(0.7);}}

/* ════ FOOTER TICKER ════ */
.footer{
  display:flex;align-items:center;gap:14px;
  padding:0 20px;overflow:hidden;
}
.footer-icon{font-size:22px;flex-shrink:0;}
.ticker-wrap{flex:1;overflow:hidden;position:relative;}
.ticker-text{
  white-space:nowrap;
  font-size:15px;font-weight:600;
  color:rgba(255,255,255,0.75);
  display:inline-block;
  animation:ticker 35s linear infinite;
  padding-right:60px;
}
@keyframes ticker{from{transform:translateX(-100%);}to{transform:translateX(100vw);}}

/* ════ CELEBRATION ════ */
.confetti-piece{
  position:fixed;
  width:10px;height:10px;
  border-radius:2px;
  animation:fall linear forwards;
  pointer-events:none;
  z-index:9999;
}
@keyframes fall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
}

/* ════ LOADING ════ */
.loading-overlay{
  position:fixed;inset:0;background:#050d1a;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;z-index:9998;
  transition:opacity 0.6s;
}
.loading-spinner{
  width:56px;height:56px;
  border:4px solid rgba(108,61,214,0.2);
  border-top-color:#6C3DD6;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:16px;color:rgba(255,255,255,0.5);}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div style="width:60px;height:60px;background:linear-gradient(135deg,#6C3DD6,#22D3EE);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;">🎓</div>
  <div class="loading-spinner"></div>
  <div class="loading-text">جاري تحضير شاشة الفصل…</div>
</div>

<div class="screen">

  <!-- ═══ HEADER ═══ -->
  <header class="glass header">
    <div class="hdr-logo">
      <div class="logo-sq">🎓</div>
      <div>
        <div class="school-name" id="schoolName">رياض الأطفال</div>
        <div class="school-sub">Powered by EduOS · NAFAS AI</div>
      </div>
    </div>
    <div class="hdr-center">
      <div class="hdr-date" id="hdrDate">—</div>
      <div class="hdr-week" id="hdrWeek">—</div>
    </div>
    <div class="hdr-clock">
      <div class="clock-time" id="clockTime">00:00</div>
      <div class="clock-label"><span class="refresh-dot"></span>مباشر — يتجدد كل دقيقة</div>
    </div>
  </header>

  <!-- ═══ CONTENT ═══ -->
  <div class="content">

    <!-- LEFT: Attendance & Mood -->
    <div class="left-panel glass" style="padding:16px;">
      <div class="sec-title">📊 إحصاء اليوم</div>

      <div class="att-box" style="background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);">
        <div class="att-icon">✅</div>
        <div>
          <div class="att-num" style="color:#34d399;" id="cntPresent">—</div>
          <div class="att-lbl">حاضر/ة</div>
        </div>
      </div>

      <div class="att-box" style="background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);">
        <div class="att-icon">❌</div>
        <div>
          <div class="att-num" style="color:#f87171;" id="cntAbsent">—</div>
          <div class="att-lbl">غائب/ة</div>
        </div>
      </div>

      <div class="att-box" style="background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);">
        <div class="att-icon">⏰</div>
        <div>
          <div class="att-num" style="color:#fbbf24;" id="cntLate">—</div>
          <div class="att-lbl">متأخر/ة</div>
        </div>
      </div>

      <div class="mood-box">
        <div class="sec-title">مزاج الفصل</div>
        <div class="mood-row">
          <div class="mood-emoji">😄</div>
          <div class="mood-track"><div class="mood-fill" id="moodHappy" style="width:0%;background:#34d399;"></div></div>
          <div class="mood-n" style="color:#34d399;" id="moodHappyN">0</div>
        </div>
        <div class="mood-row">
          <div class="mood-emoji">😐</div>
          <div class="mood-track"><div class="mood-fill" id="moodOk" style="width:0%;background:#60a5fa;"></div></div>
          <div class="mood-n" style="color:#60a5fa;" id="moodOkN">0</div>
        </div>
        <div class="mood-row">
          <div class="mood-emoji">😢</div>
          <div class="mood-track"><div class="mood-fill" id="moodSad" style="width:0%;background:#f87171;"></div></div>
          <div class="mood-n" style="color:#f87171;" id="moodSadN">0</div>
        </div>
        <div class="mood-row">
          <div class="mood-emoji">😤</div>
          <div class="mood-track"><div class="mood-fill" id="moodAngry" style="width:0%;background:#fb923c;"></div></div>
          <div class="mood-n" style="color:#fb923c;" id="moodAngryN">0</div>
        </div>
      </div>
    </div>

    <!-- CENTER: Hero & Leaderboard -->
    <div class="center-panel">

      <div class="hero-card">
        <div class="hero-crown" id="heroCrown">👑</div>
        <div class="hero-label">⭐ بطل/بطلة هذا الأسبوع</div>
        <div class="hero-name" id="heroName">جاري التحميل…</div>
        <div class="hero-stars-row" id="heroStars">⭐⭐⭐⭐⭐</div>
      </div>

      <div class="stars-total glass">
        <div>
          <div class="stars-total-label">مجموع نجوم الفصل</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:2px;">هذا الأسبوع</div>
        </div>
        <div class="stars-total-num" id="totalStars">—</div>
        <div class="stars-total-icon">⭐</div>
      </div>

      <div class="leaderboard glass" style="padding:14px;">
        <div class="sec-title">🏆 المتميزون</div>
        <div id="lbList" style="display:flex;flex-direction:column;gap:8px;">
          <!-- filled by JS -->
        </div>
      </div>

    </div>

    <!-- RIGHT: Today's Schedule -->
    <div class="right-panel glass" style="padding:16px;">
      <div class="sec-title">🗓️ برنامج اليوم</div>
      <div class="sched-list" id="schedList">
        <!-- filled by JS -->
      </div>
    </div>

  </div>

  <!-- ═══ FOOTER TICKER ═══ -->
  <footer class="glass footer">
    <div class="footer-icon">🌟</div>
    <div class="ticker-wrap">
      <div class="ticker-text" id="tickerText">جاري التحميل…</div>
    </div>
    <div class="footer-icon">📖</div>
  </footer>

</div>

<script>
/* ══════════════════════════════
   CONFIG
══════════════════════════════ */
const SB_URL = 'https://zuyizaiugpmhmeycqton.supabase.co';
const _k1='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9',_k2='eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1eWl6YWl1Z3BtaG1leWNxdG9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwODgyNDAsImV4cCI6MjA5NDY2NDI0MH0',_k3='FqOUqiR7GfttAEI8NY3bbOwFPnupxBsHMgYJCNT68PI';
const SB_KEY = [_k1,_k2,_k3].join('.');

/* ══════════════════════════════
   CLOCK
══════════════════════════════ */
function updateClock(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clockTime').textContent = h + ':' + m;
}
setInterval(updateClock, 1000);
updateClock();

/* ══════════════════════════════
   DATE
══════════════════════════════ */
function setDate(){
  const now = new Date();
  const d = now.toLocaleDateString('ar-AE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('hdrDate').textContent = d;
  // week info from platform-week if available
  if(window.platformWeek){
    const i = window.platformWeek.getInfo();
    document.getElementById('hdrWeek').textContent = `${i.year} · ${i.semester} · ${i.weekLabel}`;
  }
}

/* ══════════════════════════════
   SUPABASE FETCH
══════════════════════════════ */
async function sbGet(table, params=''){
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

/* ══════════════════════════════
   LOAD DATA
══════════════════════════════ */
let students = [];

async function loadData(){
  try{
    const data = await sbGet('kg_students','select=*&order=stars.desc,name.asc&limit=100');
    if(Array.isArray(data) && data.length) students = data;
  } catch(e){
    console.warn('Supabase fetch failed, using fallback:', e);
    students = [
      {id:1,name:'سارة أحمد',kg_class:'KG1',emoji:'👧',stars:5,status:'present',mood:'happy'},
      {id:2,name:'ريم عبدالله',kg_class:'KG1',emoji:'👧',stars:5,status:'present',mood:'happy'},
      {id:3,name:'نورة خالد',kg_class:'KG2',emoji:'👧',stars:4,status:'present',mood:'ok'},
      {id:4,name:'لين محمد',kg_class:'KG2',emoji:'👧',stars:3,status:'late',mood:'sad'},
      {id:5,name:'هند علي',kg_class:'KG1',emoji:'👧',stars:4,status:'present',mood:'happy'},
      {id:6,name:'مريم سالم',kg_class:'KG2',emoji:'👧',stars:5,status:'present',mood:'happy'},
      {id:7,name:'فاطمة حسن',kg_class:'KG1',emoji:'👧',stars:3,status:'absent',mood:null},
      {id:8,name:'شيخة راشد',kg_class:'KG3',emoji:'👧',stars:4,status:'present',mood:'ok'},
    ];
  }
  renderAll();
}

/* ══════════════════════════════
   RENDER ATTENDANCE STATS
══════════════════════════════ */
function renderStats(){
  const present = students.filter(s=>s.status==='present').length;
  const absent  = students.filter(s=>s.status==='absent').length;
  const late    = students.filter(s=>s.status==='late').length;
  document.getElementById('cntPresent').textContent = present;
  document.getElementById('cntAbsent').textContent  = absent;
  document.getElementById('cntLate').textContent    = late;

  // Mood (if field exists)
  const total = students.filter(s=>s.status!=='absent').length || 1;
  const mHappy  = students.filter(s=>s.mood==='happy').length;
  const mOk     = students.filter(s=>s.mood==='ok').length;
  const mSad    = students.filter(s=>s.mood==='sad').length;
  const mAngry  = students.filter(s=>s.mood==='angry').length;

  const setPct = (id,n,totl) => {
    const el = document.getElementById(id);
    if(el) el.style.width = Math.round((n/totl)*100)+'%';
  };
  setPct('moodHappy',mHappy,total);
  setPct('moodOk',mOk,total);
  setPct('moodSad',mSad,total);
  setPct('moodAngry',mAngry,total);
  document.getElementById('moodHappyN').textContent = mHappy;
  document.getElementById('moodOkN').textContent    = mOk;
  document.getElementById('moodSadN').textContent   = mSad;
  document.getElementById('moodAngryN').textContent = mAngry;

  // Celebration if full attendance
  if(absent === 0 && students.length > 0) launchConfetti();
}

/* ══════════════════════════════
   RENDER HERO & LEADERBOARD
══════════════════════════════ */
function renderLeaderboard(){
  const sorted = [...students].sort((a,b)=>(b.stars||0)-(a.stars||0));
  const top = sorted[0];

  // Hero
  if(top){
    document.getElementById('heroName').textContent = top.name;
    document.getElementById('heroStars').textContent = '⭐'.repeat(Math.min(top.stars||5,5));
    document.getElementById('heroCrown').textContent = top.emoji || '👑';
  }

  // Total stars
  const total = students.reduce((s,x)=>s+(x.stars||0),0);
  document.getElementById('totalStars').textContent = total;

  // Top 5
  const medals = ['🥇','🥈','🥉','🏅','🏅'];
  const lbList = document.getElementById('lbList');
  lbList.innerHTML = sorted.slice(0,5).map((s,i)=>`
    <div class="lb-row">
      <div class="lb-rank">${medals[i]}</div>
      <div class="lb-emo">${s.emoji||'👧'}</div>
      <div class="lb-info">
        <div class="lb-name">${s.name}</div>
        <div class="lb-cls">${s.kg_class||''}</div>
      </div>
      <div class="lb-stars">${'⭐'.repeat(Math.min(s.stars||0,5))}</div>
    </div>
  `).join('');
}

/* ══════════════════════════════
   RENDER SCHEDULE
══════════════════════════════ */
const SCHEDULE = [
  {time:'07:30',icon:'🕌',name:'دعاء الصباح وأذكار'},
  {time:'08:00',icon:'📖',name:'دائرة الصباح'},
  {time:'08:30',icon:'✏️',name:'نشاط اللغة العربية'},
  {time:'09:15',icon:'🔢',name:'نشاط الرياضيات'},
  {time:'10:00',icon:'🍎',name:'وقت الفطور والراحة'},
  {time:'10:30',icon:'🎨',name:'نشاط الفنون والإبداع'},
  {time:'11:15',icon:'🏃',name:'النشاط الحركي'},
  {time:'12:00',icon:'📚',name:'وقت القصة'},
  {time:'12:30',icon:'🧩',name:'ألعاب تعليمية تفاعلية'},
  {time:'13:00',icon:'🌙',name:'دعاء الانصراف'},
];

function renderSchedule(){
  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();

  const list = document.getElementById('schedList');
  list.innerHTML = SCHEDULE.map(item => {
    const [h,m] = item.time.split(':').map(Number);
    const itemMin = h*60+m;
    const nextIdx = SCHEDULE.findIndex(x=>{
      const [xh,xm]=x.time.split(':').map(Number);return xh*60+xm>nowMin;
    });
    const itemIdx = SCHEDULE.indexOf(item);
    let cls = '';
    if(itemIdx === nextIdx-1 || (nextIdx===-1 && itemIdx===SCHEDULE.length-1)) cls='current';
    else if(itemMin < nowMin && nextIdx > itemIdx) cls='done';

    return `
      <div class="sched-item ${cls}">
        <div class="sched-time">${item.time}</div>
        <div class="sched-icon">${item.icon}</div>
        <div class="sched-name">${item.name}</div>
        ${cls==='current'?'<div class="sched-live"></div>':''}
      </div>
    `;
  }).join('');
}

let quoteIdx = 0;
function rotateTicker(){
  const el = document.getElementById('tickerText');
  el.textContent = QUOTES[quoteIdx % QUOTES.length];
  el.style.animation='none';
  el.offsetHeight; // reflow
  el.style.animation='ticker 35s linear infinite';
  quoteIdx++;
}

/* ══════════════════════════════
   CONFETTI CELEBRATION
══════════════════════════════ */
let confettiFired = false;
function launchConfetti(){
  if(confettiFired) return;
  confettiFired = true;
  const colors = ['#f472b6','#a78bfa','#34d399','#fbbf24','#60a5fa','#fb923c'];
  for(let i=0;i<80;i++){
    setTimeout(()=>{
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random()*100+'vw';
      el.style.top = '-20px';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.transform = `rotate(${Math.random()*360}deg)`;
      el.style.animationDuration = (2+Math.random()*3)+'s';
      el.style.animationDelay = Math.random()*2+'s';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),6000);
    }, i*50);
  }
}
