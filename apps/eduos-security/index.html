<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>لوحة الأمن — EduOS Security</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<script src="/apps/platform-config.js"></script>
<script src="/apps/platform-autologout.js"></script>
<script src="/apps/platform-shield.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',Arial,sans-serif;background:#F0F4F8;color:#1e293b;min-height:100vh;direction:rtl}
:root{--pr:#6C3DD6;--sc:#22D3EE;--card:#fff;--bd:#e2e8f0;--tx:#1e293b;--tx2:#64748b}
/* HEADER */
.hdr{background:linear-gradient(135deg,#1e293b,#0f172a);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{background:linear-gradient(135deg,#6C3DD6,#22D3EE);border-radius:10px;padding:8px 14px;font-size:1.4rem;font-weight:900;color:#fff}
.hdr-text h1{color:#fff;font-size:1rem;font-weight:700}
.hdr-text p{color:rgba(255,255,255,.6);font-size:.73rem}
.hdr-right{display:flex;align-items:center;gap:12px}
.live-badge{background:#22c55e;color:#fff;border-radius:20px;padding:4px 12px;font-size:.72rem;font-weight:700;display:flex;align-items:center;gap:5px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.7}}
.btn-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:6px 14px;cursor:pointer;font-family:inherit;font-size:.78rem;transition:.2s}
.btn-logout:hover{background:rgba(255,255,255,.2)}
/* MAIN */
.main{padding:24px;max-width:1300px;margin:0 auto}
/* TABS */
.tabs{display:flex;gap:8px;margin-bottom:20px;background:#fff;border-radius:12px;padding:6px;border:1px solid var(--bd);width:fit-content}
.tab{padding:8px 20px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;color:var(--tx2);transition:.2s;border:none;background:none;font-family:inherit}
.tab.active{background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff}
.tab-panel{display:none}.tab-panel.active{display:block}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--card);border-radius:14px;padding:18px;border:1px solid var(--bd);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.kpi-icon{font-size:1.8rem;margin-bottom:8px}
.kpi-val{font-size:1.8rem;font-weight:900;color:var(--tx);margin-bottom:2px}
.kpi-label{font-size:.75rem;color:var(--tx2)}
.kpi.green{border-color:#86efac;background:#f0fdf4}.kpi.green .kpi-val{color:#16a34a}
.kpi.blue{border-color:#93c5fd;background:#eff6ff}.kpi.blue .kpi-val{color:#1d4ed8}
.kpi.red{border-color:#fca5a5;background:#fff5f5}.kpi.red .kpi-val{color:#dc2626}
.kpi.amber{border-color:#fcd34d;background:#fffbeb}.kpi.amber .kpi-val{color:#d97706}
/* CARD */
.card{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--bd);box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:16px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:8px}
/* GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:768px){.grid2{grid-template-columns:1fr}}
/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:.78rem;font-weight:600;color:var(--tx2)}
.form-group input,.form-group select,.form-group textarea{
  border:1.5px solid var(--bd);border-radius:8px;padding:9px 12px;
  font-family:inherit;font-size:.85rem;color:var(--tx);background:#fff;transition:.2s;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#6C3DD6;box-shadow:0 0 0 3px rgba(108,61,214,.1)}
.form-full{grid-column:1/-1}
/* BUTTONS */
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:700;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff;box-shadow:0 2px 8px rgba(108,61,214,.3)}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-success{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff}
.btn-danger{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff}
.btn-secondary{background:#f1f5f9;color:var(--tx2);border:1px solid var(--bd)}
.btn-sm{padding:5px 12px;font-size:.75rem}
/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--bd)}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:#f8faff;padding:11px 14px;text-align:right;font-weight:700;color:var(--tx2);border-bottom:2px solid var(--bd);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}
/* BADGE */
.badge{padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;white-space:nowrap}
.badge-green{background:#dcfce7;color:#16a34a}
.badge-red{background:#fee2e2;color:#dc2626}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-amber{background:#fef3c7;color:#d97706}
/* SEARCH BAR */
.search-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:180px;border:1.5px solid var(--bd);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:.84rem;outline:none}
.search-bar input:focus{border-color:#6C3DD6}
/* EMPTY STATE */
.empty{text-align:center;padding:40px;color:var(--tx2)}
.empty-icon{font-size:2.5rem;margin-bottom:10px}
/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:10px;padding:12px 24px;font-size:.85rem;font-weight:600;z-index:9999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.3)}
/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;max-width:500px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--tx2)}
</style>
</head>
<body>

<div id="toast"></div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">🔒</div>
    <div class="hdr-text">
      <h1>لوحة الأمن | Security Dashboard</h1>
      <p>بوابة الجود الذكية — <span id="hdUser">جار التحميل...</span></p>
    </div>
  </div>
  <div class="hdr-right">
    <div class="live-badge">● مباشر</div>
    <button class="btn-logout" onclick="logout()">خروج</button>
  </div>
</div>

<!-- TABS -->
<div class="main">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('today','this')">🚪 الزوار اليوم</button>
    <button class="tab" onclick="switchTab('register','this')">➕ تسجيل زائر/ة</button>
    <button class="tab" onclick="switchTab('history','this')">📋 السجل الكامل</button>
  </div>

  <!-- TAB: TODAY VISITORS -->
  <div id="tab-today" class="tab-panel active">
    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi blue"><div class="kpi-icon">👥</div><div class="kpi-val" id="kpiTotal">—</div><div class="kpi-label">إجمالي الزوار اليوم</div></div>
      <div class="kpi green"><div class="kpi-icon">✅</div><div class="kpi-val" id="kpiIn">—</div><div class="kpi-label">داخل المدرسة الآن</div></div>
      <div class="kpi amber"><div class="kpi-icon">🚶</div><div class="kpi-val" id="kpiOut">—</div><div class="kpi-label">غادر/ت</div></div>
      <div class="kpi red"><div class="kpi-icon">⏳</div><div class="kpi-val" id="kpiPending">—</div><div class="kpi-label">بانتظار الدخول</div></div>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <input type="text" id="searchToday" placeholder="🔍 ابحث بالاسم أو رقم الهوية..." oninput="filterToday()"/>
      <button class="btn btn-primary btn-sm" onclick="loadToday()">🔄 تحديث</button>
    </div>

    <div class="card">
      <div class="card-hdr">
        <span class="card-title">📋 قائمة الزوار — <span id="todayDate"></span></span>
      </div>
      <div id="todayList">
        <div class="empty"><div class="empty-icon">⏳</div>جار التحميل...</div>
      </div>
    </div>
  </div>

  <!-- TAB: REGISTER -->
  <div id="tab-register" class="tab-panel">
    <div class="card">
      <div class="card-hdr">
        <span class="card-title">➕ تسجيل زائر/ة جديد/ة</span>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>اسم الزائر/ة *</label>
          <input type="text" id="vName" placeholder="الاسم الكامل"/>
        </div>
        <div class="form-group">
          <label>رقم الهوية / جواز *</label>
          <input type="text" id="vId" placeholder="784-XXXX-XXXXXXX-X"/>
        </div>
        <div class="form-group">
          <label>رقم الجوال</label>
          <input type="text" id="vPhone" placeholder="05X XXXXXXX"/>
        </div>
        <div class="form-group">
          <label>الشخص المُستضيف/ة</label>
          <input type="text" id="vHost" placeholder="اسم المعلم/ة أو المسؤول/ة"/>
        </div>
        <div class="form-group">
          <label>الغرض من الزيارة *</label>
          <select id="vPurpose">
            <option value="">-- اختر --</option>
            <option value="اجتماع ولي أمر">اجتماع ولي/ة أمر</option>
            <option value="مقابلة إدارية">مقابلة إدارية</option>
            <option value="تسليم وثيقة">تسليم وثيقة</option>
            <option value="زيارة تفتيشية">زيارة تفتيشية</option>
            <option value="صيانة وخدمات">صيانة وخدمات</option>
            <option value="زيارة خارجية">زيارة خارجية أخرى</option>
          </select>
        </div>
        <div class="form-group">
          <label>الحالة</label>
          <select id="vStatus">
            <option value="inside">داخل المدرسة</option>
            <option value="pending">بانتظار الدخول</option>
          </select>
        </div>
        <div class="form-group form-full">
          <label>ملاحظات</label>
          <textarea id="vNotes" rows="2" placeholder="أي ملاحظات إضافية..."></textarea>
        </div>
      </div>
      <div style="margin-top:16px;display:flex;gap:10px;">
        <button class="btn btn-primary" onclick="saveVisitor()">✅ تسجيل الدخول</button>
        <button class="btn btn-secondary" onclick="clearVisitorForm()">🗑️ مسح</button>
      </div>
    </div>
  </div>

  <!-- TAB: HISTORY -->
  <div id="tab-history" class="tab-panel">
    <div class="search-bar">
      <input type="text" id="searchHistory" placeholder="🔍 ابحث في السجل..." oninput="filterHistory()"/>
      <select id="filterStatus" onchange="filterHistory()" style="border:1.5px solid var(--bd);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:.82rem">
        <option value="">جميع الحالات</option>
        <option value="inside">داخل</option>
        <option value="exited">غادر/ت</option>
        <option value="pending">انتظار</option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="loadHistory()">🔄 تحديث</button>
    </div>
    <div class="card">
      <div id="historyList">
        <div class="empty"><div class="empty-icon">⏳</div>جار التحميل...</div>
      </div>
    </div>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="overlay" id="checkoutOverlay">
  <div class="modal">
    <div class="modal-hdr">
      <span style="font-weight:700;font-size:1rem">🚶 تسجيل خروج</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <p style="color:var(--tx2);font-size:.85rem;margin-bottom:16px">هل تريد/ين تسجيل خروج <strong id="checkoutName"></strong>؟</p>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-danger" onclick="confirmCheckout()">✅ تسجيل الخروج</button>
      <button class="btn btn-secondary" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const SB_URL = window.EduOS?.SB_URL || 'https://zuyizaiugpmhmeycqton.supabase.co';
const SB_KEY = window.EduOS?.SB_KEY || '';
const HDR = { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

let allToday = [], allHistory = [], pendingCheckoutId = null, currentUser = {};

// ── AUTH ──
function getSession(){
  try { return JSON.parse(sessionStorage.getItem('edoos_user') || '{}'); } catch{ return {}; }
}
function logout(){
  sessionStorage.removeItem('edoos_user');
  location.href = '/apps/eduos-login/';
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', async () => {
  currentUser = getSession();
  if (!currentUser || !currentUser.id) { location.href='/apps/eduos-login/'; return; }
  if (currentUser.role && currentUser.role !== 'security' && currentUser.role !== 'admin') {
    // allow admin to view
  }
  document.getElementById('hdUser').textContent = currentUser.name || 'أمن/ة';
  const d = new Date();
  document.getElementById('todayDate').textContent = d.toLocaleDateString('ar-AE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  await loadToday();
  await loadHistory();
  setInterval(loadToday, 60000); // تحديث كل دقيقة
});

// ── LOAD TODAY ──
async function loadToday() {
  const today = new Date().toISOString().split('T')[0];
  try {
    const r = await fetch(`${SB_URL}/rest/v1/visitor_log?entry_time=gte.${today}T00:00:00&order=entry_time.desc&limit=100`, { headers: HDR });
    allToday = await r.json();
    renderKPIs(allToday);
    renderTodayTable(allToday);
  } catch(e) {
    document.getElementById('todayList').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>تعذّر تحميل البيانات</div>`;
  }
}

// ── LOAD HISTORY ──
async function loadHistory() {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/visitor_log?order=entry_time.desc&limit=200`, { headers: HDR });
    allHistory = await r.json();
    renderHistoryTable(allHistory);
  } catch(e) {}
}

// ── KPIs ──
function renderKPIs(data) {
  const total = data.length;
  const inside = data.filter(v => v.status === 'inside').length;
  const exited = data.filter(v => v.status === 'exited').length;
  const pending = data.filter(v => v.status === 'pending').length;
  document.getElementById('kpiTotal').textContent = total;
  document.getElementById('kpiIn').textContent = inside;
  document.getElementById('kpiOut').textContent = exited;
  document.getElementById('kpiPending').textContent = pending;
}

// ── RENDER TODAY TABLE ──
function renderTodayTable(data) {
  const el = document.getElementById('todayList');
  if (!data || data.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🚪</div><p>لا زوار مسجّلون/ات اليوم</p></div>`;
    return;
  }
  el.innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr><th>#</th><th>الاسم</th><th>رقم الهوية</th><th>الغرض</th><th>المُستضيف/ة</th><th>وقت الدخول</th><th>وقت الخروج</th><th>الحالة</th><th>إجراء</th></tr></thead>
    <tbody>${data.map((v,i) => `
      <tr>
        <td>${i+1}</td>
        <td><strong>${v.visitor_name||'—'}</strong><br/><small style="color:var(--tx2)">${v.phone||''}</small></td>
        <td style="font-size:.75rem;color:var(--tx2)">${v.id_number||'—'}</td>
        <td>${v.purpose||'—'}</td>
        <td>${v.host_name||'—'}</td>
        <td>${formatTime(v.entry_time)}</td>
        <td>${v.exit_time ? formatTime(v.exit_time) : '—'}</td>
        <td>${statusBadge(v.status)}</td>
        <td>${v.status==='inside'||v.status==='pending' ? `<button class="btn btn-danger btn-sm" onclick="checkout('${v.id}','${v.visitor_name}')">خروج</button>` : '—'}</td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

// ── RENDER HISTORY TABLE ──
function renderHistoryTable(data) {
  const el = document.getElementById('historyList');
  if (!data || data.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>السجل فارغ</p></div>`;
    return;
  }
  el.innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr><th>#</th><th>الاسم</th><th>الغرض</th><th>تاريخ الدخول</th><th>وقت الدخول</th><th>وقت الخروج</th><th>الحالة</th></tr></thead>
    <tbody>${data.map((v,i) => `
      <tr>
        <td>${i+1}</td>
        <td><strong>${v.visitor_name||'—'}</strong><br/><small style="color:var(--tx2)">${v.id_number||''}</small></td>
        <td>${v.purpose||'—'}</td>
        <td style="font-size:.78rem">${v.entry_time ? new Date(v.entry_time).toLocaleDateString('ar-AE') : '—'}</td>
        <td>${formatTime(v.entry_time)}</td>
        <td>${v.exit_time ? formatTime(v.exit_time) : '—'}</td>
        <td>${statusBadge(v.status)}</td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

// ── SAVE VISITOR ──
async function saveVisitor() {
  const name = document.getElementById('vName').value.trim();
  const idNum = document.getElementById('vId').value.trim();
  const phone = document.getElementById('vPhone').value.trim();
  const host = document.getElementById('vHost').value.trim();
  const purpose = document.getElementById('vPurpose').value;
  const status = document.getElementById('vStatus').value;
  const notes = document.getElementById('vNotes').value.trim();

  if (!name) { showToast('❌ أدخل/ي اسم الزائر/ة'); return; }
  if (!idNum) { showToast('❌ أدخل/ي رقم الهوية'); return; }
  if (!purpose) { showToast('❌ اختر/ي غرض الزيارة'); return; }

  const payload = {
    visitor_name: name, id_number: idNum, phone: phone||null,
    host_name: host||null, purpose, status, notes: notes||null,
    entry_time: new Date().toISOString()
  };

  try {
    const r = await fetch(`${SB_URL}/rest/v1/visitor_log`, {
      method: 'POST',
      headers: { ...HDR, 'Prefer': 'return=minimal' },
      body: JSON.stringify(payload)
    });
    if (r.ok || r.status === 201) {
      showToast('✅ تم تسجيل دخول الزائر/ة بنجاح');
      clearVisitorForm();
      await loadToday();
      switchTab('today', null);
    } else {
      const err = await r.json();
      showToast('❌ خطأ في الحفظ: ' + (err.message || r.status));
    }
  } catch(e) {
    showToast('❌ تعذّر الاتصال بالخادم');
  }
}

// ── CHECKOUT ──
function checkout(id, name) {
  pendingCheckoutId = id;
  document.getElementById('checkoutName').textContent = name;
  document.getElementById('checkoutOverlay').classList.add('open');
}

async function confirmCheckout() {
  if (!pendingCheckoutId) return;
  try {
    const r = await fetch(`${SB_URL}/rest/v1/visitor_log?id=eq.${pendingCheckoutId}`, {
      method: 'PATCH',
      headers: { ...HDR, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ status: 'exited', exit_time: new Date().toISOString() })
    });
    if (r.ok) {
      showToast('✅ تم تسجيل الخروج');
      closeModal();
      await loadToday();
    } else {
      showToast('❌ فشل تسجيل الخروج');
    }
  } catch(e) {
    showToast('❌ تعذّر الاتصال بالخادم');
  }
}

function closeModal() {
  document.getElementById('checkoutOverlay').classList.remove('open');
  pendingCheckoutId = null;
}

// ── FILTER ──
function filterToday() {
  const q = document.getElementById('searchToday').value.toLowerCase();
  const filtered = allToday.filter(v =>
    (v.visitor_name||'').toLowerCase().includes(q) ||
    (v.id_number||'').toLowerCase().includes(q)
  );
  renderTodayTable(filtered);
}

function filterHistory() {
  const q = document.getElementById('searchHistory').value.toLowerCase();
  const st = document.getElementById('filterStatus').value;
  const filtered = allHistory.filter(v =>
    (!q || (v.visitor_name||'').toLowerCase().includes(q) || (v.id_number||'').toLowerCase().includes(q)) &&
    (!st || v.status === st)
  );
  renderHistoryTable(filtered);
}

// ── UTILS ──
function clearVisitorForm() {
  ['vName','vId','vPhone','vHost','vNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('vPurpose').value = '';
  document.getElementById('vStatus').value = 'inside';
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if (btn === 'this') event.target.classList.add('active');
}

function statusBadge(s) {
  const map = { inside: ['badge-green','داخل المدرسة'], exited: ['badge-blue','غادر/ت'], pending: ['badge-amber','انتظار'] };
  const [cls, lbl] = map[s] || ['badge-amber', s||'غير معروف'];
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function formatTime(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleTimeString('ar-AE',{hour:'2-digit',minute:'2-digit'}); } catch{ return '—'; }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}
</script>
