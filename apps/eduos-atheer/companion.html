<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>أثير — رفيقي الذكي | Atheer Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: #0a1628;
    color: #f0f4ff;
    min-height: 100vh;
    overflow: hidden;
    touch-action: manipulation;
  }
  /* ── OVERLAY UI (above Phaser canvas) ── */
  #atheer-ui {
    position: fixed; inset: 0; z-index: 100;
    pointer-events: none;
    display: flex; flex-direction: column;
  }
  /* Header */
  #ath-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    background: linear-gradient(135deg, rgba(108,61,214,.9), rgba(34,211,238,.7));
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,.15);
    pointer-events: all;
  }
  .ath-logo { display: flex; align-items: center; gap: 10px; }
  .ath-logo .icon { font-size: 26px; }
  .ath-logo .name { font-weight: 900; font-size: 1.1rem; }
  .ath-logo .sub  { font-size: .7rem; opacity: .8; }
  .ath-progress {
    display: flex; gap: 6px; align-items: center;
  }
  .step-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(255,255,255,.3);
    transition: all .3s;
  }
  .step-dot.done  { background: #22D3EE; }
  .step-dot.active{ background: #fff; transform: scale(1.4); box-shadow: 0 0 8px #fff; }

  /* Speech bubble */
  #ath-bubble {
    position: fixed;
    top: 90px; left: 50%; transform: translateX(-50%);
    width: min(90vw, 560px);
    background: rgba(255,255,255,.12);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 20px; padding: 18px 22px;
    font-size: 1.05rem; line-height: 1.8;
    text-align: center; color: #fff;
    transition: all .4s ease;
    pointer-events: none;
    min-height: 60px;
  }
  #ath-bubble.hidden { opacity: 0; transform: translateX(-50%) translateY(-10px); }

  /* Choice buttons */
  #ath-choices {
    position: fixed;
    bottom: 110px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 10px;
    width: min(90vw, 440px);
    pointer-events: all;
    transition: all .3s;
  }
  #ath-choices.hidden { opacity: 0; pointer-events: none; }
  .choice-btn {
    background: rgba(255,255,255,.12);
    border: 1.5px solid rgba(255,255,255,.3);
    border-radius: 14px; padding: 14px 22px;
    color: #fff; font-family: 'Tajawal', sans-serif;
    font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: all .2s;
    text-align: center;
  }
  .choice-btn:hover, .choice-btn:active {
    background: rgba(108,61,214,.6);
    border-color: #6C3DD6;
    transform: scale(1.02);
  }
  .choice-btn.selected {
    background: linear-gradient(135deg, #6C3DD6, #22D3EE);
    border-color: transparent;
  }

  /* Mic / Next button */
  #ath-action {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    pointer-events: all;
    display: flex; gap: 14px; align-items: center; justify-content: center;
  }
  .ath-btn {
    border: none; border-radius: 50px; cursor: pointer;
    font-family: 'Tajawal', sans-serif; font-weight: 700;
    transition: all .25s; display: flex; align-items: center; gap: 8px;
  }
  #btn-speak {
    background: linear-gradient(135deg, #6C3DD6, #22D3EE);
    color: #fff; padding: 14px 28px; font-size: 1rem;
    box-shadow: 0 6px 24px rgba(108,61,214,.5);
  }
  #btn-speak:hover { transform: scale(1.06); box-shadow: 0 8px 32px rgba(108,61,214,.7); }
  #btn-speak.loading { opacity: .6; pointer-events: none; }
  #btn-next {
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.3);
    color: #fff; padding: 14px 24px; font-size: .95rem;
  }
  #btn-next:hover { background: rgba(255,255,255,.25); }
  #btn-next.hidden { display: none; }

  /* Signal dots (silent taps) */
  #silent-feed {
    position: fixed; top: 90px; right: 16px;
    display: flex; flex-direction: column; gap: 6px;
    pointer-events: none; opacity: .7;
  }
  .signal-pill {
    background: rgba(34,211,238,.2);
    border: 1px solid rgba(34,211,238,.4);
    border-radius: 20px; padding: 3px 10px;
    font-size: .7rem; color: #22D3EE;
    animation: fadeUp .5s ease forwards;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:.9;transform:translateY(0)} }

  /* End screen */
  #ath-end {
    position: fixed; inset: 0; z-index: 200;
    background: linear-gradient(135deg, #0a1628 0%, #1a0a3c 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; padding: 32px;
    display: none;
    text-align: center;
  }
  .end-icon { font-size: 72px; }
  .end-title { font-size: 1.8rem; font-weight: 900; color: #22D3EE; }
  .end-msg   { font-size: 1rem; color: rgba(255,255,255,.8); max-width: 340px; line-height: 1.7; }
  .end-parent-note {
    background: rgba(108,61,214,.2);
    border: 1px solid rgba(108,61,214,.4);
    border-radius: 14px; padding: 16px 20px;
    font-size: .88rem; color: #c4b5fd; max-width: 400px; line-height: 1.7;
  }
  #btn-restart {
    background: linear-gradient(135deg, #6C3DD6, #22D3EE);
    color: #fff; border: none; border-radius: 14px;
    padding: 14px 32px; font-size: 1rem; font-weight: 700;
    cursor: pointer; font-family: 'Tajawal', sans-serif;
  }

  /* Loading overlay */
  #ath-loading {
    position: fixed; inset: 0; z-index: 300;
    background: #0a1628;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
  }
  .spinner { width: 48px; height: 48px; border-radius: 50%;
    border: 4px solid rgba(108,61,214,.3);
    border-top-color: #6C3DD6; animation: spin .8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<!-- Loading -->
<div id="ath-loading">
  <div style="font-size:48px">✨</div>
  <div class="spinner"></div>

<!-- Phaser Canvas injected here by JS -->

<!-- Overlay UI -->
<div id="atheer-ui">
  <div id="ath-header">
    <div class="ath-logo">

</div>

<div id="ath-bubble" class="hidden"></div>

<div id="ath-choices" class="hidden"></div>

<div id="ath-action">

<!-- End Screen -->

<script>

const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1eWl6YWl1Z3BtaG1leWNxdG9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwODgyNDAsImV4cCI6MjA5NDY2NDI0MH0.FqOUqiR7GfttAEI8NY3bbOwFPnupxBsHMgYJCNT68PI';
const SH = {'Content-Type':'application/json','apikey':SKEY,'Authorization':'Bearer '+SKEY};

// ── SESSION STATE ──

// ── VARK + PLATFORM STATE — DYNAMIC SCREEN BUILDER ──

async function getChildVARK(childId) {
  if (!childId) return null;
  try {
    const r = await fetch(
      `${SURL}/rest/v1/atheer_signals?child_id=eq.${childId}&signal_type=eq.vark_result&order=captured_at.desc&limit=1`,
      { headers: SH }
    );
    if (r.ok) { const d = await r.json(); return d[0]?.signal_data?.vark_type || null; }
  } catch(e) {}
  return null;
}

async function getCurrentPlatformState() {
  try {
    const r = await fetch(`${SURL}/rest/v1/platform_state?order=updated_at.desc&limit=1`, { headers: SH });
    if (r.ok) { const d = await r.json(); return d[0]?.current_state || 'normal'; }
  } catch(e) {}
  return 'normal';
}

function buildScreens(vark, state) {
  const isExam      = state === 'exam';
  const isRamadan   = state === 'ramadan';
  const isHoliday   = ['holiday','break','summer'].includes(state);
  const isEmergency = state === 'emergency';
  const v = (vark || 'K').toUpperCase();

  // ── VARK story variants ──
  const stories = {
    V: { bubble: 'هيّا نتخيّل معاً 🎨\n\nتخيّل/ي أنك في مكان جميل جداً —\nالألوان حولك زاهية والضوء دافئ.\nأيّ لوحة تصفها؟', choices: ['🌅 شروق الشمس على البحر','🌿 حديقة خضراء هادئة','🌠 سماء ليلية بالنجوم'] },
    A: { bubble: 'هيّا نستمع معاً 🎶\n\nتخيّل/ي صوتاً يجعلك/ِ سعيداً/ة —\nصوت يريحك/ِ ويطمئنك/ِ.\nأيّ صوت هو؟', choices: ['🌊 صوت الأمواج','🎵 موسيقى هادئة','🌧️ صوت المطر'] },
    R: { bubble: 'هيّا نفكّر معاً 📖\n\nأمامك ثلاثة خيارات ليوم جميل.\nأيّها يصف يومك الأجمل؟', choices: ['📚 يوم تعلّم شيء جديد','✍️ يوم كتبت أفكاري','📖 يوم قرأت قصة مميزة'] },
    K: { bubble: 'هيّا نحسّ ونتحرّك 🌀\n\nفكّر/ي في جسمك الآن.\nأين تشعر/ين بأكبر طاقة؟', choices: ['💪 يديّ — أريد أن أصنع شيئاً','🦵 قدميّ — أريد أن أتحرك','❤️ قلبي — أشعر بدفء'] }
  };
  // ── VARK activity variants ──
  const activities = {
    V: 'ارسم/ي في مخيّلتك صورة من يومك.\nصف/صفي لي ما تراه — ألوانه ومشاعره! 🎨',
    A: 'تذكّر/ي صوتاً جميلاً سمعته/ِ اليوم.\nأيّ صوت كان؟ أخبرني! 🎶',
    R: 'اذكر/ي لي ثلاثة أشياء جميلة\nحدثت معك/ِ اليوم — أي شيء صغير أو كبير! 📋',
    K: 'تذكّر/ي لحظة تحرّكت فيها أو صنعت شيئاً بيديك/ِ اليوم.\nكيف شعرت/ِ؟ 💫'
  };

  const story    = stories[v]    || stories.K;
  const actTxt   = activities[v] || activities.K;

  // ── State-aware check-in ──
  let checkin = {
    id:'checkin', bg:'#0d1a2e', avatar:{x:.5,y:.6,scale:1},
    bubble: 'رائع! كيف حالك اليوم؟\nأخبرني بصدق 💙',
    choices:['😊 بخير وسعيد/ة','😐 عادي لا بأس','😔 أشعر بشيء ما'],
    action:'choose', nextAuto:false, signalKey:'emotional_state'
  };
  if (isExam) {
    checkin.bubble  = 'أعرف أن هناك اختباراً قريباً 📝\nكيف تشعر/ين حيال ذلك؟\nكل مشاعرك طبيعية 💙';
    checkin.choices = ['😤 متوتر/ة قليلاً','😊 مستعد/ة وواثق/ة','😔 خائف/ة من الاختبار'];
    checkin.signalKey = 'exam_stress';
  } else if (isRamadan) {
    checkin.bubble  = 'رمضان كريم 🌙\nكيف تشعر/ين اليوم في رمضان؟\nشاركني اللحظة 💜';
    checkin.choices = ['🌙 أحسّ بسكينة','🤲 أتمنى الخير للجميع','😴 متعب/ة لكنني سعيد/ة'];
    checkin.signalKey = 'ramadan_feeling';
  } else if (isHoliday) {
    checkin.bubble  = 'إجازة مباركة 🎉\nكيف تقضي/ين وقتك؟ أخبرني! 😄';
    checkin.choices = ['🎮 ألعب وأستمتع','👨‍👩‍👧 مع العائلة','😌 أرتاح وأسترخي'];
    checkin.signalKey = 'holiday_mood';
  }

  // ── State-specific extra screens ──
  const examBreath = isExam ? [{
    id:'exam_breath', bg:'#0a1628', avatar:{x:.5,y:.62,scale:1},
    bubble:'تمرين التنفّس قبل الاختبار 🌬️\n\nخذ/ي نفساً عميقاً ببطء...\nاحبسه/ِ للحظة...\nثم أخرجه ببطء.\n\nأحسنت! أنت أقوى مما تظن/ين 💪',
    choices:null, action:'next', nextAuto:false, signalKey:'breath_done'
  }] : [];

  const ramadanGrat = isRamadan ? [{
    id:'ramadan_gratitude', bg:'#0f1428', avatar:{x:.5,y:.62,scale:1},
    bubble:'لحظة شكر 🤲\n\nما الشيء الجميل الذي تشكر/ين الله عليه اليوم؟\nحتى النِعم الصغيرة تستحق الشكر 🌟',
    choices:['🏠 بيتي وعائلتي','❤️ صحتي وسلامتي','📚 تعلّمي ومدرستي'],
    action:'choose', nextAuto:false, signalKey:'gratitude_focus'
  }] : [];

  return [
    {
      id:'welcome', bg:'#0a1628', avatar:{x:.5,y:.62,scale:1.2},
      bubble: isHoliday  ? 'أهلاً في الإجازة 🎉\nأنا أثير، رفيقك الذكي!\nكيف اسمك؟'
            : isRamadan  ? 'رمضان كريم 🌙\nأنا أثير، رفيقك الذكي!\nكيف اسمك؟'
            : 'أهلاً وسهلاً 🌟\nأنا أثير، رفيقك الذكي!\nكيف اسمك؟',
      choices:['أحمد 👦','فاطمة 👧','اسمي مختلف ✏️'],
      action:'speak', nextAuto:false
    },
    checkin,
    ...examBreath,
    ...ramadanGrat,
    {
      id:'story', bg:'#0f1f35', avatar:{x:.5,y:.58,scale:1.1},
      bubble:story.bubble, choices:story.choices,
      action:'choose', nextAuto:false, signalKey:'story_choice'
    },
    {
      id:'feeling_draw', bg:'#0a1628', avatar:{x:.5,y:.55,scale:.9},
      bubble: isEmergency
        ? 'أنا هنا معك/ِ 💙\nلا تخف/ي — كلّ شيء سيكون بخير.\nما الذي تشعر/ين به الآن؟'
        : 'الآن، خذ/ي نفساً عميقاً 🌬️\n\nما الذي تشعر/ين به في قلبك الآن؟',
      choices: isEmergency
        ? ['💙 أشعر بالأمان','😟 قلقان/ة قليلاً','🤗 بحاجة لأحد يتحدث معي']
        : ['❤️ دفء وأمان','⚡ طاقة ونشاط','💧 هدوء وراحة','🌪️ قلق أو توتر'],
      action:'choose', nextAuto:false,
      signalKey: isEmergency ? 'emergency_feeling' : 'inner_feeling'
    },
    {
      id:'activity', bg:'#0c1e30', avatar:{x:.5,y:.6,scale:1},
      bubble:`نشاط اليوم 🎯\n\n${actTxt}`,
      choices:null, action:'speak', nextAuto:false, signalKey:'positive_event'
    },
    {
      id:'goodbye', bg:'#0a1628', avatar:{x:.5,y:.6,scale:1.15},
      bubble: isExam    ? 'أنت مستعد/ة 💜\nثق/ي بنفسك في الاختبار.\nأثير فخور/ة بك دائماً. 🌟'
            : isRamadan ? 'رمضان مبارك 🌙\nكانت جلستنا رائعة!\nأثير معك/ِ دائماً. 💜'
            : 'شكراً لك 💜\nكانت جلستنا رائعة!\nأثير فخور/ة بك دائماً.',
      choices:null, action:'end', nextAuto:true
    }
  ];
}

// ── 6 SCREENS FLOW (dynamic — built in init) ──
let SCREENS = [];
// ── WELCOME SCREEN PLACEHOLDER (replaced by buildScreens) ──
// (static screens removed — buildScreens() generates them dynamically)

let currentStep = 0;
let phaserScene = null;

// ── PHASER GAME ──
class AtheerScene extends Phaser.Scene {
  constructor() { super({ key: 'AtheerScene' }); }

  preload() {
    // Create a simple gradient avatar using graphics
  }

  create() {
    phaserScene = this;
    this.cameras.main.setBackgroundColor('#0a1628');
    this.createBackground();
    this.createAvatar();
    this.createParticles();
  }

  createBackground() {
    const { width, height } = this.scale;
    // Gradient background via rectangles
    const bg = this.add.graphics();
    bg.fillGradientStyle(0x0a1628, 0x0a1628, 0x1a0a3c, 0x1a0a3c, 1);
    bg.fillRect(0, 0, width, height);

    // Stars
    for (let i = 0; i < 60; i++) {
      const x = Phaser.Math.Between(0, width);
      const y = Phaser.Math.Between(0, height * .7);
      const r = Phaser.Math.FloatBetween(1, 2.5);
      const star = this.add.circle(x, y, r, 0xffffff, Phaser.Math.FloatBetween(.3, .9));
      this.tweens.add({
        targets: star, alpha: { from: .2, to: .9 },
        duration: Phaser.Math.Between(1500, 3500),
        yoyo: true, repeat: -1,
        delay: Phaser.Math.Between(0, 2000)
      });
    }
  }

  createAvatar() {
    const { width, height } = this.scale;
    const cx = width * .5;
    const cy = height * .62;

    // Glow ring
    this.glowRing = this.add.circle(cx, cy, 85, 0x6C3DD6, .18);
    this.tweens.add({
      targets: this.glowRing,
      scaleX: { from: 1, to: 1.12 }, scaleY: { from: 1, to: 1.12 },
      alpha: { from: .18, to: .35 },
      duration: 1800, yoyo: true, repeat: -1
    });

    // Body gradient circle
    const g = this.add.graphics();
    g.fillGradientStyle(0x6C3DD6, 0x22D3EE, 0x6C3DD6, 0x22D3EE, 1);
    g.fillCircle(cx, cy, 68);

    // Face emoji-style using text
    this.face = this.add.text(cx, cy - 8, '✨', {
      fontSize: '52px', align: 'center'
    }).setOrigin(.5);

    // Idle float animation
    this.tweens.add({
      targets: [g, this.face, this.glowRing],
      y: '-=10', duration: 2200, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
    });

    this.avatarGroup = [g, this.face];
  }

  createParticles() {
    const { width, height } = this.scale;
    // Floating orbs
    for (let i = 0; i < 8; i++) {
      const x = Phaser.Math.Between(30, width - 30);
      const y = Phaser.Math.Between(height * .4, height * .9);
      const orb = this.add.circle(x, y, Phaser.Math.Between(4, 10),
        i % 2 === 0 ? 0x6C3DD6 : 0x22D3EE, .3);
      this.tweens.add({
        targets: orb,
        x: x + Phaser.Math.Between(-40, 40),
        y: y + Phaser.Math.Between(-30, 30),
        alpha: { from: .1, to: .5 },
        duration: Phaser.Math.Between(2000, 4000),
        yoyo: true, repeat: -1,
        delay: i * 300
      });
    }
  }

  updateBackground(color) {
    this.cameras.main.setBackgroundColor(color || '#0a1628');
  }

  playHappy() {
    if (!this.face) return;
    this.face.setText('🌟');
    this.tweens.add({
      targets: this.face, scaleX: 1.2, scaleY: 1.2,
      duration: 200, yoyo: true, ease: 'Bounce'
    });
  }

  playThinking() {
    if (!this.face) return;
    this.face.setText('🤔');
  }

  playSpeaking() {
    if (!this.face) return;
    this.face.setText('🗣️');
  }

  playEnd() {
    if (!this.face) return;
    this.face.setText('💜');
    this.tweens.add({
      targets: this.glowRing,
      scaleX: 2, scaleY: 2, alpha: 0,
      duration: 1000
    });
  }
}

const phaserConfig = {
  type: Phaser.AUTO,
  parent: 'game-container',
  width: window.innerWidth,
  height: window.innerHeight,
  backgroundColor: '#0a1628',
  scene: AtheerScene,
  scale: {
    mode: Phaser.Scale.RESIZE,
    autoCenter: Phaser.Scale.CENTER_BOTH
  }
};

// ── FLOW ENGINE ──
function buildStepDots() {
  const el = document.getElementById('stepDots');
  el.innerHTML = SCREENS.map((_, i) => `<div class="step-dot" id="dot-${i}"></div>`).join('');
}

function updateStepDots(step) {
  SCREENS.forEach((_, i) => {
    const d = document.getElementById('dot-' + i);
    if (!d) return;
    d.className = 'step-dot' + (i < step ? ' done' : i === step ? ' active' : '');
  });
}

function showBubble(text) {
  const el = document.getElementById('ath-bubble');
  el.innerHTML = text.replace(/\n/g, '<br>');
  el.classList.remove('hidden');
}

function hideBubble() {
  document.getElementById('ath-bubble').classList.add('hidden');
}

function showChoices(choices) {
  const el = document.getElementById('ath-choices');
  if (!choices || !choices.length) { el.classList.add('hidden'); return; }
  el.innerHTML = choices.map((c, i) =>
    `<button class="choice-btn" onclick="onChoice(${i},'${c.replace(/'/g,"\\'")}')">
      ${c}
    </button>`).join('');
  el.classList.remove('hidden');
}

function hideChoices() {
  document.getElementById('ath-choices').classList.add('hidden');
}

function showAction(action) {
  const speakBtn = document.getElementById('btn-speak');
  const nextBtn  = document.getElementById('btn-next');
  if (action === 'speak') {
    speakBtn.style.display = 'flex';
    nextBtn.classList.add('hidden');
  } else if (action === 'choose') {
    speakBtn.style.display = 'none';
    nextBtn.classList.remove('hidden');
  } else if (action === 'next') {
    speakBtn.style.display = 'none';
    nextBtn.classList.remove('hidden');
  } else if (action === 'end') {
    speakBtn.style.display = 'none';
    nextBtn.classList.add('hidden');
  }
}

async function runScreen(stepIdx) {
  const screen = SCREENS[stepIdx];
  if (!screen) { endSession(); return; }

  currentStep = stepIdx;
  updateStepDots(stepIdx);

  // Update Phaser background
  if (phaserScene) phaserScene.updateBackground(screen.bg);

  // Speech via ElevenLabs Edge Function
  await speakText(screen.bubble);

  showBubble(screen.bubble);
  showChoices(screen.choices);
  showAction(screen.action);

  if (screen.nextAuto) {
    setTimeout(() => { runScreen(stepIdx + 1); }, 3500);
  }
}

// ── VOICE (ElevenLabs via Edge Function) ──
async function speakText(text) {
  if (phaserScene) phaserScene.playSpeaking();
  try {
    const clean = text.replace(/\n/g, ' ').replace(/[^\u0600-\u06FF\u0020-\u007E]/g, ' ');
    const res = await fetch(`${SURL}/functions/v1/agent-brain`, {
      method: 'POST',
      headers: { ...SH, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'speak',
        text: clean,
        lang: 'ar'
      })
    });
    if (res.ok) {
      const data = await res.json();
      if (data.audio_url) {
        const audio = new Audio(data.audio_url);
        await audio.play().catch(() => {});
        await new Promise(r => { audio.onended = r; setTimeout(r, 6000); });
      }
    }
  } catch (e) {
    // Silent fallback — Web Speech API
    if ('speechSynthesis' in window) {
      const utt = new SpeechSynthesisUtterance(text.replace(/\n/g,' '));
      utt.lang = 'ar-AE';
      utt.rate = .9;
      speechSynthesis.speak(utt);
      await new Promise(r => { utt.onend = r; setTimeout(r, 4000); });
    }
  }
  if (phaserScene) phaserScene.playHappy();
}

// ── CHOICE HANDLER ──
function onChoice(idx, label) {
  document.querySelectorAll('.choice-btn').forEach((b, i) => b.classList.toggle('selected', i === idx));
  const screen = SCREENS[currentStep];
  recordSignal(screen.signalKey || 'choice', { idx, label, step: screen.id });
  setTimeout(() => { onNextClick(); }, 600);
}

// ── SPEAK BUTTON ──
async function onSpeakClick() {
  const btn = document.getElementById('btn-speak');
  btn.classList.add('loading');
  btn.innerHTML = '⏳ جارٍ الاستماع…';

  // Use Web Speech Recognition if available
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SpeechR();
    rec.lang = 'ar-SA';
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    rec.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      recordSignal('voice_response', { text: transcript, step: SCREENS[currentStep].id });
      showBubble(`سمعتك: "${transcript}" 💙\nرائع!`);
    };
    rec.onerror = () => {};
    rec.onend = () => {
      btn.classList.remove('loading');
      btn.innerHTML = '🎤 استمع إليّ';
      setTimeout(() => onNextClick(), 1500);
    };
    rec.start();
  } else {
    // Fallback — skip with tap
    recordSignal('voice_response', { text: '[tap_only]', step: SCREENS[currentStep].id });
    btn.classList.remove('loading');
    btn.innerHTML = '🎤 استمع إليّ';
    setTimeout(() => onNextClick(), 800);
  }
}

// ── NEXT ──
function onNextClick() {
  hideChoices();
  runScreen(currentStep + 1);
}

// ── SILENT SIGNAL RECORDING ──
function recordSignal(type, data) {
  const sig = {
    session_id: SESSION.id,
    child_id: SESSION.childId,
    signal_type: type,
    signal_data: data,
    step: currentStep,
    captured_at: new Date().toISOString()
  };
  SESSION.signals.push(sig);
  flashSignalFeed(type);
  // Async push — fire and forget
  pushSignal(sig);
}

async function pushSignal(sig) {
  try {
    await fetch(`${SURL}/rest/v1/atheer_signals`, {
      method: 'POST',
      headers: { ...SH, 'Prefer': 'return=minimal' },
      body: JSON.stringify(sig)
    });
  } catch(e) {}
}

function flashSignalFeed(type) {
  const feed = document.getElementById('silent-feed');
  const pill = document.createElement('div');
  pill.className = 'signal-pill';
  pill.textContent = '● ' + type;
  feed.appendChild(pill);
  setTimeout(() => pill.remove(), 3000);
}

// ── END SESSION ──
async function endSession() {
  if (phaserScene) phaserScene.playEnd();

  // Analyze signals for parent note
  const emotional = SESSION.signals.find(s => s.signal_type === 'emotional_state');
  let parentNote = '✅ الجلسة سليمة — لا إشارات تستدعي الانتباه.';
  if (emotional?.signal_data?.label?.includes('😔')) {
    parentNote = '⚠️ لاحظ أثير أن طفلك/ِ أشار إلى مشاعر تستحق الاهتمام — يُنصح بالتحدث معه/ا بلطف.';
  }
  document.getElementById('parentNote').textContent = parentNote;

  // Push full session summary
  try {
    await fetch(`${SURL}/rest/v1/atheer_signals`, {
      method: 'POST',
      headers: { ...SH, 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        session_id: SESSION.id,
        child_id: SESSION.childId,
        signal_type: 'session_complete',
        signal_data: {
          duration_sec: Math.round((Date.now() - SESSION.startTime) / 1000),
          total_signals: SESSION.signals.length,
          parent_note: parentNote
        },
        step: 5,
        captured_at: new Date().toISOString()
      })
    });
  } catch(e) {}

  document.getElementById('ath-end').style.display = 'flex';
}

function restartFlow() {
  document.getElementById('ath-end').style.display = 'none';
  SESSION.signals = [];
  SESSION.responses = [];
  SESSION.startTime = Date.now();
  runScreen(0);
}

// ── INIT ──
async function init() {
  // 1. Detect child_id from URL param (optional — passed by parent/teacher portal)
  const urlParams   = new URLSearchParams(window.location.search);
  const childIdParam = urlParams.get('child_id') || null;
  SESSION.childId   = childIdParam;

  // 2. Load VARK type + platform state in parallel
  const [varkType, platformState] = await Promise.all([
    getChildVARK(childIdParam),
    getCurrentPlatformState()
  ]);
  SESSION.vark  = varkType  || 'K';   // default kinesthetic (most universal for young children)
  SESSION.state = platformState || 'normal';

  // 3. Build personalized screens
  SCREENS = buildScreens(SESSION.vark, SESSION.state);

  // 4. Build step dots based on actual screen count
  buildStepDots();

  // 5. Start Phaser
  const game = new Phaser.Game(phaserConfig);

  // 6. Wait for scene to be ready
  await new Promise(r => setTimeout(r, 800));

  // 7. Hide loading
  document.getElementById('ath-loading').style.display = 'none';

  // 8. Start personalized flow
  runScreen(0);
}

// Handle resize
window.addEventListener('resize', () => {
  const g = document.getElementById('game-container');
  if (g) { g.style.width = window.innerWidth + 'px'; g.style.height = window.innerHeight + 'px'; }
});

window.addEventListener('load', init);
</script>
