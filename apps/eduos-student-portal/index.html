<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابتي — EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../platform-config.js"></script>
<script src="../platform-auth-guard.js"></script>
<script src="../platform-motd.js" defer></script>
<script src="../platform-curriculum-rules.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
:root{
  --bg:#0D1B2A;--card:rgba(255,255,255,0.05);--card2:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.1);--primary:#6C3DD6;--accent:#22D3EE;
  --gold:#F59E0B;--green:#10B981;--red:#EF4444;--orange:#F97316;
  --text:#F1F5F9;--muted:#94A3B8;--pink:#EC4899;
}
html,body{background:var(--bg);color:var(--text);min-height:100vh}

/* ══ HEADER ══ */
.header{
  background:linear-gradient(135deg,rgba(108,61,214,0.25),rgba(34,211,238,0.1));
  border-bottom:1px solid var(--border);padding:12px 20px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.header-brand{display:flex;align-items:center;gap:10px}
.brand-icon{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,#6C3DD6,#22D3EE);
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.brand-text{font-size:17px;font-weight:900}
.brand-sub{font-size:10px;color:var(--muted)}
.header-user{display:flex;align-items:center;gap:10px}
.stars-badge{
  display:flex;align-items:center;gap:5px;
  background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);
  border-radius:20px;padding:5px 12px;cursor:pointer;transition:.2s;
}
.stars-badge:hover{background:rgba(245,158,11,0.25)}
.stars-badge span{font-size:15px;font-weight:900;color:var(--gold)}
.stars-badge small{font-size:10px;color:var(--muted)}
.user-name{font-size:14px;font-weight:700}
.user-grade{font-size:11px;color:var(--accent)}
.logout-btn{
  width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:.2s;
}
.logout-btn:hover{background:#EF4444;border-color:#EF4444;color:#fff}

/* ══ LIVE BANNER ══ */
#live-lesson-banner{
  display:none;margin:14px 20px 0;
  background:linear-gradient(135deg,rgba(239,68,68,0.2),rgba(239,68,68,0.05));
  border:2px solid rgba(239,68,68,0.5);border-radius:16px;padding:14px 18px;
  position:relative;overflow:hidden;
}
#live-lesson-banner.active{display:flex;align-items:center;gap:14px}
.live-dot{
  width:12px;height:12px;border-radius:50%;background:#EF4444;flex-shrink:0;
  animation:pulse-dot 1.2s infinite;
}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.6)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}
.live-info{flex:1}
.live-label{font-size:11px;color:#EF4444;font-weight:700;letter-spacing:1px}
.live-subject{font-size:19px;font-weight:900}
.live-meta{font-size:12px;color:var(--muted)}
.exit-ticket-pill{
  display:none;padding:8px 14px;border-radius:20px;
  background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff;
  font-size:13px;font-weight:700;cursor:pointer;animation:pop-in .4s ease;
}
.exit-ticket-pill.visible{display:block}
@keyframes pop-in{0%{transform:scale(0.5);opacity:0}80%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.live-action-btn{
  padding:9px 18px;border-radius:12px;background:#EF4444;color:#fff;
  border:none;cursor:pointer;font-family:Tajawal;font-size:13px;font-weight:700;
  white-space:nowrap;transition:.2s;
}
.live-action-btn:hover{background:#DC2626;transform:scale(1.02)}

/* ══ TABS ══ */
.tabs{
  display:flex;gap:2px;padding:14px 20px 0;overflow-x:auto;
  scrollbar-width:none;border-bottom:1px solid var(--border);
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  padding:9px 14px;cursor:pointer;font-size:13px;font-weight:600;
  color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;
  transition:.2s;display:flex;align-items:center;gap:5px;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-badge{
  background:#EF4444;color:#fff;border-radius:99px;
  font-size:10px;padding:1px 6px;font-weight:900;
}

/* ══ MAIN ══ */
.main{padding:18px;max-width:900px;margin:0 auto}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ══ CARDS ══ */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:18px;margin-bottom:14px;
}
.card-title{
  font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.5px;
  margin-bottom:12px;display:flex;align-items:center;gap:6px;
}

/* ══ SPINNER ══ */
.spin-wrap{display:flex;justify-content:center;padding:40px}
.spinner{
  width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ EMPTY ══ */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state .emoji{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:15px}

/* ══ TODAY TAB ══ */
.today-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:580px){.today-grid{grid-template-columns:1fr}}
.period-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;
  display:flex;align-items:center;gap:10px;
}
.period-card.current{border-color:rgba(16,185,129,0.5);background:rgba(16,185,129,0.08)}
.period-card.next{border-color:rgba(34,211,238,0.3);background:rgba(34,211,238,0.06)}
.period-num{
  width:42px;height:42px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:17px;font-weight:900;flex-shrink:0;
}
.current .period-num{background:rgba(16,185,129,0.2);color:var(--green)}
.next .period-num{background:rgba(34,211,238,0.15);color:var(--accent)}
.period-info .p-lbl{font-size:10px;color:var(--muted)}
.period-info .p-sub{font-size:15px;font-weight:700}
.period-info .p-time{font-size:11px;color:var(--muted)}
.alert-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 13px;border-radius:12px;margin-bottom:8px;border:1px solid;
}
.alert-item.hw{background:rgba(34,211,238,0.07);border-color:rgba(34,211,238,0.2)}
.alert-item.exam{background:rgba(239,68,68,0.07);border-color:rgba(239,68,68,0.2)}
.alert-icon{font-size:20px;flex-shrink:0}
.alert-text .at-main{font-size:14px;font-weight:600}
.alert-text .at-sub{font-size:11px;color:var(--muted)}

/* Timeline */
.timeline{position:relative;padding-right:26px}
.timeline::before{content:'';position:absolute;right:8px;top:0;bottom:0;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:12px}
.tl-dot{
  position:absolute;right:-26px;width:16px;height:16px;border-radius:50%;
  border:2px solid var(--border);background:var(--bg);
  display:flex;align-items:center;justify-content:center;font-size:7px;top:4px;
}
.tl-item.done .tl-dot{background:var(--green);border-color:var(--green)}
.tl-item.current .tl-dot{background:var(--primary);border-color:var(--primary);animation:pulse-dot 1.2s infinite}
.tl-item.brk .tl-dot{background:var(--gold);border-color:var(--gold)}
.tl-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 13px;
  display:flex;align-items:center;justify-content:space-between;
}
.tl-item.current .tl-card{border-color:rgba(108,61,214,0.5);background:rgba(108,61,214,0.1)}
.tl-item.brk .tl-card{border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.07)}
.tl-item.done .tl-card{opacity:.45}
.tl-sub{font-size:14px;font-weight:700}
.tl-time{font-size:11px;color:var(--muted)}
.tl-room{font-size:10px;color:var(--accent)}
.curr-badge{font-size:10px;background:#6C3DD6;color:#fff;border-radius:99px;padding:2px 8px;font-weight:700}

/* ══ SCHEDULE TAB ══ */
.week-days{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;scrollbar-width:none}
.week-days::-webkit-scrollbar{display:none}
.day-btn{
  padding:7px 14px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;font-family:Tajawal;
  font-size:13px;font-weight:600;transition:.2s;white-space:nowrap;
}
.day-btn.active,.day-btn:hover{background:var(--primary);border-color:var(--primary);color:#fff}
.day-btn.today{border-color:var(--accent)}
.sched-list{display:flex;flex-direction:column;gap:8px}
.sched-row{
  display:grid;grid-template-columns:32px 54px 1fr auto;gap:10px;align-items:center;
  background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px;
}
.sched-row.current-period{border-color:rgba(108,61,214,0.5);background:rgba(108,61,214,0.08)}
.sched-period{font-size:13px;font-weight:900;color:var(--primary)}
.sched-time{font-size:10px;color:var(--muted);line-height:1.4}
.sched-subject{font-size:14px;font-weight:700}
.sched-room{font-size:11px;color:var(--accent)}
.sched-break{
  text-align:center;font-size:12px;color:var(--gold);padding:8px;
  border:1px dashed rgba(245,158,11,0.3);border-radius:10px;background:rgba(245,158,11,0.05);
}

/* ══ HOMEWORK TAB ══ */
.hw-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.hw-filter-btn{
  padding:6px 14px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;font-family:Tajawal;
  font-size:12px;font-weight:600;transition:.2s;
}
.hw-filter-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.hw-card{
  display:flex;gap:12px;background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:14px;margin-bottom:10px;transition:.2s;
}
.hw-card.overdue{border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.06)}
.hw-card.due-today{border-color:rgba(245,158,11,0.4);background:rgba(245,158,11,0.06)}
.hw-icon{font-size:28px;flex-shrink:0}
.hw-subject{font-size:15px;font-weight:700}
.hw-desc{font-size:13px;color:var(--muted);margin:4px 0}
.hw-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hw-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px}
.hw-badge.overdue{background:rgba(239,68,68,0.2);color:#EF4444}
.hw-badge.today{background:rgba(245,158,11,0.2);color:var(--gold)}
.hw-badge.upcoming{background:rgba(34,211,238,0.15);color:var(--accent)}
.hw-date{font-size:11px;color:var(--muted)}

/* ══ PERFORMANCE TAB ══ */
.perf-summary{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;
}
.perf-stat{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:16px;text-align:center;
}
.perf-stat .val{font-size:28px;font-weight:900;color:var(--accent)}
.perf-stat .lbl{font-size:11px;color:var(--muted);margin-top:4px}
.subj-grade-row{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;margin-bottom:8px;
}
.subj-grade-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.subj-name{font-size:14px;font-weight:600}
.subj-score{font-size:16px;font-weight:900}
.subj-score.excellent{color:var(--green)}
.subj-score.good{color:var(--accent)}
.subj-score.pass{color:var(--gold)}
.subj-score.fail{color:var(--red)}
.grade-bar-wrap{height:6px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden}
.grade-bar{height:100%;border-radius:99px;transition:width 1s ease}
.grade-bar.excellent{background:var(--green)}
.grade-bar.good{background:var(--accent)}
.grade-bar.pass{background:var(--gold)}
.grade-bar.fail{background:var(--red)}

/* G9-G12 GPA */
.gpa-ring-wrap{text-align:center;margin-bottom:16px}
.gpa-value{font-size:48px;font-weight:900;color:var(--accent)}
.gpa-label{font-size:13px;color:var(--muted)}
.rank-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);
  border-radius:20px;padding:8px 16px;font-size:14px;font-weight:700;color:var(--gold);
  margin-bottom:16px;
}
/* Subjects grid */
.subjects-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:580px){.subjects-grid{grid-template-columns:1fr}}
.subj-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;
}
.subj-card .s-icon{font-size:24px;margin-bottom:6px}
.subj-card .s-name{font-size:13px;font-weight:700;margin-bottom:8px}
.subj-card .s-score-row{display:flex;justify-content:space-between;align-items:center}
.subj-card .s-score{font-size:20px;font-weight:900}

/* G11-G12 uni section */
.uni-path{
  background:linear-gradient(135deg,rgba(108,61,214,0.15),rgba(34,211,238,0.08));
  border:1px solid rgba(108,61,214,0.3);border-radius:16px;padding:20px;margin-bottom:14px;
}
.uni-title{font-size:16px;font-weight:800;margin-bottom:12px}
.uni-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.uni-stat{text-align:center}
.uni-stat .u-val{font-size:22px;font-weight:900;color:var(--primary)}
.uni-stat .u-lbl{font-size:11px;color:var(--muted)}

/* ══ STARS TAB ══ */
.stars-hero{
  text-align:center;
  background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(245,158,11,0.05));
  border:1px solid rgba(245,158,11,0.3);border-radius:20px;
  padding:28px;margin-bottom:16px;
}
.stars-num{font-size:52px;font-weight:900;color:var(--gold)}
.stars-lbl{font-size:14px;color:var(--muted);margin-top:4px}
.stars-expire{font-size:11px;color:rgba(148,163,184,0.7);margin-top:6px}
.goal-card{
  background:var(--card);border:1px solid rgba(108,61,214,0.3);
  border-radius:14px;padding:16px;margin-bottom:12px;
}
.goal-name{font-size:16px;font-weight:700;margin-bottom:10px}
.goal-progress-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.goal-bar-wrap{height:8px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden}
.goal-bar{height:100%;background:linear-gradient(90deg,#6C3DD6,#22D3EE);border-radius:99px;transition:width 1s}
.store-link-btn{
  display:block;text-align:center;padding:14px;border-radius:14px;
  background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff;
  font-size:15px;font-weight:700;text-decoration:none;margin-top:12px;
  transition:.2s;
}
.store-link-btn:hover{opacity:.9;transform:scale(1.01)}
.stars-history-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.stars-history-row:last-child{border-bottom:none}
.sh-msg{font-size:13px}
.sh-stars{color:var(--gold);font-weight:700}

/* ══ GOALS TAB (G9+) ══ */
.goal-item{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:16px;margin-bottom:12px;
}
.goal-item-title{font-size:15px;font-weight:700;margin-bottom:8px}
.goal-item-date{font-size:11px;color:var(--muted)}
.goal-item-notes{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.6}

/* ══ MODAL EXIT TICKET ══ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);
  z-index:999;display:none;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.open{display:flex}
.modal{
  background:#1A2B3C;border:1px solid var(--border);border-radius:20px;
  padding:24px;max-width:480px;width:100%;animation:modal-in .3s ease;
}
@keyframes modal-in{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:18px;font-weight:800;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:14px}
.modal-question{font-size:16px;font-weight:700;line-height:1.6;margin-bottom:14px}
.modal-options{display:flex;flex-direction:column;gap:8px}
.modal-opt{
  padding:12px 16px;border-radius:12px;border:1px solid var(--border);
  background:var(--card);color:var(--text);cursor:pointer;font-family:Tajawal;
  font-size:14px;text-align:start;transition:.2s;
}
.modal-opt:hover{border-color:var(--primary);background:rgba(108,61,214,0.1)}
.modal-opt.selected{border-color:var(--primary);background:rgba(108,61,214,0.2);color:#fff}
.modal-textarea{
  width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);
  background:rgba(255,255,255,0.05);color:var(--text);font-family:Tajawal;
  font-size:14px;resize:vertical;margin-top:8px;
}
.modal-submit{
  margin-top:14px;width:100%;padding:13px;border-radius:12px;
  background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff;
  border:none;cursor:pointer;font-family:Tajawal;font-size:15px;font-weight:700;
  transition:.2s;
}
.modal-submit:hover{opacity:.9;transform:scale(1.01)}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#1A2B3C;border:1px solid var(--border);border-radius:16px;
  padding:12px 20px;font-size:14px;font-weight:600;z-index:9999;
  display:none;animation:pop-in .3s ease;max-width:90vw;text-align:center;
}

/* ══════════ AGE: KG + G1-G3 ══════════ */
body.age-young .tab-panel#panel-today .card-title{font-size:14px}
body.age-young .tl-sub{font-size:17px}
body.age-young .tl-card{padding:14px 16px}
body.age-young .period-card{padding:18px}
body.age-young .period-num{width:52px;height:52px;font-size:22px}
body.age-young .period-info .p-sub{font-size:18px}
body.age-young .stars-num{font-size:64px}

/* ══════════ AGE: G11-G12 compact ══════════ */
body.age-senior .tab{font-size:12px;padding:8px 11px}
body.age-senior .stars-hero{padding:18px}
body.age-senior .stars-num{font-size:40px}

/* ══ REINF TOAST ══ */
#reinf-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,rgba(108,61,214,0.9),rgba(34,211,238,0.9));
  border-radius:16px;padding:12px 20px;font-size:14px;font-weight:700;
  z-index:9999;display:none;animation:pop-in .3s ease;max-width:90vw;text-align:center;
}
</style>
<link rel="stylesheet" href="../platform-theme-light.css">

<body>

<!-- HEADER -->
<header class="header">
  <div class="header-brand">
    <div class="brand-icon">🎓</div>
    <div>
      <div class="brand-text">بوابتي</div>
      <div class="brand-sub">EduOS</div>
    </div>
  </div>
  <div class="header-user">
    <div class="stars-badge" onclick="switchTab('stars')">
      <span id="hdr-stars">…</span>
      <small>⭐</small>
    </div>
    <div>
      <div class="user-name" id="hdr-name">…</div>
      <div class="user-grade" id="hdr-grade"></div>
    </div>
    <button class="logout-btn" onclick="doLogout()" title="خروج">⏻</button>
  </div>
</header>

<!-- LIVE LESSON BANNER -->

  <div class="live-dot"></div>
  <div class="live-info">
    <div class="live-label">🔴 الحصة الآن — مباشر</div>

    <div class="live-meta" id="live-meta"></div>

<div class="main" id="main-content"></div>

  <div class="modal">

    <button class="modal-submit" onclick="submitExitTicket()">إرسال ✓</button>
  </div>
</div>

<div id="reinf-toast"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════
const PERIOD_TIMES = [
  {p:1,  start:'07:00', end:'07:45'},
  {p:2,  start:'07:45', end:'08:30'},
  {p:3,  start:'08:30', end:'09:15'},
  {p:'b1', start:'09:15', end:'09:30', label:'استراحة'},
  {p:4,  start:'09:30', end:'10:15'},
  {p:5,  start:'10:15', end:'11:00'},
  {p:'b2', start:'11:00', end:'11:15', label:'استراحة'},
  {p:6,  start:'11:15', end:'12:00'},
  {p:7,  start:'12:00', end:'12:45'},
  {p:8,  start:'12:45', end:'13:30'},
];

const DAYS_AR = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس'];
const DAYS_DB = ['Sunday','Monday','Tuesday','Wednesday','Thursday'];

const SUBJ_ICONS = {
  'رياضيات':'🔢','math':'🔢','علوم':'🔬','science':'🔬',
  'عربي':'📖','لغة عربية':'📖','arabic':'📖',
  'إنجليزي':'🌐','لغة إنجليزية':'🌐','english':'🌐',
  'دراسات':'🌍','social':'🌍','إسلامية':'☪️','تربية إسلامية':'☪️','islamic':'☪️',
  'رياضة':'⚽','تربية بدنية':'⚽','pe':'⚽','بدنية':'⚽',
  'فنون':'🎨','art':'🎨','موسيقى':'🎵','حاسوب':'💻','computer':'💻',
  'تكنولوجيا':'💻','وطنية':'🇦🇪','default':'📘'
};

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let SB, USER, STUDENT;
let ALL_SCHED = [];
let ALL_HW = [];
let hwFilter = 'all';
let activeSession = null;
let activeTicket = null;
let rtChannel = null;
let AGE_GROUP = 'middle'; // kg | lower | middle | upper7 | upper9 | senior

// ═══════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  try {
    const raw = sessionStorage.getItem('edoos_user');
    if (!raw) { window.location.replace('/apps/eduos-login/'); return; }
    USER = JSON.parse(raw);
    SB = supabase.createClient(window.EduOS.SB_URL, window.EduOS.SB_KEY);

    await loadStudentData();
    AGE_GROUP = getAgeGroup(STUDENT.grade);
    document.body.classList.add('age-' + AGE_GROUP);

    buildTabs();
    buildPanels();

    await Promise.all([loadToday(), loadHomework()]);
    loadStars();
    loadPerformance();
    subscribeRealtime();
  } catch(e) {
    console.error('Boot error:', e);
  }
});

// ═══════════════════════════════════════════════
//  STUDENT DATA
// ═══════════════════════════════════════════════
async function loadStudentData() {
  // Fields from session
  if (USER.grade !== undefined && USER.class_name) {
    STUDENT = USER;
  } else {
    const sid = USER.username || USER.student_id || USER.id;
    const { data } = await SB.from('students').select('*').eq('id', sid).single();
    STUDENT = data || USER;
  }
  document.getElementById('hdr-name').textContent = firstName(STUDENT.name);
  document.getElementById('hdr-grade').textContent = gradeLabel(STUDENT.grade) + (STUDENT.class_name ? ' — ' + STUDENT.class_name : '');
}

function firstName(n) { return n ? n.trim().split(' ')[0] : '—'; }

function gradeLabel(g) {
  const map = {'-2':'KG1','-1':'KG1','0':'KG2',
    '1':'الصف الأول','2':'الصف الثاني','3':'الصف الثالث',
    '4':'الصف الرابع','5':'الصف الخامس','6':'الصف السادس',
    '7':'الصف السابع','8':'الصف الثامن',
    '9':'الصف التاسع','10':'الصف العاشر',
    '11':'الصف الحادي عشر','12':'الصف الثاني عشر'};
  return map[String(g)] || `الصف ${g}`;
}

function getAgeGroup(g) {
  const n = parseInt(g);
  if (n <= -1) return 'young';  // KG1
  if (n === 0) return 'young';  // KG2
  if (n <= 3)  return 'young';  // G1-G3
  if (n <= 6)  return 'middle'; // G4-G6
  if (n <= 8)  return 'upper7'; // G7-G8
  if (n <= 10) return 'upper9'; // G9-G10
  return 'senior';              // G11-G12
}

// ═══════════════════════════════════════════════
//  TABS & PANELS — built per age group
// ═══════════════════════════════════════════════
const TAB_DEFS = {
  young:  [
    {id:'today',   icon:'🏠', ar:'اليوم'},
    {id:'schedule',icon:'📅', ar:'جدولي'},
    {id:'stars',   icon:'⭐', ar:'نجومي'},
  ],
  middle: [
    {id:'today',   icon:'🏠', ar:'اليوم'},
    {id:'schedule',icon:'📅', ar:'جدولي'},
    {id:'homework',icon:'📚', ar:'واجباتي', badge:'badge-hw'},
    {id:'performance',icon:'📊', ar:'أدائي'},
    {id:'stars',   icon:'⭐', ar:'نجومي'},
  ],
  upper7: [
    {id:'today',   icon:'🏠', ar:'اليوم'},
    {id:'schedule',icon:'📅', ar:'جدولي'},
    {id:'homework',icon:'📚', ar:'واجباتي', badge:'badge-hw'},
    {id:'performance',icon:'📊', ar:'أدائي'},
    {id:'stars',   icon:'🏆', ar:'إنجازاتي'},
  ],
  upper9: [
    {id:'today',   icon:'🏠', ar:'اليوم'},
    {id:'schedule',icon:'📅', ar:'جدولي'},
    {id:'homework',icon:'📚', ar:'واجباتي', badge:'badge-hw'},
    {id:'performance',icon:'📊', ar:'أدائي'},
    {id:'goals',   icon:'🎯', ar:'أهدافي'},
  ],
  senior: [
    {id:'today',   icon:'🏠', ar:'اليوم'},
    {id:'schedule',icon:'📅', ar:'جدولي'},
    {id:'homework',icon:'📚', ar:'واجباتي', badge:'badge-hw'},
    {id:'performance',icon:'📊', ar:'أدائي'},
    {id:'goals',   icon:'🎯', ar:'أهدافي'},
    {id:'university',icon:'🎓', ar:'مساري'},
  ],
};

function buildTabs() {
  const tabs = TAB_DEFS[AGE_GROUP] || TAB_DEFS.middle;
  document.getElementById('main-tabs').innerHTML = tabs.map((t, i) => `
    <div class="tab ${i===0?'active':''}" onclick="switchTab('${t.id}')" data-tab="${t.id}">
      <span>${t.icon}</span><span>${t.ar}</span>
      ${t.badge ? `<span class="tab-badge" id="${t.badge}" style="display:none">0</span>` : ''}
    </div>`).join('');
}

function buildPanels() {
  const tabs = TAB_DEFS[AGE_GROUP] || TAB_DEFS.middle;
  const ids = tabs.map(t => t.id);
  let html = '';

  // TODAY — always present
  html += `<div class="tab-panel active" id="panel-today">
    <div class="spin-wrap" id="today-loader"><div class="spinner"></div></div>
    <div id="today-content" style="display:none">
      <div class="today-grid" id="today-periods-grid"></div>
      <div id="today-alerts"></div>
      <div class="card">
        <div class="card-title">📋 جدول اليوم</div>
        <div class="timeline" id="today-timeline"></div>
      </div>
      <div id="reinf-card-wrap"></div>
    </div>
  </div>`;

  // SCHEDULE — always present
  html += `<div class="tab-panel" id="panel-schedule">
    <div class="week-days" id="week-day-btns"></div>
    <div id="schedule-content"><div class="spin-wrap"><div class="spinner"></div></div></div>
  </div>`;

  // HOMEWORK — not for young
  if (ids.includes('homework')) {
    html += `<div class="tab-panel" id="panel-homework">
      <div class="hw-filter">
        <button class="hw-filter-btn active" onclick="filterHW('all',this)">الكل</button>
        <button class="hw-filter-btn" onclick="filterHW('overdue',this)">⚠️ متأخر</button>
        <button class="hw-filter-btn" onclick="filterHW('today',this)">📌 اليوم</button>
        <button class="hw-filter-btn" onclick="filterHW('upcoming',this)">⏳ قادم</button>
      </div>
      <div id="hw-list"><div class="spin-wrap"><div class="spinner"></div></div></div>
    </div>`;
  }

  // PERFORMANCE
  if (ids.includes('performance')) {
    html += `<div class="tab-panel" id="panel-performance">
      <div id="perf-content"><div class="spin-wrap"><div class="spinner"></div></div></div>
    </div>`;
  }

  // STARS (young + middle)
  if (ids.includes('stars')) {
    html += `<div class="tab-panel" id="panel-stars">
      <div id="stars-content"><div class="spin-wrap"><div class="spinner"></div></div></div>
    </div>`;
  }

  // GOALS (G9+)
  if (ids.includes('goals')) {
    html += `<div class="tab-panel" id="panel-goals">
      <div id="goals-content"><div class="spin-wrap"><div class="spinner"></div></div></div>
    </div>`;
  }

  // UNIVERSITY (G11-G12)
  if (ids.includes('university')) {
    html += `<div class="tab-panel" id="panel-university">
      <div id="uni-content"><div class="spin-wrap"><div class="spinner"></div></div></div>
    </div>`;
  }

  document.getElementById('main-content').innerHTML = html;
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const tabEl = document.querySelector(`[data-tab="${name}"]`);
  const panEl = document.getElementById(`panel-${name}`);
  if (tabEl) tabEl.classList.add('active');
  if (panEl) panEl.classList.add('active');

  // Lazy-load tabs
  if (name === 'schedule') buildWeekDayButtons();
  if (name === 'goals' && !document.getElementById('goals-content')?.dataset.loaded) loadGoals();
  if (name === 'university' && !document.getElementById('uni-content')?.dataset.loaded) loadUniversity();
}

// ═══════════════════════════════════════════════
//  TODAY TAB
// ═══════════════════════════════════════════════
async function loadToday() {
  const dayIdx = todayDayIdx();
  const cn = STUDENT.class_name;

  if (dayIdx < 0) {
    document.getElementById('today-loader').style.display = 'none';
    document.getElementById('today-content').style.display = 'block';
    document.getElementById('today-timeline').innerHTML =
      `<div class="empty-state"><div class="emoji">🌙</div><p>اليوم عطلة — استرح واستعد</p></div>`;
    return;
  }

  const dayName = DAYS_DB[dayIdx];

  // ① Schedule for today — correct columns: day_of_week + period_number
  const { data: slots } = await SB
    .from('timetable_slots')
    .select('*')
    .eq('class_name', cn)
    .eq('day_of_week', dayName)
    .order('period_number');
  ALL_SCHED = slots || [];

  // ② Active lesson session
  const { data: sessions } = await SB
    .from('lesson_sessions')
    .select('*')
    .eq('class_name', cn)
    .eq('status', 'active')
    .limit(1);
  if (sessions?.length) showLiveBanner(sessions[0]);

  // ③ Open exit ticket
  const { data: tickets } = await SB
    .from('exit_tickets')
    .select('*')
    .eq('class_name', cn)
    .eq('is_open', true)
    .limit(1);
  if (tickets?.length) {
    activeTicket = tickets[0];
    document.getElementById('exit-ticket-pill').classList.add('visible');
  }

  // ④ Homework (upcoming 7 days) — for alerts
  const today = todayStr();
  const { data: hwAlert } = await SB
    .from('homework')
    .select('*')
    .eq('class_name', cn)
    .gte('due_date', new Date(Date.now() - 3*86400000).toISOString().split('T')[0])
    .lte('due_date', new Date(Date.now() + 7*86400000).toISOString().split('T')[0])
    .order('due_date');

  // ⑤ Reinforcement (public) for this student
  const { data: reinf } = await SB
    .from('reinforcements')
    .select('*')
    .eq('student_id', STUDENT.id)
    .eq('is_public', true)
    .order('created_at', { ascending: false })
    .limit(1);

  // Build UI
  buildTodayPeriods(ALL_SCHED);
  buildTodayAlerts(hwAlert || []);
  buildTodayTimeline(ALL_SCHED);
  if (reinf?.length) showReinfCard(reinf[0]);

  // Badge
  const pending = (hwAlert || []).filter(h => h.due_date <= today).length;
  if (pending > 0) setBadge('badge-today', pending);

  document.getElementById('today-loader').style.display = 'none';
  document.getElementById('today-content').style.display = 'block';
}

function buildTodayPeriods(slots) {
  const cp = currentPeriod();
  const el = document.getElementById('today-periods-grid');
  if (!cp || !slots.length) { el.innerHTML = ''; return; }

  const curr = slots.find(s => s.period_number === cp);
  const nxt  = slots.find(s => s.period_number === cp + 1);
  let html = '';

  if (curr) html += periodCard(cp, curr, 'current', 'الحصة الحالية');
  if (nxt)  html += periodCard(cp+1, nxt, 'next', 'الحصة التالية');

  el.innerHTML = html;
}

function periodCard(num, slot, cls, lbl) {
  return `<div class="period-card ${cls}">
    <div class="period-num">${num}</div>
    <div class="period-info">
      <div class="p-lbl">${lbl}</div>
      <div class="p-sub">${getIcon(slot.subject)} ${slot.subject || '—'}</div>
      <div class="p-time">${getPTime(num)} · ${slot.room || ''}</div>
    </div>
  </div>`;
}

function buildTodayAlerts(hw) {
  const today = todayStr();
  let html = '';

  hw.filter(h => h.due_date <= today).forEach(h => {
    html += `<div class="alert-item hw">
      <div class="alert-icon">📚</div>
      <div class="alert-text">
        <div class="at-main">واجب ${h.subject || ''}</div>
        <div class="at-sub">${h.description || ''} · يُسلَّم ${h.due_date === today ? 'اليوم' : formatDate(h.due_date)}</div>
      </div>
    </div>`;
  });

  document.getElementById('today-alerts').innerHTML = html;
}

function buildTodayTimeline(slots) {
  const cp = currentPeriod();
  const now = new Date();
  const hhmm = now.getHours()*60 + now.getMinutes();
  let html = '';

  PERIOD_TIMES.forEach(pt => {
    if (typeof pt.p !== 'number') {
      html += `<div class="tl-item brk">
        <div class="tl-dot">☕</div>
        <div class="tl-card">
          <div class="tl-sub" style="color:var(--gold)">${pt.label}</div>
          <div class="tl-time">${pt.start}–${pt.end}</div>
        </div>
      </div>`;
      return;
    }
    const slot = slots.find(s => s.period_number === pt.p);
    if (!slot) return;

    const [eh,em] = pt.end.split(':').map(Number);
    const done = hhmm >= eh*60+em;
    const isCurr = pt.p === cp;

    html += `<div class="tl-item ${done?'done':''} ${isCurr?'current':''}">
      <div class="tl-dot">${isCurr?'●':''}</div>
      <div class="tl-card">
        <div>
          <div class="tl-sub">${getIcon(slot.subject)} ${slot.subject || '—'}</div>
          <div class="tl-room">${slot.room || ''}</div>
        </div>
        <div style="text-align:end">
          <div class="tl-time">${pt.start}–${pt.end}</div>
          ${isCurr ? '<div class="curr-badge">الآن</div>' : ''}
        </div>
      </div>
    </div>`;
  });

  document.getElementById('today-timeline').innerHTML = html ||
    '<div class="empty-state"><div class="emoji">📭</div><p>لا حصص مسجّلة اليوم</p></div>';
}

// ═══════════════════════════════════════════════
//  SCHEDULE TAB
// ═══════════════════════════════════════════════
function buildWeekDayButtons() {
  const today = todayDayIdx();
  const wrap = document.getElementById('week-day-btns');
  if (wrap.dataset.built) return;
  wrap.dataset.built = '1';

  wrap.innerHTML = DAYS_AR.map((d, i) =>
    `<button class="day-btn ${i===today?'today active':''}" onclick="loadDaySched(${i},this)">${d}</button>`
  ).join('');

  loadDaySched(Math.max(0, today), wrap.querySelector('.active'));
}

async function loadDaySched(idx, btn) {
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  document.getElementById('schedule-content').innerHTML =
    '<div class="spin-wrap"><div class="spinner"></div></div>';

  // correct column: day_of_week (text) + period_number (int)
  const { data: slots } = await SB
    .from('timetable_slots')
    .select('*')
    .eq('class_name', STUDENT.class_name)
    .eq('day_of_week', DAYS_DB[idx])
    .order('period_number');

  const cp = idx === todayDayIdx() ? currentPeriod() : null;

  if (!slots || !slots.length) {
    document.getElementById('schedule-content').innerHTML =
      '<div class="empty-state"><div class="emoji">📭</div><p>لا حصص هذا اليوم</p></div>';
    return;
  }

  let html = '<div class="sched-list">';
  PERIOD_TIMES.forEach(pt => {
    if (typeof pt.p !== 'number') {
      html += `<div class="sched-break">─── ${pt.label} &nbsp; ${pt.start}–${pt.end} ───</div>`;
      return;
    }
    const s = slots.find(x => x.period_number === pt.p);
    if (!s) return;
    const curr = pt.p === cp;
    html += `<div class="sched-row ${curr?'current-period':''}">
      <div class="sched-period">${pt.p}</div>
      <div class="sched-time">${pt.start}<br>${pt.end}</div>
      <div class="sched-subject">${getIcon(s.subject)} ${s.subject||'—'}</div>
      <div class="sched-room">${s.room||''}</div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('schedule-content').innerHTML = html;
}

// ═══════════════════════════════════════════════
//  HOMEWORK TAB
// ═══════════════════════════════════════════════
async function loadHomework() {
  const cn = STUDENT.class_name;
  const from = new Date(Date.now()-7*86400000).toISOString().split('T')[0];
  const to   = new Date(Date.now()+21*86400000).toISOString().split('T')[0];

  const { data: hw } = await SB
    .from('homework')
    .select('*')
    .eq('class_name', cn)
    .gte('due_date', from)
    .lte('due_date', to)
    .order('due_date');

  ALL_HW = hw || [];
  renderHW();

  const pending = ALL_HW.filter(h => h.due_date >= todayStr()).length;
  if (pending > 0) setBadge('badge-hw', pending);
}

function filterHW(type, btn) {
  hwFilter = type;
  document.querySelectorAll('.hw-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHW();
}

function renderHW() {
  const el = document.getElementById('hw-list');
  if (!el) return;
  const today = todayStr();
  let items = ALL_HW;

  if (hwFilter === 'overdue')  items = items.filter(h => h.due_date < today);
  else if (hwFilter === 'today')    items = items.filter(h => h.due_date === today);
  else if (hwFilter === 'upcoming') items = items.filter(h => h.due_date > today);

  if (!items.length) {
    el.innerHTML = '<div class="empty-state"><div class="emoji">✅</div><p>لا واجبات في هذه الفئة</p></div>';
    return;
  }

  el.innerHTML = items.map(h => {
    const dL = Math.ceil((new Date(h.due_date) - new Date()) / 86400000);
    const badgeCls = dL < 0 ? 'overdue' : dL === 0 ? 'today' : 'upcoming';
    const badgeTxt = dL < 0 ? 'متأخر ⚠️' : dL === 0 ? 'اليوم 📌' : `بعد ${dL} أيام`;
    return `<div class="hw-card ${dL<0?'overdue':''} ${dL===0?'due-today':''}">
      <div class="hw-icon">${getIcon(h.subject)}</div>
      <div>
        <div class="hw-subject">${h.subject||'واجب'}</div>
        <div class="hw-desc">${h.description||''}</div>
        <div class="hw-meta">
          <span class="hw-badge ${badgeCls}">${badgeTxt}</span>
          <span class="hw-date">📅 ${formatDate(h.due_date)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
//  PERFORMANCE TAB
// ═══════════════════════════════════════════════
async function loadPerformance() {
  const el = document.getElementById('perf-content');
  if (!el) return;

  // Parse class_name e.g. "4B" → grade=4, section=B
  const cn = STUDENT.class_name || '';
  const m  = cn.match(/^(\d+)([A-Z])$/);
  const gradeStr  = m ? m[1] : String(STUDENT.grade||'');
  const section   = m ? m[2] : '';
  const nameFirst = firstName(STUDENT.name);

  // student_grades table — same query as before
  let rows = null;
  if (gradeStr && nameFirst) {
    const { data } = await SB
      .from('student_grades')
      .select('*')
      .eq('grade', gradeStr)
      .eq('section', section)
      .ilike('student_name', `%${nameFirst}%`)
      .limit(10);
    rows = data;
  }

  // student_semester_summary — more reliable if exists
  let summary = null;
  const { data: sumData } = await SB
    .from('student_semester_summary')
    .select('*')
    .eq('student_id', STUDENT.id)
    .order('semester', { ascending: false })
    .limit(1);
  if (sumData?.length) summary = sumData[0];

  // Choose rendering based on age group
  if (AGE_GROUP === 'upper9' || AGE_GROUP === 'senior') {
    renderPerfAdvanced(rows, summary);
  } else {
    renderPerfBasic(rows, summary);
  }
}

function renderPerfBasic(rows, summary) {
  const el = document.getElementById('perf-content');
  if ((!rows || !rows.length) && !summary) {
    el.innerHTML = noDataPerf(); return;
  }

  const src = summary || rows[0] || {};
  const formative = parseFloat(src.formative || src.formative_total) || 0;
  const summative  = parseFloat(src.summative || src.summative_total) || 0;
  const total      = parseFloat(src.term1_total || src.total) || Math.round(formative + summative);
  const _stPS      = (typeof getPassScore === 'function') ? getPassScore() : 50;
  const cls        = total >= 90 ? 'excellent' : total >= 75 ? 'good' : total >= _stPS ? 'pass' : 'fail';

  el.innerHTML = `
    <div class="perf-summary">
      <div class="perf-stat"><div class="val">${total||'—'}</div><div class="lbl">المجموع الكلي</div></div>
      <div class="perf-stat"><div class="val">${formative||'—'}</div><div class="lbl">التكويني</div></div>
      <div class="perf-stat"><div class="val">${summative||'—'}</div><div class="lbl">الختامي</div></div>
    </div>
    ${formative ? `<div class="subj-grade-row">
      <div class="subj-grade-header">
        <div class="subj-name">📋 درجة التكوين</div>
        <div class="subj-score ${formative>=18?'excellent':formative>=14?'good':'pass'}">${formative}/20</div>
      </div>
      <div class="grade-bar-wrap"><div class="grade-bar ${formative>=18?'excellent':formative>=14?'good':'pass'}" style="width:${(formative/20)*100}%"></div></div>
    </div>` : ''}
    ${summative ? `<div class="subj-grade-row">
      <div class="subj-grade-header">
        <div class="subj-name">📝 درجة الختامي</div>
        <div class="subj-score ${summative>=72?'excellent':summative>=60?'good':'pass'}">${summative}/80</div>
      </div>
      <div class="grade-bar-wrap"><div class="grade-bar ${summative>=72?'excellent':summative>=60?'good':'pass'}" style="width:${(summative/80)*100}%"></div></div>
    </div>` : ''}
    ${total ? `<div class="subj-grade-row" style="border-color:rgba(108,61,214,0.4)">
      <div class="subj-grade-header">
        <div class="subj-name">🏆 المجموع</div>
        <div class="subj-score ${cls}">${total}/100</div>
      </div>
      <div class="grade-bar-wrap"><div class="grade-bar ${cls}" style="width:${total}%"></div></div>
    </div>` : ''}
    ${rows && rows.length > 1 ? renderSubjectsGrid(rows) : ''}
    <div class="card" style="margin-top:12px;text-align:center;font-size:13px;color:var(--muted)">
      الفصل الدراسي الثاني 2025–2026
    </div>`;
}

function renderPerfAdvanced(rows, summary) {
  const el = document.getElementById('perf-content');
  if ((!rows || !rows.length) && !summary) {
    el.innerHTML = noDataPerf(); return;
  }

  const src = summary || rows?.[0] || {};
  const total = parseFloat(src.term1_total || src.total) || 0;
  const gpa   = total ? (total / 100 * 4).toFixed(2) : '—';
  const rank  = src.class_rank ? `الترتيب ${src.class_rank}` : '';

  let html = `<div class="card">
    <div class="gpa-ring-wrap">
      <div class="gpa-value">${gpa}</div>
      <div class="gpa-label">المعدل التراكمي GPA (من 4.0)</div>
    </div>
    ${rank ? `<div style="text-align:center"><div class="rank-badge">🏅 ${rank} في الفصل</div></div>` : ''}
  </div>`;

  if (rows && rows.length > 0) {
    html += `<div class="card"><div class="card-title">📊 المواد التفصيلية</div>`;
    html += `<div class="subjects-grid">${rows.map(r => {
      const t = parseFloat(r.term1_total || r.total) || 0;
      const _sp3 = (typeof getPassScore==='function')?getPassScore():50;
      const c = t >= 90 ? 'excellent' : t >= 75 ? 'good' : t >= _sp3 ? 'pass' : 'fail';
      return `<div class="subj-card">
        <div class="s-icon">${getIcon(r.subject || r.subject_name)}</div>
        <div class="s-name">${r.subject || r.subject_name || 'مادة'}</div>
        <div class="s-score-row">
          <div class="grade-bar-wrap" style="flex:1;margin-left:10px">
            <div class="grade-bar ${c}" style="width:${t}%"></div>
          </div>
          <div class="s-score ${c}">${t}</div>
        </div>
      </div>`;
    }).join('')}</div></div>`;
  }

  if (AGE_GROUP === 'senior') {
    html += `<div class="card" style="margin-top:4px;text-align:center;font-size:13px;color:var(--muted)">
      لعرض التقرير الأكاديمي الكامل — تواصل مع الإرشاد الأكاديمي
    </div>`;
  }

  el.innerHTML = html;
}

function renderSubjectsGrid(rows) {
  if (!rows || rows.length < 2) return '';
  return `<div class="card" style="margin-top:12px">
    <div class="card-title">📚 المواد</div>
    <div class="subjects-grid">${rows.map(r => {
      const t = parseFloat(r.term1_total||r.total)||0;
      const c = t>=90?'excellent':t>=75?'good':t>=60?'pass':'fail';
      return `<div class="subj-card">
        <div class="s-icon">${getIcon(r.subject||r.subject_name)}</div>
        <div class="s-name">${r.subject||r.subject_name||'مادة'}</div>
        <div class="s-score-row">
          <div class="s-score ${c}">${t}/100</div>
        </div>
      </div>`;
    }).join('')}</div>
  </div>`;
}

function noDataPerf() {
  return `<div class="empty-state">
    <div class="emoji">📊</div>
    <p>ستظهر درجاتك هنا عند إعلان النتائج</p>
    <small style="color:var(--muted)">الفصل الدراسي الثاني 2025–2026</small>
  </div>`;
}

// ═══════════════════════════════════════════════
//  STARS TAB
// ═══════════════════════════════════════════════
async function loadStars() {
  const el = document.getElementById('stars-content');
  if (!el) return;

  const sid = STUDENT.id;

  const [{ data: star }, { data: goals }, { data: parentGoal }, { data: recent }] = await Promise.all([
    SB.from('student_stars').select('*').eq('student_id', sid).single(),
    SB.from('student_goals').select('*, store_items(name,stars_cost,emoji)')
      .eq('student_id', sid).eq('status','active').limit(1),
    SB.from('parent_goals').select('*').eq('student_id', sid).eq('status','active').limit(1),
    SB.from('reinforcements').select('stars_count,message,created_at')
      .eq('student_id', sid).order('created_at',{ascending:false}).limit(5),
  ]);

  const balance = star?.available_stars ?? star?.balance ?? 0;
  document.getElementById('hdr-stars').textContent = balance;

  let html = `<div class="stars-hero">
    <div class="stars-num">⭐ ${balance}</div>
    <div class="stars-lbl">رصيد نجومك</div>
    <div class="stars-expire">تنتهي صلاحية النجوم نهاية الفصل القادم</div>
  </div>`;

  // Active goal from student
  if (goals?.length) {
    const g = goals[0];
    const item = g.store_items;
    const cost = item?.stars_cost || g.target_stars || 100;
    const pct  = Math.min(100, Math.round((balance/cost)*100));
    html += `<div class="goal-card">
      <div class="card-title">🎯 هدفي الحالي</div>
      <div class="goal-name">${item?.emoji||'🎁'} ${item?.name||g.goal_description||'—'}</div>
      <div class="goal-progress-row"><span>${balance}/${cost} نجمة</span><span>${pct}%</span></div>
      <div class="goal-bar-wrap"><div class="goal-bar" style="width:${pct}%"></div></div>
    </div>`;
  }

  // Goal from parent
  if (parentGoal?.length) {
    const pg = parentGoal[0];
    const cost = pg.target_stars || 100;
    const pct  = Math.min(100, Math.round((balance/cost)*100));
    html += `<div class="goal-card" style="border-color:rgba(16,185,129,0.3)">
      <div class="card-title">💚 هدف من أهلي</div>
      <div class="goal-name">${pg.reward_description||'—'}</div>
      <div class="goal-progress-row"><span>${balance}/${cost} نجمة</span><span>${pct}%</span></div>
      <div class="goal-bar-wrap"><div class="goal-bar" style="width:${pct}%"></div></div>
    </div>`;
  }

  // Store link
  html += `<a href="../eduos-store/" class="store-link-btn">🛒 المتجر — استبدل نجومك بمكافآت</a>`;

  // Recent stars history
  if (recent?.length) {
    html += `<div class="card" style="margin-top:16px">
      <div class="card-title">📜 آخر النجوم المكتسبة</div>`;
    recent.forEach(r => {
      html += `<div class="stars-history-row">
        <div class="sh-msg">${r.message||'تعزيز من المعلم/ة'}</div>
        <div class="sh-stars">+${r.stars_count||0} ⭐</div>
      </div>`;
    });
    html += '</div>';
  }

  el.innerHTML = html;
}

// ═══════════════════════════════════════════════
//  GOALS TAB — G9+ — real data from student_goals
// ═══════════════════════════════════════════════
async function loadGoals() {
  const el = document.getElementById('goals-content');
  if (!el) return;
  el.dataset.loaded = '1';

  const sid = STUDENT.id;
  const { data: goals } = await SB
    .from('student_goals')
    .select('*, store_items(name,stars_cost,emoji)')
    .eq('student_id', sid)
    .order('created_at', { ascending: false });

  if (!goals?.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="emoji">🎯</div>
      <p>لا أهداف مسجّلة بعد</p>
      <small style="color:var(--muted)">يمكنك تحديد هدفك من المتجر</small>
    </div>
    <a href="../eduos-store/" class="store-link-btn" style="margin-top:12px">🛒 اختر هدفاً من المتجر</a>`;
    return;
  }

  const { data: star } = await SB.from('student_stars').select('*').eq('student_id', sid).single();
  const balance = star?.available_stars ?? 0;

  let html = '';
  goals.forEach(g => {
    const item = g.store_items;
    const cost = item?.stars_cost || g.target_stars || 100;
    const pct  = Math.min(100, Math.round((balance/cost)*100));
    const statusMap = { active:'🟢 نشط', achieved:'✅ مكتمل', cancelled:'❌ ملغى' };
    html += `<div class="goal-item">
      <div style="display:flex;justify-content:space-between;align-items:start">
        <div class="goal-item-title">${item?.emoji||'🎯'} ${item?.name||g.goal_description||'هدف'}</div>
        <span style="font-size:12px">${statusMap[g.status]||g.status}</span>
      </div>
      ${g.status === 'active' ? `
        <div class="goal-progress-row" style="margin-top:10px"><span>${balance}/${cost} ⭐</span><span>${pct}%</span></div>
        <div class="goal-bar-wrap"><div class="goal-bar" style="width:${pct}%"></div></div>` : ''}
      <div class="goal-item-date">${formatDate(g.created_at)}</div>
    </div>`;
  });

  html += `<a href="../eduos-store/" class="store-link-btn" style="margin-top:4px">🛒 اختر هدفاً جديداً</a>`;
  el.innerHTML = html;
}

// ═══════════════════════════════════════════════
//  UNIVERSITY TAB — G11-G12
// ═══════════════════════════════════════════════
async function loadUniversity() {
  const el = document.getElementById('uni-content');
  if (!el) return;
  el.dataset.loaded = '1';

  // Pull from student_semester_summary for cumulative GPA
  const { data: sums } = await SB
    .from('student_semester_summary')
    .select('*')
    .eq('student_id', STUDENT.id)
    .order('semester', { ascending: true });

  // Compute cumulative average
  let cumAvg = 0;
  if (sums?.length) {
    const totals = sums.map(s => parseFloat(s.total||s.term1_total)||0).filter(v=>v>0);
    cumAvg = totals.length ? Math.round(totals.reduce((a,b)=>a+b,0)/totals.length) : 0;
  }
  const gpa4 = cumAvg ? (cumAvg/100*4).toFixed(2) : '—';

  let html = `<div class="uni-path">
    <div class="uni-title">🎓 مساري الجامعي</div>
    <div class="uni-stat-row">
      <div class="uni-stat"><div class="u-val">${gpa4}</div><div class="u-lbl">المعدل التراكمي</div></div>
      <div class="uni-stat"><div class="u-val">${sums?.length||0}</div><div class="u-lbl">فصول مكتملة</div></div>
      <div class="uni-stat"><div class="u-val">${cumAvg||'—'}</div><div class="u-lbl">متوسط الدرجات</div></div>
    </div>
  </div>`;

  // Historical semesters
  if (sums?.length) {
    html += `<div class="card">
      <div class="card-title">📈 السجل الأكاديمي</div>`;
    sums.slice().reverse().forEach(s => {
      const t = parseFloat(s.total||s.term1_total)||0;
      const _sp2 = (typeof getPassScore==='function')?getPassScore():50;
      const c = t>=90?'excellent':t>=75?'good':t>=_sp2?'pass':'fail';
      html += `<div class="subj-grade-row">
        <div class="subj-grade-header">
          <div class="subj-name">${s.semester||'فصل'}</div>
          <div class="subj-score ${c}">${t}/100</div>
        </div>
        <div class="grade-bar-wrap"><div class="grade-bar ${c}" style="width:${t}%"></div></div>
      </div>`;
    });
    html += '</div>';
  }

  html += `<div class="card" style="text-align:center">
    <div style="font-size:13px;color:var(--muted);line-height:1.7">
      للاستفسار عن متطلبات القبول الجامعي وإرشاد المسار الأكاديمي<br>
      تواصل مع المرشد الأكاديمي في المدرسة
    </div>
  </div>`;

  el.innerHTML = html;
}

// ═══════════════════════════════════════════════
//  LIVE BANNER + EXIT TICKET
// ═══════════════════════════════════════════════
function showLiveBanner(session) {
  activeSession = session;
  document.getElementById('live-subject').textContent = session.subject || 'حصة ذكية';
  document.getElementById('live-meta').textContent =
    (session.teacher_name||'') + (session.room ? ' · ' + session.room : '');
  document.getElementById('live-lesson-banner').classList.add('active');
}

function hideLiveBanner() {
  activeSession = null;
  document.getElementById('live-lesson-banner').classList.remove('active');
  document.getElementById('exit-ticket-pill').classList.remove('visible');
  activeTicket = null;
}

function openExitTicket() {
  if (!activeTicket) return;
  document.getElementById('et-sub').textContent = 'مادة: ' + (activeSession?.subject||'');
  document.getElementById('et-question').textContent = activeTicket.question || 'ما أهم شيء تعلّمته اليوم؟';

  const opts = activeTicket.options || [];
  if (opts.length > 0) {
    document.getElementById('et-options').innerHTML = opts.map(o =>
      `<button class="modal-opt" onclick="selectOpt(this)">${o}</button>`).join('');
    document.getElementById('et-free').style.display = 'none';
  } else {
    document.getElementById('et-options').innerHTML = '';
    document.getElementById('et-free').style.display = 'block';
    document.getElementById('et-free').value = '';
  }
  document.getElementById('exit-modal').classList.add('open');
}

function selectOpt(btn) {
  document.querySelectorAll('.modal-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

async function submitExitTicket() {
  const selected = document.querySelector('.modal-opt.selected')?.textContent;
  const free = document.getElementById('et-free').value.trim();
  const answer = selected || free;
  if (!answer) { showToast('⚠️ اختر إجابة أو اكتب تعليقك'); return; }

  await SB.from('exit_ticket_responses').insert({
    ticket_id: activeTicket.id,
    student_id: STUDENT.id,
    answer,
    submitted_at: new Date().toISOString(),
  });

  document.getElementById('exit-modal').classList.remove('open');
  document.getElementById('exit-ticket-pill').classList.remove('visible');
  activeTicket = null;
  showToast('✅ تم إرسال بطاقة الخروج — أحسنت!');
}

// ═══════════════════════════════════════════════
//  REALTIME
// ═══════════════════════════════════════════════
function subscribeRealtime() {
  const cn = STUDENT.class_name;
  if (!cn) return;

  rtChannel = SB
    .channel(`student-portal-${cn}`)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'lesson_sessions',
      filter: `class_name=eq.${cn}`
    }, ({ eventType, new: n }) => {
      if (eventType === 'DELETE' || n?.status === 'ended') hideLiveBanner();
      else if (n?.status === 'active') showLiveBanner(n);
    })
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'exit_tickets',
      filter: `class_name=eq.${cn}`
    }, ({ new: t }) => {
      if (t?.is_open) {
        activeTicket = t;
        document.getElementById('exit-ticket-pill').classList.add('visible');
        showToast('📝 بطاقة الخروج — أجب الآن!');
      } else {
        activeTicket = null;
        document.getElementById('exit-ticket-pill').classList.remove('visible');
      }
    })
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'reinforcements',
      filter: `student_id=eq.${STUDENT.id}`
    }, ({ new: r }) => {
      if (r?.is_public) {
        showToast('💌 ' + (r.message||'رسالة تعزيز!') + ' ⭐' + (r.stars_count||0));
        loadStars();
      }
    })
    .subscribe();
}

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function todayDayIdx() {
  const d = new Date().getDay(); // 0=Sun
  if (d === 5 || d === 6) return -1; // weekend
  return d;
}

function currentPeriod() {
  const now = new Date();
  const hhmm = now.getHours()*60 + now.getMinutes();
  for (const pt of PERIOD_TIMES) {
    if (typeof pt.p !== 'number') continue;
    const [sh,sm] = pt.start.split(':').map(Number);
    const [eh,em] = pt.end.split(':').map(Number);
    if (hhmm >= sh*60+sm && hhmm < eh*60+em) return pt.p;
  }
  return null;
}

function getPTime(p) {
  const pt = PERIOD_TIMES.find(x => x.p === p);
  return pt ? pt.start + '–' + pt.end : '';
}

function getIcon(sub) {
  if (!sub) return '📘';
  const low = sub.toLowerCase();
  for (const [k,v] of Object.entries(SUBJ_ICONS)) {
    if (low.includes(k.toLowerCase())) return v;
  }
  return SUBJ_ICONS.default;
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function formatDate(d) {
  if (!d) return '';
  const s = d.substring ? d.substring(0,10) : new Date(d).toISOString().split('T')[0];
  return new Date(s).toLocaleDateString('ar-AE', {weekday:'short',month:'short',day:'numeric'});
}

function setBadge(id, count) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = count;
  el.style.display = 'inline';
}

function showToast(msg) {
  const t = document.getElementById('reinf-toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.display = 'none'; }, 4500);
}

function doLogout() {
  sessionStorage.removeItem('edoos_user');
  window.location.replace('/apps/eduos-login/');
}

// Close exit modal on overlay click
document.getElementById('exit-modal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});
