<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ملف الطالب/ة — EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<script src="/apps/platform-autologout.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',Arial,sans-serif;background:#F0F4F8;color:#1e293b;min-height:100vh;direction:rtl}
:root{--primary:#6C3DD6;--secondary:#22D3EE;--card:#fff;--border:#e2e8f0;--text:#1e293b;--text2:#64748b}
.hdr{background:linear-gradient(135deg,#6C3DD6,#22D3EE);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(108,61,214,.25)}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{background:rgba(255,255,255,.2);border-radius:10px;padding:8px 14px;font-size:1.4rem;font-weight:900;color:#fff}
.hdr-title{color:#fff;font-size:1rem;font-weight:700}
.hdr-sub{color:rgba(255,255,255,.8);font-size:.75rem}
.btn-hdr{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 14px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;transition:.2s}
.btn-hdr:hover{background:rgba(255,255,255,.35)}
.tabs-bar{background:#fff;border-bottom:2px solid var(--border);padding:0 24px;display:flex;gap:2px;overflow-x:auto}
.tab{padding:14px 18px;border:none;background:transparent;color:var(--text2);font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.panel{display:none}.panel.active{display:block}
.main{padding:24px;max-width:1100px;margin:0 auto}
.profile-header{background:var(--card);border-radius:14px;padding:24px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.big-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#6C3DD6,#22D3EE);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:2rem;flex-shrink:0}
.profile-name{font-size:1.4rem;font-weight:900;margin-bottom:4px}
.profile-meta{font-size:.85rem;color:var(--text2);display:flex;gap:16px;flex-wrap:wrap}
.profile-meta span{display:flex;align-items:center;gap:4px}
.profile-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-right:auto}
@media(max-width:768px){.profile-stats{grid-template-columns:repeat(2,1fr)}}
.pstat{text-align:center;padding:12px;background:#F8FAFF;border-radius:10px}
.pstat-num{font-size:1.2rem;font-weight:900;color:var(--primary)}
.pstat-label{font-size:.7rem;color:var(--text2)}
.card{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.card-title{font-size:1rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:768px){.grid2{grid-template-columns:1fr}}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.88rem}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--text2);font-weight:600}
.info-val{font-weight:700}
.badge{padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:700;display:inline-block}
.badge-green{background:#dcfce7;color:#16a34a}.badge-yellow{background:#fef3c7;color:#d97706}.badge-blue{background:#dbeafe;color:#1d4ed8}.badge-red{background:#fee2e2;color:#dc2626}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead{background:#F8FAFF}
th{padding:11px 14px;text-align:right;font-weight:700;color:var(--text2);border-bottom:2px solid var(--border)}
td{padding:10px 14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#F8FAFF}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:700;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text2)}.btn-outline:hover{border-color:var(--primary)}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:10px;padding:12px 24px;font-size:.88rem;font-weight:600;z-index:999;display:none}
.toast.show{display:block}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">👤</div>
    <div>
      <div class="hdr-title">ملف الطالب/ة | Student Profile</div>
      <div class="hdr-sub">السجل الشامل — EduOS</div>
    </div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn-hdr" onclick="printProfile()">🖨️ طباعة</button>
    <button class="btn-hdr" onclick="history.back()">← رجوع</button>
  </div>
</header>
<div class="tabs-bar">
  <button class="tab active" onclick="switchTab('info')">👤 البيانات</button>
  <button class="tab" onclick="switchTab('grades')">📊 الدرجات</button>
  <button class="tab" onclick="switchTab('attendance')">✅ الحضور</button>
  <button class="tab" onclick="switchTab('behavior')">🌟 السلوك</button>
  <button class="tab" onclick="switchTab('parent')">👪 ولي/ة الأمر</button>
</div>
<div class="main">
  <div class="profile-header">
    <div class="big-avatar" id="profileAvatar">ط</div>
    <div style="flex:1">
      <div class="profile-name" id="profileName">جاري التحميل...</div>
      <div class="profile-meta">
        <span>🏫 <span id="profileClass">—</span></span>
        <span>🆔 <span id="profileId">—</span></span>
        <span>🎂 <span id="profileAge">—</span></span>
      </div>
    </div>
    <div class="profile-stats">
      <div class="pstat"><div class="pstat-num" id="statAvg">—</div><div class="pstat-label">المتوسط</div></div>
      <div class="pstat"><div class="pstat-num" id="statAtt">—</div><div class="pstat-label">الحضور</div></div>
      <div class="pstat"><div class="pstat-num" id="statStars">—</div><div class="pstat-label">⭐ نجوم</div></div>
      <div class="pstat"><div class="pstat-num" id="statRank">—</div><div class="pstat-label">الترتيب</div></div>
    </div>
  </div>

  <div id="tab-info" class="panel active">
    <div class="grid2">
      <div class="card">
        <div class="card-header"><div class="card-title">📋 البيانات الأساسية</div></div>
        <div id="basicInfo"></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">📊 ملخص الأداء</div></div>
        <div id="performanceSummary"></div>
      </div>
    </div>
  </div>

  <div id="tab-grades" class="panel">
    <div class="card">
      <div class="card-header"><div class="card-title">📊 الدرجات الأكاديمية</div></div>
      <div class="tbl-wrap" id="gradesTable"></div>
    </div>
  </div>

  <div id="tab-attendance" class="panel">
    <div class="card">
      <div class="card-header"><div class="card-title">✅ سجل الحضور</div></div>
      <div id="attSummary"></div>
    </div>
  </div>

  <div id="tab-behavior" class="panel">
    <div class="card">
      <div class="card-header"><div class="card-title">🌟 السلوك والإنجازات</div></div>
      <div id="behaviorList"></div>
    </div>
  </div>

  <div id="tab-parent" class="panel">
    <div class="card">
      <div class="card-header"><div class="card-title">👪 بيانات ولي/ة الأمر</div></div>
      <div id="parentInfo"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SB='https://zuyizaiugpmhmeycqton.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1eWl6YWl1Z3BtaG1leWNxdG9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDk3NTYxNzcsImV4cCI6MjAyNTMzMjE3N30.LSbSGlMPy8TGlGDDFVaVWGYnZ-N_9schRKPD69FQNPU';
const params=new URLSearchParams(location.search);
const studentId=params.get('id')||'demo';
async function get(t,p=''){ const r=await fetch(`${SB}/rest/v1/${t}?${p}`,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}); return r.ok?r.json():[]; }

async function init(){
  let student=null;
  try{
    if(studentId!=='demo'){
      const s=await get('students',`id=eq.${studentId}&select=*&limit=1`);
      student=s&&s[0]?s[0]:null;
    }
  }catch(e){}
  const name=student?.full_name||'طالب/ة - Demo';
  document.getElementById('profileAvatar').textContent=name[0]||'ط';
  document.getElementById('profileName').textContent=name;
  document.getElementById('profileClass').textContent=student?.class_id||'5أ';
  document.getElementById('profileId').textContent=student?.student_number||'2026001';
  document.getElementById('profileAge').textContent='12 سنة';
  document.getElementById('statAvg').textContent='87%';
  document.getElementById('statAtt').textContent='94%';
  document.getElementById('statStars').textContent='42';
  document.getElementById('statRank').textContent='#5';
  renderInfo(name,student);
  renderGrades();
  renderAttendance();
  renderBehavior();
  renderParent(student);
}

function renderInfo(name,s){
  const fields=[{l:'الاسم الكامل',v:name},{l:'الجنس',v:s?.gender==='male'?'ذكر':'أنثى'},{l:'الصف',v:s?.class_id||'5أ'},{l:'الرقم الأكاديمي',v:s?.student_number||'2026001'},{l:'تاريخ الانتساب',v:'2024-09-01'},{l:'الجنسية',v:'إماراتية'},{l:'الحالة',v:'نشط/ة'}];
  document.getElementById('basicInfo').innerHTML=fields.map(f=>`<div class="info-row"><span class="info-label">${f.l}</span><span class="info-val">${f.v}</span></div>`).join('');
  document.getElementById('performanceSummary').innerHTML=[{l:'المتوسط الأكاديمي',v:'87%',c:'badge-green'},{l:'معدل الحضور',v:'94%',c:'badge-green'},{l:'السلوك العام',v:'ممتاز',c:'badge-green'},{l:'المشاركة',v:'عالية',c:'badge-blue'},{l:'الواجبات',v:'92% مكتملة',c:'badge-green'}].map(f=>`<div class="info-row"><span class="info-label">${f.l}</span><span class="badge ${f.c}">${f.v}</span></div>`).join('');
}

function renderGrades(){
  const subjects=[{s:'اللغة العربية',sb1:88,sb2:90,exam:86,total:88,grade:'ب+'},{s:'الرياضيات',sb1:92,sb2:88,exam:90,total:90,grade:'أ'},{s:'العلوم',sb1:85,sb2:82,exam:87,total:85,grade:'ب+'},{s:'الإنجليزية',sb1:78,sb2:80,exam:82,total:80,grade:'ب'},{s:'الإسلامية',sb1:95,sb2:97,exam:94,total:95,grade:'أ+'}];
  document.getElementById('gradesTable').innerHTML=`<table><thead><tr><th>المادة</th><th>الفصل 1</th><th>الفصل 2</th><th>الامتحان</th><th>المجموع</th><th>التقدير</th></tr></thead><tbody>${subjects.map(s=>`<tr><td><strong>${s.s}</strong></td><td>${s.sb1}</td><td>${s.sb2}</td><td>${s.exam}</td><td><strong>${s.total}</strong></td><td><span class="badge badge-${s.total>=90?'green':'blue'}">${s.grade}</span></td></tr>`).join('')}</tbody></table>`;
}

function renderAttendance(){
  document.getElementById('attSummary').innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px">
      <div style="background:#dcfce7;border-radius:10px;padding:14px;text-align:center"><div style="font-size:1.4rem;font-weight:900;color:#16a34a">148</div><div style="font-size:.75rem;color:#16a34a">يوم حضور</div></div>
      <div style="background:#fee2e2;border-radius:10px;padding:14px;text-align:center"><div style="font-size:1.4rem;font-weight:900;color:#dc2626">8</div><div style="font-size:.75rem;color:#dc2626">يوم غياب</div></div>
      <div style="background:#fef3c7;border-radius:10px;padding:14px;text-align:center"><div style="font-size:1.4rem;font-weight:900;color:#d97706">3</div><div style="font-size:.75rem;color:#d97706">تأخير</div></div>
    </div>
    <div style="height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden"><div style="height:100%;width:94%;background:linear-gradient(90deg,#22c55e,#16a34a);border-radius:4px"></div></div>
    <div style="text-align:center;margin-top:6px;font-size:.82rem;font-weight:700;color:#16a34a">94% معدل الحضور</div>`;
}

function renderBehavior(){
  document.getElementById('behaviorList').innerHTML=[{icon:'⭐',t:'حضور مثالي لأسبوعين',d:'مُنحت من: أ. سارة'},{icon:'🏆',t:'أفضل مشاركة في الفصل',d:'مُنحت من: أ. خالد'},{icon:'📚',t:'إكمال برنامج القراءة',d:'مُنحت من: المكتبة'}].map(b=>`<div style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px"><div style="font-size:1.3rem">${b.icon}</div><div><div style="font-weight:700;font-size:.88rem">${b.t}</div><div style="font-size:.75rem;color:var(--text2)">${b.d}</div></div></div>`).join('');
}

function renderParent(s){
  const fields=[{l:'اسم ولي/ة الأمر',v:'والد/ة الطالب/ة'},{l:'صلة القرابة',v:'أب/أم'},{l:'رقم الهاتف',v:'050-XXXXXXX'},{l:'البريد الإلكتروني',v:'parent@email.com'},{l:'قناة التواصل المفضلة',v:'واتساب'}];
  document.getElementById('parentInfo').innerHTML=fields.map(f=>`<div class="info-row"><span class="info-label">${f.l}</span><span class="info-val">${f.v}</span></div>`).join('');
}

function printProfile(){ window.print(); }
function switchTab(n){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); ['info','grades','attendance','behavior','parent'].forEach((t,i)=>{ if(t===n) document.querySelectorAll('.tab')[i].classList.add('active'); }); document.getElementById(`tab-${n}`).classList.add('active'); }
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
init();
</script>
</body>
</html>
