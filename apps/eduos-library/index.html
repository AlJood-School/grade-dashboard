<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>المكتبة الذكية — EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<script src="/apps/platform-week.js"></script>
<script src="/apps/platform-autologout.js"></script>
<script src="/apps/platform-auth-guard.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',Arial,sans-serif;background:#F0F4F8;color:#1e293b;min-height:100vh;direction:rtl}
:root{--primary:#6C3DD6;--secondary:#22D3EE;--card:#fff;--border:#e2e8f0;--text:#1e293b;--text2:#64748b}
.hdr{background:linear-gradient(135deg,#6C3DD6,#22D3EE);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(108,61,214,.25)}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{background:rgba(255,255,255,.2);border-radius:10px;padding:8px 14px;font-size:1.4rem;font-weight:900;color:#fff}
.hdr-title{color:#fff;font-size:1rem;font-weight:700}
.hdr-sub{color:rgba(255,255,255,.8);font-size:.75rem}
.btn-hdr{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 14px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;transition:.2s}
.btn-hdr:hover{background:rgba(255,255,255,.35)}
.tabs-bar{background:#fff;border-bottom:2px solid var(--border);padding:0 24px;display:flex;gap:2px;overflow-x:auto;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tab{padding:14px 18px;border:none;background:transparent;color:var(--text2);font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}
.panel{display:none}.panel.active{display:block}
.main{padding:24px;max-width:1200px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
@media(max-width:768px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:var(--card);border-radius:14px;padding:18px;border:1px solid var(--border);text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.kpi-icon{font-size:1.8rem;margin-bottom:6px}.kpi-num{font-size:1.6rem;font-weight:900;color:var(--text)}.kpi-label{font-size:.75rem;color:var(--text2)}
.card{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.card-title{font-size:1rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.book-card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);text-align:center;cursor:pointer;transition:.2s}
.book-card:hover{border-color:var(--primary);box-shadow:0 4px 14px rgba(108,61,214,.15);transform:translateY(-2px)}
.book-cover{width:80px;height:110px;border-radius:8px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:2rem}
.book-title{font-weight:700;font-size:.88rem;color:var(--text);margin-bottom:4px;line-height:1.3}
.book-author{font-size:.72rem;color:var(--text2);margin-bottom:8px}
.book-badge{padding:4px 10px;border-radius:20px;font-size:.7rem;font-weight:700}
.available{background:#dcfce7;color:#16a34a}.borrowed{background:#fee2e2;color:#dc2626}.reserved{background:#fef3c7;color:#d97706}
input,select{background:#fff;border:1.5px solid var(--border);border-radius:8px;color:var(--text);padding:9px 14px;font-family:inherit;font-size:.88rem}
input:focus,select:focus{outline:none;border-color:var(--primary)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:6px}
.btn{padding:9px 20px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:700;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff}.btn-primary:hover{opacity:.9}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text2)}.btn-outline:hover{border-color:var(--primary)}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead{background:#F8FAFF}
th{padding:11px 14px;text-align:right;font-weight:700;color:var(--text2);border-bottom:2px solid var(--border)}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#F8FAFF}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:10px;padding:12px 24px;font-size:.88rem;font-weight:600;z-index:999;display:none}
.toast.show{display:block}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">📚</div>
    <div>
      <div class="hdr-title">المكتبة الذكية | Smart Library</div>
      <div class="hdr-sub">إدارة الكتب والإعارة — EduOS</div>
    </div>
  </div>
  <button class="btn-hdr" onclick="location.href='/apps/eduos-hub/'">← الرئيسية</button>
</header>
<div class="tabs-bar">
  <button class="tab active" onclick="switchTab('catalog')">📖 الفهرس</button>
  <button class="tab" onclick="switchTab('borrow')">📤 إعارة / إرجاع</button>
  <button class="tab" onclick="switchTab('active')">📋 الإعارات النشطة</button>
  <button class="tab" onclick="switchTab('add')">➕ إضافة كتاب</button>
</div>
<div class="main">
  <div class="kpis">
    <div class="kpi-card"><div class="kpi-icon">📚</div><div class="kpi-num" id="kpiTotal">—</div><div class="kpi-label">إجمالي الكتب</div></div>
    <div class="kpi-card"><div class="kpi-icon">📤</div><div class="kpi-num" id="kpiBorrowed">—</div><div class="kpi-label">مُعارة حالياً</div></div>
    <div class="kpi-card"><div class="kpi-icon">⚠️</div><div class="kpi-num" id="kpiOverdue">—</div><div class="kpi-label">متأخرة الإرجاع</div></div>
    <div class="kpi-card"><div class="kpi-icon">📊</div><div class="kpi-num" id="kpiMonth">—</div><div class="kpi-label">إعارة هذا الشهر</div></div>
  </div>

  <div id="tab-catalog" class="panel active">
    <div class="card">
      <div class="card-header">
        <div class="card-title">📖 فهرس الكتب | Catalog</div>
        <div style="display:flex;gap:8px">
          <input type="text" id="searchBook" placeholder="بحث في الكتب..." oninput="filterBooks()" style="width:200px"/>
          <select id="filterCat" onchange="filterBooks()" style="width:150px">
            <option value="">كل التصنيفات</option>
            <option value="arabic">لغة عربية</option>
            <option value="science">علوم</option>
            <option value="story">قصص</option>
            <option value="islamic">إسلامية</option>
            <option value="math">رياضيات</option>
          </select>
        </div>
      </div>
      <div class="book-grid" id="bookGrid"></div>
    </div>
  </div>

  <div id="tab-borrow" class="panel">
    <div class="card">
      <div class="card-header"><div class="card-title">📤 إعارة / إرجاع | Borrow / Return</div></div>
      <div style="max-width:500px">
        <div class="form-group"><label class="form-label">العملية | Action</label>
          <select id="borrowAction"><option value="borrow">إعارة | Borrow</option><option value="return">إرجاع | Return</option></select>
        </div>
        <div class="form-group"><label class="form-label">الطالب/ة | Student</label>
          <select id="borrowStudent"><option value="">اختر الطالب/ة...</option></select>
        </div>
        <div class="form-group"><label class="form-label">رقم الكتاب / ISBN</label>
          <input type="text" id="borrowBookId" placeholder="رقم الكتاب أو الباركود..."/>
        </div>
        <div class="form-group"><label class="form-label">تاريخ الإرجاع المتوقع</label>
          <input type="date" id="borrowReturnDate"/>
        </div>
        <button class="btn btn-primary" onclick="saveBorrow()">📤 تأكيد العملية</button>
      </div>
    </div>
  </div>

  <div id="tab-active" class="panel">
    <div class="card">
      <div class="card-header"><div class="card-title">📋 الإعارات النشطة | Active Borrows</div></div>
      <div class="tbl-wrap" id="activeTable"></div>
    </div>
  </div>

  <div id="tab-add" class="panel">
    <div class="card">
      <div class="card-header"><div class="card-title">➕ إضافة كتاب جديد | Add Book</div></div>
      <div style="max-width:500px">
        <div class="form-group"><label class="form-label">عنوان الكتاب | Title</label><input type="text" id="bookTitle" placeholder="عنوان الكتاب..."/></div>
        <div class="form-group"><label class="form-label">المؤلف/ة | Author</label><input type="text" id="bookAuthor" placeholder="اسم المؤلف/ة..."/></div>
        <div class="form-group"><label class="form-label">التصنيف | Category</label>
          <select id="bookCat"><option value="arabic">لغة عربية</option><option value="science">علوم</option><option value="story">قصص</option><option value="islamic">إسلامية</option><option value="math">رياضيات</option><option value="other">أخرى</option></select>
        </div>
        <div class="form-group"><label class="form-label">عدد النسخ | Copies</label><input type="number" id="bookCopies" value="1" min="1"/></div>
        <button class="btn btn-primary" onclick="addBook()">➕ إضافة الكتاب</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SB='https://zuyizaiugpmhmeycqton.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1eWl6YWl1Z3BtaG1leWNxdG9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDk3NTYxNzcsImV4cCI6MjAyNTMzMjE3N30.LSbSGlMPy8TGlGDDFVaVWGYnZ-N_9schRKPD69FQNPU';
async function get(t,p=''){ const r=await fetch(`${SB}/rest/v1/${t}?${p}`,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}); return r.ok?r.json():[]; }
const catColors={arabic:'#dbeafe',science:'#dcfce7',story:'#fce7f3',islamic:'#fef3c7',math:'#ede9fe',other:'#F0F4F8'};
const catEmojis={arabic:'📖',science:'🔬',story:'📕',islamic:'☪️',math:'📐',other:'📗'};
let allBooks=[];

const DEMO_BOOKS=[
  {id:'b1',title:'قصص الأنبياء',author:'ابن كثير',category:'islamic',copies:3,available:2},{id:'b2',title:'رياضيات الصف 4',author:'وزارة التربية',category:'math',copies:5,available:0},{id:'b3',title:'نحو اللغة العربية',author:'د. خالد',category:'arabic',copies:4,available:3},{id:'b4',title:'علوم الحياة',author:'منهج MOE',category:'science',copies:3,available:1},{id:'b5',title:'حكايات جحا',author:'تراثية',category:'story',copies:6,available:5},{id:'b6',title:'المتنبي شاعر العرب',author:'د. سارة',category:'arabic',copies:2,available:2},{id:'b7',title:'مقدمة الحساب',author:'الخوارزمي',category:'math',copies:2,available:2},{id:'b8',title:'أدب الأطفال',author:'مجموعة مؤلفين',category:'story',copies:4,available:3}
];

async function init(){
  try{ const books=await get('library_books','select=*&order=title&limit=100'); allBooks=books&&books.length>0?books:DEMO_BOOKS; }
  catch(e){ allBooks=DEMO_BOOKS; }
  document.getElementById('kpiTotal').textContent=allBooks.length;
  document.getElementById('kpiBorrowed').textContent=allBooks.filter(b=>b.available===0).length;
  document.getElementById('kpiOverdue').textContent='2';
  document.getElementById('kpiMonth').textContent='18';
  renderBooks(allBooks);
  await loadStudents();
  renderActiveTable();
  const d=new Date(); d.setDate(d.getDate()+14);
  document.getElementById('borrowReturnDate').value=d.toISOString().split('T')[0];
}

function renderBooks(books){
  document.getElementById('bookGrid').innerHTML=books.map(b=>`
    <div class="book-card" onclick="showToast('📖 ${b.title}')">
      <div class="book-cover" style="background:${catColors[b.category]||'#F0F4F8'}">${catEmojis[b.category]||'📗'}</div>
      <div class="book-title">${b.title}</div>
      <div class="book-author">${b.author||'—'}</div>
      <span class="book-badge ${(b.available||0)>0?'available':'borrowed'}">${(b.available||0)>0?`متاح (${b.available})`:b.copies>0?'مُعار':'نفذ'}</span>
    </div>`).join('');
}

function filterBooks(){
  const s=document.getElementById('searchBook').value.toLowerCase();
  const cat=document.getElementById('filterCat').value;
  const filtered=allBooks.filter(b=>(!s||(b.title||'').toLowerCase().includes(s)||(b.author||'').toLowerCase().includes(s))&&(!cat||b.category===cat));
  renderBooks(filtered);
}

async function loadStudents(){
  try{ const s=await get('students','select=id,full_name&order=full_name&limit=100'); s.forEach(st=>{ const o=document.createElement('option'); o.value=st.id; o.textContent=st.full_name; document.getElementById('borrowStudent').appendChild(o); }); }catch(e){}
}

function renderActiveTable(){
  const demo=[{student:'طالب/ة أ',book:'علوم الحياة',date:'2026-06-15',due:'2026-06-29',overdue:true},{student:'طالب/ة ب',book:'حكايات جحا',date:'2026-06-20',due:'2026-07-04',overdue:false},{student:'طالب/ة ج',book:'أدب الأطفال',date:'2026-06-22',due:'2026-07-06',overdue:false}];
  document.getElementById('activeTable').innerHTML=`<table><thead><tr><th>الطالب/ة</th><th>الكتاب</th><th>تاريخ الإعارة</th><th>موعد الإرجاع</th><th>الحالة</th></tr></thead><tbody>${demo.map(d=>`<tr><td>${d.student}</td><td>${d.book}</td><td>${d.date}</td><td>${d.due}</td><td><span class="book-badge ${d.overdue?'borrowed':'available'}">${d.overdue?'⚠️ متأخر':'✅ في الموعد'}</span></td></tr>`).join('')}</tbody></table>`;
}

async function saveBorrow(){
  const st=document.getElementById('borrowStudent').value;
  const book=document.getElementById('borrowBookId').value;
  if(!st||!book){ showToast('⚠️ اختر/ي الطالب/ة والكتاب'); return; }
  showToast('✅ تمت عملية الإعارة بنجاح');
  switchTab('active');
}

async function addBook(){
  const title=document.getElementById('bookTitle').value;
  if(!title){ showToast('⚠️ أدخل/ي عنوان الكتاب'); return; }
  try{
    await fetch(`${SB}/rest/v1/library_books`,{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({title,author:document.getElementById('bookAuthor').value,category:document.getElementById('bookCat').value,copies:parseInt(document.getElementById('bookCopies').value)||1,available:parseInt(document.getElementById('bookCopies').value)||1})});
  }catch(e){}
  showToast('✅ تم إضافة الكتاب بنجاح');
}

function switchTab(n){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); ['catalog','borrow','active','add'].forEach((t,i)=>{ if(t===n) document.querySelectorAll('.tab')[i].classList.add('active'); }); document.getElementById(`tab-${n}`).classList.add('active'); }
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
init();
</script>
</body>
</html>
