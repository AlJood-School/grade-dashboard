<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>طباعة الجدول — EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<script src="/apps/platform-autologout.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',Arial,sans-serif;background:#F0F4F8;color:#1e293b;min-height:100vh;direction:rtl}
:root{--primary:#6C3DD6;--secondary:#22D3EE;--border:#e2e8f0;--text:#1e293b;--text2:#64748b}
.hdr{background:linear-gradient(135deg,#6C3DD6,#22D3EE);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(108,61,214,.25)}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{background:rgba(255,255,255,.2);border-radius:10px;padding:8px 14px;font-size:1.4rem;font-weight:900;color:#fff}
.hdr-title{color:#fff;font-size:1rem;font-weight:700}
.hdr-sub{color:rgba(255,255,255,.8);font-size:.75rem}
.btn-hdr{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 14px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;transition:.2s}
.controls{background:#fff;border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.btn{padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:700;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff}.btn-primary:hover{opacity:.9}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text2)}.btn-outline:hover{border-color:var(--primary)}
select,input{background:#fff;border:1.5px solid var(--border);border-radius:8px;color:var(--text);padding:7px 12px;font-family:inherit;font-size:.85rem}
.main{padding:24px;max-width:1000px;margin:0 auto}
/* Print styles */
.print-sheet{background:#fff;border-radius:14px;padding:30px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.08)}
.print-header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:3px solid #6C3DD6}
.print-logo{background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff;border-radius:12px;padding:10px 20px;font-size:1.2rem;font-weight:900;display:inline-block;margin-bottom:8px}
.print-school{font-size:1rem;font-weight:700;margin-bottom:4px}
.print-meta{font-size:.78rem;color:var(--text2);display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
table{width:100%;border-collapse:collapse}
thead{background:linear-gradient(135deg,#6C3DD6,#22D3EE)}
th{padding:10px 8px;text-align:center;font-weight:700;color:#fff;border:1px solid rgba(255,255,255,.2);font-size:.82rem}
td{padding:8px 6px;border:1px solid var(--border);text-align:center;vertical-align:top;min-height:50px}
.period-cell{background:#F8FAFF;font-weight:700;font-size:.72rem;color:var(--text2)}
.subject-pill{border-radius:6px;padding:5px 6px;font-size:.7rem;font-weight:700;line-height:1.3;display:block}
.break-row td{background:#fef3c7;text-align:center;font-size:.72rem;font-weight:700;color:#d97706;padding:5px}
.print-footer{margin-top:16px;text-align:center;font-size:.68rem;color:var(--text2);border-top:1px solid var(--border);padding-top:10px}
@media print{
  .hdr,.controls{display:none!important}
  body{background:#fff}
  .main{padding:0;max-width:100%}
  .print-sheet{box-shadow:none;border:none;padding:10px}
}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:10px;padding:12px 24px;font-size:.88rem;font-weight:600;z-index:999;display:none}
.toast.show{display:block}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">🖨️</div>
    <div>
      <div class="hdr-title">طباعة الجدول | Print Timetable</div>
      <div class="hdr-sub">تصدير الجدول الدراسي — EduOS</div>
    </div>
  </div>
  <button class="btn-hdr" onclick="location.href='/apps/eduos-timetable/'">← الجدول</button>
</header>
<div class="controls">
  <select id="classSelect" onchange="loadTimetable()">
    <option value="5a">الصف 5أ</option>
    <option value="5b">الصف 5ب</option>
    <option value="6a">الصف 6أ</option>
    <option value="3a">الصف 3أ</option>
  </select>
  <select id="termSelect">
    <option>الفصل الثالث 2025-2026</option>
    <option>الفصل الثاني 2025-2026</option>
    <option>الفصل الأول 2025-2026</option>
  </select>
  <button class="btn btn-primary" onclick="window.print()">🖨️ طباعة</button>
  <button class="btn btn-outline" onclick="exportPDF()">📥 تصدير PDF</button>
  <button class="btn btn-outline" onclick="showToast('📋 تم النسخ')">🔗 نسخ الرابط</button>
</div>
<div class="main">
  <div class="print-sheet" id="printSheet">
    <div class="print-header">
      <div class="print-logo">🎓 EduOS — بوابة الجود الذكية</div>
      <div class="print-school">مدرسة الجود</div>
      <div class="print-meta">
        <span>📚 الفصل الثالث 2025-2026</span>
        <span>🏫 الصف 5أ</span>
        <span>⏰ 08:00 | 45 دقيقة</span>
        <span>📅 أحد–خميس</span>
      </div>
    </div>
    <div id="timetableContainer"></div>
    <div class="print-footer">
      تم التوليد تلقائياً بنظام EduOS · NAFAS FOR ARTIFICIAL INTELLIGENCE · CN-6573712 · © 2026 جميع الحقوق محفوظة
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SB='https://zuyizaiugpmhmeycqton.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1eWl6YWl1Z3BtaG1leWNxdG9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDk3NTYxNzcsImV4cCI6MjAyNTMzMjE3N30.LSbSGlMPy8TGlGDDFVaVWGYnZ-N_9schRKPD69FQNPU';
const SUBJECTS=[{n:'رياضيات',c:'#ede9fe',t:'#6C3DD6'},{n:'علوم',c:'#dbeafe',t:'#1d4ed8'},{n:'عربي',c:'#dcfce7',t:'#16a34a'},{n:'إنجليزي',c:'#ffedd5',t:'#c2410c'},{n:'إسلامية',c:'#fef3c7',t:'#d97706'},{n:'اجتماعيات',c:'#fce7f3',t:'#be185d'},{n:'تربية بدنية',c:'#e0f2fe',t:'#0284c7'},{n:'فنون',c:'#f3e8ff',t:'#7c3aed'}];
const PERIODS=['08:00–08:45','08:50–09:35','09:35–09:55','09:55–10:40','10:45–11:30','11:30–12:00','12:00–12:45'];
const DAYS=['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس'];
function buildTable(){
  let html=`<table><thead><tr><th>الحصة</th>${DAYS.map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody>`;
  PERIODS.forEach((p,i)=>{
    if(i===2||i===5){ html+=`<tr class="break-row"><td colspan="6">☕ ${p.includes('09')?'استراحة أولى':'استراحة ثانية'} — ${p}</td></tr>`; return; }
    html+=`<tr><td class="period-cell">${p}</td>`;
    DAYS.forEach(()=>{const s=SUBJECTS[Math.floor(Math.random()*SUBJECTS.length)];html+=`<td><span class="subject-pill" style="background:${s.c};color:${s.t}">${s.n}</span></td>`;});
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('timetableContainer').innerHTML=html;
}
function loadTimetable(){ buildTable(); }
function exportPDF(){ showToast('⏳ جارٍ التصدير...'); setTimeout(()=>showToast('✅ تم تصدير PDF'),1500); }
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
buildTable();
</script>
</body>
</html>
