<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>المعلم/ة البديل/ة — EduOS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<script src="/apps/platform-autologout.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',Arial,sans-serif;background:#F0F4F8;color:#1e293b;min-height:100vh;direction:rtl}
:root{--primary:#6C3DD6;--secondary:#22D3EE;--card:#fff;--border:#e2e8f0;--text:#1e293b;--text2:#64748b}
.hdr{background:linear-gradient(135deg,#6C3DD6,#22D3EE);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(108,61,214,.25)}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{background:rgba(255,255,255,.2);border-radius:10px;padding:8px 14px;font-size:1.4rem;font-weight:900;color:#fff}
.hdr-title{color:#fff;font-size:1rem;font-weight:700}
.hdr-sub{color:rgba(255,255,255,.8);font-size:.75rem}
.btn-hdr{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 14px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;transition:.2s}
.btn-hdr:hover{background:rgba(255,255,255,.35)}
.tabs-bar{background:#fff;border-bottom:2px solid var(--border);padding:0 24px;display:flex;gap:2px;overflow-x:auto}
.tab{padding:14px 18px;border:none;background:transparent;color:var(--text2);font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.panel{display:none}.panel.active{display:block}
.main{padding:24px;max-width:1200px;margin:0 auto}
.card{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.card-title{font-size:1rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}

/* Sub assignment card */
.assign-card{background:#F8FAFF;border-radius:12px;border:1px solid var(--border);padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;transition:.2s}
.assign-card:hover{border-color:var(--primary)}
.assign-card.urgent{border-right:4px solid #ef4444;background:#fff8f8}
.assign-card.assigned{border-right:4px solid #22c55e;background:#f0fdf4}
.assign-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.assign-info{flex:1}
.assign-subject{font-weight:700;font-size:.92rem}
.assign-meta{font-size:.75rem;color:var(--text2);margin-top:2px}
.badge{padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:700;display:inline-block}
.badge-green{background:#dcfce7;color:#16a34a}.badge-yellow{background:#fef3c7;color:#d97706}.badge-red{background:#fee2e2;color:#dc2626}.badge-blue{background:#dbeafe;color:#1d4ed8}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:700;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#6C3DD6,#22D3EE);color:#fff}.btn-primary:hover{opacity:.9}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text2)}.btn-outline:hover{border-color:var(--primary)}
input,select{background:#fff;border:1.5px solid var(--border);border-radius:8px;color:var(--text);padding:9px 14px;font-family:inherit;font-size:.88rem}
input:focus,select:focus{outline:none;border-color:var(--primary)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:6px}
/* Untouchable ورقة rule */
.waraka-badge{background:#fffbeb;border:2px solid #f59e0b;color:#92400e;padding:10px 16px;border-radius:10px;font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:16px}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead{background:#F8FAFF}
th{padding:11px 14px;text-align:right;font-weight:700;color:var(--text2);border-bottom:2px solid var(--border)}
td{padding:10px 14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#F8FAFF}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:10px;padding:12px 24px;font-size:.88rem;font-weight:600;z-index:999;display:none}
.toast.show{display:block}
</style>
<script src="../platform-config.js"></script>
</head>
<body>
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">🔄</div>
    <div>
      <div class="hdr-title">المعلم/ة البديل/ة | Substitute</div>
      <div class="hdr-sub">إدارة الحصص البديلة تلقائياً — EduOS</div>
    </div>
  </div>
  <button class="btn-hdr" onclick="location.href='/apps/eduos-principal/'">← رجوع</button>
</header>
<div class="tabs-bar">
  <button class="tab active" onclick="switchTab('today')">📅 اليوم</button>
  <button class="tab" onclick="switchTab('assign')">➕ تعيين بديل/ة</button>
  <button class="tab" onclick="switchTab('history')">📋 السجل</button>
</div>
<div class="main">
  <div class="waraka-badge">
    🔒 تنبيه: عمود "ورقة" للمعلم/ة Dash غير قابل للتعديل وهو محمي تلقائياً
  </div>

  <div id="tab-today" class="panel active">
    <div class="card">
      <div class="card-header">
        <div class="card-title">📅 الحصص البديلة اليوم | Today's Subs</div>
        <span class="badge badge-blue" id="subCount">جاري التحميل...</span>
      </div>
      <div id="todaySubs"></div>
    </div>
  </div>

  <div id="tab-assign" class="panel">
    <div class="card">
      <div class="card-header"><div class="card-title">➕ تعيين معلم/ة بديل/ة | Assign Substitute</div></div>
      <div style="max-width:500px">
        <div class="form-group"><label class="form-label">المعلم/ة الغائب/ة | Absent Teacher</label><select id="absentTeacher"><option value="">اختر المعلم/ة...</option></select></div>
        <div class="form-group"><label class="form-label">الحصة | Period</label>
          <select id="subPeriod"><option value="1">الحصة 1 (07:15–07:55)</option><option value="2">الحصة 2 (08:00–08:40)</option><option value="3">الحصة 3 (08:45–09:25)</option><option value="4">الحصة 4 (09:30–10:10)</option><option value="5">الحصة 5 (10:30–11:10)</option><option value="6">الحصة 6 (11:15–11:55)</option></select>
        </div>
        <div class="form-group"><label class="form-label">الصف | Class</label><select id="subClass"><option value="">اختر الصف...</option></select></div>
        <div class="form-group"><label class="form-label">المعلم/ة البديل/ة | Substitute</label><select id="subTeacher"><option value="">اختر البديل/ة...</option></select></div>
        <button class="btn btn-primary" onclick="assignSub()">✅ تعيين البديل/ة</button>
      </div>
    </div>
  </div>

  <div id="tab-history" class="panel">
    <div class="card">
      <div class="card-header"><div class="card-title">📋 سجل الاستبدال | Sub History</div></div>
      <div class="tbl-wrap" id="subHistory"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SB='https://zuyizaiugpmhmeycqton.supabase.co';
const KEY=window.EduOS?.SB_KEY;
async function get(t,p=''){ const r=await fetch(`${SB}/rest/v1/${t}?${p}`,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}); return r.ok?r.json():[]; }

const DEMO_SUBS=[{absent:'أ. خالد محمد',period:'2',class:'4ج',sub:'أ. سارة أحمد',status:'assigned'},{absent:'أ. نورة علي',period:'4',class:'3أ',sub:'',status:'pending'},{absent:'أ. فيصل ناصر',period:'6',class:'6ب',sub:'أ. منى حسن',status:'assigned'}];

async function init(){
  document.getElementById('subCount').textContent=`${DEMO_SUBS.length} حصص بديلة`;
  renderTodaySubs();
  renderHistory();
  await loadStaff();
  await loadClasses();
}

function renderTodaySubs(){
  document.getElementById('todaySubs').innerHTML=DEMO_SUBS.map(s=>`
    <div class="assign-card ${s.status==='pending'?'urgent':'assigned'}">
      <div class="assign-icon" style="background:${s.status==='pending'?'#fee2e2':'#dcfce7'}">${s.status==='pending'?'⚠️':'✅'}</div>
      <div class="assign-info">
        <div class="assign-subject">الحصة ${s.period} — ${s.class}</div>
        <div class="assign-meta">غائب/ة: ${s.absent} ${s.sub?`· بديل/ة: ${s.sub}`:''}</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="badge ${s.status==='assigned'?'badge-green':'badge-red'}">${s.status==='assigned'?'مُعيَّن/ة':'معلّق'}</span>
        ${s.status==='pending'?`<button class="btn btn-primary" style="padding:6px 12px;font-size:.78rem" onclick="switchTab('assign')">تعيين</button>`:''}
      </div>
    </div>`).join('');
}

function renderHistory(){
  const hist=[{date:'2026-06-29',absent:'أ. خالد',period:'2',class:'4ج',sub:'أ. سارة'},{date:'2026-06-28',absent:'أ. نورة',period:'4',class:'3أ',sub:'أ. ريم'},{date:'2026-06-27',absent:'أ. فيصل',period:'1',class:'6ب',sub:'أ. خالد'}];
  document.getElementById('subHistory').innerHTML=`<table><thead><tr><th>التاريخ</th><th>الغائب/ة</th><th>الحصة</th><th>الصف</th><th>البديل/ة</th></tr></thead><tbody>${hist.map(h=>`<tr><td>${h.date}</td><td>${h.absent}</td><td>${h.period}</td><td>${h.class}</td><td>${h.sub}</td></tr>`).join('')}</tbody></table>`;
}

async function loadStaff(){
  try{
    const s=await get('staff_profiles','select=id,full_name&order=full_name&limit=50');
    s.forEach(st=>{
      ['absentTeacher','subTeacher'].forEach(id=>{ const o=document.createElement('option'); o.value=st.id; o.textContent=st.full_name; document.getElementById(id).appendChild(o.cloneNode(true)); });
    });
  }catch(e){}
}

async function loadClasses(){
  try{
    const c=await get('classes','select=id,name&order=name&limit=30');
    c.forEach(cl=>{ const o=document.createElement('option'); o.value=cl.id; o.textContent=cl.name; document.getElementById('subClass').appendChild(o); });
  }catch(e){}
}

async function assignSub(){
  const absent=document.getElementById('absentTeacher').value;
  const sub=document.getElementById('subTeacher').value;
  const period=document.getElementById('subPeriod').value;
  const cls=document.getElementById('subClass').value;
  if(!absent||!sub||!cls){ showToast('⚠️ أكمل/ي جميع الحقول'); return; }
  try{
    await fetch(`${SB}/rest/v1/substitute_assignments`,{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({absent_teacher_id:absent,substitute_teacher_id:sub,period_number:parseInt(period),class_id:cls,date:new Date().toISOString().split('T')[0]})});
  }catch(e){}
  showToast('✅ تم تعيين المعلم/ة البديل/ة وإرسال إشعار');
  switchTab('today');
}

function switchTab(n){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); ['today','assign','history'].forEach((t,i)=>{ if(t===n) document.querySelectorAll('.tab')[i].classList.add('active'); }); document.getElementById(`tab-${n}`).classList.add('active'); }
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
init();
</script>
</body>
</html>
