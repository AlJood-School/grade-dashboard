<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تغيير كلمة المرور — EduOS</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: #0D1B2A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 460px;
      text-align: center;
    }

    .logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #6C3DD6, #22D3EE);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(108,61,214,0.4);
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .alert-box {
      background: rgba(255, 193, 7, 0.1);
      border: 1px solid rgba(255, 193, 7, 0.3);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 28px;
      color: #FFC107;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: right;
    }

    label {
      display: block;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .input-wrap {
      position: relative;
    }

    input[type="password"], input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 14px 18px 14px 48px;
      color: #fff;
      font-family: 'Tajawal', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      direction: ltr;
      text-align: right;
    }

    input:focus {
      border-color: #6C3DD6;
      background: rgba(108,61,214,0.1);
    }

    .toggle-pw {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      line-height: 1;
    }

    .toggle-pw:hover { color: rgba(255,255,255,0.8); }

    .strength-bar {
      height: 4px;
      border-radius: 2px;
      margin-top: 8px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }

    .strength-text {
      font-size: 11px;
      margin-top: 4px;
      color: rgba(255,255,255,0.4);
    }

    .rules {
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 24px;
      text-align: right;
    }

    .rule {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .rule.ok { color: #22D3EE; }
    .rule.ok::before { content: '✓'; }
    .rule:not(.ok)::before { content: '○'; }

    .btn-submit {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #6C3DD6, #22D3EE);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Tajawal', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      margin-top: 16px;
      font-size: 14px;
      padding: 12px 16px;
      border-radius: 10px;
      display: none;
    }

    .msg.error {
      background: rgba(239,68,68,0.15);
      color: #F87171;
      border: 1px solid rgba(239,68,68,0.3);
      display: block;
    }

    .msg.success {
      background: rgba(34,211,238,0.1);
      color: #22D3EE;
      border: 1px solid rgba(34,211,238,0.3);
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-left: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">🎓</div>
  <h1>تغيير كلمة المرور</h1>
  <p class="subtitle">أهلاً بك في بوابة الجود الذكية<br/>يجب تغيير كلمة المرور قبل المتابعة</p>

  <div class="alert-box">
    ⚠️ كلمة المرور الافتراضية غير آمنة — يُرجى تعيين كلمة مرور خاصة بك
  </div>

  <form id="cpForm" autocomplete="off">
    <div class="form-group">
      <label>كلمة المرور الحالية</label>
      <div class="input-wrap">
        <input type="password" id="oldPw" placeholder="أدخل كلمة المرور الحالية" required/>
        <button type="button" class="toggle-pw" onclick="togglePw('oldPw',this)">👁</button>
      </div>
    </div>

    <div class="form-group">
      <label>كلمة المرور الجديدة</label>
      <div class="input-wrap">
        <input type="password" id="newPw" placeholder="أدخل كلمة مرور جديدة" required oninput="checkStrength()"/>
        <button type="button" class="toggle-pw" onclick="togglePw('newPw',this)">👁</button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-text" id="strengthText"></div>
    </div>

    <div class="form-group">
      <label>تأكيد كلمة المرور الجديدة</label>
      <div class="input-wrap">
        <input type="password" id="confirmPw" placeholder="أعد إدخال كلمة المرور الجديدة" required/>
        <button type="button" class="toggle-pw" onclick="togglePw('confirmPw',this)">👁</button>
      </div>
    </div>

    <div class="rules" id="rules">
      <div class="rule" id="r1">8 أحرف على الأقل</div>
      <div class="rule" id="r2">حرف كبير واحد على الأقل (A-Z)</div>
      <div class="rule" id="r3">رقم واحد على الأقل (0-9)</div>
      <div class="rule" id="r4">تختلف عن كلمة المرور الحالية</div>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">تغيير كلمة المرور</button>
  </form>

  <div class="msg" id="msg"></div>
</div>

<script>
  // قراءة بيانات المستخدم من الجلسة
  let sessionUser = null;
  try {
    const raw = sessionStorage.getItem('edoos_user');
    if (raw) sessionUser = JSON.parse(raw);
  } catch(e) {}

  // إذا لم تكن هناك جلسة → العودة لصفحة الدخول
  if (!sessionUser || !sessionUser.username) {
    window.location.replace('/apps/eduos-login/');
  }

  // إذا لم يكن مُجبراً على التغيير → العودة للـ Hub
  if (sessionUser && sessionUser.force_password_change === false) {
    window.location.replace('/apps/eduos-hub/');
  }

  const SUPABASE_URL = 'https://zuyizaiugpmhmeycqton.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1eWl6YWl1Z3BtaG1leWNxdG9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzM4MzY0NjAsImV4cCI6MjA0OTQxMjQ2MH0.PA7GVPhKJBIQn1YFEHiAHXXyY2kcmn2-JyJ3IUoJRuY';

  function togglePw(id, btn) {
    const input = document.getElementById(id);
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁';
    }
  }

  function checkStrength() {
    const pw = document.getElementById('newPw').value;
    const old = document.getElementById('oldPw').value;
    const fill = document.getElementById('strengthFill');
    const text = document.getElementById('strengthText');

    const r1 = pw.length >= 8;
    const r2 = /[A-Z]/.test(pw);
    const r3 = /[0-9]/.test(pw);
    const r4 = pw !== old || old === '';

    document.getElementById('r1').className = 'rule' + (r1 ? ' ok' : '');
    document.getElementById('r2').className = 'rule' + (r2 ? ' ok' : '');
    document.getElementById('r3').className = 'rule' + (r3 ? ' ok' : '');
    document.getElementById('r4').className = 'rule' + (r4 ? ' ok' : '');

    const score = [r1, r2, r3, pw.length >= 12, /[!@#$%^&*]/.test(pw)].filter(Boolean).length;

    const levels = [
      { w: '20%', color: '#EF4444', label: 'ضعيفة جداً' },
      { w: '40%', color: '#F97316', label: 'ضعيفة' },
      { w: '60%', color: '#EAB308', label: 'مقبولة' },
      { w: '80%', color: '#22C55E', label: 'جيدة' },
      { w: '100%', color: '#22D3EE', label: 'قوية جداً ✓' },
    ];

    const lvl = levels[Math.min(score, 4)];
    fill.style.width = pw ? lvl.w : '0%';
    fill.style.background = lvl.color;
    text.textContent = pw ? lvl.label : '';
    text.style.color = lvl.color;
  }

  function showMsg(type, text) {
    const msg = document.getElementById('msg');
    msg.className = 'msg ' + type;
    msg.textContent = text;
  }

  document.getElementById('cpForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const oldPw = document.getElementById('oldPw').value.trim();
    const newPw = document.getElementById('newPw').value.trim();
    const confirmPw = document.getElementById('confirmPw').value.trim();

    if (newPw !== confirmPw) {
      showMsg('error', '❌ كلمتا المرور غير متطابقتين');
      return;
    }

    if (newPw.length < 8 || !/[A-Z]/.test(newPw) || !/[0-9]/.test(newPw)) {
      showMsg('error', '❌ كلمة المرور لا تستوفي الشروط المطلوبة');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = 'جارٍ التغيير... <span class="spinner"></span>';

    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/change-password`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${SUPABASE_ANON}`,
        },
        body: JSON.stringify({
          username: sessionUser.username,
          old_password: oldPw,
          new_password: newPw,
        }),
      });

      const data = await res.json();

      if (data.success) {
        // تحديث الجلسة — إزالة force_password_change
        sessionUser.force_password_change = false;
        sessionStorage.setItem('edoos_user', JSON.stringify(sessionUser));

        showMsg('success', '✅ تم تغيير كلمة المرور بنجاح! جارٍ الدخول...');
        btn.innerHTML = '✅ تم';

        setTimeout(() => {
          // توجيه حسب الدور
          const roleMap = {
            admin: '/apps/eduos-hub/',
            principal: '/apps/eduos-hub/',
            teacher: '/apps/eduos-hub/',
            sub_teacher: '/apps/eduos-timetable/',
            social_worker: '/apps/eduos-hub/',
            nurse: '/apps/eduos-hub/',
            security: '/apps/eduos-hub/',
            support: '/apps/eduos-hub/',
          };
          const dest = roleMap[sessionUser.role] || '/apps/eduos-hub/';
          window.location.replace(dest);
        }, 1800);
      } else {
        showMsg('error', '❌ ' + (data.error || 'حدث خطأ'));
        btn.disabled = false;
        btn.innerHTML = 'تغيير كلمة المرور';
      }
    } catch(err) {
      showMsg('error', '❌ فشل الاتصال بالخادم — حاول مرة أخرى');
      btn.disabled = false;
      btn.innerHTML = 'تغيير كلمة المرور';
    }
  });
</script>
</body>
</html>
