<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>منظومة الجدول المدرسي - مدرسة الجود</title>
<style>
:root{--navy:#1A2A4A;--gold:#C9A84C;--light:#f8f9fa;--white:#fff;--text:#2c3e50;--border:#dee2e6;--hover:#e9ecef;--success:#27ae60;--danger:#e74c3c;--warn:#f39c12}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:var(--text);direction:rtl}
.header{background:linear-gradient(135deg,var(--navy),#2a3f6e);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px}
.header img.logo-main{width:52px;height:52px;border-radius:50%;background:#fff;padding:2px}
.header-title h1{font-size:1.25rem;font-weight:700;margin:0}
.header-title p{font-size:.8rem;opacity:.75;margin:2px 0 0}
.header-moe{margin-right:auto}
.header-moe img{height:38px;width:auto;filter:brightness(0) invert(1)}
.nav-tabs{background:#fff;border-bottom:2px solid var(--gold);display:flex;overflow-x:auto;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.nav-tab{padding:13px 20px;cursor:pointer;font-weight:600;font-size:.88rem;border-bottom:3px solid transparent;white-space:nowrap;color:#666;transition:all .2s;user-select:none}
.nav-tab:hover{background:var(--hover);color:var(--navy)}
.nav-tab.active{color:var(--navy);border-bottom-color:var(--gold);background:#fffaf0}
.section{display:none;padding:18px 20px;max-width:1400px;margin:0 auto}
.section.active{display:block}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.toolbar select,.toolbar input[type="text"]{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;font-family:inherit;background:#fff;color:var(--text)}
.toolbar select:focus,.toolbar input:focus{outline:none;border-color:var(--gold)}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:.85rem;transition:all .2s;font-family:inherit;white-space:nowrap}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:#2a3f6e}
.btn-gold{background:var(--gold);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:5px 11px;font-size:.8rem}
.btn-outline{background:transparent;border:1.5px solid var(--navy);color:var(--navy)}
.btn-outline:hover{background:var(--navy);color:#fff}
.stats-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.stat-card{background:#fff;border-radius:10px;padding:12px 18px;box-shadow:0 1px 6px rgba(0,0,0,.07);min-width:120px}
.stat-label{font-size:.75rem;color:#888;margin-bottom:2px}
.stat-val{font-size:1.3rem;font-weight:700;color:var(--navy)}
.load-bar{height:7px;border-radius:4px;background:#e8e8e8;margin-top:5px;overflow:hidden}
.load-fill{height:100%;border-radius:4px;background:var(--success);transition:width .3s}
.load-fill.warn{background:var(--warn)}
.sched-wrap{background:#fff;border-radius:12px;overflow:auto;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.sched-table{width:100%;border-collapse:collapse;min-width:800px}
.sched-table th{background:var(--navy);color:#fff;padding:9px 6px;text-align:center;font-size:.8rem;font-weight:600;white-space:nowrap;position:sticky;top:0}
.sched-table .th-period{min-width:115px}
.sched-table .th-day{background:#243b5e;min-width:85px}
.sched-table td{border:1px solid #e8e8e8;vertical-align:top;padding:3px;min-height:58px}
.day-cell{background:#f4f6f9;font-weight:700;color:var(--navy);text-align:center;padding:8px 5px;font-size:.84rem;vertical-align:middle}
.cell-card{background:#fff;border-radius:6px;padding:5px 7px;font-size:.77rem;cursor:pointer;transition:all .2s;border:1px solid #eee;margin:2px;min-height:50px;display:flex;flex-direction:column;justify-content:center;border-right-width:4px}
.cell-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.14);transform:translateY(-1px)}
.cell-card .c-subj{font-weight:700;color:#2c3e50;font-size:.8rem}
.cell-card .c-tchr{color:#666;font-size:.71rem;margin-top:2px}
.cell-empty{min-height:50px;cursor:pointer;border-radius:6px;border:1.5px dashed #d0d0d0;margin:2px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:1.3rem;transition:all .2s}
.cell-empty:hover{border-color:var(--gold);color:var(--gold);background:#fffaf0}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:.76rem;background:#fff;padding:3px 9px;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.leg-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.data-table{width:100%;border-collapse:collapse;font-size:.83rem;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.07)}
.data-table thead th{background:var(--navy);color:#fff;padding:10px 8px;text-align:right;font-weight:600;font-size:.8rem}
.data-table tbody td{padding:8px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.data-table tbody tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.73rem;font-weight:600}
.badge-c1{background:#dbeafe;color:#1e40af}
.badge-c2{background:#dcfce7;color:#166534}
.badge-c12{background:#f3e8ff;color:#6b21a8}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:24px;width:430px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-box h3{color:var(--navy);margin-bottom:16px;font-size:1rem;border-bottom:2px solid var(--gold);padding-bottom:8px}
.form-group{margin-bottom:13px}
.form-group label{display:block;font-weight:600;margin-bottom:4px;font-size:.85rem;color:#444}
.form-group select,.form-group input[type="text"]{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;font-family:inherit}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.gen-card{background:#fff;border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 1px 8px rgba(0,0,0,.07)}
.gen-card h4{color:var(--navy);margin-bottom:12px;font-size:.95rem;padding-bottom:8px;border-bottom:2px solid var(--gold)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:13px 22px;border-radius:12px;z-index:9999;font-size:.9rem;box-shadow:0 6px 20px rgba(0,0,0,.3);animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.week-badge{background:#e9f0ff;color:var(--navy);padding:5px 12px;border-radius:20px;font-size:.8rem;font-weight:600}
.progress-outer{background:#e8e8e8;border-radius:8px;height:14px;overflow:hidden;margin-top:10px}
.progress-inner{height:100%;background:linear-gradient(90deg,var(--navy),var(--gold));border-radius:8px;transition:width .4s}
@media print{
  .nav-tabs,.toolbar,.stats-bar,.btn,.modal-bg,.legend{display:none!important}
  .header{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .sched-wrap{box-shadow:none;border:1px solid #ccc}
  .section{display:block!important;padding:8px}
  body{background:#fff}
  @page{size:A4 landscape;margin:8mm}
}
</style>

// ============================================================
function getGrade(cls){return parseInt(cls,10);}
function getCycle(cls){return getGrade(cls)<=6?"C1":"C2";}
function getPeriods(cls){return getGrade(cls)<=6?PERIODS_C1:PERIODS_C2;}
function findTeacher(tid){
  for(var i=0;i<TEACHERS.length;i++){if(TEACHERS[i].id===tid)return TEACHERS[i];}
  return null;
}
function shuffled(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}
  return a;
}
function showToast(msg){
  var t=document.createElement("div");t.className="toast";t.textContent=msg;
  document.body.appendChild(t);setTimeout(function(){t.remove();},3000);
}

  var tabs=document.querySelectorAll(".nav-tab");

function renderClassSchedule(){
  var cls=document.getElementById("sel-class").value;
  var periods=getPeriods(cls);
  var teachPeriods=periods.filter(function(p){return !p.isBreak;});
  renderClassStats(cls,teachPeriods);
  var html="<thead><tr><th class='th-day'>اليوم</th>";
  for(var pi=0;pi<periods.length;pi++){
    var p=periods[pi];
    if(p.isBreak){
      html+="<th style='background:#C9A84C22;color:#7a6020;font-size:.68rem;padding:4px 6px;white-space:nowrap;min-width:70px'>";
      html+="<div style='font-weight:700'>"+p.label+"</div>";
      html+="<div style='font-size:.6rem;opacity:.8'>"+p.time+"</div></th>";
    } else {
      html+="<th class='th-period'><div>"+p.label+"</div><div style='font-size:.7rem;font-weight:400;opacity:.8'>"+p.time+"</div></th>";
    }
  }
  html+="</tr></thead><tbody>";
  for(var di=0;di<DAYS.length;di++){
    var day=DAYS[di];
    var dayData=SCHED[cls]?SCHED[cls][day]:{};
    html+="<tr><td class='day-cell'>"+DAYS_AR[day]+"<br><small style='font-weight:400;color:#8a9bb2'>"+day+"</small></td>";
    for(var pi=0;pi<periods.length;pi++){
      var p=periods[pi];
      if(p.isBreak){
        html+="<td style='background:linear-gradient(180deg,#C9A84C18,#C9A84C08);text-align:center;color:#9a7a30;font-size:.65rem;padding:4px;vertical-align:middle'>";
        html+="<div style='writing-mode:vertical-rl;transform:rotate(180deg);margin:0 auto;opacity:.7'>&#x2615; "+p.label+"</div></td>";
        continue;
      }
      var tid=dayData?dayData[p.id]:null;
      var teacher=tid?findTeacher(tid):null;
      html+="<td>";
      if(teacher){
        html+="<div class='cell-card' style='border-right:4px solid "+teacher.color+"' onclick='onCellClick(\""+cls+"\",\""+day+"\",\""+p.id+"\")'>";
        html+="<div class='c-subj'>"+teacher.subject+"</div>";
        html+="<div class='c-tchr'>"+teacher.name+"</div>";
        html+="</div>";
      }else if(editMode){
        html+="<div class='cell-empty' onclick='onCellClick(\""+cls+"\",\""+day+"\",\""+p.id+"\")'>+</div>";
      }else{
        html+="<div style='min-height:50px'></div>";
      }
      html+="</td>";
    }
    html+="</tr>";
  }
  html+="</tbody>";
  document.getElementById("class-sched-table").innerHTML=html;
  renderClassLegend(cls,teachPeriods);
}

function renderClassStats(cls,periods){
  var total=0;
  for(var di=0;di<DAYS.length;di++){
    var d=DAYS[di];
    if(SCHED[cls]&&SCHED[cls][d])total+=Object.keys(SCHED[cls][d]).length;
  }
  var maxSlots=periods.length*DAYS.length;
  var pct=maxSlots>0?Math.round(total/maxSlots*100):0;
  var fillCls=pct<40?"warn":"";
  document.getElementById("class-stats").innerHTML=
    "<div class='stat-card'><div class='stat-label'>الصف</div><div class='stat-val'>"+cls+"</div></div>"+
    "<div class='stat-card'><div class='stat-label'>مجموع الحصص</div><div class='stat-val'>"+total+"</div></div>"+
    "<div class='stat-card'><div class='stat-label'>اكتمال الجدول</div><div class='stat-val'>"+pct+"%</div><div class='load-bar'><div class='load-fill "+fillCls+"' style='width:"+pct+"%'></div></div></div>"+
    "<div class='stat-card'><div class='stat-label'>الحلقة</div><div class='stat-val' style='font-size:.95rem'>"+getCycle(cls)+"</div></div>";
}

function renderTeacherNote(t){
  if(!t || !t.note) return "";
  return "<span title='"+t.note+"' style='color:#e67e22;font-size:.6rem;margin-right:4px'>&#9888;</span>";
}
function renderClassLegend(cls,periods){
  var seen={};
  if(SCHED[cls]){
    var days=Object.keys(SCHED[cls]);
    for(var di=0;di<days.length;di++){
      var dayObj=SCHED[cls][days[di]];
      var pids=Object.keys(dayObj);
      for(var pi=0;pi<pids.length;pi++){
        var t=findTeacher(dayObj[pids[pi]]);
        if(t&&!seen[t.subject])seen[t.subject]=t.color;
      }
    }
  }
  var html="";
  var subjects=Object.keys(seen);
  for(var i=0;i<subjects.length;i++){
    html+="<div class='leg-item'><div class='leg-dot' style='background:"+seen[subjects[i]]+"'></div><span>"+subjects[i]+"</span></div>";
  }
  document.getElementById("class-legend").innerHTML=html;
}

function renderTeacherSchedule(){
  var tid=document.getElementById("sel-teacher").value;
  var teacher=findTeacher(tid);
  if(!teacher){document.getElementById("teacher-sched-table").innerHTML="";return;}
  var periods=teacher.cycle==="C2"?PERIODS_C2:PERIODS_C1;
  var tmap={};
  for(var ci=0;ci<CLASSES.length;ci++){
    var cls=CLASSES[ci];
    if(SCHED[cls]){
      for(var di=0;di<DAYS.length;di++){
        var day=DAYS[di];
        if(SCHED[cls][day]){
          for(var pi=0;pi<periods.length;pi++){
            var p=periods[pi];
            if(SCHED[cls][day][p.id]===tid){
              var key=day+"|"+p.id;
              if(!tmap[key])tmap[key]=[];
              tmap[key].push(cls);
            }
          }
        }
      }
    }
  }
  var wk=0;
  for(var di=0;di<DAYS.length;di++){
    for(var pi=0;pi<periods.length;pi++){
      var key=DAYS[di]+"|"+periods[pi].id;
      if(tmap[key])wk+=tmap[key].length;
    }
  }
  var ts=TSETTINGS[tid]||{};
  var maxW=ts.max||teacher.max;
  var pct=Math.min(100,maxW>0?Math.round(wk/maxW*100):0);
  var fillCls=pct>90?"over":pct>70?"warn":"";
  document.getElementById("teacher-stats").innerHTML=
    "<div class='stat-card'><div class='stat-label'>المعلمة</div><div class='stat-val' style='font-size:1rem'>"+teacher.name+"</div></div>"+
    "<div class='stat-card'><div class='stat-label'>المادة</div><div class='stat-val' style='font-size:.9rem'>"+teacher.subject+"</div></div>"+
    "<div class='stat-card'><div class='stat-label'>الحصص/أسبوع</div><div class='stat-val'>"+wk+" / "+maxW+"</div><div class='load-bar'><div class='load-fill "+fillCls+"' style='width:"+pct+"%'></div></div></div>"+
    "<div class='stat-card'><div class='stat-label'>الحلقة</div><div class='stat-val' style='font-size:.95rem'>"+teacher.cycle+"</div></div>";
  var html="<thead><tr><th class='th-day'>اليوم</th>";
  for(var pi=0;pi<periods.length;pi++){
    html+="<th class='th-period'>"+periods[pi].label+"<br><small style='font-weight:400;opacity:.8;font-size:.68rem'>"+periods[pi].time+"</small></th>";
  }
  html+="</tr></thead><tbody>";
  for(var di=0;di<DAYS.length;di++){
    var day=DAYS[di];
    html+="<tr><td class='day-cell'>"+DAYS_AR[day]+"<br><small style='font-weight:400;color:#8a9bb2'>"+day+"</small></td>";
    for(var pi=0;pi<periods.length;pi++){
      var key=day+"|"+periods[pi].id;
      var classes=tmap[key]||[];
      html+="<td>";
      for(var ci=0;ci<classes.length;ci++){
        html+="<div class='cell-card' style='border-right:4px solid "+teacher.color+";margin:2px'><div class='c-subj'>"+classes[ci]+"</div></div>";
      }
      html+="</td>";
    }
    html+="</tr>";
  }
  html+="</tbody>";
  document.getElementById("teacher-sched-table").innerHTML=html;
}

/* ─── Subjects that officially allow double/consecutive periods in the same class ─── */
// Subjects that may have two consecutive periods in the same class (confirmed from official schedule PDF)
var DOUBLE_ALLOWED = [
  // Confirmed from school schedule PDF (Cycle 1 double blocks)
  "Arabic & Islamic", "Arabic", "Islamic", "ARA", "ISL",
  "English", "Math", "Science", "ENG", "MATH", "SCI",
  // Special/activity subjects
  "Art", "Physical Education", "PE", "Music",
  "Computer", "CCDI", "ICT", "Lab", "Science Lab",
  "Drama", "Design", "Technology", "Jiu"
];

function subjectAllowsDouble(subject){
  if(!subject) return false;
  var s = subject.toLowerCase();
  for(var i=0;i<DOUBLE_ALLOWED.length;i++){
    if(s.indexOf(DOUBLE_ALLOWED[i].toLowerCase())!==-1) return true;
  }
  return false;
}

/* ─── Validation helpers ─── */
// checkConflict: only checks teaching periods (breaks are excluded from conflict checks)
function checkConflict(tid, day, pid, skipCls){
  // Returns list of classes where this teacher already has this period on this day
  var conflicts=[];
  for(var cls in SCHED){
    if(cls===skipCls)continue;
    if(SCHED[cls][day]&&SCHED[cls][day][pid]===tid) conflicts.push(cls);
  }
  return conflicts;
}

function checkSameClassDouble(tid, cls, day, pid){
  // Check if placing this teacher creates adjacent periods in the SAME class on the SAME day
  var periods = getPeriods(cls);
  // Only consider teaching periods (skip break rows)
  var teachPeriods = periods.filter(function(p){return !p.isBreak;});
  var allPids = teachPeriods.map(function(p){return p.id;});
  var newIdx = allPids.indexOf(pid);
  if(newIdx === -1) return false;

  // Simulate proposed assignment
  var simDay = {};
  if(SCHED[cls] && SCHED[cls][day]) Object.assign(simDay, SCHED[cls][day]);
  simDay[pid] = tid;

  // Check adjacent slots (before and after), only among teaching periods
  var breakPids = []; // break rows already filtered out above
  var adj = [];
  for(var d=-1;d<=1;d+=2){
    var ni = newIdx + d;
    if(ni<0 || ni>=allPids.length) continue;
    var adjPid = allPids[ni];
    if(breakPids.indexOf(adjPid) !== -1) continue; // skip if break between them
    if(simDay[adjPid] === tid) adj.push(adjPid);
  }
  return adj.length > 0;
}

function checkConsecutive(tid, cls, day, pid){
  // Build the period order for this class after the proposed change
  var periods=getPeriods(cls);
  var allPids=periods.map(function(p){return p.id;});
  // Simulate what the schedule will look like
  var simDay={};
  if(SCHED[cls]&&SCHED[cls][day]) Object.assign(simDay, SCHED[cls][day]);
  simDay[pid]=tid; // add proposed period
  // Count consecutive periods for this teacher
  var maxConsec=0, cur=0;
  for(var i=0;i<allPids.length;i++){
    if(simDay[allPids[i]]===tid){cur++; if(cur>maxConsec)maxConsec=cur;}
    else cur=0;
  }
  return maxConsec;
}

  // Remove old alert if exists
  var old=document.getElementById("val-alert");
  if(old)old.remove();

  var div=document.createElement("div");
  div.id="val-alert";
  div.style.cssText="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center;";

  var box=document.createElement("div");
  box.style.cssText="background:#fff;border-radius:14px;padding:28px 32px;max-width:460px;width:92%;box-shadow:0 8px 40px rgba(0,0,0,.3);text-align:center;direction:rtl;";

  var icon=blockOnly?"❌":"⚠️";
  var color=blockOnly?"#c0392b":"#e67e22";

  box.innerHTML="<div style='font-size:2.2rem;margin-bottom:10px;'>"+icon+"</div>"+
    "<h3 style='color:"+color+";margin:0 0 12px;font-size:1.1rem;'>"+
    (blockOnly?"تعارض في الجدول — لا يمكن الحفظ":"تحذير — يُرجى المراجعة")+"</h3>"+
    "<p style='color:#333;font-size:.95rem;line-height:1.7;margin:0 0 20px;'>"+msg+"</p>"+
    (blockOnly
      ? "<button onclick='document.getElementById(\"val-alert\").remove()' style='background:#c0392b;color:#fff;border:none;border-radius:8px;padding:10px 28px;font-size:.95rem;cursor:pointer;font-family:inherit;'>حسناً</button>"
      : "<button onclick='document.getElementById(\"val-alert\").remove();("+onConfirm.toString()+")()' style='background:#e67e22;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:.95rem;cursor:pointer;font-family:inherit;margin-left:10px;'>نعم، أنا متأكدة</button>"+
        "<button onclick='document.getElementById(\"val-alert\").remove()' style='background:#95a5a6;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:.95rem;cursor:pointer;font-family:inherit;'>إلغاء</button>"
    );

  div.appendChild(box);
  document.body.appendChild(div);
}

function applySave(tid){
  if(!SCHED[editCell.cls])SCHED[editCell.cls]={};
  if(!SCHED[editCell.cls][editCell.day])SCHED[editCell.cls][editCell.day]={};
  if(tid)SCHED[editCell.cls][editCell.day][editCell.pid]=tid;
  else delete SCHED[editCell.cls][editCell.day][editCell.pid];
  closeModal();renderClassSchedule();
}

function saveCell(){
  if(!editCell)return;
  var tid=document.getElementById("modal-teacher-sel").value;
  var cls=editCell.cls, day=editCell.day, pid=editCell.pid;

  if(!tid){
    // Clearing a cell — always allowed
    applySave(tid);
    return;
  }

  var t=findTeacher(tid);
  var tName=t?t.name:tid;

  // 1. HARD CHECK: teacher conflict (same period, same day, another class)
  var conflicts=checkConflict(tid,day,pid,cls);
  if(conflicts.length>0){
    var conflictList=conflicts.map(function(c){return "الصف "+c;}).join("، ");
    showValidationAlert(
      "المعلمة <strong>"+tName+"</strong> لديها حصة في نفس اليوم ونفس الوقت (<strong>"+pid+"</strong>) في: "+conflictList+".<br><br>لا يمكن أن تكون معلمة واحدة في صفَّين في وقت واحد.",
      null, true
    );
    return;
  }

  // 2. HARD CHECK: two consecutive periods for the same class (unless subject allows it)
  var hasDouble = checkSameClassDouble(tid, cls, day, pid);
  if(hasDouble){
    var t2=findTeacher(tid);
    var subj2=t2?t2.subject:"";
    if(!subjectAllowsDouble(subj2)){
      showValidationAlert(
        "المعلمة <strong>"+tName+"</strong> لديها بالفعل حصة في الصف <strong>"+cls+"</strong> في الحصة المجاورة مباشرةً في نفس اليوم.<br><br>"+
        "لا يُسمح بحصتين متتاليتين لنفس المعلمة في نفس الشعبة إلا إذا كانت المادة تستوجب ذلك رسمياً (كالفن أو التربية البدنية أو الحاسوب).<br><br>"+
        "مادة <strong>"+subj2+"</strong> لا تشترط الحصص المزدوجة.",
        null, true
      );
      return;
    }
  }

  // 3. SOFT CHECK: more than 3 consecutive periods
  var consec=checkConsecutive(tid,cls,day,pid);
  if(consec>3){
    var snapshot=JSON.stringify(editCell);
    var tidSnapshot=tid;
    showValidationAlert(
      "المعلمة <strong>"+tName+"</strong> ستحصل على <strong>"+consec+" حصص متتالية</strong> في هذا اليوم.<br><br>الحد الموصى به هو ٣ حصص متتالية فقط لتجنب الإرهاق.<br>هل أنتِ متأكدة من إجراء هذا التغيير؟",
      function(){ applySave(tidSnapshot); },
      false
    );
    return;
  }

  // All checks passed
  applySave(tid);
}

function exportClassCSV(){
  var cls=document.getElementById("sel-class").value;
  var periods=getPeriods(cls);
  var rows=[["اليوم"].concat(periods.map(function(p){return p.label;}))];
  for(var di=0;di<DAYS.length;di++){
    var day=DAYS[di];
    var row=[DAYS_AR[day]];
    for(var pi=0;pi<periods.length;pi++){
      var tid=SCHED[cls]&&SCHED[cls][day]?SCHED[cls][day][periods[pi].id]:"";
      var t=tid?findTeacher(tid):null;
      row.push(t?t.subject+" - "+t.name:"");
    }
    rows.push(row);
  }
  var csv=rows.map(function(r){return r.map(function(c){return '"'+c+'"';}).join(",");}).join("\n");
  var a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv);
  a.download="schedule_"+cls+".csv";
  a.click();
}

  renderGenTable();
}

  var html="";
  for(var i=0;i<genReqs.length;i++){

    html+="<tr>";

    for(var si=0;si<SUBJECTS.length;si++){
      html+="<option value='"+SUBJECTS[si]+"'"+(r.subject===SUBJECTS[si]?" selected":"")+ ">"+SUBJECTS[si]+"</option>";
    }
    html+="</select></td>";
    html+="<td><select style='width:100%;padding:4px;border:1px solid #ddd;border-radius:4px' onchange='genReqs["+idx+"].tid=this.value'><option value=''>اختر معلمة</option>";
    for(var ti=0;ti<TEACHERS.length;ti++){
      var t=TEACHERS[ti];

    }
    html+="</select></td>";
    html+="<td><input type='number' value='"+r.weekly+"' min='1' max='10' style='width:55px;padding:4px;border:1px solid #ddd;border-radius:4px;text-align:center' onchange='genReqs["+idx+"].weekly=+this.value'></td>";
    html+="<td><select style='padding:4px;border:1px solid #ddd;border-radius:4px' onchange='genReqs["+idx+"].adjacent=+this.value'><option value='1'"+(r.adjacent===1?" selected":"")+ ">مستقلة</option><option value='2'"+(r.adjacent===2?" selected":"")+ ">ثنائية</option><option value='3'"+(r.adjacent===3?" selected":"")+ ">ثلاثية</option></select></td>";
    html+="<td style='text-align:center'><button class='btn btn-danger btn-sm' onclick='genReqs.splice("+idx+",1);renderGenTable()'>X</button></td>";
    html+="</tr>";
  }
  document.getElementById("gen-tbody").innerHTML=html;
}
async function runGenerator(){
  var cls=document.getElementById("gen-cls").value;
  var maxConsec=+document.getElementById("max-consec").value;
  var medDaily=+document.getElementById("medical-daily").value;
  var periods=getPeriods(cls);
  document.getElementById("gen-prog").style.display="block";
  document.getElementById("gen-preview").innerHTML="";
  document.getElementById("approve-btn").style.display="none";
  var fill=document.getElementById("gen-prog-fill");
  var status=document.getElementById("gen-status");
  var result={};
  for(var di=0;di<DAYS.length;di++)result[DAYS[di]]={};
  var tDaily={},tWeekly={};
  for(var ti=0;ti<TEACHERS.length;ti++){
    var t=TEACHERS[ti];tDaily[t.id]={};tWeekly[t.id]=0;
    for(var di=0;di<DAYS.length;di++)tDaily[t.id][DAYS[di]]=0;
  }
  var done=0;
  var total=genReqs.reduce(function(s,r){return s+(r.weekly||0);},0);
  for(var ri=0;ri<genReqs.length;ri++){
    var req=genReqs[ri];
    if(!req.tid)continue;
    var t=findTeacher(req.tid);if(!t)continue;
    var ts=TSETTINGS[t.id]||{};
    var maxW=ts.max||t.max;
    var dailyMax=ts.medical?medDaily:(ts.maternity?Math.max(1,Math.floor(maxW/5)-2):6);
    var placed=0;
    if(req.adjacent>=2){
      var shuffDays=shuffled(DAYS);
      for(var di=0;di<shuffDays.length;di++){
        if(placed>=req.weekly)break;
        var day=shuffDays[di];
        for(var i=0;i<=periods.length-req.adjacent;i++){
          if(placed>=req.weekly)break;
          var grp=[];for(var j=i;j<i+req.adjacent;j++)grp.push(periods[j].id);
          var ok=true;
          for(var gi=0;gi<grp.length;gi++){if(result[day][grp[gi]]){ok=false;break;}}
          if(ok&&tDaily[req.tid][day]+req.adjacent<=dailyMax&&tWeekly[req.tid]+req.adjacent<=maxW){
            for(var gi=0;gi<grp.length;gi++){result[day][grp[gi]]=req.tid;tDaily[req.tid][day]++;tWeekly[req.tid]++;placed++;}
            break;
          }
        }
      }
    }
    var shuffDays2=shuffled(DAYS);
    for(var di=0;di<shuffDays2.length;di++){
      if(placed>=req.weekly)break;
      var day=shuffDays2[di];
      var shuffP=shuffled(periods);
      for(var pi=0;pi<shuffP.length;pi++){
        if(placed>=req.weekly)break;
        var p=shuffP[pi];
        if(!result[day][p.id]&&tDaily[req.tid][day]<dailyMax&&tWeekly[req.tid]<maxW){
          result[day][p.id]=req.tid;tDaily[req.tid][day]++;tWeekly[req.tid]++;placed++;
        }
      }
    }
    done+=req.weekly;
    fill.style.width=Math.min(100,Math.round(done/total*100))+"%";
    status.textContent="جاري توزيع: "+t.subject+" ("+t.name+") - "+placed+"/"+req.weekly;
    await new Promise(function(r){setTimeout(r,70);});
  }
  fill.style.width="100%";
  status.textContent="اكتمل التوليد - راجع النتائج";
  genResult={cls:cls,result:result};
  showGenPreview(cls,result,periods);
  document.getElementById("approve-btn").style.display="";
}
function showGenPreview(cls,result,periods){
  var html="<div style='background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,.07)'>";
  html+="<h4 style='color:var(--navy);margin-bottom:10px;font-size:.95rem'>معاينة الجدول المولد - صف "+cls+"</h4>";
  html+="<div style='overflow-x:auto'><table class='sched-table'><thead><tr><th class='th-day'>اليوم</th>";
  for(var pi=0;pi<periods.length;pi++)html+="<th class='th-period'>"+periods[pi].label+"<br><small>"+periods[pi].time+"</small></th>";
  html+="<th style='background:var(--navy);color:#fff;min-width:55px;text-align:center'>مجموع</th></tr></thead><tbody>";
  for(var di=0;di<DAYS.length;di++){
    var day=DAYS[di];var cnt=0;
    html+="<tr><td class='day-cell'>"+DAYS_AR[day]+"</td>";
    for(var pi=0;pi<periods.length;pi++){
      var tid2=result[day]?result[day][periods[pi].id]:"";
      var t=tid2?findTeacher(tid2):null;
      if(t){cnt++;html+="<td><div class='cell-card' style='border-right:4px solid "+t.color+"'><div class='c-subj'>"+t.subject+"</div><div class='c-tchr'>"+t.name+"</div></div></td>";}
      else html+="<td><div style='min-height:50px'></div></td>";
    }
    html+="<td style='text-align:center;font-weight:700;color:var(--navy)'>"+cnt+"</td></tr>";
  }
  html+="</tbody></table></div></div>";
  document.getElementById("gen-preview").innerHTML=html;
}
function approveGenerated(){
  if(!genResult){alert("ولّد الجدول أولاً");return;}
  var cls=genResult.cls,result=genResult.result;
  if(!SCHED[cls])SCHED[cls]={};
  for(var di=0;di<DAYS.length;di++){
    var d=DAYS[di];
    if(!SCHED[cls][d])SCHED[cls][d]={};
    var keys=Object.keys(result[d]);
    for(var ki=0;ki<keys.length;ki++)SCHED[cls][d][keys[ki]]=result[d][keys[ki]];
  }
  saveScheduleLS(SCHED);
  showToast("تم اعتماد جدول الصف "+cls+" وحفظه");
  document.getElementById("sel-class").value=cls;
  document.querySelector(".nav-tab[data-tab='tab-class']").click();
}
