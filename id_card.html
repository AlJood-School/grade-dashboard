<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans Arabic',sans-serif; direction:rtl;
        display:flex; justify-content:center; align-items:center;
        width:85mm; height:54mm; overflow:hidden; }
@page { size:85mm 54mm; margin:0; }
.card { width:85mm; height:54mm; background:#fff;
         display:flex; flex-direction:column;
         border:1px solid #C9A84C; overflow:hidden; }
.card-header { background:#1A2A4A; height:12mm; display:flex;
                align-items:center; padding:0 3mm; justify-content:space-between; }
.school-name { color:#C9A84C; font-size:8pt; font-weight:700; }
.card-body { display:flex; flex:1; padding:2mm 3mm; align-items:center; gap:2mm; }
.photo-box { width:18mm; height:24mm; border-radius:3px; background:#e8ecf0;
              border:1px solid #C9A84C; flex-shrink:0; }
.info { flex:1; }
.teacher-name { font-size:9.5pt; font-weight:700; color:#1A2A4A; margin-bottom:1mm; }
.teacher-role { font-size:8pt; color:#555; margin-bottom:1mm; }
.teacher-id { font-size:7.5pt; color:#888; margin-bottom:1mm; }
.teacher-email { font-size:7pt; color:#aaa; }
.jood-small { width:50px; height:50px; flex-shrink:0; }
.card-footer { background:#C9A84C; height:8mm; display:flex;
                align-items:center; padding:0 3mm;
                justify-content:space-between; }
.footer-text { color:#1A2A4A; font-size:7pt; font-weight:600; }
