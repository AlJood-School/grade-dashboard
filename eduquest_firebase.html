
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>

(function() {
  'use strict';
  
  const SYNC_KEYS = ['eduquest_results', 'eduquest_students', 'eduquest_sessions', 
                     'eduquest_teams', 'eduquest_progress', 'eduquest_challenges'];
  
  
  let syncQueue = [];
  let isSyncing = false;
  
  
  const isAppsScript = typeof google !== 'undefined' && google.script && google.script.run;
  
  if (!isAppsScript) {
    console.log('EduQuest: Running in standalone mode (localStorage only)');
    return;
  }
  
  console.log('EduQuest: Google Sheets sync enabled ✅');
  
  
  const originalSetItem = localStorage.setItem.bind(localStorage);
  const originalGetItem = localStorage.getItem.bind(localStorage);
  
  localStorage.setItem = function(key, value) {
    originalSetItem(key, value);
    
    
    if (key.startsWith('eduquest_') || key.startsWith('eq_')) {
      queueSync(key, value);
    }
  };
  
  function queueSync(key, value) {
    syncQueue.push({ key, value, timestamp: Date.now() });
    if (!isSyncing) {
      processSyncQueue();
    }
  }
  
  function processSyncQueue() {
    if (syncQueue.length === 0) {
      isSyncing = false;
      return;
    }
    
    isSyncing = true;
    const item = syncQueue.shift();
    
    try {
      
      let data;
      try { data = JSON.parse(item.value); } catch(e) { data = item.value; }
      
      
      if (item.key.includes('result')) {
        syncResults(data);
      } else if (item.key.includes('session')) {
        syncSession(data);
      } else if (item.key.includes('progress')) {
        syncProgress(data);
      } else if (item.key.includes('team')) {
        syncTeams(data);
      }
    } catch(e) {
      console.warn('Sync error:', e);
    }
    
    
    setTimeout(processSyncQueue, 500);
  }
  
  function syncResults(data) {
    if (!Array.isArray(data)) data = [data];
    data.forEach(function(result) {
      google.script.run
        .withSuccessHandler(function(r) { 
          if(r.success) console.log('✅ Result synced'); 
        })
        .withFailureHandler(function(e) { 
          console.warn('❌ Sync failed:', e); 
        })
        .saveResult(result);
    });
  }
  
  function syncSession(data) {
    google.script.run
      .withSuccessHandler(function(r) {})
      .withFailureHandler(function(e) { console.warn('Session sync failed:', e); })
      .saveSession(data);
  }
  
  function syncProgress(data) {
    if (data && data.studentId) {
      google.script.run
        .withSuccessHandler(function(r) {})
        .withFailureHandler(function(e) {})
        .updateStudentProgress(data.studentId, data.level || 1, data.xp || 0, data.totalStars || 0);
    }
  }
  
  function syncTeams(data) {
    if (!Array.isArray(data)) data = [data];
    data.forEach(function(team) {
      google.script.run
        .withSuccessHandler(function(r) {})
        .withFailureHandler(function(e) {})
        .saveTeam(team);
    });
  }
  
  
  window.addEventListener('load', function() {
    setTimeout(function() {
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success && result.students.length > 0) {
            console.log('📥 Loaded ' + result.students.length + ' students from Sheets');
            
            const existing = originalGetItem('eduquest_students');
            if (!existing) {
              originalSetItem('eduquest_students', JSON.stringify(result.students));
            }
          }
        })
        .withFailureHandler(function(e) {
          console.warn('Failed to load from Sheets:', e);
        })
        .getAllStudents();
    }, 2000);
  });
  
  
  window.eduquestSync = {
    syncAll: function() {
      console.log('🔄 Manual sync started...');
      
      const keys = Object.keys(localStorage).filter(function(k) { 
        return k.startsWith('eduquest_') || k.startsWith('eq_'); 
      });
      keys.forEach(function(key) {
        queueSync(key, localStorage.getItem(key));
      });
    },
    getStats: function() {
      return new Promise(function(resolve) {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(function(e) { resolve({ error: e }); })
          .getDashboardStats();
      });
    }
  };
})();

</script>

- اسمي = "أحمد" (نص)
- عمري = 9 (رقم)
- طالب = صحيح (منطقي)

1. تكتب عنوان الموقع 🔗
2. يذهب الطلب عبر الشبكة 📡

4. المتصفح يعرضها لك 🖥️

function eqUpdateNames() {
  const cls = document.getElementById('eq-grade-select').value;
  const nameSelect = document.getElementById('eq-name-select');
  const btn = document.getElementById('eq-enter-btn');
  nameSelect.innerHTML = '<option value="">-- اختر اسمك --</option>';
  nameSelect.disabled = true;
  btn.disabled = true;
  if (!cls || !EQ_STUDENTS[cls]) return;
  EQ_STUDENTS[cls].forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.pin;
    opt.textContent = s.name;
    nameSelect.appendChild(opt);
  });
  nameSelect.disabled = false;
  nameSelect.onchange = () => {
    btn.disabled = !nameSelect.value;
  };
}

function eqStartGame() {
  const pin = document.getElementById('eq-name-select').value;
  if (!pin) return;
  
  // Hide overlay
  document.getElementById('eq-login-overlay').classList.add('hidden');
  
  // Wait for game to render, then auto-enter PIN
  function tryAutoPin(attempts) {
    const buttons = document.querySelectorAll('button');
    // Find digit buttons in the game's pin pad
    const digitBtns = Array.from(buttons).filter(b => {
      const txt = b.textContent.trim();
      return txt.length === 1 && '0123456789'.includes(txt);
    });
    
    if (digitBtns.length < 10 && attempts > 0) {
      setTimeout(() => tryAutoPin(attempts - 1), 300);
      return;
    }
    
    if (digitBtns.length > 0) {
      // Click each digit
      let delay = 100;
      pin.split('').forEach(digit => {
        setTimeout(() => {
          const btn = digitBtns.find(b => b.textContent.trim() === digit);
          if (btn) btn.click();
        }, delay);
        delay += 200;
      });
    } else {
      // Fallback: show overlay again with error
      document.getElementById('eq-login-overlay').classList.remove('hidden');
      document.getElementById('eq-error').style.display = 'block';
    }
  }
  
  setTimeout(() => tryAutoPin(15), 500);
}
