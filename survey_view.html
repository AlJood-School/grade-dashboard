<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استبيان — روضة ومدرسة الجود</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Tajawal',sans-serif;background:#f0f4f8;min-height:100vh;color:#1a2e4a}
  header{background:#1a2e4a;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
  header h1{font-size:20px;font-weight:800}
  .logo-area{display:flex;align-items:center;gap:10px}
  .progress-bar-outer{height:6px;background:#e2e8f0;width:100%}
  .progress-bar-inner{height:6px;background:linear-gradient(90deg,#d4a843,#f0c060);transition:width .4s ease}
  .card{background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08);max-width:600px;margin:30px auto;overflow:hidden}
  .card-header{background:linear-gradient(135deg,#1a2e4a,#2a4a7a);color:#fff;padding:24px;text-align:center}
  .card-header h2{font-size:20px;font-weight:800;margin-bottom:6px}
  .card-header p{font-size:13px;opacity:.85}
  .card-body{padding:28px}
  .step-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;font-size:13px;color:#888}
  .question-text{font-size:17px;font-weight:700;color:#1a2e4a;margin-bottom:18px;line-height:1.5}
  .required-star{color:#e53e3e;margin-right:3px}
  /* section divider */
  .section-divider{text-align:center;padding:20px 0}
  .section-divider h3{font-size:18px;font-weight:800;color:#1a2e4a;border-bottom:3px solid #d4a843;padding-bottom:10px;display:inline-block}
  /* radio/checkbox cards */
  .options-grid{display:flex;flex-direction:column;gap:10px}
  .opt-card{border:2px solid #e2e8f0;border-radius:10px;padding:14px 18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;font-size:15px}
  .opt-card:hover{border-color:#d4a843;background:#fffbf0}
  .opt-card.selected{border-color:#d4a843;background:#fffbf0;font-weight:600}
  .opt-card input{accent-color:#d4a843;width:18px;height:18px;flex-shrink:0}
  /* text/textarea */
  .form-control{width:100%;border:2px solid #e2e8f0;border-radius:10px;padding:12px 16px;font-family:'Tajawal',sans-serif;font-size:15px;color:#1a2e4a;transition:border-color .2s;resize:vertical}
  .form-control:focus{outline:none;border-color:#d4a843}
  /* rating */
  .stars-row{display:flex;gap:8px;justify-content:center;margin:10px 0}
  .star{font-size:40px;cursor:pointer;transition:transform .15s,opacity .15s;opacity:.4;user-select:none}
  .star.active,.star:hover{opacity:1;transform:scale(1.2)}
  /* scale */
  .scale-container{text-align:center}
  .scale-input{width:100%;accent-color:#d4a843;margin:12px 0}
  .scale-value{font-size:48px;font-weight:800;color:#d4a843}
  .scale-labels{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-top:4px}
  /* yesno */
  .yesno-row{display:flex;gap:16px;justify-content:center;margin:10px 0}
  .yesno-btn{flex:1;padding:20px;border-radius:12px;border:3px solid #e2e8f0;background:#fff;font-family:'Tajawal',sans-serif;font-size:22px;font-weight:700;cursor:pointer;transition:all .2s;max-width:180px}
  .yesno-btn:hover{transform:scale(1.04)}
  .yesno-btn.selected-yes{border-color:#38a169;background:#f0fff4;color:#276749}
  .yesno-btn.selected-no{border-color:#e53e3e;background:#fff5f5;color:#c53030}
  /* navigation */
  .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:18px;border-top:2px solid #f0f4f8}
  .btn{font-family:'Tajawal',sans-serif;padding:12px 28px;border-radius:10px;border:none;cursor:pointer;font-size:15px;font-weight:600;transition:all .2s}
  .btn-next{background:#d4a843;color:#1a2e4a}
  .btn-next:hover{background:#c19635}
  .btn-back{background:#e2e8f0;color:#4a5568}
  .btn-back:hover{background:#cbd5e0}
  .btn-submit{background:linear-gradient(135deg,#1a2e4a,#2a4a7a);color:#fff}
  .btn-submit:hover{opacity:.9}
  /* start screen */
  .start-screen .card-body{text-align:center}
  .start-screen h3{font-size:22px;font-weight:800;margin-bottom:12px}
  .start-screen p{color:#666;margin-bottom:20px;font-size:15px;line-height:1.6}
  .name-input{margin:16px 0}
  /* success */
  .success-screen{text-align:center;padding:40px 28px}
  .success-icon{font-size:70px;margin-bottom:16px}
  .success-screen h2{font-size:22px;font-weight:800;color:#276749;margin-bottom:10px}
  .success-screen p{color:#666;font-size:15px}
  .countdown{font-size:40px;font-weight:800;color:#d4a843;margin:16px 0}
  .btn-home{margin-top:16px;background:#1a2e4a;color:#fff;padding:12px 32px;border-radius:10px;border:none;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:600;cursor:pointer}
  /* error/unavailable */
  .unavailable{text-align:center;padding:60px 28px}
  .unavailable .icon{font-size:60px;margin-bottom:16px}
  /* loading */
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;color:#888}
  .spinner{width:40px;height:40px;border:4px solid #e2e8f0;border-top:4px solid #d4a843;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-msg{color:#e53e3e;font-size:13px;margin-top:8px}
  .ip-badge{position:fixed;bottom:14px;left:14px;background:linear-gradient(135deg,#1a2e4a,#2a4a7a);color:#d4a843;padding:5px 12px;border-radius:20px;font-size:11px;font-family:'Tajawal',sans-serif;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
  @media print{.ip-badge,.nav-row button{display:none}}
</style>
</head>
<body>
<header>
  <div class="logo-area">
    <span style="font-size:26px">📝</span>
    <h1 id="headerTitle">استبيان</h1>
  </div>
  <span style="font-size:13px;opacity:.8">روضة ومدرسة الجود</span>
</header>
<div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar" style="width:0%"></div></div>

<div id="mainContent">
  <div class="card"><div class="card-body"><div class="loading"><div class="spinner"></div><p>جاري التحميل...</p></div></div></div>
</div>

<div class="ip-badge">🛡️ 1614-2026</div>

<script>
const SUPABASE_URL = 'https://zuyizaiugpmhmeycqton.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1eWl6YWl1Z3BtaG1leWNxdG9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwODgyNDAsImV4cCI6MjA5NDY2NDI0MH0.FqOUqiR7GfttAEI8NY3bbOwFPnupxBsHMgYJCNT68PI';
const hdrs = {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};
const roleMap = {admin:'principal_dashboard.html',principal:'principal_dashboard.html',teacher:'teacher_hub.html',special_ed:'special_ed_dashboard.html',assistant:'teacher_hub.html'};

const urlParams = new URLSearchParams(window.location.search);
const surveyId = urlParams.get('id');
const role = sessionStorage.getItem('aljood_session_role');
const userId = sessionStorage.getItem('aljood_session_id');
const schoolId = sessionStorage.getItem('aljood_school_id');
const userName = sessionStorage.getItem('aljood_session_name');

let survey = null;
let questions = [];
let activeQuestions = []; // non-section questions
let currentIndex = 0;
let answers = {};
let respondentName = '';
let respondentRole = '';

async function sbFetch(path, opts={}){
  const r = await fetch(SUPABASE_URL+'/rest/v1/'+path, {...opts, headers:{...hdrs,...(opts.headers||{})}});
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const ct=r.headers.get('content-type')||'';
  return ct.includes('json') ? r.json() : null;
}

function setContent(html){ document.getElementById('mainContent').innerHTML = html; }

async function init(){
  if(!surveyId){showUnavailable('رابط غير صحيح — معرف الاستبيان مفقود');return;}
  // check duplicate
  if(sessionStorage.getItem('survey_done_'+surveyId)){
    showAlreadyDone();return;
  }
  try{
    const surveys = await sbFetch(`surveys?id=eq.${surveyId}&select=*`);
    if(!surveys.length){showUnavailable('هذا الاستبيان غير موجود');return;}
    survey = surveys[0];
    if(survey.status==='closed' || survey.status==='draft'){
      showUnavailable('هذا الاستبيان غير متاح حالياً');return;
    }
    questions = await sbFetch(`survey_questions?survey_id=eq.${surveyId}&order=order_num.asc&select=*`);
    activeQuestions = questions.filter(q=>q.type!=='section');
    document.getElementById('headerTitle').textContent = survey.title;
    showStartScreen();
  }catch(e){showUnavailable('خطأ في التحميل: '+e.message);}
}

function showUnavailable(msg){
  setContent(`<div class="card"><div class="unavailable"><div class="icon">🔒</div><h2>${msg}</h2><p style="color:#888;margin-top:10px">يرجى التواصل مع إدارة المدرسة</p></div></div>`);
}

function showAlreadyDone(){
  setContent(`<div class="card"><div class="unavailable"><div class="icon">✅</div><h2>أجبتِ على هذا الاستبيان مسبقاً</h2><p style="color:#888;margin-top:10px">شكراً لمشاركتك</p><br><button class="btn btn-submit" onclick="goHome()" style="margin-top:10px">العودة إلى البوابة</button></div></div>`);
}

function showStartScreen(){
  const roles=[{v:'teacher',l:'معلمة'},{v:'special_ed',l:'تربية خاصة'},{v:'assistant',l:'مساعد'},{v:'admin',l:'إدارة'},{v:'principal',l:'مدير'}];
  const detected = role||'';
  const detectedName = userName||'';
  setContent(`
  <div class="card start-screen">
    <div class="card-header">
      <h2>${survey.title}</h2>
      ${survey.description?`<p>${survey.description}</p>`:''}
    </div>
    <div class="card-body">
      <div class="name-input">
        <label style="display:block;font-weight:600;margin-bottom:6px;font-size:14px">الاسم ${survey.allow_anon?'(اختياري)':'*'}</label>
        <input type="text" id="nameInput" class="form-control" value="${detectedName}" placeholder="اسمك الكامل">
      </div>
      <div style="margin-bottom:16px">
        <label style="display:block;font-weight:600;margin-bottom:8px;font-size:14px">الدور *</label>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          ${roles.map(r=>`<label class="opt-card" style="cursor:pointer;padding:10px 16px;flex:1;min-width:100px;justify-content:center">
            <input type="radio" name="roleSelect" value="${r.v}" ${detected===r.v?'checked':''} style="display:none" onchange="selectedRole='${r.v}'">
            <span>${r.l}</span>
          </label>`).join('')}
        </div>
      </div>
      <p style="color:#888;font-size:13px;margin-bottom:20px">يتضمن هذا الاستبيان <strong>${activeQuestions.length}</strong> سؤالاً. يُرجى الإجابة بصدق.</p>
      <button class="btn btn-submit" style="width:100%;padding:14px;font-size:16px" onclick="startSurvey()">بدء الاستبيان ←</button>
    </div>
  </div>`);
  // Style radio as cards
  document.querySelectorAll('input[name="roleSelect"]').forEach(r=>{
    if(r.checked) r.closest('label').classList.add('selected');
    r.addEventListener('change',function(){
      document.querySelectorAll('input[name="roleSelect"]').forEach(x=>x.closest('label').classList.remove('selected'));
      this.closest('label').classList.add('selected');
    });
  });
}

let selectedRole = role||'';

function startSurvey(){
  const nameEl = document.getElementById('nameInput');
  respondentName = nameEl ? nameEl.value.trim() : '';
  const roleEl = document.querySelector('input[name="roleSelect"]:checked');
  respondentRole = roleEl ? roleEl.value : selectedRole;
  if(!survey.allow_anon && !respondentName){
    document.getElementById('nameInput').style.borderColor='#e53e3e';
    return;
  }
  if(!respondentRole){alert('الرجاء اختيار دورك');return;}
  currentIndex=0;
  showQuestion();
}

function getOrderedItems(){
  // flatten: sections and questions in order
  return questions;
}

function showQuestion(){
  // find current question (skip sections for counting but show them)
  // We iterate through questions in order
  // currentIndex refers to activeQuestions index
  updateProgress();

  // Find which question in the full list corresponds
  const q = activeQuestions[currentIndex];
  if(!q){return;}

  // Check if there's a section before this question
  const qOrderNum = q.order_num;
  // Find sections between previous question and this one
  const prevQOrderNum = currentIndex>0 ? activeQuestions[currentIndex-1].order_num : 0;
  const sections = questions.filter(x=>x.type==='section' && x.order_num>prevQOrderNum && x.order_num<qOrderNum);
  const sectionHtml = sections.map(s=>`<div class="section-divider"><h3>${s.section_title||s.question_text||''}</h3></div>`).join('');

  setContent(`
  <div class="card">
    <div class="card-body">
      ${sectionHtml}
      <div class="step-info">
        <span>السؤال ${currentIndex+1} من ${activeQuestions.length}</span>
        ${q.required?'<span style="color:#e53e3e;font-size:12px">* إلزامي</span>':''}
      </div>
      <div class="question-text">${q.required?'<span class="required-star">*</span>':''}${q.question_text}</div>
      <div id="inputArea">${buildInput(q)}</div>
      <div class="error-msg" id="errMsg" style="display:none">يرجى الإجابة على هذا السؤال أولاً</div>
      <div class="nav-row">
        ${currentIndex>0?`<button class="btn btn-back" onclick="goBack()">← السابق</button>`:'<div></div>'}
        ${currentIndex<activeQuestions.length-1
          ? `<button class="btn btn-next" onclick="goNext()">التالي →</button>`
          : `<button class="btn btn-submit" onclick="submitSurvey()">إرسال الاستبيان ✓</button>`}
      </div>
    </div>
  </div>`);
  restoreAnswer(q);
}

function buildInput(q){
  switch(q.type){
    case 'single':
      return `<div class="options-grid">${(q.options||[]).map((o,i)=>`
        <label class="opt-card" onclick="selectSingle(this,'${q.id}','${o.replace(/'/g,"\\'")}')">
          <input type="radio" name="q_${q.id}" value="${o}" style="display:none">
          <span>${o}</span>
        </label>`).join('')}</div>`;
    case 'multiple':
      return `<div class="options-grid">${(q.options||[]).map((o,i)=>`
        <label class="opt-card" onclick="toggleMulti(this,'${q.id}','${o.replace(/'/g,"\\'")}')">
          <input type="checkbox" name="q_${q.id}" value="${o}" style="display:none">
          <span>${o}</span>
        </label>`).join('')}</div>`;
    case 'text':
      return `<input type="text" class="form-control" id="input_${q.id}" placeholder="اكتب إجابتك هنا..." onchange="answers['${q.id}']=this.value">`;
    case 'textarea':
      return `<textarea class="form-control" id="input_${q.id}" rows="4" placeholder="اكتب إجابتك هنا..." onchange="answers['${q.id}']=this.value"></textarea>`;
    case 'rating':
      return `<div class="stars-row">${[1,2,3,4,5].map(n=>`<span class="star" data-val="${n}" onclick="selectStar('${q.id}',${n})">★</span>`).join('')}</div>
      <div style="text-align:center;color:#888;font-size:13px;margin-top:4px" id="starLabel_${q.id}">لم يتم الاختيار</div>`;
    case 'scale':
      return `<div class="scale-container">
        <div class="scale-value" id="scaleVal_${q.id}">${answers[q.id]||5}</div>
        <input type="range" min="1" max="10" value="${answers[q.id]||5}" class="scale-input" 
          oninput="document.getElementById('scaleVal_${q.id}').textContent=this.value;answers['${q.id}']=parseInt(this.value)">
        <div class="scale-labels"><span>1 — منخفض جداً</span><span>10 — مرتفع جداً</span></div>
      </div>`;
    case 'yesno':
      return `<div class="yesno-row">
        <button class="yesno-btn" id="yn_yes_${q.id}" onclick="selectYesNo('${q.id}','yes')">نعم 👍</button>
        <button class="yesno-btn" id="yn_no_${q.id}" onclick="selectYesNo('${q.id}','no')">لا 👎</button>
      </div>`;
    default:
      return `<input type="text" class="form-control" id="input_${q.id}" onchange="answers['${q.id}']=this.value">`;
  }
}

function restoreAnswer(q){
  const ans = answers[q.id];
  if(ans===undefined) return;
  switch(q.type){
    case 'single':
      document.querySelectorAll(`input[name="q_${q.id}"]`).forEach(r=>{
        if(r.value===ans){r.checked=true;r.closest('label').classList.add('selected');}
      });break;
    case 'multiple':
      if(Array.isArray(ans)) document.querySelectorAll(`input[name="q_${q.id}"]`).forEach(cb=>{
        if(ans.includes(cb.value)){cb.checked=true;cb.closest('label').classList.add('selected');}
      });break;
    case 'text':case 'textarea':
      const el=document.getElementById('input_'+q.id);if(el)el.value=ans;break;
    case 'rating':
      updateStars(q.id,ans);break;
    case 'scale':
      document.querySelector(`input[type=range]`).value=ans;
      document.getElementById('scaleVal_'+q.id).textContent=ans;break;
    case 'yesno':
      if(ans==='yes')document.getElementById('yn_yes_'+q.id).classList.add('selected-yes');
      else if(ans==='no')document.getElementById('yn_no_'+q.id).classList.add('selected-no');break;
  }
}

function selectSingle(label,qId,val){
  document.querySelectorAll(`label[onclick*="q_${qId}"],label[onclick*="${qId}"]`).forEach(l=>l.classList.remove('selected'));
  document.querySelectorAll('.opt-card').forEach(l=>{const r=l.querySelector('input[type=radio]');if(r&&r.name==='q_'+qId)l.classList.remove('selected');});
  label.classList.add('selected');
  answers[qId]=val;
}

function toggleMulti(label,qId,val){
  if(!Array.isArray(answers[qId])) answers[qId]=[];
  if(label.classList.contains('selected')){
    label.classList.remove('selected');
    answers[qId]=answers[qId].filter(v=>v!==val);
  }else{
    label.classList.add('selected');
    answers[qId].push(val);
  }
}

function selectStar(qId,val){
  answers[qId]=val;
  updateStars(qId,val);
}

function updateStars(qId,val){
  const stars=document.querySelectorAll('.star');
  stars.forEach(s=>{s.classList.toggle('active',parseInt(s.dataset.val)<=val);});
  const lbl=document.getElementById('starLabel_'+qId);
  if(lbl) lbl.textContent=['','ضعيف','مقبول','جيد','جيد جداً','ممتاز'][val]||val+' نجوم';
}

function selectYesNo(qId,val){
  answers[qId]=val;
  document.getElementById('yn_yes_'+qId).className='yesno-btn'+(val==='yes'?' selected-yes':'');
  document.getElementById('yn_no_'+qId).className='yesno-btn'+(val==='no'?' selected-no':'');
}

function getAnswer(q){
  if(q.type==='scale' && answers[q.id]===undefined) return 5;
  return answers[q.id];
}

function validateCurrent(){
  const q=activeQuestions[currentIndex];
  if(!q.required) return true;
  const ans=getAnswer(q);
  if(ans===undefined||ans===null||ans==='') return false;
  if(Array.isArray(ans)&&ans.length===0) return false;
  return true;
}

function goNext(){
  const q=activeQuestions[currentIndex];
  // sync text inputs
  const inp=document.getElementById('input_'+q.id);
  if(inp) answers[q.id]=inp.value;
  if(!validateCurrent()){
    document.getElementById('errMsg').style.display='block';return;
  }
  currentIndex++;
  showQuestion();
}

function goBack(){
  if(currentIndex>0){currentIndex--;showQuestion();}
  else{showStartScreen();}
}

function updateProgress(){
  const pct = activeQuestions.length>0 ? Math.round((currentIndex/activeQuestions.length)*100) : 0;
  document.getElementById('progressBar').style.width=pct+'%';
}

async function submitSurvey(){
  const q=activeQuestions[currentIndex];
  const inp=document.getElementById('input_'+q.id);
  if(inp) answers[q.id]=inp.value;
  if(!validateCurrent()){
    document.getElementById('errMsg').style.display='block';return;
  }
  document.getElementById('progressBar').style.width='100%';
  setContent('<div class="card"><div class="card-body"><div class="loading"><div class="spinner"></div><p>جاري الإرسال...</p></div></div></div>');
  try{
    const response = await sbFetch('survey_responses',{
      method:'POST',
      headers:{'Prefer':'return=representation'},
      body:JSON.stringify({
        survey_id:surveyId,
        school_id:schoolId||null,
        respondent_name:respondentName||'مجهول',
        respondent_role:respondentRole,
        respondent_id:userId||null
      })
    });
    const responseId = response[0].id;
    const answersArr = activeQuestions.map(q=>({
      response_id:responseId,
      question_id:q.id,
      answer_value:JSON.stringify(getAnswer(q)||'')
    })).filter(a=>a.answer_value!==undefined);
    if(answersArr.length){
      await sbFetch('survey_answers',{method:'POST',body:JSON.stringify(answersArr)});
    }
    sessionStorage.setItem('survey_done_'+surveyId,'1');
    showSuccess();
  }catch(e){
    setContent(`<div class="card"><div class="card-body"><div class="unavailable"><div class="icon">❌</div><h2>خطأ في الإرسال</h2><p>${e.message}</p><br><button class="btn btn-submit" onclick="location.reload()">إعادة المحاولة</button></div></div></div>`);
  }
}

function showSuccess(){
  setContent(`
  <div class="card">
    <div class="success-screen">
      <div class="success-icon">🎉</div>
      <h2>شكراً لمشاركتك!</h2>
      <p>تم إرسال إجاباتك بنجاح</p>
      <div class="countdown" id="countdown">5</div>
      <p style="color:#aaa;font-size:13px">سيتم توجيهك تلقائياً</p>
      <button class="btn-home" onclick="goHome()">العودة إلى البوابة</button>
    </div>
  </div>`);
  let n=5;
  const iv=setInterval(()=>{
    n--;
    const el=document.getElementById('countdown');
    if(el) el.textContent=n;
    if(n<=0){clearInterval(iv);goHome();}
  },1000);
}

function goHome(){
  const dest = roleMap[role]||'index.html';
  window.location.href=dest;
}

init();
</script>
